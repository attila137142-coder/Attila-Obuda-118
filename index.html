<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Attila Közlekedés – térkép</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
height:100%;
margin:0;
}

#map{
width:100%;
height:100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.55,19.04],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var busIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/61/61231.png',
iconSize:[28,28]
});

var stopIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/854/854878.png',
iconSize:[16,16]
});

var vehicles = [
{id:1,lat:47.55,lon:19.04},
{id:2,lat:47.56,lon:19.03},
{id:3,lat:47.57,lon:19.05},
{id:4,lat:47.54,lon:19.06}
];

var markers = {};

vehicles.forEach(function(v){
markers[v.id] = L.marker([v.lat,v.lon],{icon:busIcon}).addTo(map);
});

function moveVehicles(){

vehicles.forEach(function(v){

v.lat += (Math.random()-0.5)*0.002;
v.lon += (Math.random()-0.5)*0.002;

markers[v.id].setLatLng([v.lat,v.lon]);

});

}

setInterval(moveVehicles,15000);

var stops = [

["Békásmegyer H",47.5985,19.0552],
["Békásmegyer lakótelep",47.5965,19.0581],
["Pünkösdfürdő",47.5889,19.0553],
["Csillaghegy H",47.5797,19.0484],
["Római fürdő",47.5750,19.0454],
["Aquincum H",47.5673,19.0459],
["Szentlélek tér H",47.5393,19.0460],
["Flórián tér",47.5440,19.0406],
["Kolosy tér",47.5296,19.0382],
["Óbuda vasútállomás",47.5586,19.0432],
["Kaszdűlő H",47.5638,19.0511],

["Szentendre autóbusz-állomás",47.6673,19.0756],
["Pomáz HÉV-állomás",47.6410,19.0273],
["Budakalász HÉV-állomás",47.6168,19.0453],
["Leányfalu központ",47.7140,19.0854],
["Tahitótfalu híd",47.7502,19.0864]

];

stops.forEach(function(s){

L.marker([s[1],s[2]],{icon:stopIcon})
.addTo(map)
.bindPopup(s[0]);

});

</script>

</body>
</html>
