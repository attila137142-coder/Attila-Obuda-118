<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Attila Közlekedés Teszt</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; }
#map { height:100vh; }

.busBKV {color:blue;}
.busVOLAN {color:yellow;}
.hev {color:green;}
.test {color:red;}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.60,19.05],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

function jarmu(lat,lon,szin,szoveg){

L.circleMarker([lat,lon],{
radius:8,
color:szin,
fillColor:szin,
fillOpacity:0.9
}).addTo(map)
.bindPopup(szoveg);

}

jarmu(
47.6103,
19.0956,
"blue",
"BKV 160<br>Mercedes<br>Rendszám: ABC123<br>Késés: +40 mp"
);

jarmu(
47.6035,
19.0487,
"blue",
"BKV 243<br>MAN<br>Késés: -15 mp"
);

jarmu(
47.5850,
19.0400,
"green",
"H5 HÉV<br>6 kocsis szerelvény"
);

jarmu(
47.6020,
19.0700,
"yellow",
"Volánbusz 889 → 3089<br>Szentendre"
);

jarmu(
47.5980,
19.0600,
"red",
"TESZT JÁRMŰ<br>Forda: 12"
);

</script>

</body>
</html>
