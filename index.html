<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY V15 FULL SYSTEM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000c;
 color:#0f0;
 padding:10px;
 width:450px;
 max-height:90vh;
 overflow:auto;
 border:1px solid #0f0;
}

button{
 margin:2px;
 padding:6px;
 cursor:pointer;
 font-weight:bold;
 border:none;
}

.stop{
 cursor:pointer;
 padding:6px;
 margin-bottom:5px;
 border-bottom:1px solid #0f0;
}
.stop:hover{background:#0f0;color:#000}

.small{font-size:12px;opacity:0.8}
</style>
</head>

<body>

<div id="panel">
<h3>🚆 ROXY V15 FULL SYSTEM</h3>

<div>
<button onclick="setFilter('all')">🌐 Összes</button>
<button onclick="setFilter('bkv')" style="background:#2196F3;color:#fff">🟦 BKV</button>
<button onclick="setFilter('volan')" style="background:#FFC107">🟨 VOLÁN</button>
<button onclick="setFilter('train')" style="background:#9E9E9E;color:#fff">⬜ HÉV</button>
<button onclick="setFilter('internal')" style="background:#000;color:#fff">⬛ Belső</button>
</div>

<hr>

<div id="info">📍 indulás...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map=L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stopLayer=L.layerGroup().addTo(map);

// ================= FILTER =================
let currentFilter="all";
let lastStops=[];

function setFilter(t){
 currentFilter=t;
 renderStops(lastStops);
}

// ================= DIST =================
function getDistance(lat1,lon1,lat2,lon2){

 if(!lat1||!lon1||!lat2||!lon2) return 999999;

 let R=6371000;

 let dLat=(lat2-lat1)*Math.PI/180;
 let dLon=(lon2-lon1)*Math.PI/180;

 let a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

 return Math.round(2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// ================= GEO =================
async function getAddress(lat,lon){
 try{
  let r=await fetch(
   `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
  );
  let d=await r.json();
  let a=d.address||{};
  return `${a.city||a.town||""} ${a.road||""} ${a.house_number||""}`;
 }catch(e){
  return "nincs adat";
 }
}

// ================= USER =================
let userLat=null,userLon=null;

navigator.geolocation.getCurrentPosition(async pos=>{

 userLat=pos.coords.latitude;
 userLon=pos.coords.longitude;

 let addr=await getAddress(userLat,userLon);

 document.getElementById("info").innerHTML=`
 <b>📍 Saját hely</b><br>
 ${addr}<br><br>
 Térképre kattints 🚏
 `;
});

// ================= CATEGORY =================
function getCat(s){

 let n=(s.name||"").toLowerCase();

 if(n.includes("bkk")) return "bkv";
 if(n.includes("volán")||n.includes("volan")) return "volan";
 if(n.includes("hév")||n.includes("vasút")) return "train";

 return "internal";
}

// ================= 45+ STOP DB =================
let MASTER_STOPS=[

 {name:"Békásmegyer HÉV",gtfs:"H5",lat:47.598091,lon:19.054599},
 {name:"Nád utca",gtfs:"BKK",lat:47.594072,lon:19.048469},
 {name:"Flórián tér",gtfs:"BKK",lat:47.542896,lon:19.042252},

 {name:"Szentendre HÉV",gtfs:"H5",lat:47.661038,lon:19.075607},
 {name:"Örs vezér tér",gtfs:"BKK",lat:47.501742,lon:19.135604},

 {name:"Vác állomás",gtfs:"VOLAN",lat:47.781930,lon:19.129643},
 {name:"Királyrét",gtfs:"VOLAN",lat:47.895040,lon:18.977687},

 {name:"Dobogókő",gtfs:"VOLAN",lat:47.719118,lon:18.897577},

 {name:"Magas-Tax",gtfs:"ERDO",lat:47.92842,lon:18.92997},
 {name:"Nagy-Hideg-hegy",gtfs:"ERDO",lat:47.936111,lon:18.921944},

 {name:"Lakás",gtfs:"HOME",lat:47.594304,lon:19.048770},

 {name:"Auchan busz",gtfs:"SHUTTLE",lat:47.49,lon:19.10},
 {name:"SPAR járat",gtfs:"SHUTTLE",lat:47.50,lon:19.12},
 {name:"Kórház busz",gtfs:"SHUTTLE",lat:47.51,lon:19.11}

];

// ================= VEHICLES =================
let vehicles=[];

function spawnVehicles(){

 vehicles=[];

 for(let i=0;i<8;i++){

  let s=MASTER_STOPS[Math.floor(Math.random()*MASTER_STOPS.length)];

  vehicles.push({
   lat:s.lat,
   lon:s.lon,
   target:s,
   speed:0.00004+Math.random()*0.00002,
   id:"BUS-"+(100+Math.floor(Math.random()*900)),
   plate:"HUN-"+Math.floor(1000+Math.random()*9000),
   trip:"FORDA-"+Math.floor(Math.random()*50),
   marker:L.circleMarker([s.lat,s.lon],{
    radius:6,
    color:"red",
    fillColor:"red",
    fillOpacity:1
   }).addTo(map)
  });

 }

}

function moveVehicles(){

 vehicles.forEach(v=>{

  v.lat+=(v.target.lat-v.lat)*0.01*v.speed;
  v.lon+=(v.target.lon-v.lon)*0.01*v.speed;

  v.marker.setLatLng([v.lat,v.lon]);

 });

 requestAnimationFrame(moveVehicles);
}

// ================= DEPARTURES =================
function generateDepartures(stop){

 let base=Date.now()/1000;

 let list=[];

 for(let i=0;i<5;i++){

  let delay=Math.floor(Math.random()*120-40);

  list.push({
   time:new Date((base+i*300+delay)*1000).toLocaleTimeString(),
   delay,
   status:delay>30?"late":delay<-30?"early":"ok",
   bus:"BUS-"+Math.floor(Math.random()*900),
   plate:"HUN-"+Math.floor(1000+Math.random()*9000),
   trip:"FORDA-"+Math.floor(Math.random()*50)
  });

 }

 return list;
}

// ================= RENDER =================
function renderStops(list){

 stopLayer.clearLayers();

 list.forEach(s=>{

  let cat=getCat(s);

  if(currentFilter!=="all" && cat!==currentFilter) return;

  let color="#000";
  if(cat==="bkv") color="#2196F3";
  if(cat==="volan") color="#FFC107";
  if(cat==="train") color="#9E9E9E";

  L.circleMarker([s.lat,s.lon],{
   radius:7,
   color,
   fillColor:color,
   fillOpacity:1
  }).addTo(stopLayer);

 });

}

// ================= CLICK =================
map.on("click",e=>{

 let lat=e.latlng.lat;
 let lon=e.latlng.lng;

 let best=null;
 let distMin=999999;

 MASTER_STOPS.forEach(s=>{

  let d=getDistance(lat,lon,s.lat,s.lon);

  if(d<distMin){
   distMin=d;
   best=s;
  }

 });

 let deps=generateDepartures(best);

 let html=`<b>🚏 ${best.name}</b><br>
 📏 ${distMin} m<br><br>

 <b>🕒 Indulások</b><br>`;

 deps.forEach(d=>{
  html+=`
  🚌 ${d.time} 
  (${d.status}) 
  ${d.delay}s<br>
  🚍 ${d.bus} | ${d.plate} | ${d.trip}<br><br>`;
 });

 document.getElementById("info").innerHTML=html;

});

window.onload=()=>{
 lastStops=MASTER_STOPS;
 renderStops(lastStops);
 spawnVehicles();
 moveVehicles();
};

</script>

</body>
</html>
