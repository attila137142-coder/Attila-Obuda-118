<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés – GTFS PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#panel {
 position:absolute;
 top:10px;
 left:10px;
 z-index:1000;
 background:white;
 padding:10px;
 width:320px;
 max-height:90vh;
 overflow:auto;
}
button { width:100%; margin-top:5px; }
</style>
</head>

<body>

<div id="panel">

<h3>📍 Helyadat</h3>
<div id="loc">...</div>

<h3>🚏 Legközelebbi GTFS megállók</h3>
<div id="stops"></div>

<h3>🗺️ Rétegek</h3>
<button onclick="setOSM()">Alap</button>
<button onclick="setRail()">Vasút</button>

<h3>🌲 POI</h3>
<button onclick="loadPOI()">Turista POI</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🌍 MAP
let map = L.map('map').setView([47.5,19.04],13);

let osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
let rail = L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png');

osm.addTo(map);

function setOSM(){ map.eachLayer(l=>map.removeLayer(l)); osm.addTo(map); }
function setRail(){ map.eachLayer(l=>map.removeLayer(l)); rail.addTo(map); }

let stopLayer = L.layerGroup().addTo(map);
let poiLayer = L.layerGroup().addTo(map);

let userLat, userLon;

// 📍 HELY
navigator.geolocation.getCurrentPosition(async pos=>{

 userLat = pos.coords.latitude;
 userLon = pos.coords.longitude;

 L.marker([userLat,userLon]).addTo(map).bindPopup("Te itt vagy");
 map.setView([userLat,userLon],14);

 // cím
 let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`);
 let d = await res.json();

 document.getElementById("loc").innerHTML = d.display_name;

 loadGTFS();

});

// 📏 távolság
function dist(a,b){
 return map.distance(a,b);
}

// 🚏 GTFS BETÖLTÉS
async function loadGTFS(){

 let res = await fetch("stops.txt");
 let text = await res.text();

 let rows = text.split("\n");

 let stops = [];

 rows.slice(1).forEach(r=>{
  let c = r.split(",");

  let stop = {
   id:c[0],
   name:c[2],
   lat:parseFloat(c[4]),
   lon:parseFloat(c[5])
  };

  if(!isNaN(stop.lat)) stops.push(stop);
 });

 // távolság számítás
 stops.forEach(s=>{
  s.dist = dist([userLat,userLon],[s.lat,s.lon]);
 });

 stops.sort((a,b)=>a.dist-b.dist);

 stopLayer.clearLayers();

 let html="";

 stops.slice(0,15).forEach(s=>{

  html += `${s.name} (${s.id}) – ${Math.round(s.dist)} m<br>`;

  L.circleMarker([s.lat,s.lon],{radius:5})
   .addTo(stopLayer)
   .bindPopup(`${s.name}<br>${s.id}<br>${Math.round(s.dist)} m`);

 });

 document.getElementById("stops").innerHTML = html;

}

// 🌲 POI (Börzsöny / Pilis / Budai)
async function loadPOI(){

 let query = `
 [out:json];
 (
  node["tourism"](47.6,18.7,47.9,19.3);
 );
 out;
 `;

 let res = await fetch("https://overpass-api.de/api/interpreter",{
  method:"POST",
  body:query
 });

 let data = await res.json();

 poiLayer.clearLayers();

 data.elements.forEach(p=>{
  L.marker([p.lat,p.lon])
   .addTo(poiLayer)
   .bindPopup(p.tags.name || "POI");
 });

}

</script>

</body>
</html>
