<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Navigáció</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:10px;
}
input,button{
width:100%;
padding:10px;
margin-top:5px;
}
</style>
</head>

<body>

<button onclick="back()">⬅ Vissza</button>

<h2>🧭 Navigáció</h2>

<input id="lat" placeholder="Cél latitude (pl: 47.5)">
<input id="lon" placeholder="Cél longitude (pl: 19.04)">

<button onclick="go()">Navigáció indítása</button>

<script>
function back(){
window.location.href="index.html";
}

function go(){
let lat=document.getElementById("lat").value;
let lon=document.getElementById("lon").value;

window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}
</script>

</body>
</html>
