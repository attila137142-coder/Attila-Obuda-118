<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY V4 FULL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000c;
 color:#0f0;
 padding:10px;
 width:340px;
 border:1px solid #0f0;
 max-height:90vh;
 overflow:auto;
}

.stop{
 cursor:pointer;
 padding:4px;
 margin-bottom:5px;
 border-bottom:1px solid #0f0;
}
.stop:hover{
 background:#0f0;
 color:#000;
}
.small{opacity:0.8;font-size:12px}
</style>
</head>

<body>

<div id="panel">
<h3>🚆 ROXY V4</h3>
<div id="info">📍 Helyzet betöltése...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stopLayer = L.layerGroup().addTo(map);

// ================= USER GPS =================
let userLat=null,userLon=null;
let userAddress="📍 ismeretlen hely";

function formatDistance(m){
 if(m<1000) return `${m} m`;
 return `${(m/1000).toFixed(2)} km`;
}

// ================= DIST =================
function getDistance(lat1,lon1,lat2,lon2){
 let R=6371000;
 let dLat=(lat2-lat1)*Math.PI/180;
 let dLon=(lon2-lon1)*Math.PI/180;

 let a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

 let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
 return Math.round(R*c);
}

// ================= ADDRESS =================
async function getAddress(lat,lon){
 try{
  let res=await fetch(
   `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
  );
  let d=await res.json();
  let a=d.address;

  return `${a.city || a.town || a.village || ""} 
  ${a.road || ""} 
  ${a.house_number || ""}`;
 }catch(e){
  return "nincs adat";
 }
}

// ================= USER LOCATION =================
navigator.geolocation.getCurrentPosition(async pos=>{
 userLat=pos.coords.latitude;
 userLon=pos.coords.longitude;

 userAddress = await getAddress(userLat,userLon);

 document.getElementById("info").innerHTML=`
 <b>📍 Saját helyzeted</b><br>
 ${userAddress}<br><br>
 Térképre kattints 🚏
 `;
});

// ================= OVERPASS =================
async function fetchOverpass(query){
 let urls=[
  "https://overpass-api.de/api/interpreter",
  "https://lz4.overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter"
 ];

 for(let url of urls){
  try{
   let res=await fetch(url,{method:"POST",body:query});
   if(res.ok) return await res.json();
  }catch(e){}
 }
 throw "no server";
}

// ================= GTFS =================
let GTFS={stopTimes:[]};

async function loadGTFS(){
 try{
  let res=await fetch("stop_times.txt");
  let text=await res.text();
  let lines=text.split("\n");

  for(let i=1;i<lines.length;i++){
   let c=lines[i].split(",");

   GTFS.stopTimes.push({
    trip_id:c[0],
    arr:c[1],
    dep:c[2],
    stop_id:c[3]
   });
  }

 }catch(e){
  console.log("GTFS hiba");
 }
}

// ================= NEXT DEPARTURES =================
function getNextDepartures(stopId){
 let now=new Date();
 let current=
  now.getHours().toString().padStart(2,'0')+":"+
  now.getMinutes().toString().padStart(2,'0');

 let res=[];

 GTFS.stopTimes.forEach(s=>{
  if(s.stop_id===stopId && s.dep>=current){
   res.push(s.dep);
  }
 });

 return res.sort().slice(0,10);
}

// ================= MAP CLICK =================
map.on("click",async e=>{

 let lat=e.latlng.lat;
 let lon=e.latlng.lng;

 document.getElementById("info").innerHTML="🔍 keresés...";

 let query=`
 [out:json];
 (
  node(around:600,${lat},${lon})["highway"="bus_stop"];
  node(around:600,${lat},${lon})["public_transport"="platform"];
  node(around:600,${lat},${lon})["railway"="tram_stop"];
  node(around:600,${lat},${lon})["railway"="station"];
 );
 out;
 `;

 try{

  let data=await fetchOverpass(query);

  stopLayer.clearLayers();

  let used={};
  let html="<b>🚏 Közeli megállók:</b><br><br>";

  data.elements.forEach(s=>{

   let name=s.tags?.name;
   if(!name) return;
   if(used[name]) return;
   used[name]=true;

   let dist=userLat
    ? getDistance(userLat,userLon,s.lat,s.lon)
    : null;

   L.circleMarker([s.lat,s.lon],{
    radius:8,color:"yellow",fillColor:"yellow",fillOpacity:1
   }).addTo(stopLayer);

   html+=`
   <div class="stop"
   onclick="selectStop('${name}',${s.lat},${s.lon},'${s.id}')">

   🚏 ${name}<br>
   <span class="small">
   📏 ${dist ? formatDistance(dist) : "?"}
   </span><br>
   🆔 ${s.id}

   </div>`;
  });

  document.getElementById("info").innerHTML=html;

 }catch(e){
  document.getElementById("info").innerHTML="⚠️ hálózati hiba";
 }

});

// ================= SELECT STOP =================
async function selectStop(name,lat,lon,id){

 map.setView([lat,lon],16);

 let addr=await getAddress(lat,lon);
 let times=getNextDepartures(id);

 let html=`<b>🚏 ${name}</b><br><br>`;
 html+=`📍 ${addr}<br><br>`;
 html+=`🆔 ${id}<br><br>`;

 html+="<b>🕒 Indulások:</b><br>";

 if(times.length===0){
  html+="❌ nincs adat";
 }else{
  times.forEach(t=>html+="🕒 "+t+"<br>");
 }

 document.getElementById("info").innerHTML=html;
}

// ================= INIT =================
window.onload=()=>{
 loadGTFS();
};

</script>

</body>
</html>
