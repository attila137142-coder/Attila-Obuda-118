<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>REAL GPS DISPATCH MODE - GTFS ENGINE</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:#e2e8f0; }
    header { padding:12px; background:#111827; display:flex; justify-content:space-between; align-items:center; }
    h1 { font-size:14px; margin:0; }
    .btn { background:#2563eb; border:none; padding:8px 10px; color:#fff; border-radius:8px; cursor:pointer; }
    .grid { display:grid; gap:10px; padding:10px; }
    .card { background:#1f2937; padding:10px; border-radius:12px; }
    input { width:100%; padding:10px; border-radius:8px; border:none; margin-top:5px; }
    #map { height:300px; border-radius:12px; }
    .small { font-size:12px; opacity:0.85; white-space:pre-line; }
    .resultBox { margin-top:8px; padding:8px; background:#111827; border-radius:8px; cursor:pointer; }

    #menu { position:fixed; inset:0; background:#0b1220; display:none; padding:20px; z-index:999; overflow:auto; }

    /* DISPATCH COLORS */
    .onTime { color:#e2e8f0; }
    .late { color:#60a5fa; }
    .early { color:#ef4444; }

    .tag { font-size:11px; padding:2px 6px; border-radius:6px; background:#374151; margin-left:5px; }
  </style>
</head>
<body>

<header>
  <h1>🧭 REAL GPS DISPATCH MODE</h1>
  <button class="btn" onclick="toggleMenu()">Menü</button>
</header>

<div id="menu">
  <h2>🚆 GTFS ENGINE</h2>
  <p>Járatok / útvonal / import</p>
  <button class="btn" onclick="toggleMenu()">Bezár</button>
</div>

<div class="grid">

  <div class="card">
    <h3>🔍 Megálló kereső</h3>
    <input id="search" placeholder="Név vagy GTFS" oninput="searchStops()" />
    <div id="results" class="small"></div>
  </div>

  <div class="card">
    <h3>🗺️ Térkép</h3>
    <div id="map"></div>
  </div>

  <div class="card">
    <h3>📊 Megálló menetrend (DISPATCH)</h3>
    <div id="schedule" class="small">Válassz megállót...</div>
  </div>

</div>

<script>

let map;
let userLat=null, userLon=null;
let selectedStop=null;

// ---------------- GTFS STOPS ----------------
const stops = [
  {gtfs:"BKK_001", name:"Deák Ferenc tér", lat:47.4975, lon:19.0550},
  {gtfs:"BKK_002", name:"Örs vezér tere", lat:47.5017, lon:19.1356},
  {gtfs:"BKK_003", name:"Batthyány tér", lat:47.5060, lon:19.0394},
  {gtfs:"H5_001", name:"Békásmegyer HÉV", lat:47.5981, lon:19.0546}
];

// ---------------- MOCK TIMETABLE ----------------
function getTimetable(stop){
  const now = new Date();
  const base = now.getHours()*60 + now.getMinutes();

  return [
    base - 4,
    base + 2,
    base + 10
  ];
}

function statusText(mins){
  if(mins < 0) return {text:`KÉSIK ${Math.abs(mins)}p`, cls:"late"};
  if(mins === 0) return {text:`IDŐBEN`, cls:"onTime"};
  if(mins > 0) return {text:`SIET ${mins}p`, cls:"early"};
}

// ---------------- GPS REAL MODE ----------------
function startGPS(){
  if(!navigator.geolocation) return;

  navigator.geolocation.watchPosition(pos=>{
    userLat=pos.coords.latitude;
    userLon=pos.coords.longitude;
  });
}

// ---------------- DISTANCE ----------------
function dist(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ---------------- SEARCH ----------------
function searchStops(){
  const q=document.getElementById('search').value.toLowerCase();
  const res=document.getElementById('results');
  res.innerHTML="";

  stops.filter(s=>s.name.toLowerCase().includes(q)||s.gtfs.toLowerCase().includes(q))
  .forEach(s=>{

    let d="";
    if(userLat) d=` | 📏 ${dist(userLat,userLon,s.lat,s.lon).toFixed(2)} km`;

    const div=document.createElement("div");
    div.className="resultBox";
    div.innerHTML=`🚏 ${s.name}<br>🆔 ${s.gtfs}<br>${d}`;

    div.onclick=()=>renderSchedule(s);

    res.appendChild(div);
  });
}

// ---------------- SCHEDULE RENDER ----------------
function renderSchedule(stop){
  selectedStop=stop;
  const box=document.getElementById('schedule');

  const times=getTimetable(stop);

  box.innerHTML=`<b>${stop.name}</b><br><br>`;

  times.forEach(t=>{
    const now=new Date();
    const current=now.getHours()*60+now.getMinutes();
    const diff=t-current;

    const st=statusText(diff);

    const h=Math.floor(t/60);
    const m=t%60;

    box.innerHTML+=`
      <div class="${st.cls}">
        🕒 ${h}:${m.toString().padStart(2,'0')} 
        <span class="tag">${st.text}</span>
      </div>
    `;
  });
}

// ---------------- MAP ----------------
window.onload=()=>{
  map=L.map('map').setView([47.5,19.05],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  stops.forEach(s=>{
    L.marker([s.lat,s.lon]).addTo(map)
    .bindPopup(s.name)
    .on('click',()=>renderSchedule(s));
  });

  startGPS();
};

// ---------------- MENU ----------------
function toggleMenu(){
  const m=document.getElementById('menu');
  m.style.display=m.style.display==='block'?'none':'block';
}

</script>

</body>
</html>
