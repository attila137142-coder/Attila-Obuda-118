<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Attila Közlekedés térkép</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.4979, 19.0402], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
}).addTo(map);


L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap'
}).addTo(map);
L.marker([47.539,19.046]).addTo(map)
.bindPopup("Óbuda megálló");

L.marker([47.520,19.056]).addTo(map)
.bindPopup("Margit híd");

L.marker([47.4979,19.0402]).addTo(map)
.bindPopup("Belváros");
48 // IDE JÖN AZ ÚJ KÓD

// jármű ikon
var busIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/61/61231.png',
    iconSize: [32,32]
});

// járművek
var vehicles = [
    {id:1, lat:47.4979, lon:19.0402},
    {id:2, lat:47.52, lon:19.05},
    {id:3, lat:47.49, lon:19.02},
    {id:4, lat:47.51, lon:19.07}
];

var markers = {};

vehicles.forEach(v=>{
    markers[v.id] = L.marker([v.lat, v.lon],{icon:busIcon}).addTo(map)
});
// megállók (BKK + Volán)
var stops = [
["Békásmegyer H",47.5985,19.0552],
["Békásmegyer lakótelep",47.5965,19.0581],
["Pünkösdfürdő",47.5889,19.0553],
["Csillaghegy H",47.5797,19.0484],
["Római fürdő",47.5750,19.0454],
["Aquincum H",47.5673,19.0459],
["Szentlélek tér H",47.5393,19.0460],
["Flórián tér",47.5440,19.0406],
["Kolosy tér",47.5296,19.0382],
["Óbuda vasútállomás",47.5586,19.0432],
["Kaszásdűlő H",47.5638,19.0511],

["Szentendre autóbusz-állomás",47.6673,19.0756],
["Pomáz HÉV-állomás",47.6410,19.0273],
["Budakalász HÉV-állomás",47.6168,19.0453],
["Leányfalu központ",47.7140,19.0854],
["Tahitótfalu híd",47.7502,19.0864],
];
function moveVehicles(){
    vehicles.forEach(v=>{
        v.lat += (Math.random()-0.5)*0.002
        v.lon += (Math.random()-0.5)*0.002
        markers[v.id].setLatLng([v.lat,v.lon])
    })
}

setInterval(moveVehicles,5000);</script>

</body>
</html>
