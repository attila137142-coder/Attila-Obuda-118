<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GTFS SMART COCKPIT v6.1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; background:#0f0f0f; color:#fff; }
#map { height: 55vh; }
.container { display:flex; }
.panel { width:40%; padding:10px; }
.detail { width:60%; padding:10px; background:#151515; }
input { width:100%; padding:10px; margin-bottom:10px; }
.item { padding:6px; border-bottom:1px solid #333; cursor:pointer; }
.item:hover { background:#222; }
.box { background:#1e1e1e; padding:10px; border-radius:8px; }
</style>
</head>

<body>

<div id="map"></div>

<div class="container">

<!-- LEFT -->
<div class="panel">

<input id="search" placeholder="🔎 keresés..." oninput="smartSearch()"/>

<div id="list" class="box"></div>

</div>

<!-- RIGHT -->
<div class="detail box" id="detail">
  📍 válassz egy megállót
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([47.3,19.3],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let user = null;
let selected = null;

let stops = [
  {name:"Nád utca", gtfs:"BKK-F00457", lat:47.594072, lng:19.048469},
  {name:"Flórián tér", gtfs:"BKK-F00611", lat:47.542896, lng:19.042252},
  {name:"Batthyány tér", gtfs:"BKK-F00057", lat:47.506002, lng:19.039456},
  {name:"Békásmegyer HÉV", gtfs:"H5-09183", lat:47.598091, lng:19.054599},
  {name:"Szentendre HÉV", gtfs:"H5-09142221", lat:47.661038, lng:19.075607},
  {name:"Dobogókő", gtfs:"VOL-778561", lat:47.719118, lng:18.897577},
  {name:"Keleti pályaudvar", gtfs:"MAV-KELETI", lat:47.5009, lng:19.0836},
  {name:"Királyrét", gtfs:"KISVASUT", lat:47.9100, lng:18.9730},
  {name:"Csóványos", gtfs:"TURA", lat:47.94908, lng:18.9483}
];

// ---------------- GPS ----------------
navigator.geolocation.watchPosition(p=>{
  user = {lat:p.coords.latitude,lng:p.coords.longitude};
});

// ---------------- SMART SEARCH ----------------
function smartSearch(){

  let q = document.getElementById("search").value.toLowerCase();

  let res = stops.filter(s =>
    s.name.toLowerCase().includes(q)
  );

  renderList(res);
}

// ---------------- LIST ----------------
function renderList(list){

  document.getElementById("list").innerHTML =
    list.map(s=>`
      <div class="item" onclick="selectStop('${s.gtfs}')">
        🚏 ${s.name}
      </div>
    `).join("");
}

// ---------------- SELECT ----------------
function selectStop(id){

  let s = stops.find(x=>x.gtfs===id);
  selected = s;

  let d = getDistance(s);

  document.getElementById("detail").innerHTML = `
    <h3>🚏 ${s.name}</h3>

    🆔 GTFS: <b>${s.gtfs}</b><br><br>

    📍 Koordináta:<br>
    ${s.lat.toFixed(6)}, ${s.lng.toFixed(6)}<br><br>

    📏 Légvonal: <b>${d.air} m</b><br>
    🛣️ Közút (becsült): <b>${d.road} m</b>
  `;
}

// ---------------- DISTANCE ----------------
function getDistance(s){

  if(!user) return {air:0,road:0};

  let air = hav(user.lat,user.lng,s.lat,s.lng);

  // egyszerűsített közút (x1.3–1.8 szorzó)
  let road = air * 1.4;

  return {
    air: Math.round(air),
    road: Math.round(road)
  };
}

// ---------------- HAVERSINE ----------------
function hav(lat1,lon1,lat2,lon2){

  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;

  const a=
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// INIT
renderList(stops);
</script>

</body>
</html>
