// ---------------- GPS ----------------
navigator.geolocation.watchPosition(pos=>{
  userPos = {lat:pos.coords.latitude,lng:pos.coords.longitude};

  render();
});

// ---------------- MODE ----------------
function setMode(m){
  mode = m;
  render();
}

// ---------------- TOGGLE ----------------
function toggleStops(){
  showStops = !showStops;
  render();
}

// ---------------- FILTER ----------------
function filter(type){
  markers.clearLayers();

  stops.filter(s=>s.type===type).forEach(s=>{
    addStop(s);
  });

  render();
}

// ---------------- STOP RENDER ----------------
function addStop(s){
  let m = L.marker([s.lat,s.lng]).addTo(markers);

  let dist = userPos ? haversine(userPos.lat,userPos.lng,s.lat,s.lng) : 0;

  m.bindPopup(`
    🚏 ${s.name}<br>
    🆔 ${s.id}<br>
    📏 ${dist.toFixed(0)} m
  `);
}

// ---------------- DISTANCE ----------------
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ---------------- MAIN RENDER ----------------
function render(){

  if(showStops){
    markers.clearLayers();
    stops.forEach(s=>addStop(s));
  }

  let text = `
    🧭 MODE: ${mode}<br>
    📍 User: ${userPos ? userPos.lat.toFixed(5)+", "+userPos.lng.toFixed(5) : "no GPS"}<br>
    🚏 Stops loaded: ${stops.length}<br>
  `;

  document.getElementById("info").innerHTML = text;
}
