<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Attila Közlekedés – Diszpécser térkép</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body{
margin:0;
padding:0;
height:100%;
font-family:Arial;
}

#map{
height:100%;
width:100%;
}

#menuButton{
position:absolute;
top:15px;
left:15px;
z-index:1000;
background:white;
border-radius:6px;
padding:8px 12px;
cursor:pointer;
font-size:18px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

#menuPanel{

position:absolute;
top:60px;
left:15px;
width:260px;
background:white;
border-radius:10px;
padding:15px;
z-index:1000;
box-shadow:0 4px 10px rgba(0,0,0,0.3);

}

.menuButton{

width:100%;
padding:10px;
margin-top:8px;
border:none;
background:#e6e6e6;
border-radius:8px;
font-size:15px;
cursor:pointer;

}

.menuButton:hover{
background:#d4d4d4;
}

h2{
margin-top:0;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="menuButton" onclick="toggleMenu()">☰</div>

<div id="menuPanel">

<h2>Attila Közlekedés<br>Diszpécser térkép</h2>

<b>Térkép</b>

<button class="menuButton" onclick="setStreet()">Utcai térkép</button>
<button class="menuButton" onclick="setTopo()">Topográfia</button>

<br><br>

<b>Pozíció</b>

<button class="menuButton" onclick="locate()">Saját pozíció</button>

<br><br>

<b>Kisvasutak</b>

<button class="menuButton">Gyermekvasút</button>
<button class="menuButton">Királyréti kisvasút</button>
<button class="menuButton">Szob–Nagybörzsöny</button>

</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.53,19.04],12);

var street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

var topo = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
{
maxZoom:17,
attribution:'© OpenTopoMap'
}
);

function setStreet(){

map.removeLayer(topo);
street.addTo(map);

}

function setTopo(){

map.removeLayer(street);
topo.addTo(map);

}

function locate(){

map.locate({
setView:true,
maxZoom:16
});

}

function toggleMenu(){

var menu=document.getElementById("menuPanel");

if(menu.style.display==="none"){
menu.style.display="block";
}else{
menu.style.display="none";
}

}

</script>

</body>
</html>
