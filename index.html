<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attila Közlekedés 2.1</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #0d3b66;
}

.section {
    margin-top: 30px;
}

input {
    padding: 15px;
    width: 80%;
    max-width: 400px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    margin-top: 15px;
    padding: 15px;
    width: 80%;
    max-width: 400px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #1565c0;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0d47a1;
}
</style>
</head>

<body>

<h1>🚌 Attila Közlekedés 2.1</h1>

<div class="section">
    <h2>🔎 Járatszám kereső</h2>
    <input type="text" id="jarat" placeholder="Pl. 890">
    <br>
    <button onclick="keresJarat()">Keresés Google Transitben</button>
</div>

<div class="section">
    <h2>📍 Megálló kereső</h2>
    <input type="text" id="megallo" placeholder="Pl. Szentendre, Autóbusz-állomás">
    <br>
    <button onclick="keresMegallo()">Megnyitás Google Mapsen</button>
</div>

<div class="section">
    <h2>🗺 Élő térképek</h2>
    <button onclick="window.open('https://www.google.com/maps/search/Budapest+Transit')">Budapest</button>
    <button onclick="window.open('https://www.google.com/maps/search/Dunakanyar')">Dunakanyar</button>
    <button onclick="window.open('https://www.google.com/maps/search/Pest+megye+Transit')">Pest Megye</button>
</div>

<script>
function keresJarat() {
    var jarat = document.getElementById("jarat").value;
    if(jarat !== "") {
        window.open("https://www.google.com/maps/search/" + jarat + "+busz");
    }
}

function keresMegallo() {
    var megallo = document.getElementById("megallo").value;
    if(megallo !== "") {
        window.open("https://www.google.com/maps/search/" + megallo);
    }
}
</script>

</body>
</html>
