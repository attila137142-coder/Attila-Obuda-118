<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés V6 - Mini BKK Control Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff;}

#top{
display:flex;
justify-content:space-between;
padding:10px;
background:#111827;
font-size:13px;
}

#wrap{
display:grid;
grid-template-columns:2fr 1fr;
height:calc(100vh - 40px);
}

#map{height:100%;}

.panel{
background:#1f2937;
padding:10px;
overflow:auto;
}

.card{
background:#0f172a;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #243244;
font-size:13px;
}

h3{color:#38bdf8;}
</style>
</head>

<body>

<div id="top">
 <div id="gps">📍 GPS...</div>
 <div>🚦 Attila Control Center V6</div>
</div>

<div id="wrap">

 <div id="map"></div>

 <div class="panel">

  <h3>🚏 Megállók</h3>
  <div id="stops"></div>

  <h3>🚌 Élő járatok (szimulált mozgás)</h3>
  <div id="vehicles"></div>

 </div>

</div>

<script>

/* ================= MAP ================= */

let map = L.map('map').setView([47.4979,19.0402], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:"OSM"
}).addTo(map);

/* ================= DATA ================= */

let stops = [
{name:"Deák tér", lat:47.4979, lon:19.0540},
{name:"Blaha", lat:47.4963, lon:19.0700},
{name:"Keleti", lat:47.5008, lon:19.0830}
];

/* ================= DRAW STOPS ================= */

stops.forEach(s=>{
 L.circleMarker([s.lat,s.lon],{
  radius:6,
  color:"#22c55e"
 }).addTo(map).bindPopup("🚏 "+s.name);
});

/* ================= VEHICLES (SIMULATED MOVEMENT) ================= */

let vehicles = [
{
 name:"🚌 M3 Metro",
 path:[
  [47.4979,19.0540],
  [47.4963,19.0700],
  [47.5008,19.0830]
 ],
 i:0
}
];

vehicles.forEach(v=>{
 v.marker = L.marker(v.path[0]).addTo(map);
});

/* ================= ANIMATION LOOP ================= */

function moveVehicles(){

 vehicles.forEach(v=>{

  v.i += 0.01;

  if(v.i >= v.path.length-1){
   v.i = 0;
  }

  let i0 = Math.floor(v.i);
  let i1 = i0+1;

  let t = v.i - i0;

  if(i1 < v.path.length){

   let lat = v.path[i0][0] + (v.path[i1][0]-v.path[i0][0])*t;
   let lon = v.path[i0][1] + (v.path[i1][1]-v.path[i0][1])*t;

   v.marker.setLatLng([lat,lon]);

  }

 });

}

/* ================= PANEL ================= */

function renderVehicles(){

 document.getElementById("vehicles").innerHTML =
 vehicles.map(v=>`
  <div class="card">
   ${v.name}<br>
   📍 mozgásban
  </div>
 `).join("");

}

/* ================= GPS ================= */

navigator.geolocation.watchPosition(pos=>{

 document.getElementById("gps").innerHTML =
 `📍 ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;

 L.marker([pos.coords.latitude,pos.coords.longitude]).addTo(map);

 map.setView([pos.coords.latitude,pos.coords.longitude],13);

});

/* ================= LOOP ================= */

setInterval(()=>{
 moveVehicles();
 renderVehicles();
},100);

renderVehicles();

</script>

</body>
</html>
