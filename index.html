<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY V8 FLEET INTELLIGENCE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000c;
 color:#0f0;
 padding:10px;
 width:380px;
 border:1px solid #0f0;
 max-height:90vh;
 overflow:auto;
}

.stop{
 cursor:pointer;
 padding:6px;
 margin-bottom:5px;
 border-bottom:1px solid #0f0;
}
.stop:hover{
 background:#0f0;
 color:#000;
}

.small{font-size:12px;opacity:0.8}
</style>
</head>

<body>

<div id="panel">
<h3>🚆 ROXY V8 FLEET INTELLIGENCE</h3>
<div id="info">📍 indulás...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stopLayer = L.layerGroup().addTo(map);

// ================= USER =================
let userLat=null,userLon=null;
let userAddress="";

function formatDistance(m){
 return m<1000 ? m+" m" : (m/1000).toFixed(2)+" km";
}

// ================= DIST =================
function getDistance(lat1,lon1,lat2,lon2){
 let R=6371000;
 let dLat=(lat2-lat1)*Math.PI/180;
 let dLon=(lon2-lon1)*Math.PI/180;

 let a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

 return Math.round(2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// ================= ADDRESS =================
async function getAddress(lat,lon){
 try{
  let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
  let d=await res.json();
  let a=d.address;

  return `${a.city||a.town||a.village||""} ${a.road||""} ${a.house_number||""}`;
 }catch(e){
  return "nincs cím";
 }
}

// ================= USER GPS =================
navigator.geolocation.getCurrentPosition(async pos=>{
 userLat=pos.coords.latitude;
 userLon=pos.coords.longitude;

 userAddress = await getAddress(userLat,userLon);

 document.getElementById("info").innerHTML=`
 <b>📍 Saját helyzet</b><br>
 ${userAddress}<br><br>
 Térképre kattints 🚏
 `;
});

// ================= OVERPASS =================
async function fetchOverpass(query){
 let urls=[
  "https://overpass-api.de/api/interpreter",
  "https://lz4.overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter"
 ];

 for(let url of urls){
  try{
   let res=await fetch(url,{method:"POST",body:query});
   if(res.ok) return await res.json();
  }catch(e){}
 }
 throw "overpass error";
}

// ================= GTFS =================
let GTFSStops = {};
let GTFSTimes = [];

async function loadStops(){
 let res=await fetch("stops.txt");
 let text=await res.text();
 let lines=text.split("\n");

 for(let i=1;i<lines.length;i++){
  let c=lines[i].split(",");
  if(c.length<5) continue;

  GTFSStops[c[0]]={
   name:c[2],
   lat:parseFloat(c[3]),
   lon:parseFloat(c[4])
  };
 }
}

async function loadTimes(){
 let res=await fetch("stop_times.txt");
 let text=await res.text();
 let lines=text.split("\n");

 for(let i=1;i<lines.length;i++){
  let c=lines[i].split(",");
  if(c.length<4) continue;

  GTFSTimes.push({
   trip_id:c[0],
   arr:c[1],
   dep:c[2],
   stop_id:c[3]
  });
 }
}

// ================= NEAREST STOP =================
function findNearestStop(lat,lon){
 let best=null;
 let bestDist=999999;

 for(let id in GTFSStops){
  let s=GTFSStops[id];
  let d=getDistance(lat,lon,s.lat,s.lon);

  if(d<bestDist){
   bestDist=d;
   best=id;
  }
 }

 return best;
}

// ================= LIVE TIME =================
function nowSeconds(){
 let d=new Date();
 return d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
}

function getSecondsFromTime(t){
 let [h,m,s]=t.split(":");
 return (+h)*3600+(+m)*60+(+s||0);
}

// ================= STATUS =================
function getLiveStatus(t){
 let gtfs=getSecondsFromTime(t);
 let now=nowSeconds();

 let diff=gtfs-now;
 let abs=Math.abs(diff);

 let min=Math.floor(abs/60);
 let sec=abs%60;

 if(diff>60) return {type:"future",text:`⏳ ${min}p ${sec}s`};
 if(diff<=60 && diff>=-30) return {type:"now",text:`🟡 ÉRKEZIK`};
 if(diff<-30) return {type:"late",text:`🔵 KÉSIK ${min}p ${sec}s`};

 return {type:"ok",text:"🟢 MOST"};
}

// ================= VEHICLE INTELLIGENCE =================
let vehicleInfo={
 HÉV:{short:"3 kocsi",long:"6 kocsi"},
 bus:{solo:"szóló",art:"csuklós"},
 tram:{short:"1 egység",long:"2 egység"}
};

function detectVehicle(name){
 name=name.toLowerCase();

 if(name.includes("hév")||name.includes("hev")) return "HÉV";
 if(name.includes("villamos")) return "tram";
 return "bus";
}

function getVehicle(name){
 let type=detectVehicle(name);
 let v=vehicleInfo[type];

 if(type==="HÉV"){
  return Math.random()>0.5?v.long:v.short;
 }

 if(type==="tram"){
  return Math.random()>0.6?v.long:v.short;
 }

 return Math.random()>0.5?v.art:v.solo;
}

// ================= DEPARTURES =================
function getDepartures(stopId){
 let now=new Date();
 let current=
  now.getHours().toString().padStart(2,'0')+":"+
  now.getMinutes().toString().padStart(2,'0');

 return GTFSTimes
 .filter(s=>s.stop_id===stopId && s.dep>=current)
 .map(s=>s.dep)
 .sort()
 .slice(0,10);
}

// ================= CLICK =================
map.on("click",async e=>{

 let lat=e.latlng.lat;
 let lon=e.latlng.lon || e.latlng.lng;

 document.getElementById("info").innerHTML="🔍 keresés...";

 let query=`
 [out:json];
 (
  node(around:600,${lat},${lon})["highway"="bus_stop"];
  node(around:600,${lat},${lon})["public_transport"="platform"];
  node(around:600,${lat},${lon})["railway"];
 );
 out;
 `;

 try{

  let data=await fetchOverpass(query);

  stopLayer.clearLayers();

  let html="<b>🚏 Megállók</b><br><br>";

  data.elements.forEach(s=>{

   let name=s.tags?.name;
   if(!name) return;

   let dist=userLat?getDistance(userLat,userLon,s.lat,s.lon):null;
   let nearest=findNearestStop(s.lat,s.lon);

   L.circleMarker([s.lat,s.lon],{
    radius:8,color:"yellow",fillColor:"yellow",fillOpacity:1
   }).addTo(stopLayer);

   html+=`
   <div class="stop"
   onclick="selectStop('${name}',${s.lat},${s.lon},'${nearest}')">

   🚏 ${name}<br>
   <span class="small">📏 ${dist?formatDistance(dist):"?"}</span><br>
   <span class="small">GTFS: ${nearest||"nincs"}</span>

   </div>`;
  });

  document.getElementById("info").innerHTML=html;

 }catch(e){
  document.getElementById("info").innerHTML="⚠️ hiba";
 }

});

// ================= SELECT =================
function selectStop(name,lat,lon,stopId){

 map.setView([lat,lon],16);

 let addr=userAddress;
 let times=stopId?getDepartures(stopId):[];

 let html=`<b>🚏 ${name}</b><br><br>`;
 html+=`📍 ${addr}<br><br>`;
 html+=`🆔 ${stopId||"nincs"}<br><br>`;

 html+="<b>🕒 LIVE:</b><br>";

 if(!stopId){
  html+="❌ nincs GTFS match";
 }
 else if(times.length===0){
  html+="⚠️ nincs adat";
 }
 else{
  times.forEach(t=>{
   let st=getLiveStatus(t);
   html+=`🕒 ${t} → ${st.text}<br>`;
  });
 }

 html+=`<br><b>🚆 Jármű:</b> ${getVehicle(name)}<br>`;

 document.getElementById("info").innerHTML=html;
}

// ================= INIT =================
window.onload=async()=>{
 await loadStops();
 await loadTimes();
};

</script>

</body>
</html>
