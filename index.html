<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila PRO MAX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{background:black;color:yellow;font-family:Arial;text-align:center;}
#map{height:650px;}
button{margin:5px;padding:10px;}
#info{color:cyan;margin-top:10px;}
.stop{background:#222;margin:5px;padding:8px;border-radius:8px;}
.red{color:#ff5555;}
.blue{color:#55aaff;}
.white{color:white;}
</style>
</head>

<body>

<h1>🚂 Attila PRO MAX</h1>

<div>
<button onclick="setLayer('osm')">Alap</button>
<button onclick="setLayer('topo')">Topo</button>
<button onclick="setLayer('rail')">Vasút</button>
<button onclick="setLayer('turista')">Turista</button>
</div>

<div>
<button onclick="mode='road'">🛣 Közút</button>
<button onclick="mode='hike'">🌲 Turista út</button>
<button onclick="resetRoute()">❌ Törlés</button>
</div>

<div id="map"></div>

<div id="info">Kattints: start → cél</div>

<h2>🚌 Megállók</h2>
<div id="stops"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAP
let map=L.map('map').setView([47.49,19.04],15);

let osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
let topo=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
let rail=L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png',{opacity:0.9});
let turista=L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png');

osm.addTo(map);

function setLayer(type){
 map.eachLayer(l=>map.removeLayer(l));
 osm.addTo(map);
 if(type==="topo") topo.addTo(map);
 if(type==="rail") rail.addTo(map);
 if(type==="turista") turista.addTo(map);
}

// ===== GPS
let userPos=null;

navigator.geolocation.watchPosition(p=>{
 userPos=[p.coords.latitude,p.coords.longitude];
 loadStops();
});

// ===== MÓD
let mode="road";

// ===== RESET
let line=null,start=null;

function resetRoute(){
 if(line) map.removeLayer(line);
 start=null;
 document.getElementById("info").innerText="Törölve";
}

// ===== ÚTVONAL
map.on("click", async e=>{

 if(!userPos) return;

 if(!start){
   start=userPos;
   alert("Start OK → kattints célra");
   return;
 }

 let end=[e.latlng.lat,e.latlng.lng];

 let url;

 // ===== ROUTER
 if(mode==="road"){
   url=`https://router.project-osrm.org/route/v1/foot/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;
 }else{
   url=`https://api.openrouteservice.org/v2/directions/foot-hiking?api_key=YOUR_API_KEY&start=${start[1]},${start[0]}&end=${end[1]},${end[0]}`;
 }

 let res=await fetch(url);
 let data=await res.json();

 let route;

 if(mode==="road"){
   route=data.routes[0];
 }else{
   route={
     distance:data.features[0].properties.summary.distance,
     geometry:data.features[0].geometry
   };
 }

 let dist=(route.distance/1000).toFixed(2);

 if(line) map.removeLayer(line);
 line=L.geoJSON(route.geometry).addTo(map);

 document.getElementById("info").innerHTML=
 `📏 Út: ${dist} km`;

 start=null;

});

// ===== MEGÁLLÓK
function loadStops(){

 if(!userPos) return;

 fetch(`https://overpass-api.de/api/interpreter?data=
 [out:json];
 node(around:1000,${userPos[0]},${userPos[1]})["highway"="bus_stop"];
 out;`)
 .then(r=>r.json())
 .then(d=>{

  let html="";

  d.elements.slice(0,6).forEach(s=>{

    let dx=map.distance(userPos,[s.lat,s.lon]);

    html+=`
    <div class="stop">
      <b>${s.tags.name||"Megálló"}</b><br>
      📏 ${dx.toFixed(0)} m
      ${fakeTimes()}
    </div>`;
  });

  document.getElementById("stops").innerHTML=html;

 });
}

// ===== MENETREND (stabil)
function fakeTimes(){

 let html="";

 for(let i=1;i<=3;i++){

  let sec=Math.floor(Math.random()*500-200);

  let c="white";
  if(sec<0)c="red";
  if(sec>300)c="blue";

  let m=Math.floor(Math.abs(sec)/60);
  let s=Math.abs(sec)%60;

  html+=`<div class="${c}">
  Járat ${i} → ${sec>=0?"+":"-"}${m}:${String(s).padStart(2,"0")}
  </div>`;
 }

 return html;
}

</script>

</body>
</html>
