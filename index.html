<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚍 NAV ENGINE PRO v3.1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{margin:0;background:#000;color:#ffd700;font-family:Arial;}
h1{text-align:center;font-size:16px;margin:10px;}

#map{height:50vh;width:100%;}

.mode{display:flex;gap:5px;padding:5px;}
.mode button{
flex:1;padding:10px;border:0;border-radius:10px;
background:#222;color:#ffd700;
}
.active{background:#0a0;}

.panel{padding:10px;}

.card{
background:#111;padding:8px;margin:5px 0;border-radius:8px;
}

.small{font-size:12px;opacity:0.7;}
</style>
</head>

<body>

<h1>🚍 NAV ENGINE PRO v3.1</h1>

<div class="mode">
<button onclick="setMode('basic')" id="m1">Alap</button>
<button onclick="setMode('pro')" id="m2">PRO</button>
<button onclick="setMode('full')" id="m3">FULL</button>
<button onclick="setMode('forest')" id="m4">🌲 ERDŐ</button>
</div>

<div id="map"></div>

<div class="panel">
<button onclick="getGPS()">📍 GPS</button>
<button onclick="loadPOI()">🌲 POI</button>
<button onclick="loadGTFS()">🚍 GTFS</button>

<div id="info" class="card">Indítás...</div>
</div>

<script>

// ---------------- MAP ----------------
let map = L.map('map').setView([47.4979,19.0402],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'OSM'
}).addTo(map);

// ---------------- STATE ----------------
let mode="basic";
let userMarker=null;
let poiMarkers=[];
let stops=[];
let stopMarkers=[];

// ---------------- MODE ----------------
function setMode(m){
mode=m;
["m1","m2","m3","m4"].forEach(id=>document.getElementById(id).classList.remove("active"));
document.getElementById("m"+(m==="basic"?1:m==="pro"?2:m==="full"?3:4)).classList.add("active");
document.getElementById("info").innerHTML="Mód: "+m;
}

// ---------------- DIST ----------------
function distance(lat1, lon1, lat2, lon2){
const R = 6371000;
const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)**2;

return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ---------------- CÍM (OSM) ----------------
async function getAddress(lat, lon){
try{
const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
);
const data = await res.json();
return data.display_name || "Ismeretlen hely";
}catch(e){
return "Cím nem elérhető";
}
}

// ---------------- POI ----------------
function getPOI(){
return [
{name:"🌲 Kisinóci Turistaház",lat:47.9,lon:18.9},
{name:"🏔️ Prédikálószék",lat:47.75,lon:18.95},
{name:"🌄 Hármashatár-hegy",lat:47.54,lon:19.02},
];
}

function loadPOI(){

poiMarkers.forEach(m=>map.removeLayer(m));
poiMarkers=[];

getPOI().forEach(p=>{
let m=L.marker([p.lat,p.lon]).addTo(map)
.bindPopup(p.name);

poiMarkers.push(m);
});

document.getElementById("info").innerHTML="🌲 POI betöltve";
}

// ---------------- KÖZELI ----------------
function getNearby(lat, lon){

let points = getPOI().map(p=>{
return {
name:p.name,
dist:distance(lat,lon,p.lat,p.lon)
};
});

return points.sort((a,b)=>a.dist-b.dist).slice(0,5);
}

// ---------------- GPS ----------------
async function getGPS(){

navigator.geolocation.getCurrentPosition(async p=>{

let lat = p.coords.latitude;
let lon = p.coords.longitude;

map.setView([lat,lon],13);

if(userMarker) map.removeLayer(userMarker);

userMarker = L.marker([lat,lon]).addTo(map)
.bindPopup("📍 Te itt vagy").openPopup();

let address = await getAddress(lat,lon);
let near = getNearby(lat,lon);

let html = `
📍 <b>Pozíció</b><br>
${lat.toFixed(5)}, ${lon.toFixed(5)}<br>
<span class="small">${address}</span><br><br>

📌 <b>Közeli pontok</b><br>
`;

near.forEach(n=>{
html += `${n.name} - ${Math.round(n.dist)} m<br>`;
});

document.getElementById("info").innerHTML = html;

});

}

// ---------------- GTFS (hely fenntartva) ----------------
async function loadGTFS(){
document.getElementById("info").innerHTML="📦 GTFS még nincs bekötve";
}

// ---------------- INIT ----------------
setMode("basic");

</script>

</body>
</html>
