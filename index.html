<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Attila Közlekedés</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.title{
position:absolute;
top:15px;
left:70px;
z-index:1000;
background:white;
padding:10px 16px;
border-radius:8px;
font-size:22px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

.panel{
position:absolute;
top:70px;
left:10px;
width:260px;
background:white;
z-index:1000;
padding:10px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
font-size:14px;
}

.panel h3{
margin-top:5px;
}

button{
width:100%;
margin-top:5px;
padding:6px;
font-size:14px;
}

.leaflet-control-zoom a{
width:50px;
height:50px;
line-height:50px;
font-size:26px;
}

</style>

</head>

<body>

<div class="title">
Attila Közlekedés – Diszpécser térkép
</div>

<div class="panel">

<h3>Térkép</h3>

<button onclick="streetLayer.addTo(map); map.removeLayer(topoLayer)">
Utcatérkép
</button>

<button onclick="topoLayer.addTo(map); map.removeLayer(streetLayer)">
Topográfia
</button>

<hr>

<h3>Pozíció</h3>

<button onclick="locateMe()">
Saját pozíció
</button>

<hr>

<h3>Kisvasutak</h3>

<button onclick="showChildrenRailway()">
Gyermekvasút
</button>

<button onclick="showKiralyret()">
Királyréti kisvasút
</button>

<button onclick="showSzob()">
Szob–Nagybörzsöny
</button>

<hr>

<h3>Diszpécser</h3>

<div id="vehicleData">
nincs kiválasztva
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.55,19.03],13);

var streetLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

var topoLayer = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
{
maxZoom:17,
attribution:'© OpenTopoMap'
}
);

/* GPS */

function locateMe(){
map.locate({
setView:true,
maxZoom:17,
enableHighAccuracy:true
});
}

map.on('locationfound', function(e){

var radius = e.accuracy;

L.marker(e.latlng)
.addTo(map)
.bindPopup("Az Ön pozíciója<br>Pontosság: " + Math.round(radius) + " m")
.openPopup();

L.circle(e.latlng, radius).addTo(map);

});
function locateMe(){

map.locate({
setView:true,
maxZoom:18,
enableHighAccuracy:true,
timeout:20000,
maximumAge:0
});

}
function toggleMenu(){

var menu=document.getElementById("menuPanel");

if(menu.style.display==="none"){
menu.style.display="block";
}else{
menu.style.display="none";
}

}

/* Kisvasutak */

function showChildrenRailway(){

var line = [
[47.548,18.958],
[47.556,18.965],
[47.565,18.973]
];

L.polyline(line,{color:'green'}).addTo(map)
.bindPopup("Budapesti Gyermekvasút");

}

function showKiralyret(){

var line = [
[47.930,19.020],
[47.940,19.030],
[47.955,19.045]
];

L.polyline(line,{color:'brown'}).addTo(map)
.bindPopup("Királyréti Erdei Vasút");

}

function showSzob(){

var line = [
[47.820,18.870],
[47.830,18.880],
[47.840,18.890]
];

L.polyline(line,{color:'black'}).addTo(map)
.bindPopup("Szob–Nagybörzsöny kisvasút");

}

</script>

</body>
</html>
