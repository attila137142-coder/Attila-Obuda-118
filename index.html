<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚍 Attila Mobil Navigáció PRO v4</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
 background:#000;
 color:#FFD700;
 font-family:Arial;
 margin:0;
 padding:10px;
}

h1{text-align:center;font-size:18px;}

.mode{
 display:flex;
 gap:5px;
 margin-bottom:10px;
}

.mode button{
 flex:1;
 padding:10px;
 border-radius:10px;
 border:0;
 background:#222;
 color:#FFD700;
}

.active{background:#0a0;}

input{
 width:100%;
 padding:10px;
 border-radius:10px;
 margin-bottom:10px;
}

.card{
 background:#111;
 padding:10px;
 margin:8px 0;
 border-radius:10px;
}

.small{font-size:12px;opacity:0.7;}
.red{color:#ff4d4d;}
.blue{color:#4db8ff;}
.green{color:#4dff88;}
</style>
</head>

<body>

<h1>🚍 Attila PRO v4</h1>

<div class="mode">
<button onclick="setMode('basic')" id="m1">Alap</button>
<button onclick="setMode('pro')" id="m2">PRO</button>
<button onclick="setMode('full')" id="m3">FULL</button>
<button onclick="setMode('forest')" id="m4">🌲 ERDŐ</button>
</div>

<button onclick="getLocation()">📍 GPS</button>
<button onclick="loadGTFS()">📦 GTFS</button>

<input id="search" placeholder="Keresés..." oninput="render()">

<div id="status" class="card">Indítás...</div>
<div id="results"></div>

<script>

let mode="basic";
let stops=[],stopTimes=[],trips=[];
let tripsMap={},stopTimesMap={};
let userLat=null,userLon=null;

// ---------------- MODE ----------------
function setMode(m){
 mode=m;
 ["m1","m2","m3","m4"].forEach(id=>document.getElementById(id).classList.remove("active"));

 if(m==="basic")document.getElementById("m1").classList.add("active");
 if(m==="pro")document.getElementById("m2").classList.add("active");
 if(m==="full")document.getElementById("m3").classList.add("active");
 if(m==="forest")document.getElementById("m4").classList.add("active");

 render();
}

// ---------------- GPS ----------------
function getLocation(){
 navigator.geolocation.getCurrentPosition(pos=>{
  userLat=pos.coords.latitude;
  userLon=pos.coords.longitude;
  document.getElementById("status").innerText="✔ GPS OK";
  render();
 });
}

// ---------------- GTFS ----------------
async function loadGTFS(){

 const url="https://raw.githubusercontent.com/USER/REPO/main/gtfs.zip";

 try{
  const res=await fetch(url);
  const blob=await res.blob();
  const zip=await JSZip.loadAsync(blob);

  stops=parseCSV(await zip.file("stops.txt").async("string"));
  stopTimes=parseCSV(await zip.file("stop_times.txt").async("string"));
  trips=parseCSV(await zip.file("trips.txt").async("string"));

  tripsMap={};
  stopTimesMap={};

  trips.forEach(t=>tripsMap[t.trip_id]=t);
  stopTimes.forEach(st=>{
   if(!stopTimesMap[st.stop_id])stopTimesMap[st.stop_id]=[];
   stopTimesMap[st.stop_id].push(st);
  });

  document.getElementById("status").innerText="✔ GTFS kész";
  render();

 }catch(e){
  document.getElementById("status").innerText="❌ GTFS hiba";
 }
}

// ---------------- CSV ----------------
function parseCSV(txt){
 const rows=txt.split("\n");
 const h=rows[0].split(",");
 return rows.slice(1).map(r=>{
  const c=r.split(",");
  let o={};
  h.forEach((x,i)=>o[x]=c[i]);
  return o;
 });
}

// ---------------- DIST ----------------
function dist(a,b,c,d){
 const R=6371000;
 const d1=(c-a)*Math.PI/180;
 const d2=(d-b)*Math.PI/180;
 const x=Math.sin(d1/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
 Math.sin(d2/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ---------------- FORMAT ----------------
function formatDistance(m){
 if(m<1000) return Math.round(m)+" m";
 return (m/1000).toFixed(2)+" km";
}

// ---------------- GSM SIM ----------------
function signalEstimate(lat,lon){
 if(!userLat) return 50;
 let d=dist(lat,lon,userLat,userLon)/1000;

 let s=100-d*10;
 if(s<0)s=0;
 if(s>100)s=100;
 return Math.round(s);
}

// ---------------- ERDEI POI ----------------
function forestPOI(){
 return [
  {name:"🌲 Kisinóci Turistaház",lat:47.9,lon:18.9},
  {name:"🏔️ Prédikálószék",lat:47.75,lon:18.95},
  {name:"🌄 Hármashatár-hegy",lat:47.54,lon:19.02},
 ];
}

// ---------------- RENDER ----------------
function render(){

 let q=document.getElementById("search").value.toLowerCase();
 let html="";

 // ================= GTFS MODE =================
 if(mode!=="forest"){

  stops.slice(0,50).forEach(s=>{

   if(q && !s.stop_name.toLowerCase().includes(q)) return;

   let d=userLat?dist(userLat,userLon,s.stop_lat,s.stop_lon):0;

   html+=`
   <div class="card">
   🚏 ${s.stop_name}<br>
   ${mode!=="basic" ? "📏 "+formatDistance(d)+"<br>" : ""}`;

   if(mode==="full"||mode==="pro"){
    let times=stopTimesMap[s.stop_id]||[];
    times.slice(0,3).forEach(t=>{
     let tr=tripsMap[t.trip_id];
     if(!tr) return;
     html+=`🚍 ${tr.route_id}<br>`;
    });
   }

   html+="</div>";
  });
 }

 // ================= FOREST MODE =================
 if(mode==="forest"){

  forestPOI().forEach(p=>{

   if(q && !p.name.toLowerCase().includes(q)) return;

   let d=userLat?dist(userLat,userLon,p.lat,p.lon):0;
   let sig=signalEstimate(p.lat,p.lon);

   html+=`
   <div class="card">
   ${p.name}<br>
   📏 ${formatDistance(d)}<br>
   📶 Jel: ${sig}%<br>
   </div>`;
  });
 }

 document.getElementById("results").innerHTML=html;
}

setMode("basic");

</script>

</body>
</html>
