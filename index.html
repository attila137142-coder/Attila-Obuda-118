<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hungary Transit Cockpit REAL v5</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; background:#111; color:#fff; }
#map { height: 60vh; }
.panel { padding:10px; }
button { margin:3px; padding:8px; border-radius:6px; border:0; }
.box { background:#1e1e1e; padding:10px; border-radius:8px; font-size:13px; }
input { padding:8px; width:100%; margin-top:6px; }
</style>
</head>

<body>

<div class="panel">

<button onclick="loadGTFS()">📦 GTFS LOAD (demo)</button>
<button onclick="filter('all')">🌍 ALL</button>
<button onclick="filter('bkk')">🚍 BKK</button>
<button onclick="filter('volan')">🚌 VOLÁN</button>
<button onclick="filter('mav')">🚆 MÁV</button>
<button onclick="filter('forest')">🌲 KISVASÚT</button>

<input id="search" placeholder="🔎 megálló keresés..." oninput="searchStops()"/>

<div id="info" class="box">GTFS rendszer készen áll</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([47.2,19.5],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userPos = null;
let stops = [];
let markers = L.layerGroup().addTo(map);

// ---------------- GPS ----------------
navigator.geolocation.watchPosition(pos=>{
  userPos = {
    lat:pos.coords.latitude,
    lng:pos.coords.longitude
  };
});

// ---------------- GTFS LOAD (SIMULÁLT CORE) ----------------
function loadGTFS(){

  // EZ KÉSŐBB: valódi GTFS JSON import
  stops = [
    {id:"BKK_001",name:"Deák tér",lat:47.4979,lng:19.0550,type:"bkk"},
    {id:"BKK_002",name:"Astoria",lat:47.4959,lng:19.0615,type:"bkk"},
    {id:"MAV_01",name:"Keleti",lat:47.5009,lng:19.0836,type:"mav"},
    {id:"VOL_01",name:"Székesfehérvár busz",lat:47.1860,lng:18.4221,type:"volan"},
    {id:"FOREST_1",name:"Szob kisvasút",lat:47.8190,lng:18.8670,type:"forest"},
  ];

  renderStops(stops);
  render("GTFS betöltve (CORE ENGINE READY)");
}

// ---------------- RENDER ----------------
function renderStops(list){
  markers.clearLayers();

  list.forEach(s=>{
    let m = L.marker([s.lat,s.lng]).addTo(markers);

    let dist = userPos ? haversine(userPos.lat,userPos.lng,s.lat,s.lng) : 0;

    m.bindPopup(`
      🚏 ${s.name}<br>
      🆔 ${s.id}<br>
      📊 ${s.type}<br>
      📏 ${dist.toFixed(0)} m
    `);
  });
}

// ---------------- FILTER ----------------
function filter(type){

  if(type==="all"){
    renderStops(stops);
    return;
  }

  renderStops(stops.filter(s=>s.type===type));
}

// ---------------- SEARCH ----------------
function searchStops(){
  let q = document.getElementById("search").value.toLowerCase();

  let res = stops.filter(s =>
    s.name.toLowerCase().includes(q)
  );

  renderStops(res);
}

// ---------------- DISTANCE ----------------
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ---------------- UI ----------------
function render(txt){
  document.getElementById("info").innerHTML = txt;
}

</script>

</body>
</html>
