<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FUTÁR + MÁV + VOLÁN HYBRID SYSTEM</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body{margin:0;font-family:Arial;background:#0f172a;color:#e2e8f0}
    header{padding:12px;background:#111827;display:flex;justify-content:space-between;align-items:center}
    h1{font-size:14px;margin:0}
    .btn{background:#2563eb;border:none;padding:8px 10px;color:#fff;border-radius:8px;cursor:pointer}
    .grid{display:grid;gap:10px;padding:10px}
    .card{background:#1f2937;padding:10px;border-radius:12px}
    input{width:100%;padding:10px;border-radius:8px;border:none;margin-top:5px}
    #map{height:320px;border-radius:12px}
    .resultBox{margin-top:8px;padding:8px;background:#111827;border-radius:8px;cursor:pointer}
    .tag{font-size:11px;padding:2px 6px;border-radius:6px;background:#374151;margin-left:5px}

    /* STATUS COLORS */
    .onTime{color:#e2e8f0}
    .late{color:#3b82f6}   /* KÉK = késik */
    .early{color:#ef4444}  /* PIROS = siet */

    #menu{position:fixed;inset:0;background:#0b1220;display:none;padding:20px;z-index:999;overflow:auto}
  </style>
</head>
<body>

<header>
  <h1>🚆 FUTÁR + MÁV + VOLÁN HYBRID SYSTEM</h1>
  <button class="btn" onclick="toggleMenu()">Menü</button>
</header>

<div id="menu">
  <h2>🧭 UNIFIED DISPATCH ENGINE</h2>
  <p>BKK / MÁV / VOLÁN integrált rendszer</p>
  <button class="btn" onclick="toggleMenu()">Bezár</button>
</div>

<div class="grid">

  <div class="card">
    <h3>🔍 Kereső (járatok + megállók)</h3>
    <input id="search" placeholder="megálló / járat / GTFS" oninput="searchStops()" />
    <div id="results"></div>
  </div>

  <div class="card">
    <h3>🗺️ Térkép</h3>
    <div id="map"></div>
  </div>

  <div class="card">
    <h3>📊 Diszpécser panel</h3>
    <div id="panel">Válassz megállót...</div>
  </div>

</div>

<script>

let map;
let userLat=null,userLon=null;
let selected=null;

// ---------------- ROUTES (HOVA MEGY) ----------------
const routes=[
  {id:"R1",name:"Deák → Örs",from:"Deák Ferenc tér",to:"Örs vezér tere"},
  {id:"R2",name:"Batthyány → Szentendre",from:"Batthyány tér",to:"Szentendre"},
  {id:"R3",name:"Vác → Szob",from:"Vác",to:"Szob"}
];

// ---------------- STOPS ----------------
const stops=[
  {name:"Deák Ferenc tér",gtfs:"BKK_001",lat:47.4975,lon:19.0550,net:"bkk",route:"R1"},
  {name:"Örs vezér tere",gtfs:"BKK_002",lat:47.5017,lon:19.1356,net:"bkk",route:"R1"},
  {name:"Batthyány tér",gtfs:"BKK_003",lat:47.5060,lon:19.0394,net:"bkk",route:"R2"},
  {name:"Szentendre",gtfs:"VOL_002",lat:47.6604,lon:19.0754,net:"volan",route:"R2"},
  {name:"Vác",gtfs:"VOL_003",lat:47.7819,lon:19.1296,net:"volan",route:"R3"},
  {name:"Szob",gtfs:"MAV_002",lat:47.8213,lon:18.8626,net:"mav",route:"R3"}
];

// ---------------- GPS ----------------
function startGPS(){
  navigator.geolocation.watchPosition(p=>{
    userLat=p.coords.latitude;
    userLon=p.coords.longitude;
  });
}

// ---------------- DIST ----------------
function dist(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ---------------- STATUS ----------------
function status(diff){
  if(diff<0) return {t:`KÉSIK ${Math.abs(diff)}p`,c:"late"};
  if(diff>5) return {t:`SIET ${diff}p`,c:"early"};
  return {t:"IDŐBEN",c:"onTime"};
}

// ---------------- SEARCH ----------------
function searchStops(){
  const q=document.getElementById('search').value.toLowerCase();
  const res=document.getElementById('results');
  res.innerHTML="";

  stops.filter(s=>s.name.toLowerCase().includes(q)||s.gtfs.toLowerCase().includes(q))
  .forEach(s=>{

    let d="";
    if(userLat)d=`📏 ${dist(userLat,userLon,s.lat,s.lon).toFixed(2)} km`;

    const r=routes.find(r=>r.id===s.route);

    const div=document.createElement("div");
    div.className="resultBox";
    div.innerHTML=`
      🚏 ${s.name}<br>
      🆔 ${s.gtfs}<br>
      🧭 ${r?r.name:"nincs útvonal"}<br>
      ${d}
    `;

    div.onclick=()=>renderPanel(s);
    res.appendChild(div);
  });
}

// ---------------- PANEL ----------------
function renderPanel(s){
  const el=document.getElementById('panel');

  const r=routes.find(x=>x.id===s.route);

  const times=[-4,0,3,9];

  el.innerHTML=`
    <b>${s.name}</b><br>
    🧭 Hova megy: ${r?r.name:"ismeretlen"}<br><br>
  `;

  times.forEach(t=>{
    const st=status(t);

    el.innerHTML+=`
      <div class="${st.c}">
        🕒 indulás +${t}p <span class="tag">${st.t}</span>
      </div>
    `;
  });
}

// ---------------- MAP ----------------
window.onload=()=>{
  map=L.map('map').setView([47.5,19.05],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  stops.forEach(s=>{
    L.marker([s.lat,s.lon]).addTo(map)
    .bindPopup(`${s.name}<br>${s.gtfs}`)
    .on('click',()=>renderPanel(s));
  });

  startGPS();
};

// ---------------- MENU ----------------
function toggleMenu(){
  const m=document.getElementById('menu');
  m.style.display=m.style.display==='block'?'none':'block';
}

</script>

</body>
</html>
