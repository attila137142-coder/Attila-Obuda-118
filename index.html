<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Attila Közlekedés – Diszpécser térkép</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body{
height:100%;
margin:0;
font-family:Arial;
}

#map{
height:100%;
width:100%;
}

.panel{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
z-index:1000;
}

</style>
</head>

<body>

<div class="panel">
<b>Attila Közlekedés – Diszpécser térkép</b><br>
Budapest + Pest megye
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.55,19.05],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


var busIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/61/61231.png',
iconSize:[30,30]
});

var stopIcon = L.icon({
iconUrl:'https://cdn-icons-png.flaticon.com/512/854/854878.png',
iconSize:[16,16]
});


var vehicles = [

{id:101,route:"34",lat:47.565,lon:19.045},
{id:102,route:"106",lat:47.585,lon:19.050},
{id:103,route:"H5",lat:47.600,lon:19.060},
{id:104,route:"923",lat:47.540,lon:19.020}

];


var markers = {};

vehicles.forEach(function(v){

var marker = L.marker([v.lat,v.lon],{icon:busIcon}).addTo(map);

marker.bindPopup(
"<b>Járat:</b> "+v.route+
"<br><b>Jármű ID:</b> "+v.id
);

markers[v.id]=marker;

});


function moveVehicles(){

vehicles.forEach(function(v){

v.lat += (Math.random()-0.5)*0.002;
v.lon += (Math.random()-0.5)*0.002;

markers[v.id].setLatLng([v.lat,v.lon]);

});

}

setInterval(moveVehicles,15000);



var stops=[

["Békásmegyer H",47.5985,19.0552],
["Pünkösdfürdő",47.5889,19.0553],
["Csillaghegy",47.5797,19.0484],
["Római fürdő",47.5750,19.0454],
["Aquincum",47.5673,19.0459],
["Óbuda vasútállomás",47.5586,19.0432],
["Szentlélek tér",47.5393,19.0460],
["Flórián tér",47.5440,19.0406],
["Kolosy tér",47.5296,19.0382],

["Budakalász HÉV",47.6168,19.0453],
["Pomáz HÉV",47.6410,19.0273],
["Szentendre buszállomás",47.6673,19.0756],
["Leányfalu központ",47.7140,19.0854],
["Tahitótfalu híd",47.7502,19.0864]

];

stops.forEach(function(s){

L.marker([s[1],s[2]],{icon:stopIcon})
.addTo(map)
.bindPopup("<b>"+s[0]+"</b>");

});

</script>

</body>
</html>
