<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés - GPS + Megállók</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 400px; margin-top:10px; }
body { font-family: Arial; }
.box { padding:10px; border:1px solid #ccc; margin:10px 0; }
</style>
</head>

<body>

<h2>📍 Helyzet + Közlekedés rendszer</h2>

<div class="box" id="location">GPS betöltés...</div>
<div class="box" id="gsm">Hálózat...</div>

<div id="map"></div>

<h3>🚏 Legközelebbi megállók</h3>
<div id="stops">--</div>

<script>
let map = L.map('map').setView([47.4979,19.0402], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'OSM'
}).addTo(map);

let userLat, userLon;

/* ================= STOP ADATBÁZIS ================= */

let stops = [

{line:"Gyermekvasút", name:"Hűvösvölgy", lat:47.5412, lon:18.9640},
{line:"Gyermekvasút", name:"Normafa", lat:47.5070, lon:18.9630},

{line:"Királyrét", name:"Kismaros", lat:47.8270, lon:19.0150},
{line:"Királyrét", name:"Királyrét", lat:47.9100, lon:18.9730},

{line:"Kemence", name:"Kemence", lat:47.9980, lon:18.8910},

{line:"Szob", name:"Szob", lat:47.8190, lon:18.8680}

];

/* ================= FORMÁZÁS ================= */

function formatDistance(m){
 return m < 1000 ? Math.round(m)+" m" : (m/1000).toFixed(2)+" km";
}

/* ================= KÖZELI MEGÁLLÓK ================= */

function getNearest(){

 return stops.map(s=>({
  ...s,
  d: map.distance([userLat,userLon],[s.lat,s.lon])
 }))
 .sort((a,b)=>a.d-b.d)
 .slice(0,10);
}

function showStops(){

 let list = getNearest();
 let html = "";

 list.forEach(s=>{
  html += `
   🚏 <b>${s.name}</b><br>
   🚆 ${s.line}<br>
   📏 ${formatDistance(s.d)}<br><br>
  `;
 });

 document.getElementById("stops").innerHTML = html;
}

/* ================= GPS ================= */

async function updateLocation(pos){

 userLat = pos.coords.latitude;
 userLon = pos.coords.longitude;

 let acc = pos.coords.accuracy;

 /* cím */
 let res = await fetch(
  `https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`
 );

 let d = await res.json();
 let a = d.address || {};

 document.getElementById("location").innerHTML = `
 📍 ${userLat.toFixed(5)}, ${userLon.toFixed(5)}<br>
 🎯 ±${Math.round(acc)} m<br><br>
 🌍 ${a.country || "-"}<br>
 🏙 ${a.city || a.town || a.village || "-"}<br>
 🛣 ${a.road || ""} ${a.house_number || ""}
 `;

 L.marker([userLat,userLon]).addTo(map);
 map.setView([userLat,userLon],14);

 showStops();
}

/* ================= HÁLÓZAT ================= */

function getSignalInfo(){

 let c = navigator.connection;
 if(!c) return "📡 nincs adat";

 let speed = c.downlink;
 let type = c.effectiveType;

 let percent = Math.min(100, Math.round(speed*20));

 return `
 📶 Jel: ${percent}%<br>
 🌐 Típus: ${type}<br>
 ⚡ ${speed} Mbps
 `;
}

setInterval(()=>{
 document.getElementById("gsm").innerHTML = getSignalInfo();
},2000);

/* ================= GPS indítás ================= */

navigator.geolocation.watchPosition(
 updateLocation,
 ()=> document.getElementById("location").innerHTML="❌ GPS hiba",
 { enableHighAccuracy:true, maximumAge:0, timeout:10000 }
);

</script>

</body>
</html>
