<!DOCTYPE html> <html lang="hu"> <head> <meta charset="UTF-8"> <title>🚌 Megállós menetrend PRO</title> <style> body{ background:#000; color:#FFD700; font-family:Arial; padding:10px; } h1{text-align:center;} input{ width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:none; } button{ padding:10px; margin:5px; border-radius:10px; border:none; cursor:pointer; } .stop{ margin-top:15px; padding:10px; background:#111; border-radius:10px; } .row{ padding:5px; border-bottom:1px solid #333; } .red{color:red;} .blue{color:#00aaff;} .white{color:white;} </style> </head> <body> <h1>🚌 Megállós menetrend</h1> <input id="search" placeholder="Megálló / járat keresés..." oninput="render()"> <button onclick="setMode('near')">📍 1 km-en belül</button> <button onclick="setMode('all')">📊 Összes</button> <button onclick="getLocation()">📡 Saját hely</button> <div id="list"></div> <script> // ===== VALÓSABB ADAT (nem random hülyeség) const stops = [ {name:"Békásmegyer",lat:47.598,lon:19.054}, {name:"Flórián tér",lat:47.542,lon:19.042}, {name:"Batthyány tér",lat:47.506,lon:19.039} ]; const timetable = [ {stop:"Békásmegyer",line:"H5",dest:"Batthyány tér",times:["05:10","05:30","05:50","06:10"]}, {stop:"Békásmegyer",line:"134",dest:"Nyugati",times:["05:15","05:45","06:15"]}, {stop:"Flórián tér",line:"1",dest:"Kelenföld",times:["05:20","05:40","06:00"]}, {stop:"Batthyány tér",line:"19",dest:"Kelenföld",times:["05:25","05:55","06:25"]} ]; let userLat=null,userLon=null; let mode="all"; // ===== HELYZET function getLocation(){ navigator.geolocation.getCurrentPosition(pos=>{ userLat=pos.coords.latitude; userLon=pos.coords.longitude; render(); }); } // ===== TÁVOLSÁG function dist(a,b,c,d){ const R=6371e3; const dLat=(c-a)*Math.PI/180; const dLon=(d-b)*Math.PI/180; const x=Math.sin(dLat/2)**2+ Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)* Math.sin(dLon/2)**2; return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))); } // ===== IDŐ SZÁMOLÁS function getNextTimes(times){ const now=new Date(); const current=now.getHours()*60+now.getMinutes(); return times .map(t=>{ const [h,m]=t.split(":").map(Number); return {t, diff:(h*60+m)-current}; }) .filter(x=>x.diff>=0) .slice(0,3); } // ===== RENDER function setMode(m){mode=m;render();} function render(){ const search=document.getElementById("search").value.toLowerCase(); let html=""; stops.forEach(s=>{ if(mode==="near" && userLat){ const d=dist(userLat,userLon,s.lat,s.lon); if(d>1000) return; } if(!s.name.toLowerCase().includes(search)) return; html+=`<div class="stop"><b>📍 ${s.name}</b>`; timetable .filter(t=>t.stop===s.name) .forEach(t=>{ const next=getNextTimes(t.times); next.forEach(n=>{ let cls="white"; html+=` <div class="row ${cls}"> ${t.line} | ${n.t} | ${n.dest} </div>`; }); }); html+="</div>"; }); document.getElementById("list").innerHTML=html; } render(); </script> </body> </html>
