<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iránytű Navi PRO - GTFS FULL ENGINE</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family: Arial; background:#0f172a; color:#e2e8f0; }
    header { padding:12px; background:#111827; display:flex; justify-content:space-between; align-items:center; }
    h1 { font-size:16px; margin:0; }
    .btn { background:#2563eb; border:none; padding:8px 10px; color:#fff; border-radius:8px; cursor:pointer; }
    .grid { display:grid; gap:10px; padding:10px; }
    .card { background:#1f2937; padding:10px; border-radius:12px; }
    input { width:100%; padding:10px; border-radius:8px; border:none; margin-top:5px; }
    #map { height:320px; border-radius:12px; }
    .small { font-size:12px; opacity:0.85; white-space:pre-line; }
    .compass { font-size:26px; text-align:center; padding:10px; }
    .resultBox { margin-top:8px; padding:8px; background:#111827; border-radius:8px; }

    #menu {
      position:fixed;
      inset:0;
      background:#0b1220;
      display:none;
      padding:20px;
      z-index:999;
      overflow:auto;
    }
  </style>
</head>
<body>

<header>
  <h1>🧭 Iránytű Navi PRO - GTFS FULL ENGINE</h1>
  <button class="btn" onclick="toggleMenu()">Menü</button>
</header>

<div id="menu">
  <h2>🚆 GTFS FULL ENGINE</h2>
  <p>📦 Járatok / útvonaltervező / import (következő lépés)</p>
  <button class="btn" onclick="toggleMenu()">Bezár</button>
</div>

<div class="grid">

  <div class="card">
    <h3>🔍 GTFS Megálló kereső</h3>
    <input id="search" placeholder="Név vagy GTFS kód (pl. 01234)" oninput="searchStops()" />
    <div id="results" class="small"></div>
  </div>

  <div class="card">
    <h3>🗺️ Térkép</h3>
    <div id="map"></div>
    <div class="small" id="mapStatus">Térkép betöltés...</div>
  </div>

  <div class="card">
    <h3>🧭 Iránytű</h3>
    <div class="compass" id="compass">⏳ várakozás: szenzor / engedély</div>
    <button class="btn" onclick="startCompass()">Iránytű indítása</button>
  </div>

</div>

<script>

let map;

// ---------------- GTFS FULL (SIMULÁLT STRUKTÚRA) ----------------
const stops = [
  { gtfs:"HU-BKK-1001", name:"Deák Ferenc tér", lat:47.4979, lon:19.0550 },
  { gtfs:"HU-BKK-1002", name:"Kelenföld vasútállomás", lat:47.4649, lon:19.0227 },
  { gtfs:"HU-BKK-1003", name:"Örs vezér tere", lat:47.5006, lon:19.1372 },
  { gtfs:"HU-BKK-1004", name:"Batthyány tér", lat:47.5063, lon:19.0399 },
  { gtfs:"HU-BKK-1005", name:"Attila út (demo)", lat:47.4982, lon:19.0415 }
];

// ---------------- MAP ----------------
window.onload = () => {
  map = L.map('map').setView([47.4979, 19.0402], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  stops.forEach(s => {
    L.marker([s.lat, s.lon]).addTo(map)
      .bindPopup(`<b>${s.name}</b><br>GTFS: ${s.gtfs}`);
  });

  setTimeout(() => map.invalidateSize(), 300);
  document.getElementById('mapStatus').innerText = "✔ GTFS MAP READY";
};

// ---------------- SEARCH (GTFS + NAME) ----------------
function searchStops(){
  const q = document.getElementById('search').value.toLowerCase();
  const res = document.getElementById('results');
  res.innerHTML = "";

  const found = stops.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.gtfs.toLowerCase().includes(q)
  );

  if(found.length === 0){
    res.innerText = "Nincs találat";
    return;
  }

  found.forEach(s => {
    const box = document.createElement("div");
    box.className = "resultBox";
    box.innerText =
      `🚏 ${s.name}\n🆔 GTFS: ${s.gtfs}\n📍 ${s.lat}, ${s.lon}`;
    res.appendChild(box);
  });
}

// ---------------- MENU ----------------
function toggleMenu(){
  const m = document.getElementById('menu');
  m.style.display = (m.style.display === "block") ? "none" : "block";
}

// ---------------- COMPASS ----------------
function startCompass(){
  const el = document.getElementById('compass');

  if(!window.DeviceOrientationEvent){
    el.innerText = "❌ nincs szenzor";
    return;
  }

  el.innerText = "⏳ engedély / szenzor várakozás";

  if(typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission()
      .then(p => {
        if(p === 'granted') initCompass();
        else el.innerText = "❌ engedély megtagadva";
      });
  } else {
    initCompass();
  }
}

function initCompass(){
  window.addEventListener("deviceorientation", e => {
    let d = e.alpha || 0;
    let t = "⬆️ ÉSZAK";

    if(d>45&&d<135) t="➡️ KELET";
    else if(d>135&&d<225) t="⬇️ DÉL";
    else if(d>225&&d<315) t="⬅️ NYUGAT";

    document.getElementById('compass').innerText = t;
  });
}

</script>

</body>
</html>
