<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Attila Közlekedés – Élő térkép</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map{
height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.52,19.04],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

async function loadVehicles(){

const url="https://data.bkk.hu/api/query/v1/ws/gtfs-rt/vehicles";

const res = await fetch(url);
const data = await res.json();

data.entity.forEach(e=>{

if(e.vehicle){

const lat = e.vehicle.position.latitude;
const lon = e.vehicle.position.longitude;

L.marker([lat,lon])
.addTo(map)
.bindPopup(
"Járat: "+e.vehicle.trip.routeId+
"<br>Jármű: "+e.vehicle.vehicle.id
);

}

});

}

loadVehicles();
