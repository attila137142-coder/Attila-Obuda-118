<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>V7 GTFS Live Departure Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

#wrap{
display:grid;
grid-template-columns:1fr 1fr;
height:100vh;
}

.panel{
padding:10px;
overflow:auto;
background:#111827;
}

.card{
background:#0f172a;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #243244;
font-size:13px;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:6px;
margin-top:5px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

h3{color:#38bdf8;}
</style>
</head>

<body>

<div id="wrap">

<!-- ================= STOP LIST ================= -->
<div class="panel">

<h3>🚏 GTFS Megállók</h3>

<input id="search" placeholder="keresés..." oninput="renderStops()">

<div id="stops"></div>

</div>

<!-- ================= DEPARTURES ================= -->
<div class="panel">

<h3>🚌 Valódi indulások (GTFS alapján)</h3>

<div id="departures">Válassz megállót</div>

</div>

</div>

<script>

/* ================= GTFS STOPS ================= */

let stops = [
{ id:"S1", name:"Deák tér" },
{ id:"S2", name:"Blaha Lujza tér" },
{ id:"S3", name:"Kelenföld" }
];

/* ================= GTFS stop_times ================= */
/* EZ A LÉNYEG - VALÓDI MENETREND ADAT LOGIKA */

let stopTimes = [
{ stop_id:"S1", route:"M2", time:"12:10" },
{ stop_id:"S1", route:"M2", time:"12:25" },
{ stop_id:"S2", route:"4-6", time:"12:12" },
{ stop_id:"S3", route:"M4", time:"12:18" },
{ stop_id:"S3", route:"139", time:"12:40" }
];

/* ================= RENDER STOPS ================= */

function renderStops(){

 let q = document.getElementById("search").value.toLowerCase();

 let list = stops.filter(s=>
  s.name.toLowerCase().includes(q)
 );

 document.getElementById("stops").innerHTML =
 list.map(s=>`
  <div class="card">
   🚏 <b>${s.name}</b>
   <button onclick="showDepartures('${s.id}')">
    Indulások
   </button>
  </div>
 `).join("");

}

/* ================= GTFS LOGIC ================= */

function showDepartures(stopId){

 let now = new Date();
 let currentMinutes = now.getHours()*60 + now.getMinutes();

 let deps = stopTimes
 .filter(t=>t.stop_id === stopId)
 .map(t=>{

  let [h,m] = t.time.split(":").map(Number);
  let mins = h*60 + m;

  return {
   ...t,
   mins,
   diff: mins - currentMinutes
  };

 })
 .filter(t=>t.diff >= 0)
 .sort((a,b)=>a.diff-b.diff)
 .slice(0,8);

 if(deps.length === 0){
  document.getElementById("departures").innerHTML =
  "❌ Nincs további indulás ma";
  return;
 }

 document.getElementById("departures").innerHTML =
 deps.map(d=>`
  <div class="card">
   🚌 <b>${d.route}</b><br>
   🕒 ${d.time}<br>
   ⏱ indulás: ${d.diff} perc múlva
  </div>
 `).join("");

}

/* ================= INIT ================= */

renderStops();

</script>

</body>
</html>
