<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY V16 REAL FEED CONNECTOR</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000d;
 color:#0f0;
 padding:10px;
 width:480px;
 max-height:90vh;
 overflow:auto;
 border:1px solid #0f0;
}

.small{font-size:12px;opacity:0.7}
</style>
</head>

<body>

<div id="panel">
<h3>🚆 ROXY V16 – REAL FEED CONNECTOR</h3>
<div id="info">📡 feed inicializálás...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map=L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stopLayer=L.layerGroup().addTo(map);
let vehicleLayer=L.layerGroup().addTo(map);

// ================= FEED STATE =================
let FEED = {
 gtfsStops:[],
 gtfsTrips:[],
 gtfsTimes:[],
 realtime:false
};

// ================= MASTER STOPS (LOCAL DB) =================
let MASTER_STOPS=[
 {name:"Békásmegyer",gtfs:"H5",lat:47.598091,lon:19.054599},
 {name:"Flórián tér",gtfs:"BKK",lat:47.542896,lon:19.042252},
 {name:"Örs vezér tér",gtfs:"BKK",lat:47.501742,lon:19.135604},
 {name:"Vác",gtfs:"VOLAN",lat:47.781930,lon:19.129643},
 {name:"Dobogókő",gtfs:"VOLAN",lat:47.719118,lon:18.897577}
];

// ================= SAFE FETCH =================
async function safeFetch(url){

 try{
  let r=await fetch(url);
  if(!r.ok) throw "no file";
  return await r.text();
 }catch(e){
  return null;
 }

}

// ================= GTFS LOADER =================
async function loadGTFS(){

 let txt=await safeFetch("stop_times.txt");

 if(!txt){
  console.log("⚠️ GTFS fallback");
  FEED.realtime=false;
  return;
 }

 let lines=txt.split("\n");

 FEED.gtfsTimes=[];

 for(let i=1;i<lines.length;i++){

  let c=lines[i].split(",");

  if(c.length<4) continue;

  FEED.gtfsTimes.push({
   trip:c[0],
   time:c[2],
   stop:c[3]
  });

 }

 FEED.realtime=true;

}

// ================= GTFS-RT (OPTIONAL) =================
async function loadRealtime(){

 // ha nincs endpoint → fallback
 let data=await safeFetch("vehicle_positions.json");

 if(!data){
  console.log("no realtime feed");
  return;
 }

 try{
  let json=JSON.parse(data);
  console.log("realtime OK",json);
 }catch(e){}

}

// ================= DIST =================
function dist(a,b,c,d){

 let R=6371000;
 let dLat=(c-a)*Math.PI/180;
 let dLon=(d-b)*Math.PI/180;

 let x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*
 Math.cos(c*Math.PI/180)*
 Math.sin(dLon/2)**2;

 return Math.round(2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// ================= FIND STOP =================
function nearestStop(lat,lon){

 let best=null;
 let min=999999;

 MASTER_STOPS.forEach(s=>{

  let d=dist(lat,lon,s.lat,s.lon);

  if(d<min){
   min=d;
   best=s;
  }

 });

 return {best,min};
}

// ================= DEPARTURES =================
function departures(stop){

 if(FEED.realtime){

  return FEED.gtfsTimes
   .filter(t=>t.stop==stop.gtfs)
   .slice(0,10)
   .map(t=>({
    time:t.time,
    trip:t.trip,
    status:"GTFS"
   }));

 }

 // fallback
 let list=[];

 for(let i=0;i<5;i++){

  list.push({
   time:new Date(Date.now()+i*60000).toLocaleTimeString(),
   trip:"FALLBACK-"+i,
   status:"no feed"
  });

 }

 return list;
}

// ================= CLICK =================
map.on("click",e=>{

 let lat=e.latlng.lat;
 let lon=e.latlng.lng;

 let n=nearestStop(lat,lon);

 let deps=departures(n.best);

 let html=`<b>🚏 ${n.best.name}</b><br>
 📏 ${n.min} m<br>
 🆔 ${n.best.gtfs}<br>
 📡 ${FEED.realtime?"REAL FEED":"FALLBACK"}<br><br>

 <b>🕒 Indulások</b><br>`;

 deps.forEach(d=>{
  html+=`
  🕒 ${d.time}<br>
  🧾 ${d.trip}<br>
  📡 ${d.status}<br><br>`;
 });

 document.getElementById("info").innerHTML=html;

});

// ================= INIT =================
window.onload=async()=>{

 await loadGTFS();
 await loadRealtime();

 MASTER_STOPS.forEach(s=>{
  L.circleMarker([s.lat,s.lon],{
   radius:5,
   color:"#0f0",
   fillColor:"#0f0",
   fillOpacity:1
  }).addTo(stopLayer);
 });

 document.getElementById("info").innerHTML=
 FEED.realtime
 ? "✅ GTFS FEED aktív"
 : "⚠️ fallback mód (nincs feed)";

};

</script>

</body>
</html>
