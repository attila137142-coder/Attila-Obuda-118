<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Attila Közlekedés</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

#map{
height:100vh;
width:100%;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.8,18.9],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var marker = L.marker([47.88,18.97]).addTo(map);
marker.bindPopup("Királyréti kisvasút");

</script>

</body>
</html>
