
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚍 Attila Közlekedés PRO</title>

<style>
body{background:#000;color:#FFD700;font-family:Arial;padding:10px;}
.card{background:#111;padding:10px;margin-top:10px;border-radius:10px;}
.red{color:#ff4d4d;} .blue{color:#4db8ff;}
.small{font-size:12px;opacity:0.7;}
</style>

</head>
<body>

<h2>🚍 Valódi megállós indulások</h2>

<button onclick="start()">▶ Indítás</button>

<div id="status">Indítás...</div>
<div id="location" class="card"></div>
<div id="list"></div>

<script>

// ===== "GTFS JSON" (MINTA - EZT CSERÉLJÜK KÉSŐBB!)
const DATA = [
{
 stop:"Nád utca",
 lat:47.594072,
 lon:19.048469,
 departures:[
  {line:"134",dest:"Nyugati pályaudvar",time:"12:05",trip:"T123"},
  {line:"134",dest:"Nyugati pályaudvar",time:"12:15",trip:"T124"},
  {line:"34",dest:"Békásmegyer",time:"12:08",trip:"T200"}
 ]
},
{
 stop:"Békásmegyer HÉV",
 lat:47.598091,
 lon:19.054599,
 departures:[
  {line:"H5",dest:"Batthyány tér",time:"12:03",trip:"H5001"},
  {line:"H5",dest:"Batthyány tér",time:"12:13",trip:"H5002"}
 ]
}
];

// ===== GPS
let userLat,userLon,userAcc;

// ===== HELY
function getLocation(){
 return new Promise((res,rej)=>{
  navigator.geolocation.getCurrentPosition(p=>{
   userLat=p.coords.latitude;
   userLon=p.coords.longitude;
   userAcc=p.coords.accuracy;
   res();
  },rej);
 });
}

// ===== CÍM (SZÉTBONTVA)
async function getAddress(lat,lon){
 try{
  const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
  const data = await res.json();
  const a = data.address || {};

  return `${a.country||""} → ${a.city||a.town||""} → ${a.road||""} ${a.house_number||""}`;
 }catch{
  return "Cím nem elérhető";
 }
}

// ===== TÁVOLSÁG
function dist(a,b,c,d){
 const R=6371e3;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
 Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== IDŐ
function getMin(t){
 const now=new Date();
 const [h,m]=t.split(":").map(Number);
 return (h*60+m)-(now.getHours()*60+now.getMinutes());
}

// ===== RENDER
async function render(){

 const addr = await getAddress(userLat,userLon);

 document.getElementById("location").innerHTML = `
 📍 Saját hely<br>
 🌐 ${userLat.toFixed(6)}, ${userLon.toFixed(6)}<br>
 🎯 Pontosság: ±${Math.round(userAcc)} m<br>
 🏠 ${addr}
 `;

 let near = DATA.map(s=>{
  return {...s,d:dist(userLat,userLon,s.lat,s.lon)};
 })
 .filter(s=>s.d<=2000)
 .sort((a,b)=>a.d-b.d);

 let html="";

 near.forEach(s=>{

  html+=`<div class="card">
  🚏 <b>${s.stop}</b><br>
  📏 ${Math.round(s.d)} m<br>`;

  s.departures.forEach(d=>{

   let min = getMin(d.time);
   if(min<0 || min>60) return;

   let c="";
   if(min<2)c="red";
   else if(min>10)c="blue";

   html+=`<div class="${c}">
   🚍 <b>${d.line}</b> → ${d.dest}<br>
   ⏰ ${d.time} (${min} perc)<br>
   <span class="small">Trip: ${d.trip}</span>
   </div>`;
  });

  html+="</div>";
 });

 document.getElementById("list").innerHTML=html;
}

// ===== START
async function start(){
 await getLocation();
 document.getElementById("status").innerText="✔ Fut";
 render();
}

</script>

</body>
</html>
```
