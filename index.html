<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Attila Közlekedés PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  background: black;
  color: #FFD700;
  font-family: monospace;
  padding: 10px;
}

button {
  background: black;
  color: #FFD700;
  border: 2px solid #FFD700;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

.matrix {
  color: #00FF00;
  text-shadow: 0 0 5px #00FF00;
}

.line {
  padding: 10px;
  border-bottom: 1px solid #333;
  margin-bottom: 10px;
}

.early { color: red; }
.late { color: #00BFFF; }
.ontime { color: white; }

.vehicle {
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<h2>🚍 Attila Közlekedés PRO</h2>

<button onclick="loadBKK()">BKK BETÖLTÉS</button>
<button onclick="setMode('normal')">Normál</button>
<button onclick="setMode('green')">Zöld</button>
<button onclick="setMode('red')">Piros</button>
<button onclick="setMode('matrix')">MÁTRIX</button>

<div id="content">Kattints a betöltésre</div>

<script>

// ===== MÓDOK =====
function setMode(m) {
  if (m === "green") {
    document.body.style.color = "#00FF00";
    document.body.className = "";
  }
  else if (m === "red") {
    document.body.style.color = "#FF4444";
    document.body.className = "";
  }
  else if (m === "matrix") {
    document.body.style.color = "#00FF00";
    document.body.className = "matrix";
  }
  else {
    document.body.style.color = "#FFD700";
    document.body.className = "";
  }
}

// ===== CSV PARSER =====
function parseCSV(line) {
  const result = [];
  let current = "";
  let insideQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === ',' && !insideQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

// ===== KÉSÉS =====
function generateDelay() {
  return Math.floor(Math.random() * 600 - 300);
}

function formatDelay(sec) {
  if (sec === 0) return "pontos";

  const m = Math.floor(Math.abs(sec) / 60);
  const s = Math.abs(sec) % 60;

  return (sec > 0 ? "+" : "-") + m + ":" + (s < 10 ? "0" : "") + s;
}

function getDelayClass(sec) {
  if (sec < 0) return "early";
  if (sec > 0) return "late";
  return "ontime";
}

// ===== JÁRMŰ =====
function generateVehicle() {

  const types = [
    "BKK Busz",
    "BKK Villamos",
    "BKK Trolibusz",
    "HÉV",
    "VOLÁN Busz",
    "MÁV Vonat",
    "Királyréti kisvasút",
    "Nagybörzsönyi kisvasút",
    "Szobi kisvasút",
    "Budapesti Gyermekvasút",
    "Kemencei kisvasút"
  ];

  const type = types[Math.floor(Math.random() * types.length)];

  let prefix = "BKK";
  if (type.includes("VOLÁN")) prefix = "VOL";
  if (type.includes("MÁV")) prefix = "MAV";
  if (type.includes("kisvasút")) prefix = "ERD";
  if (type.includes("HÉV")) prefix = "HEV";

  const id = prefix + "-" + Math.floor(Math.random()*9000 + 1000);
  const plate = "ABC-" + Math.floor(Math.random()*900 + 100);

  return `${type} | ${id} | ${plate}`;
}

// ===== "KVÁZI ÉLŐ" FRISSÍTÉS =====
setInterval(() => {
  if (document.getElementById("content").innerHTML.includes("🚍")) {
    loadBKK();
  }
}, 15000); // 15 mp

// ===== BKK BETÖLTÉS =====
async function loadBKK() {

  document.getElementById("content").innerHTML = "BETÖLTÉS...";

  try {
    const url = "https://go.bkk.hu/api/static/v1/public-gtfs/budapest_gtfs.zip";

    const res = await fetch(url);
    const blob = await res.blob();
    const zip = await JSZip.loadAsync(blob);

    const stopsTxt = await zip.file("stops.txt").async("string");
    const stopTimesTxt = await zip.file("stop_times.txt").async("string");

    const stopsRows = stopsTxt.split("\n");
    const stopTimesRows = stopTimesTxt.split("\n");

    let html = "";

    for (let i = 1; i < 40; i++) {

      const cols = parseCSV(stopsRows[i]);
      const stopId = cols[0];
      const stopName = cols[2];

      html += `<div class="line"><b>${stopName}</b> (GTFS: ${stopId})<br>`;

      let count = 0;

      for (let j = 1; j < 5000; j++) {

        const st = parseCSV(stopTimesRows[j]);

        if (st[3] === stopId) {

          const delay = generateDelay();
          const delayText = formatDelay(delay);
          const delayClass = getDelayClass(delay);
          const vehicle = generateVehicle();

          html += `
🚍 <b>${st[1]}</b>
<span class="${delayClass}">(${delayText})</span><br>

<div class="vehicle">
${vehicle}
</div>
`;

          count++;
        }

        if (count >= 3) break;
      }

      html += `</div>`;
    }

    document.getElementById("content").innerHTML = html;

  } catch (err) {
    document.getElementById("content").innerHTML = "HIBA: " + err;
  }
}

</script>

</body>
</html>
