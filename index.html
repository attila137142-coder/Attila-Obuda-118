<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>GTFS OFFLINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; display:flex; height:100vh; font-family:Arial; }
#sidebar { width:300px; padding:10px; border-right:1px solid #ccc; overflow:auto; }
#map { flex:1; }
input { width:100%; padding:8px; margin-bottom:10px; }
.stop { padding:6px; border-bottom:1px solid #eee; }
</style>
</head>
<body>

<div id="sidebar">
<h3>🚌 OFFLINE DEMO</h3>
<input id="search" placeholder="Keresés">
<div id="list"></div>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([47.4979,19.0402],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🔥 BEÉGETETT ADAT
const stops = [
  {name:"Örs vezér tere",lat:47.503,lon:19.136},
  {name:"Deák Ferenc tér",lat:47.498,lon:19.055},
  {name:"Kőbánya alsó",lat:47.482,lon:19.124},
  {name:"Puskás Stadion",lat:47.500,lon:19.104},
  {name:"Bécsi út / Vörösvári út",lat:47.545,lon:19.028}
];

let markers=[];

function render(listData){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  const list=document.getElementById('list');
  list.innerHTML='';

  listData.forEach(s=>{
    const m=L.marker([s.lat,s.lon]).addTo(map);
    markers.push(m);

    const d=document.createElement('div');
    d.className='stop';
    d.innerText=s.name;
    list.appendChild(d);
  });
}

render(stops);

// kereső
search.oninput=e=>{
  const q=e.target.value.toLowerCase();
  const f=stops.filter(s=>s.name.toLowerCase().includes(q));
  render(f);
};
</script>

</body>
</html>
