
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚏 Megállók 2km PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{background:#000;color:#FFD700;font-family:Arial;padding:10px;}
button{padding:10px;margin:5px;border-radius:10px;}
.card{background:#111;padding:10px;margin-top:10px;border-radius:10px;}
.red{color:#ff4d4d;} .blue{color:#4db8ff;}
</style>
</head>

<body>

<h2>🚏 2km-en belüli megállók</h2>

<button onclick="start()">▶ Indítás</button>

<div id="status">Várakozás...</div>
<div id="list"></div>

<script>

const PROXY = "https://attila-obuda-118.vercel.app/api/gtfs";

let stops=[], stopTimes=[], trips=[];
let stopMap={}, tripMap={};

let userLat=null,userLon=null;

// ===== GPS
function getLocation(){
 return new Promise((res,rej)=>{
  navigator.geolocation.getCurrentPosition(p=>{
   userLat=p.coords.latitude;
   userLon=p.coords.longitude;
   res();
  },rej);
 });
}

// ===== CSV
function parseCSV(txt){
 const rows=txt.split("\\n").filter(r=>r.trim());
 const h=rows[0].split(",");
 return rows.slice(1).map(r=>{
  const c=r.split(",");
  let o={};
  h.forEach((x,i)=>o[x]=c[i]);
  return o;
 });
}

// ===== TÁVOLSÁG
function dist(a,b,c,d){
 const R=6371e3;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
 Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== BETÖLTÉS
async function loadGTFS(){
 document.getElementById("status").innerText="GTFS betöltés...";
 const res = await fetch(PROXY);
 const blob = await res.blob();
 const zip = await JSZip.loadAsync(blob);

 stops = parseCSV(await zip.file("stops.txt").async("string"));
 stopTimes = parseCSV(await zip.file("stop_times.txt").async("string"));
 trips = parseCSV(await zip.file("trips.txt").async("string"));

 trips.forEach(t=>tripMap[t.trip_id]=t);

 stopTimes.forEach(st=>{
  if(!stopMap[st.stop_id]) stopMap[st.stop_id]=[];
  stopMap[st.stop_id].push(st);
 });

 document.getElementById("status").innerText="GTFS OK";
}

// ===== LISTA
function render(){

 let now=new Date();
 let cur=now.getHours()*60+now.getMinutes();

 let near = stops.map(s=>{
  return {...s,d:dist(userLat,userLon,+s.stop_lat,+s.stop_lon)};
 })
 .filter(s=>s.d<=2000)
 .sort((a,b)=>a.d-b.d)
 .slice(0,6);

 let html="";

 near.forEach(s=>{

  let list = stopMap[s.stop_id]||[];
  let next=[];

  list.slice(0,40).forEach(st=>{
   let [h,m]=st.arrival_time.split(":").map(Number);
   h=h%24;
   let min=(h*60+m)-cur;
   if(min<0||min>120) return;

   let trip=tripMap[st.trip_id];
   if(!trip) return;

   next.push({line:trip.route_id,time:min});
  });

  next.sort((a,b)=>a.time-b.time);

  html+=`<div class="card">
  📍 ${s.stop_name} (${Math.round(s.d)} m)<br>`;

  next.slice(0,5).forEach(n=>{
   let c="";
   if(n.time<2)c="red";
   else if(n.time>10)c="blue";
   html+=`<div class="${c}">🚍 ${n.line} | ${n.time} perc</div>`;
  });

  html+="</div>";
 });

 document.getElementById("list").innerHTML=html;
}

// ===== START
async function start(){
 try{
  await getLocation();
  await loadGTFS();
  render();
 }catch(e){
  document.getElementById("status").innerText="Hiba: "+e.message;
 }
}

</script>

</body>
</html>
