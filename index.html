<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY ARCH STABLE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#panel{
 position:absolute;
 top:10px;
 left:10px;
 background:white;
 padding:10px;
 z-index:1000;
 width:300px;
}
button{width:100%;margin:3px 0;}
</style>
</head>

<body>

<div id="panel">
<h3>ROXY STABLE</h3>

<button onclick="start()">GPS START</button>
<button onclick="addPoint()">ADD POINT</button>
<button onclick="draw()">DRAW ROUTE</button>

<div id="info">READY</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([47.5,19.04],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let trail = [];
let marker;

function start(){

 navigator.geolocation.getCurrentPosition(p=>{

  let lat=p.coords.latitude;
  let lon=p.coords.longitude;

  map.setView([lat,lon],14);

  marker = L.marker([lat,lon]).addTo(map)
   .bindPopup("Te itt vagy").openPopup();

  document.getElementById("info").innerText="GPS OK";

 });

}

function addPoint(){

 navigator.geolocation.getCurrentPosition(p=>{

  trail.push([p.coords.latitude,p.coords.longitude]);

  L.circleMarker([p.coords.latitude,p.coords.longitude]).addTo(map);

  document.getElementById("info").innerText="Pont hozzáadva: "+trail.length;

 });

}

function draw(){

 if(trail.length<2) return;

 L.polyline(trail,{color:"blue"}).addTo(map);

 document.getElementById("info").innerText="Route drawn";

}

</script>

</body>
</html>
