<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GTFS Cockpit v5.1 FIX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; background:#111; color:#fff; }
#map { height: 60vh; }
.panel { padding:10px; }
button { margin:3px; padding:8px; border:0; border-radius:6px; }
.box { background:#1e1e1e; padding:10px; border-radius:8px; font-size:13px; }
.list { max-height:25vh; overflow:auto; margin-top:8px; }
.item { padding:4px 0; border-bottom:1px solid #333; }
</style>
</head>

<body>

<div class="panel">

<button onclick="loadGTFS()">📦 GTFS LOAD</button>
<button onclick="setFilter('all')">🌍 ALL</button>
<button onclick="setFilter('bkk')">🚍 BKK</button>
<button onclick="setFilter('volan')">🚌 VOLÁN</button>
<button onclick="setFilter('mav')">🚆 MÁV</button>
<button onclick="setFilter('forest')">🌲 KISVASÚT</button>

<div id="info" class="box">Ready</div>

<div id="list" class="box list"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([47.2,19.5],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = L.layerGroup().addTo(map);

let state = {
  stops: [],
  filter: "all"
};

// ---------------- GTFS LOAD ----------------
function loadGTFS(){

  state.stops = [
  const STOPS = [

/* ================= BKK / BUDAPEST ================= */

{id:"BKK-F00613", name:"Flórián tér", type:"bkk", line:null, gtfs:"BKK-F00613", lat:47.541664, lng:19.040084},
{id:"BKK-F00057", name:"Batthyány tér (villamos)", type:"bkk", line:null, gtfs:"BKK-F00057", lat:47.506002, lng:19.039456},
{id:"BKK-F00265", name:"Verecke lépcső", type:"bkk", line:null, gtfs:"BKK-F00265", lat:47.529117, lng:19.003624},

{id:"BKK-1831", name:"Kocka utca (kifelé)", type:"bkk", line:null, gtfs:"BKK-1831", lat:47.484915, lng:19.155466},
{id:"BKK-1832", name:"Kocka utca (befelé)", type:"bkk", line:null, gtfs:"BKK-1832", lat:47.484708, lng:19.155969},
{id:"BKK-F01842", name:"Újhegyi sétány", type:"bkk", line:null, gtfs:"BKK-F01842", lat:47.470813, lng:19.164510},

/* ================= HÉV ================= */
{id:"H5-09183", name:"Békásmegyer HÉV", type:"hev", line:"H5", gtfs:"H5-09183", lat:47.598091, lng:19.054599},
{id:"H5-09142221", name:"Szentendre HÉV", type:"hev", line:"H5", gtfs:"H5-09142221", lat:47.661038, lng:19.075607},
{id:"HEV5-09134", name:"Pomáz HÉV", type:"hev", line:"H5", gtfs:"HEV5-09134", lat:47.642749, lng:19.032657},

/* ================= VOLÁN ================= */
{id:"VOL-778806", name:"Szentendre buszállomás", type:"volan", line:null, gtfs:"VOLÁN-778806-99", lat:47.660403, lng:19.075408},
{id:"VOL-779365", name:"Vác buszállomás", type:"volan", line:null, gtfs:"VOLÁN-779365_99", lat:47.781930, lng:19.129643},
{id:"VOL-778561", name:"Dobogókő", type:"volan", line:null, gtfs:"VOLÁN-778561", lat:47.719118, lng:18.897577},

/* ================= MÁV ================= */
{id:"MAV-KELETI", name:"Keleti pályaudvar", type:"mav", line:null, gtfs:"MAV-KELETI", lat:47.500900, lng:19.083600},
{id:"MAV-SZOB", name:"Szob vasútállomás", type:"mav", line:null, gtfs:"VOLAN-779011", lat:47.821319, lng:18.862602},

/* ================= ERDEI VASUTAK ================= */
{id:"GYV-NORM", name:"Normafa (Gyermekvasút)", type:"forest", line:"Gyermekvasút", gtfs:"005546904", lat:47.5070, lng:18.9630},
{id:"GYV-HUV", name:"Hűvösvölgy", type:"forest", line:"Gyermekvasút", gtfs:"005546847", lat:47.5412, lng:18.9640},

{id:"KIRALYRET", name:"Királyrét", type:"forest", line:"Királyrét", gtfs:null, lat:47.9100, lng:18.9730},
{id:"KEMENCE", name:"Kemence vasút", type:"forest", line:"Kemence", gtfs:null, lat:47.9980, lng:18.8910},

/* ================= TÚRA / HEGY ================= */
{id:"DOBOGO", name:"Dobogókő hegytető", type:"tura", line:null, gtfs:"VOLAN-778561", lat:47.719118, lng:18.897577},
{id:"CSOVANYOS", name:"Csóványos", type:"tura", line:null, gtfs:"ERDO", lat:47.94908, lng:18.9483},
{id:"MAGASTAXI", name:"Magas-Taxi turistaház", type:"tura", line:null, gtfs:"ERDO", lat:47.92842, lng:18.92997}

]; 
  ];

  render();
  renderInfo("GTFS betöltve ✔");
}

// ---------------- FILTER ----------------
function setFilter(f){
  state.filter = f;
  render();
}

// ---------------- RENDER ----------------
function render(){

  markers.clearLayers();

  let list = state.stops;

  if(state.filter !== "all"){
    list = list.filter(s => s.type === state.filter);
  }

  // MAP
  list.forEach(s=>{
    L.marker([s.lat,s.lng])
      .addTo(markers)
      .bindPopup(`${s.name}<br>${s.id}`);
  });

  // LISTA
  document.getElementById("list").innerHTML =
    list.map(s =>
      `<div class="item">
        🚏 ${s.name}<br>
        🆔 ${s.id}<br>
        📊 ${s.type}
      </div>`
    ).join("");

  renderInfo(`${list.length} elem`);
}

// ---------------- INFO ----------------
function renderInfo(t){
  document.getElementById("info").innerHTML = t;
}

</script>

</body>
</html>
