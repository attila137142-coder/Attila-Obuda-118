<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Attila Közlekedés</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;}

#map{height:100vh;width:100%;}

.panel{
position:absolute;
top:10px;
left:10px;
width:260px;
background:white;
z-index:1000;
padding:10px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

button{
width:100%;
margin-top:5px;
padding:8px;
}
</style>

</head>

<body>

<div class="panel">

<h3>Térképek</h3>

<button onclick="setStreet()">🗺️ Utca</button>
<button onclick="setTopo()">⛰️ Domborzat</button>
<button onclick="setRail()">🚆 Vasút</button>

<hr>

<h3>Pozíció</h3>
<button onclick="locateMe()">📍 Saját hely</button>

<hr>

<h3>Megállók</h3>
<button onclick="showStops()">🚏 1 km-en belül</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.55,19.03],13);

var street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19});
var topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17});
var rail = L.tileLayer('https://{s}.tile.openrailwaymap.org/standard/{z}/{x}/{y}.png',{maxZoom:19});

street.addTo(map);

function setStreet(){
map.eachLayer(l=>map.removeLayer(l));
street.addTo(map);
}

function setTopo(){
map.eachLayer(l=>map.removeLayer(l));
topo.addTo(map);
}

function setRail(){
map.eachLayer(l=>map.removeLayer(l));
rail.addTo(map);
}

function locateMe(){
navigator.geolocation.getCurrentPosition(function(pos){
var lat = pos.coords.latitude;
var lon = pos.coords.longitude;

L.marker([lat,lon]).addTo(map).bindPopup("Itt vagy").openPopup();
map.setView([lat,lon],15);
});
}

function showStops(){
alert("Következő lépés: GTFS megállók betöltése");
}

</script>

</body>
</html>
