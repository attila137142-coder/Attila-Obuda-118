<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚍 Attila PRO rendszer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{margin:0;background:#000;color:#FFD700;font-family:Arial;}
#map{height:50vh;}
.panel{padding:10px;}
.card{background:#111;padding:10px;margin-top:10px;border-radius:10px;}
button{padding:10px;margin:5px;border-radius:10px;}
.row{display:flex;justify-content:space-between;border-bottom:1px solid #333;padding:5px;}
.red{color:#ff4d4d;}
.blue{color:#4db8ff;}
.small{font-size:12px;}
</style>
</head>

<body>

<h2 style="text-align:center;">🚍 Attila PRO</h2>

<div id="map"></div>

<div class="panel">

<button onclick="getLocation()">📍 GPS</button>
<button onclick="loadStops()">🚏 Megállók</button>
<button onclick="showFavorites()">⭐ Kedvencek</button>
<button onclick="openAnalyzer()">📊 Vonal elemző</button>
<button onclick="showSignal()">📶 Térerő</button>

<div id="info" class="card"></div>
<div id="stops" class="card"></div>
<div id="analyzer" class="card" style="display:none"></div>
<div id="signal" class="card" style="display:none"></div>

</div>

<script>

// ===== MAP
var map = L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png',{opacity:0.8}).addTo(map);

let userLat,userLon,marker;

// ===== GPS
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
userLat=pos.coords.latitude;
userLon=pos.coords.longitude;

if(marker) map.removeLayer(marker);

marker=L.circleMarker([userLat,userLon],{
radius:8,color:'red'
}).addTo(map);

map.setView([userLat,userLon],15);

let speed = pos.coords.speed ? (pos.coords.speed*3.6).toFixed(1) : 0;
let acc = pos.coords.accuracy;

document.getElementById("info").innerHTML=`
📍 ${userLat.toFixed(5)}, ${userLon.toFixed(5)}<br>
🎯 Pontosság: ±${Math.round(acc)} m<br>
🚀 Sebesség: ${speed} km/h (${(speed/3.6).toFixed(1)} m/s)
`;
});
}

// ===== TÁVOLSÁG
function dist(a,b){
return map.distance(a,b);
}

// ===== MEGÁLLÓK (OSM)
async function loadStops(){

if(!userLat) return;

let query=`
[out:json];
node(around:2000,${userLat},${userLon})["highway"="bus_stop"];
node(around:2000,${userLat},${userLon})["railway"="station"];
out;
`;

let res=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:query});
let data=await res.json();

let html="<b>Közeli megállók:</b><br>";

data.elements.slice(0,8).forEach(s=>{
let d = dist([userLat,userLon],[s.lat,s.lon]);

html+=`
🚏 ${s.tags.name||"megálló"}<br>
📏 ${Math.round(d)} m<br><br>
`;
});

document.getElementById("stops").innerHTML=html;
}

// ===== KEDVENCEK (IDE MÁSOLD A 45-ÖT)
function showFavorites(){

let favs=[
{name:"Békásmegyer",lat:47.598,lon:19.054}
];

let html="<b>Kedvencek:</b><br>";

favs.forEach(f=>{
let d=dist([userLat,userLon],[f.lat,f.lon]);
html+=`⭐ ${f.name} (${Math.round(d)} m)<br>`;
});

document.getElementById("stops").innerHTML=html;
}

// ===== VONAL ELEMZŐ
async function openAnalyzer(){

document.getElementById("analyzer").style.display="block";

let route=[
{name:"Pont1",lat:47.59,lon:19.05},
{name:"Pont2",lat:47.60,lon:19.04}
];

let html="<b>📊 Profil</b><br>";

for(let i=1;i<route.length;i++){

let a=route[i-1];
let b=route[i];

let d=dist([a.lat,a.lon],[b.lat,b.lon]);

html+=`
${a.name} → ${b.name}<br>
📏 ${Math.round(d)} m<br><br>
`;
}

document.getElementById("analyzer").innerHTML=html;
}

// ===== GSM / TÉRERŐ
function showSignal(){

let box=document.getElementById("signal");
box.style.display="block";

let connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

let type = connection ? connection.effectiveType : "ismeretlen";
let down = connection ? connection.downlink : "-";

let batteryLevel = "ismeretlen";

if(navigator.getBattery){
navigator.getBattery().then(b=>{
batteryLevel = Math.round(b.level*100);

box.innerHTML=`
📶 Kapcsolat: ${type}<br>
📡 Letöltés: ${down} Mbps<br>
🔋 Akku: ${batteryLevel}%<br>
⚠️ GSM torony adat: böngésző nem adja ki!
`;
});
}else{
box.innerHTML=`
📶 Kapcsolat: ${type}<br>
📡 Letöltés: ${down} Mbps<br>
⚠️ GSM részletes adat NEM elérhető böngészőből
`;
}
}

</script>

</body>
</html>
