<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés STABIL</title>

);
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{background:black;color:#0f0;text-align:center;font-family:Arial;}
#kmh{font-size:70px;text-shadow:0 0 20px #0f0;}
#ms{font-size:24px;}
#coords,#alt,#cim,#tav{color:cyan;margin:8px;font-size:18px;}
#map{height:500px;}
section{border:2px solid #0f0;margin:20px;padding:20px;}
input,button{padding:8px;margin:5px;}
</style>
</head>

<body>

<h1>🚌 Attila Közlekedés</h1>

<section>
<div id="kmh">0 km/h</div>
<div id="ms">0 m/s</div>
<div id="coords">-</div>
<div id="alt">-</div>
<div id="cim">-</div>
<div id="tav">Távolság: -</div>
</section>

<section>
<input id="kereso" placeholder="Hely keresése">
<button onclick="keres()">Keresés</button>
</section>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map=L.map('map').setView([47.49,19.04],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker=L.circleMarker([47.49,19.04],{radius:8,color:'red'}).addTo(map);

let elozoPoz=null;
let elozoIdo=null;
let aktualisPoz=null;

// cím
function cimKeres(lat,lon){
 fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
 .then(r=>r.json())
 .then(d=>{
   if(d.display_name){
     document.getElementById("cim").innerText=d.display_name;
   }
 });
}

// keresés
function keres(){
 let q=document.getElementById("kereso").value;

 fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
 .then(r=>r.json())
 .then(d=>{
   if(d.length>0){
     let lat=parseFloat(d[0].lat);
     let lon=parseFloat(d[0].lon);

     map.setView([lat,lon],15);
     L.marker([lat,lon]).addTo(map);

     if(aktualisPoz){
       let tav=map.distance(aktualisPoz,[lat,lon]);

       document.getElementById("tav").innerText=
       "Légvonal: "+tav.toFixed(0)+" m ("+(tav/1000).toFixed(2)+" km)";
     }
   }
 });
}

// GPS
navigator.geolocation.watchPosition(function(pos){

 let lat=pos.coords.latitude;
 let lon=pos.coords.longitude;
 let alt=pos.coords.altitude;
 let acc=pos.coords.accuracy;

 aktualisPoz=[lat,lon];

 document.getElementById("coords").innerText=
 lat.toFixed(5)+","+lon.toFixed(5)+" (±"+acc.toFixed(0)+"m)";

 document.getElementById("alt").innerText=
 (alt?alt.toFixed(0):"N/A")+" m";

 marker.setLatLng([lat,lon]);
 map.setView([lat,lon]);

 let most=Date.now();

 if(elozoPoz){
   let tav=map.distance(elozoPoz,[lat,lon]);
   let ido=(most-elozoIdo)/1000;

   if(tav>2 && ido>0){
     let ms=tav/ido;
     let kmh=ms*3.6;

     document.getElementById("kmh").innerText=kmh.toFixed(1)+" km/h";
     document.getElementById("ms").innerText=ms.toFixed(2)+" m/s";
   }
 }

 elozoPoz=[lat,lon];
 elozoIdo=most;

 cimKeres(lat,lon);

},{
 enableHighAccuracy:true
});

</script>
</body>
</html>
