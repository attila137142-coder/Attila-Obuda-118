<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés PRO MAX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{background:black;color:yellow;font-family:Arial;text-align:center;}
#map{height:700px;}
button{margin:5px;padding:10px;}
#info{color:cyan;}
</style>
</head>

<body>

<h1>🚌 Attila PRO MAX</h1>

<div>
<button onclick="setLayer(osm)">OSM</button>
<button onclick="setLayer(topo)">Topo</button>
<button onclick="setLayer(hiking)">Turista</button>
<button onclick="setLayer(rail)">Vasút</button>
</div>

<div id="map"></div>

<div id="info">Kattints a térképre útvonalhoz</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map=L.map('map').setView([47.49,19.04],13);

let osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let topo=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
let hiking=L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png');
let rail=L.tileLayer('https://{s}.tiles.openrailwaymap.org/{z}/{x}/{y}.png');

function setLayer(l){
 map.eachLayer(x=>map.removeLayer(x));
 l.addTo(map);
}

// ===== GPS
let userPos=null;

navigator.geolocation.watchPosition(p=>{
 userPos=[p.coords.latitude,p.coords.longitude];
});

// ===== ÚTVONAL
let start=null, line=null;

map.on("click", async e=>{

 if(!userPos) return alert("Nincs GPS");

 if(!start){
  start=userPos;
  alert("Start rögzítve, kattints a célra");
  return;
 }

 let end=[e.latlng.lat,e.latlng.lng];

 // OSRM útvonal
 let url=`https://router.project-osrm.org/route/v1/foot/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;

 let res=await fetch(url);
 let data=await res.json();

 let route=data.routes[0];

 let dist=(route.distance/1000).toFixed(2);

 // rajzolás
 if(line) map.removeLayer(line);

 line=L.geoJSON(route.geometry).addTo(map);

 // ===== SZINT (open-elevation)
 let coords=route.geometry.coordinates.map(c=>c[1]+","+c[0]).join("|");

 let elevRes=await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${coords}`);
 let elevData=await elevRes.json();

 let gain=0,loss=0;

 for(let i=1;i<elevData.results.length;i++){
  let diff=elevData.results[i].elevation - elevData.results[i-1].elevation;
  if(diff>0) gain+=diff;
  else loss+=Math.abs(diff);
 }

 document.getElementById("info").innerHTML=
 `
 📏 Út: ${dist} km<br>
 ⛰ Emelkedés: ${gain.toFixed(0)} m<br>
 ⛰ Lejtés: ${loss.toFixed(0)} m
 `;

 start=null;

});

</script>

</body>
</html>
