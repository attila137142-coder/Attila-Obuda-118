<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HEGYI TÚRA A1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }
#map { height: 70vh; width: 100%; }
.panel {
  padding:10px;
  background:#111;
  color:#fff;
  font-size:14px;
}
button {
  margin:4px;
  padding:8px;
  border:0;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="panel">
  <button onclick="startGPS()">📍 GPS indítás</button>
  <button onclick="startCompass()">🧭 Iránytű</button>
  <button onclick="resetTrack()">🔄 Reset track</button>
  <div id="info">Készen áll...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([47.4979, 19.0402], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom: 19
}).addTo(map);

let userMarker;
let path = [];
let polyline;

let minLat=999, maxLat=-999, minLng=999, maxLng=-999;

function updateInfo(text){
  document.getElementById("info").innerHTML = text;
}

function startGPS(){
  navigator.geolocation.watchPosition(async pos => {
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    path.push([lat,lng]);

    if(!userMarker){
      userMarker = L.marker([lat,lng]).addTo(map);
      map.setView([lat,lng],15);
    } else {
      userMarker.setLatLng([lat,lng]);
    }

    if(polyline){
      polyline.setLatLngs(path);
    } else {
      polyline = L.polyline(path,{color:'red'}).addTo(map);
    }

    minLat = Math.min(minLat, lat);
    maxLat = Math.max(maxLat, lat);
    minLng = Math.min(minLng, lng);
    maxLng = Math.max(maxLng, lng);

    let address = await reverseGeocode(lat,lng);

    updateInfo(`
      📍 Lat: ${lat.toFixed(5)}<br>
      📍 Lng: ${lng.toFixed(5)}<br>
      🏠 ${address}<br>
      📊 GPS min/max: ${minLat.toFixed(4)} / ${maxLat.toFixed(4)}
    `);

  }, err => console.log(err), {enableHighAccuracy:true});
}

async function reverseGeocode(lat,lng){
  try {
    let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
    let data = await res.json();
    return data.display_name || "Ismeretlen hely";
  } catch(e){
    return "Nincs cím adat";
  }
}

// 🧭 Iránytű
function startCompass(){
  window.addEventListener("deviceorientation", function(e){
    let heading = e.alpha;
    updateInfo(updateInfo.innerHTML + `<br>🧭 Irány: ${Math.round(heading)}°`);
  });
}

// 🔄 reset
function resetTrack(){
  path = [];
  if(polyline) map.removeLayer(polyline);
  polyline = null;
  updateInfo("Reset kész");
}

</script>

</body>
</html>
