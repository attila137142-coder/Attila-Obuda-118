<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GTFS Routing Engine v7 PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; background:#0f0f0f; color:#fff; }
#map { height: 55vh; }

.container { display:flex; }
.left { width:40%; padding:10px; }
.right { width:60%; padding:10px; background:#151515; }

.box { background:#1e1e1e; padding:10px; border-radius:8px; }
.item { padding:6px; border-bottom:1px solid #333; cursor:pointer; }
.item:hover { background:#222; }

input { width:100%; padding:10px; margin-bottom:8px; }

.small { font-size:12px; opacity:0.8; }
</style>
</head>

<body>

<div id="map"></div>

<div class="container">

<!-- LEFT -->
<div class="left">

<input id="search" placeholder="🔎 megálló keresés..." oninput="searchStops()"/>

<div id="list" class="box"></div>

</div>

<!-- RIGHT -->
<div class="right box" id="detail">
📍 Válassz megállót
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([47.3,19.3],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let user = null;

let gpsStats = {
  minLat: 999, maxLat: -999,
  minLng: 999, maxLng: -999,
  accuracy: null
};

let stops = [
  {name:"Nád utca", gtfs:"BKK-F00457", lat:47.594072, lng:19.048469},
  {name:"Flórián tér", gtfs:"BKK-F00611", lat:47.542896, lng:19.042252},
  {name:"Batthyány tér", gtfs:"BKK-F00057", lat:47.506002, lng:19.039456},
  {name:"Békásmegyer HÉV", gtfs:"H5-09183", lat:47.598091, lng:19.054599},
  {name:"Szentendre HÉV", gtfs:"H5-09142221", lat:47.661038, lng:19.075607},
  {name:"Dobogókő", gtfs:"VOL-778561", lat:47.719118, lng:18.897577},
  {name:"Keleti pályaudvar", gtfs:"MAV-KELETI", lat:47.5009, lng:19.0836},
  {name:"Csóványos", gtfs:"TURA-001", lat:47.94908, lng:18.9483}
];

// ---------------- GPS ----------------
navigator.geolocation.watchPosition(pos=>{

  user = {
    lat: pos.coords.latitude,
    lng: pos.coords.longitude,
    accuracy: pos.coords.accuracy
  };

  // MIN-MAX UPDATE
  gpsStats.minLat = Math.min(gpsStats.minLat, user.lat);
  gpsStats.maxLat = Math.max(gpsStats.maxLat, user.lat);
  gpsStats.minLng = Math.min(gpsStats.minLng, user.lng);
  gpsStats.maxLng = Math.max(gpsStats.maxLng, user.lng);

  gpsStats.accuracy = user.accuracy;

});

// ---------------- SEARCH ----------------
function searchStops(){

  let q = document.getElementById("search").value.toLowerCase();

  let res = stops.filter(s =>
    s.name.toLowerCase().includes(q)
  );

  renderList(res);
}

// ---------------- LIST ----------------
function renderList(list){

  document.getElementById("list").innerHTML =
    list.map(s=>`
      <div class="item" onclick="selectStop('${s.gtfs}')">
        🚏 ${s.name}
      </div>
    `).join("");
}

// ---------------- SELECT STOP ----------------
function selectStop(id){

  let s = stops.find(x=>x.gtfs===id);

  let dist = user ? hav(user.lat,user.lng,s.lat,s.lng) : 0;

  document.getElementById("detail").innerHTML = `
    <h3>🚏 ${s.name}</h3>

    🆔 GTFS: <b>${s.gtfs}</b><br><br>

    📍 Koordináta:<br>
    ${s.lat.toFixed(6)}, ${s.lng.toFixed(6)}<br><br>

    📏 Távolság:<br>
    ${Math.round(dist)} m<br><br>

    📡 GPS pontosság:<br>
    ${user ? user.accuracy.toFixed(1) + " m" : "nincs adat"}<br><br>

    📊 MIN–MAX GPS:<br>
    Lat: ${gpsStats.minLat.toFixed(5)} → ${gpsStats.maxLat.toFixed(5)}<br>
    Lng: ${gpsStats.minLng.toFixed(5)} → ${gpsStats.maxLng.toFixed(5)}<br><br>

    🏠 Helyadat:<br>
    <div class="small">Reverse geocode (következő verzióban full cím bontás)</div>
  `;
}

// ---------------- HAVERSINE ----------------
function hav(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;

  const a=
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// INIT
renderList(stops);

</script>

</body>
</html>
