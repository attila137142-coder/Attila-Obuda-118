<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

input{
    padding:10px;
    width:300px;
    font-size:16px;
    margin-bottom:20px;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#222;
    margin:8px auto;
    padding:12px;
    width:350px;
    border-radius:8px;
}

a{
    color:#00ff88;
    text-decoration:none;
    font-weight:bold;
}
button{
    padding:10px 15px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
.bkk{background:#00aa55;}
.volan{background:#ffaa00;}
.mav{background:#0066ff;}
</style>
</head>

<body>

<h1>🚍 Attila Közlekedés</h1>

<input type="text" id="search" placeholder="Keresés járatra vagy állomásra..." onkeyup="searchFunction()">

<ul id="list">
<li>🟢 BKK - 105 busz</li>
<li>🟢 BKK - M3 metró</li>
<li>🟡 Volán - 840 Budapest–Vác</li>
<li>🔵 MÁV - S70 Budapest–Vác</li>
<li>🌲 Királyrét Erdei Vasút</li>
<li>🌲 Szob–Nagybörzsöny Erdei Vasút</li>
<li>🌲 Kemencei Erdei Múzeumvasút</li>
<li>🌲 Gyermekvasút</li>
</ul>

<hr>

<h2>🛰 Élő Járatkövetés</h2>

<button class="bkk" onclick="window.open('https://futar.bkk.hu/', '_blank')">
BKK Élő térkép
</button>

<button class="volan" onclick="window.open('https://www.volanbusz.hu/hu/menetrendek/online-menetrend', '_blank')">
Volán Élő menetrend
</button>

<button class="mav" onclick="window.open('https://elvira.mav-start.hu/', '_blank')">
MÁV Vonat információ
</button>

<script>
function searchFunction(){
    let input = document.getElementById("search");
    let filter = input.value.toUpperCase();
    let ul = document.getElementById("list");
    let li = ul.getElementsByTagName("li");

    for (let i = 0; i < li.length; i++) {
        let txtValue = li[i].textContent || li[i].innerText;
        if (txtValue.toUpperCase().indexOf(filter) > -1) {
            li[i].style.display = "";
        } else {
            li[i].style.display = "none";
        }
    }
}
</script>

</body>
</html>
