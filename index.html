<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚍 NAV ENGINE PRO v4</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;background:#000;color:#ffd700;font-family:Arial;}
#map{height:60vh;}
.panel{padding:10px;}
.card{background:#111;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<h3 style="text-align:center">🚍 NAV v4 – Routing</h3>

<div id="map"></div>

<div class="panel">
<button onclick="getGPS()">📍 GPS</button>
<div id="info" class="card">Kattints a térképre útvonalhoz</div>
</div>

<script>

let map = L.map('map').setView([47.4979,19.0402],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userLat=null,userLon=null;
let routeLine=null;
let targetMarker=null;

const ORS_KEY = "IDE_A_KULCSOD";

// ---------------- GPS ----------------
function getGPS(){
 navigator.geolocation.getCurrentPosition(p=>{
  userLat=p.coords.latitude;
  userLon=p.coords.longitude;

  L.marker([userLat,userLon]).addTo(map)
   .bindPopup("📍 Te itt vagy").openPopup();

  map.setView([userLat,userLon],13);
 });
}

// ---------------- DIST ----------------
function dist(a,b,c,d){
 const R=6371000;
 const d1=(c-a)*Math.PI/180;
 const d2=(d-b)*Math.PI/180;
 const x=Math.sin(d1/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
 Math.sin(d2/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ---------------- ROUTE ----------------
async function getRoute(lat,lon){

 if(!userLat){
  alert("Előbb GPS!");
  return;
 }

 if(routeLine) map.removeLayer(routeLine);
 if(targetMarker) map.removeLayer(targetMarker);

 targetMarker = L.marker([lat,lon]).addTo(map);

 let distanceReal=null;
 let duration=null;

 try{

  if(!ORS_KEY.includes("IDE_")){

   const res=await fetch("https://api.openrouteservice.org/v2/directions/foot-walking",{
    method:"POST",
    headers:{
     "Authorization":ORS_KEY,
     "Content-Type":"application/json"
    },
    body:JSON.stringify({
     coordinates:[[userLon,userLat],[lon,lat]]
    })
   });

   const data=await res.json();

   const coords=data.routes[0].geometry.coordinates;

   const latlngs=coords.map(c=>[c[1],c[0]]);

   routeLine=L.polyline(latlngs,{color:"red"}).addTo(map);

   distanceReal=data.routes[0].summary.distance;
   duration=data.routes[0].summary.duration;

  }

 }catch(e){
  console.log("Routing hiba → fallback");
 }

 // fallback
 if(!distanceReal){
  distanceReal = dist(userLat,userLon,lat,lon);
  routeLine=L.polyline([[userLat,userLon],[lat,lon]],{color:"yellow",dashArray:"5,5"}).addTo(map);
 }

 let km=(distanceReal/1000).toFixed(2);
 let min=Math.round((duration || distanceReal/80)/60);

 document.getElementById("info").innerHTML=
 `📏 ${km} km<br>⏱ ~${min} perc`;

}

// ---------------- CLICK ----------------
map.on("click",e=>{
 getRoute(e.latlng.lat,e.latlng.lng);
});

</script>

</body>
</html>
