<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🌲 FULL TURISTA PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{background:black;color:#0f0;font-family:Arial;text-align:center;}
#map{height:75vh;}
#info{margin:10px;color:cyan;}
button{padding:8px;margin:5px;background:black;color:#0f0;border:1px solid #0f0;}
.box{background:black;color:yellow;font-size:10px;border:1px solid yellow;}
</style>
</head>

<body>

<h2>🌲 FULL TURISTA PRO</h2>

<div id="info">
Távolság: -<br>
Meredekség: -
</div>

<button onclick="reset()">🧹 Törlés</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAP
let map=L.map('map').setView([47.6,19.0],13);

// alap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// turista utak (valódi jelzések)
L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png',{
 opacity:0.7
}).addTo(map);

let pts=[],line,markers=[];

// ===== KATTINTÁS
map.on("click",e=>{
 pts.push([e.latlng.lat,e.latlng.lng]);

 if(pts.length===2){
   turistaRoute();
 }
});

// ===== TURISTA ROUTE (GraphHopper DEMO)
async function turistaRoute(){

 let url=`https://graphhopper.com/api/1/route?point=${pts[0][0]},${pts[0][1]}&point=${pts[1][0]},${pts[1][1]}&profile=foot&points_encoded=false`;

 try{
 let r=await fetch(url);
 let d=await r.json();

 let coords=d.paths[0].points.coordinates;

 coords=coords.filter((c,i)=>i%8===0);

 if(line) map.removeLayer(line);
 markers.forEach(m=>map.removeLayer(m));
 markers=[];

 line=L.polyline(coords.map(c=>[c[1],c[0]]),{color:'lime'}).addTo(map);

 calc(coords);

 }catch(e){
   alert("❌ Routing hiba (GraphHopper limit)");
 }
}

// ===== DEM
async function getElevation(coords){

 let loc=coords.map(c=>c[1]+","+c[0]).join("|");

 let r=await fetch("https://api.open-elevation.com/api/v1/lookup?locations="+loc);
 let d=await r.json();

 return d.results.map(x=>x.elevation||0);
}

// ===== SZÁMOLÁS
async function calc(coords){

 let elev=await getElevation(coords);

 let total=0,max=-999,min=999;

 for(let i=0;i<coords.length-1;i++){

  let a=coords[i],b=coords[i+1];

  let d=map.distance([a[1],a[0]],[b[1],b[0]]);
  let h=elev[i+1]-elev[i];

  if(d<3) continue;

  let slope=(h/d)*100;

  total+=d;

  if(slope>max) max=slope;
  if(slope<min) min=slope;

  let mid=[(a[1]+b[1])/2,(a[0]+b[0])/2];

  let m=L.marker(mid,{
    icon:L.divIcon({
      html:`<div class="box">${slope.toFixed(1)}%<br>${Math.round(d)}m</div>`
    })
  }).addTo(map);

  markers.push(m);
 }

 document.getElementById("info").innerHTML=
 "Távolság: "+(total/1000).toFixed(2)+" km<br>"+
 "MAX: "+max.toFixed(1)+"% | MIN: "+min.toFixed(1)+"%";
}

// ===== RESET
function reset(){
 pts=[];
 if(line) map.removeLayer(line);
 markers.forEach(m=>map.removeLayer(m));
 markers=[];
}

</script>

</body>
</html>
