<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY V13.1 GEO INTELLIGENCE RESTORE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000c;
 color:#0f0;
 padding:10px;
 width:430px;
 max-height:90vh;
 overflow:auto;
 border:1px solid #0f0;
}

button{
 margin:2px;
 padding:6px;
 cursor:pointer;
 font-weight:bold;
 border:none;
}

.stop{
 cursor:pointer;
 padding:6px;
 margin-bottom:5px;
 border-bottom:1px solid #0f0;
}
.stop:hover{background:#0f0;color:#000}

.small{font-size:12px;opacity:0.8}
</style>
</head>

<body>

<div id="panel">
<h3>🚆 ROXY V13.1 GEO RESTORE</h3>

<div>
<button onclick="setFilter('all')">🌐 Összes</button>
<button onclick="setFilter('bkv')" style="background:#2196F3;color:#fff">🟦 BKV</button>
<button onclick="setFilter('volan')" style="background:#FFC107">🟨 VOLÁN</button>
<button onclick="setFilter('train')" style="background:#9E9E9E;color:#fff">⬜ HÉV / VONAT</button>
<button onclick="setFilter('internal')" style="background:#000;color:#fff">⬛ Belső</button>
</div>

<hr>

<div id="info">📍 indulás...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map=L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stopLayer=L.layerGroup().addTo(map);

// ================= FILTER =================
let currentFilter="all";
let lastStops=[];

function setFilter(type){
 currentFilter=type;
 renderStops(lastStops);
}

// ================= DISTANCE (FIXED) =================
function getDistance(lat1,lon1,lat2,lon2){

 if(!lat1||!lon1||!lat2||!lon2) return 999999;

 let R=6371000;

 let dLat=(lat2-lat1)*Math.PI/180;
 let dLon=(lon2-lon1)*Math.PI/180;

 let a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

 return Math.round(2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// ================= GEO ADDRESS (RESTORED) =================
async function getAddress(lat,lon){
 try{
  let res=await fetch(
   `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
  );

  let d=await res.json();
  let a=d.address||{};

  return {
   city:a.city||a.town||a.village||"",
   road:a.road||"",
   house:a.house_number||"",
   full:d.display_name||"",
   lat,lon
  };

 }catch(e){
  return {
   city:"nincs adat",
   road:"",
   house:"",
   full:"nincs adat",
   lat,lon
  };
 }
}

// ================= USER LOCATION =================
let userLat=null,userLon=null;

navigator.geolocation.getCurrentPosition(async pos=>{

 userLat=pos.coords.latitude;
 userLon=pos.coords.longitude;

 let addr=await getAddress(userLat,userLon);

 document.getElementById("info").innerHTML=`
 <b>📍 Saját hely</b><br>
 ${addr.city} ${addr.road} ${addr.house}<br>
 <span class="small">${addr.full}</span><br><br>
 Térképre kattints 🚏
 `;
});

// ================= CATEGORY =================
function getCategory(s){

 let n=(s.name||"").toLowerCase();

 if(n.includes("bkk") || n.includes("vill")) return "bkv";
 if(n.includes("volán") || n.includes("volan")) return "volan";
 if(n.includes("hév") || n.includes("vasút") || n.includes("állomás")) return "train";

 if(
  n.includes("auchan") ||
  n.includes("spar") ||
  n.includes("kórház") ||
  n.includes("korház") ||
  n.includes("shuttle")
 ){
  return "internal";
 }

 return "bkv";
}

// ================= YOUR 45+ STOP DB =================
let MASTER_STOPS=[

 {name:"Békásmegyer HÉV-állomás",gtfs:"H5-09183",lat:47.598091,lon:19.054599},
 {name:"Nád utca",gtfs:"BKK-F00457",lat:47.594072,lon:19.048469},
 {name:"Gulácsy Lajos utca",gtfs:"BKK-00438",lat:47.602562,lon:19.048229},
 {name:"Flórián tér",gtfs:"BKK-F00611",lat:47.542896,lon:19.042252},
 {name:"Flórián tér",gtfs:"BKK-F00613",lat:47.541664,lon:19.040084},
 {name:"Batthyány tér",gtfs:"BKK-F00057",lat:47.506002,lon:19.039456},

 {name:"Szentendre HÉV",gtfs:"H5",lat:47.661038,lon:19.075607},
 {name:"Örs vezér tér",gtfs:"BKK",lat:47.501742,lon:19.135604},

 {name:"Vác autóbusz-állomás",gtfs:"VOLAN",lat:47.781930,lon:19.129643},
 {name:"Királyrét",gtfs:"VOLAN",lat:47.895040,lon:18.977687},
 {name:"Dobogókő",gtfs:"VOLAN",lat:47.719118,lon:18.897577},

 {name:"Magas-Tax turistaház",gtfs:"ERDO",lat:47.92842,lon:18.92997},
 {name:"Nagy-Hideg-hegy",gtfs:"ERDO",lat:47.936111,lon:18.921944},

 {name:"Lakás (Dino lak)",gtfs:"UTCA",lat:47.594304,lon:19.048770},

 {name:"Auchan busz",gtfs:"SHUTTLE",lat:47.49,lon:19.10},
 {name:"SPAR járat",gtfs:"SHUTTLE",lat:47.50,lon:19.12},
 {name:"Kórházi járat",gtfs:"SHUTTLE",lat:47.51,lon:19.11}

];

// ================= NEAREST =================
function findNearest(lat,lon){

 let best=null;
 let bestDist=999999;

 for(let s of MASTER_STOPS){

  let d=getDistance(lat,lon,s.lat,s.lon);

  if(d<bestDist){
   bestDist=d;
   best=s;
  }
 }

 return {best,bestDist};
}

// ================= RENDER =================
function renderStops(list){

 stopLayer.clearLayers();

 list.forEach(s=>{

  let cat=getCategory(s);

  if(currentFilter!=="all" && cat!==currentFilter){
   return;
  }

  let color="#000";

  if(cat==="bkv") color="#2196F3";
  if(cat==="volan") color="#FFC107";
  if(cat==="train") color="#9E9E9E";
  if(cat==="internal") color="#000";

  L.circleMarker([s.lat,s.lon],{
   radius:7,
   color:color,
   fillColor:color,
   fillOpacity:1
  }).addTo(stopLayer);

 });

}

// ================= CLICK =================
map.on("click",async e=>{

 let lat=e.latlng.lat;
 let lon=e.latlng.lng;

 let nearest=findNearest(lat,lon);

 let addr=await getAddress(lat,lon);

 let html=`
 <b>🚏 Kattintott pont</b><br>
 📍 ${addr.city} ${addr.road} ${addr.house}<br>
 <span class="small">${addr.full}</span><br><br>

 <b>🧭 Legközelebbi megálló</b><br>
 🚏 ${nearest.best.name}<br>
 📏 ${nearest.bestDist} m<br>
 🆔 ${nearest.best.gtfs}
 `;

 document.getElementById("info").innerHTML=html;

 lastStops=MASTER_STOPS;
 renderStops(lastStops);

});

</script>

</body>
</html>
