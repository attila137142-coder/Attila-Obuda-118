<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés PRO MAX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#panel {
 position:absolute;
 top:10px;
 left:10px;
 z-index:1000;
 background:white;
 padding:10px;
 width:340px;
 max-height:90vh;
 overflow:auto;
}

button { width:100%; margin-top:5px; }
</style>
</head>

<body>

<div id="panel">

<h3>📍 Helyadat</h3>
<div id="loc">...</div>

<h3>🔎 Kereső</h3>
<input id="search">
<button onclick="search()">Keres</button>
<button onclick="route()">🚗 Közúti útvonal</button>

<h3>🚏 Megállók (GTFS)</h3>
<div id="stops"></div>

<h3>📊 Útvonal adatok</h3>
<div id="routeInfo"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
let map = L.map('map').setView([47.5,19.04],13);

// rétegek
let osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
let rail = L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png');

osm.addTo(map);
rail.addTo(map); // 🔥 EZ FONTOS → nem tűnik el!

let stopLayer = L.layerGroup().addTo(map);
let routeLayer = L.layerGroup().addTo(map);

let userLat, userLon, target;

// HELY
navigator.geolocation.getCurrentPosition(async pos=>{

 userLat = pos.coords.latitude;
 userLon = pos.coords.longitude;

 L.marker([userLat,userLon]).addTo(map);
 map.setView([userLat,userLon],14);

 let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`);
 let d = await res.json();

 document.getElementById("loc").innerHTML = d.display_name;

 loadGTFS();

});

// KERESÉS
async function search(){

 let q = document.getElementById("search").value;

 let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
 let data = await res.json();

 if(data.length==0) return alert("NINCS TALÁLAT");

 let p = data[0];

 target = [parseFloat(p.lat), parseFloat(p.lon)];

 map.setView(target,15);
 L.marker(target).addTo(map);

}

// GTFS
async function loadGTFS(){

 let res = await fetch("stops.txt");
 let text = await res.text();

 let rows = text.split("\n");

 let stops = [];

 rows.slice(1).forEach(r=>{
  let c = r.split(",");

  let lat = parseFloat(c[4]);
  let lon = parseFloat(c[5]);

  if(!isNaN(lat)){

   let d = map.distance([userLat,userLon],[lat,lon]);

   stops.push({
    id:c[0],
    name:c[2],
    lat,lon,
    dist:d
   });

  }
 });

 stops.sort((a,b)=>a.dist-b.dist);

 let html="";

 stops.slice(0,10).forEach(s=>{

  html += `${s.name} (${s.id}) – ${Math.round(s.dist)} m<br>`;

  L.circleMarker([s.lat,s.lon],{radius:5})
   .addTo(stopLayer)
   .bindPopup(`${s.name}<br>${s.id}<br>${Math.round(s.dist)} m`);

 });

 document.getElementById("stops").innerHTML = html;

}

// 🚗 ÚTVONAL (OSRM)
async function route(){

 if(!target) return alert("Adj meg célt!");

 let url = `https://router.project-osrm.org/route/v1/driving/${userLon},${userLat};${target[1]},${target[0]}?overview=full&geometries=geojson`;

 let res = await fetch(url);
 let data = await res.json();

 let route = data.routes[0];

 let coords = route.geometry.coordinates.map(c=>[c[1],c[0]]);

 routeLayer.clearLayers();

 L.polyline(coords,{color:"blue"}).addTo(routeLayer);

 // 📏 adatok
 let dist = route.distance;
 let time = route.duration;

 // ⛰ szint (durva becslés DEM nélkül)
 let elevGain = 0;

 for(let i=1;i<coords.length;i++){
  let d = map.distance(coords[i-1],coords[i]);
  let fakeElev = Math.sin(i/10)*5; // demo
  elevGain += Math.max(0,fakeElev);
 }

 let percent = (elevGain / dist) * 100;

 document.getElementById("routeInfo").innerHTML = `
 Távolság: ${(dist/1000).toFixed(2)} km<br>
 Idő: ${(time/60).toFixed(1)} perc<br>
 Emelkedés: ${elevGain.toFixed(1)} m<br>
 Emelkedés %: ${percent.toFixed(2)} %
 `;

}

</script>

</body>
</html>
