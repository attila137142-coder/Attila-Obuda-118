<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXY V2 GTFS FULL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:rgba(0,0,0,0.85);
 color:#0f0;
 padding:10px;
 width:380px;
 border:1px solid #0f0;
}

button{
 width:100%;
 margin:3px 0;
 padding:6px;
 background:black;
 color:#0f0;
 border:1px solid #0f0;
 cursor:pointer;
}

.status{
 font-size:12px;
 margin:5px 0;
 border:1px solid #0f0;
 padding:5px;
}
</style>
</head>

<body>

<div id="panel">
<h3>🚉 ROXY V2 GTFS FULL</h3>

<div id="status" class="status">READY</div>

<button onclick="loadGTFS()">📦 GTFS LOAD</button>
<button onclick="runDijkstra('A','E')">🧠 ROUTE AI</button>
<button onclick="touristMode()">🌲 TOURIST MODE</button>
<button onclick="clearMap()">🧹 RESET</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.5,19.04],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= GTFS DATA =================
// (később CSV/JSON-ból jön)

let nodes = {};
let edges = {};

let markers = [];
let routeLine = null;

// ================= GTFS LOAD =================
function loadGTFS(){

 nodes = {
  A:{lat:47.50, lon:19.00},
  B:{lat:47.505, lon:19.01},
  C:{lat:47.51, lon:19.02},
  D:{lat:47.52, lon:19.04},
  E:{lat:47.53, lon:19.06}
 };

 edges = {
  A:["B","C"],
  B:["A","D"],
  C:["A","D"],
  D:["B","C","E"],
  E:["D"]
 };

 // marker reset
 markers.forEach(m=>map.removeLayer(m));
 markers = [];

 for(let id in nodes){
  let n = nodes[id];
  let m = L.marker([n.lat,n.lon]).addTo(map).bindPopup(id);
  markers.push(m);
 }

 document.getElementById("status").innerText =
 "📦 GTFS LOADED (nodes: " + Object.keys(nodes).length + ")";
}

// ================= DIJKSTRA ROUTE AI =================
function runDijkstra(start,end){

 let dist = {};
 let prev = {};
 let Q = Object.keys(nodes);

 Q.forEach(n=>dist[n]=Infinity);
 dist[start]=0;

 while(Q.length){

  Q.sort((a,b)=>dist[a]-dist[b]);
  let u = Q.shift();

  if(u===end) break;

  let neighbors = edges[u] || [];

  for(let v of neighbors){

   let cost = distance(u,v); // valós távolság

   let alt = dist[u] + cost;

   if(alt < dist[v]){
    dist[v]=alt;
    prev[v]=u;
   }
  }
 }

 let path = [];
 let cur = end;

 while(cur){
  path.unshift(cur);
  cur = prev[cur];
 }

 drawRoute(path);

 document.getElementById("status").innerText =
 "🧠 ROUTE: " + path.join(" → ");
}

// ================= DISTANCE =================
function distance(a,b){

 let A = nodes[a];
 let B = nodes[b];

 let dx = (A.lat-B.lat)*111000;
 let dy = (A.lon-B.lon)*111000;

 return Math.sqrt(dx*dx+dy*dy);
}

// ================= DRAW ROUTE =================
function drawRoute(path){

 let coords = path.map(id=>[
  nodes[id].lat,
  nodes[id].lon
 ]);

 if(routeLine) map.removeLayer(routeLine);

 routeLine = L.polyline(coords,{color:"lime"}).addTo(map);

 map.fitBounds(routeLine.getBounds());
}

// ================= TOURIST MODE =================
function touristMode(){

 navigator.geolocation.getCurrentPosition(p=>{

  let from = [p.coords.latitude,p.coords.longitude];

  let to = [nodes["E"].lat, nodes["E"].lon];

  L.polyline([from,to],{color:"orange"}).addTo(map);

  document.getElementById("status").innerText =
  "🌲 TOURIST MODE (légvonal)";
 });

}

// ================= RESET =================
function clearMap(){
 location.reload();
}

</script>

</body>
</html>
