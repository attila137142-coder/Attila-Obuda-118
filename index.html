<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BKK VALÓDI MENETREND</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{background:black;color:#FFD700;font-family:Arial;text-align:center;}
.stop{border:1px solid #444;margin:5px;padding:10px;}
.line{color:cyan;}
</style>
</head>

<body>

<h2>🚌 VALÓDI MENETREND (GTFS)</h2>

<button onclick="loadGTFS()">📥 Betöltés</button>

<div id="out">Kattints a betöltésre</div>

<script>

let stops = {};
let stopTimes = [];
let trips = {};

async function loadGTFS(){

 out.innerHTML="BETÖLTÉS...";

 const url="https://go.bkk.hu/api/static/v1/public-gtfs/budapest_gtfs.zip";

 try{

  const res=await fetch(url);
  const zip=await JSZip.loadAsync(await res.blob());

  // stops
  let s=(await zip.file("stops.txt").async("string")).split("\n");
  s.slice(1).forEach(r=>{
    let c=r.split(",");
    stops[c[0]]=c[2];
  });

  // trips
  let t=(await zip.file("trips.txt").async("string")).split("\n");
  t.slice(1).forEach(r=>{
    let c=r.split(",");
    trips[c[2]]=c[0]; // route_id
  });

  // stop_times
  let st=(await zip.file("stop_times.txt").async("string")).split("\n");
  stopTimes=st.slice(1).map(r=>r.split(","));

  show();

 }catch(e){
   out.innerHTML="HIBA: "+e;
 }
}

// ===== MEGJELENÍTÉS
function show(){

 let html="";

 // csak pár megálló (gyors teszt)
 let keys=Object.keys(stops).slice(0,5);

 keys.forEach(id=>{

  let nev=stops[id];

  html+=`<div class="stop"><b>${nev}</b><br>`;

  let count=0;

  stopTimes.forEach(st=>{

    if(st[3]===id && count<5){

      let ido=st[1];
      let trip=st[0];
      let route=trips[trip] || "?";

      html+=`<div class="line">
      Járat: ${route} → ${ido}
      </div>`;

      count++;
    }
  });

  html+="</div>";
 });

 out.innerHTML=html;
}

</script>

</body>
</html>
