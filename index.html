<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}
select, input, button {
    padding:10px;
    margin:10px;
    font-size:16px;
    border-radius:8px;
    border:none;
}
button {
    background:#00bcd4;
    color:white;
    cursor:pointer;
}
iframe {
    width:100%;
    height:600px;
    border:none;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>🚍 Attila Közlekedési Központ 🚂</h1>

<input type="text" id="search" placeholder="Keresés megállóra...">

<br>

<select id="locationSelect">
<option value="">-- Válassz szolgáltatót / megállót --</option>

<option value="https://futar.bkk.hu/">BKK - Élő térkép</option>
<option value="https://menetrendek.hu/">Volánbusz - Menetrend</option>
<option value="https://www.mavcsoport.hu/mav-start/belfoldi-utazas">MÁV - Belföldi utazás</option>

<option value="https://kiralyret.hu/">Királyréti Erdei Vasút</option>
<option value="https://szobiborzesz.hu/">Szob–Nagybörzsöny Erdei Vasút</option>
<option value="https://kemencekisvasut.hu/">Kemencei Erdei Múzeumvasút</option>
<option value="https://gyermekvasut.hu/">Gyermekvasút</option>

</select>

<br>

<button onclick="loadPage()">Megnyitás</button>

<iframe id="viewer"></iframe>

<script>
function loadPage() {
    var url = document.getElementById("locationSelect").value;
    if(url !== "") {
        document.getElementById("viewer").src = url;
    }
}

document.getElementById("search").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let options = document.getElementById("locationSelect").options;
    for (let i = 0; i < options.length; i++) {
        let txt = options[i].text.toLowerCase();
        options[i].style.display = txt.includes(filter) ? "" : "none";
    }
});
</script>

</body>
</html>
