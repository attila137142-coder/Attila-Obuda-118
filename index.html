<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; }
#map { height:100vh; }
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.598,19.055],13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var marker = L.marker([47.598,19.055]).addTo(map);

marker.bindPopup("Békásmegyer teszt pont


<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 10px;
}

button {
  padding: 6px 10px;
  margin: 4px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.stop {
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  background: #222;
}

/* módok */
.green .stop { background: #0a3; }
.red .stop { background: #a00; }

.matrix {
  background: black;
  color: #FFD700;
  font-family: monospace;
}
</style>
</head>

<body>

<h2>🚏 Közeli megállók</h2>

<!-- mód kapcsoló -->
<button onclick="setMode('normal')">Normál</button>
<button onclick="setMode('green')">Zöld</button>
<button onclick="setMode('red')">Piros</button>
<button onclick="setMode('matrix')">MÁTRIX</button>

<!-- lista -->
<div id="list"></div>

<script>
let mode = "normal";

const stops = [
  {name:"Békásmegyer HÉV", dist:300},
  {name:"Pünkösdfürdő", dist:800},
  {name:"Csillaghegy", dist:1200},
  {name:"Rómaifürdő", dist:1800},
  {name:"Aquincum", dist:2200}
];

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  document.body.className = "";
  if(mode==="green") document.body.classList.add("green");
  if(mode==="red") document.body.classList.add("red");
  if(mode==="matrix") document.body.classList.add("matrix");

  stops.forEach(s=>{
    const d = document.createElement("div");
    d.className = "stop";
    d.innerHTML = `
      <b>${s.name}</b><br>
      Távolság: ${s.dist} m
    `;
    list.appendChild(d);
  });
}

function setMode(m){
  mode = m;
  render();
}

render();
</script>

</body>
</html>
