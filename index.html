<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<title>Attila Közlekedés – Diszpécser térkép</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
position:absolute;
top:0;
bottom:0;
left:0;
right:0;
}

/* Menü panel */

#menuPanel{
position:absolute;
top:70px;
left:10px;
width:260px;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
padding:10px;
z-index:1000;
}

/* Menü gomb */

#menuButton{
position:absolute;
top:10px;
left:70px;
z-index:2000;
background:white;
border:none;
padding:10px;
font-size:18px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* Menü gombok */

.menuButton{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#e6e6e6;
font-size:16px;
}

h2{
margin-top:0;
}

</style>
</head>

<body>

<button id="menuButton" onclick="toggleMenu()">☰</button>

<div id="menuPanel">

<h2>Attila Közlekedés – Diszpécser térkép</h2>

<b>Térkép</b><br>

<button class="menuButton" onclick="setStreet()">Utcatérkép</button>
<button class="menuButton" onclick="setTopo()">Topográfia</button>

<hr>

<b>Pozíció</b><br>

<button class="menuButton" onclick="locate()">Saját pozíció</button>

<hr>

<b>Kisvasutak</b><br>

<button class="menuButton">Gyermekvasút</button>
<button class="menuButton">Királyréti kisvasút</button>
<button class="menuButton">Szob–Nagybörzsöny</button>

<hr>

<b>Diszpécser</b><br>
nincs kiválasztva

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* térkép */

var map = L.map('map').setView([47.4979,19.0402],11);

/* rétegek */

var street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

var topo = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
{maxZoom:17}
);

/* térkép váltás */

function setStreet(){
map.removeLayer(topo);
street.addTo(map);
}

function setTopo(){
map.removeLayer(street);
topo.addTo(map);
}

/* GPS */

var marker;

function locate(){

map.locate({setView:true,maxZoom:16});

}

map.on('locationfound',function(e){

if(marker){
map.removeLayer(marker);
}

marker=L.marker(e.latlng).addTo(map);

marker.bindPopup(
"Az Ön pozíciója<br>Pontosság: "+Math.round(e.accuracy)+" m"
).openPopup();

L.circle(e.latlng,{
radius:e.accuracy
}).addTo(map);

});

/* menü nyitás */

function toggleMenu(){

var menu=document.getElementById("menuPanel");

if(menu.style.display==="none"){
menu.style.display="block";
}else{
menu.style.display="none";
}

}

</script>

</body>
</html>
