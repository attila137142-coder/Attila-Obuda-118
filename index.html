<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Google Transit Control HU V3</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0b1020; color:#fff; }

#topbar {
 display:flex;
 justify-content:space-between;
 padding:10px;
 background:#111827;
 font-size:13px;
}

#grid {
 display:grid;
 grid-template-columns: 2.2fr 1fr;
 height: calc(100vh - 40px);
}

#map { height:100%; }

.panel {
 background:#1f2937;
 padding:10px;
 overflow:auto;
}

.card {
 background:#0f172a;
 padding:8px;
 margin-bottom:8px;
 border-radius:8px;
}

input, select {
 width:100%;
 padding:6px;
 margin-bottom:8px;
}
</style>
</head>

<body>

<div id="topbar">
 <div id="gps">📍 GPS...</div>
 <div id="net">📶 ...</div>
 <div id="zone">🧭 zóna...</div>
</div>

<div id="grid">

 <div id="map"></div>

 <div class="panel">

  <input id="search" placeholder="🔎 megálló / vonal..." oninput="filter()">

  <select id="network" onchange="setNetwork()">
   <option value="ALL">🌐 Összes</option>
   <option value="BKK">🟡 BKK</option>
   <option value="MAV">🔵 MÁV</option>
   <option value="HÉV">🟢 HÉV</option>
   <option value="KISVASUT">🚂 Kisvasút</option>
   <option value="ZALA">🟣 Zala</option>
  </select>

  <h3>🚏 Legközelebbi</h3>
  <div id="stops"></div>

 </div>

</div>

<script>

/* ================= MAP ================= */

let map = L.map('map').setView([47.4979,19.0402], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'OSM'
}).addTo(map);

let userLat, userLon;

/* ================= GTFS CORE ================= */

let stops = [];

/*
FORMAT:
{
 name:"",
 lat:0,
 lon:0,
 network:"BKK/MAV/HÉV/ZALA/KISVASUT",
 line:""
}
*/

/* ================= KISVASUT DEMO ================= */

let kisvasut = [
 {name:"Hűvösvölgy", lat:47.5412, lon:18.9640, network:"KISVASUT", line:"Gyermekvasút"},
 {name:"Normafa", lat:47.5070, lon:18.9630, network:"KISVASUT", line:"Gyermekvasút"},
 {name:"Királyrét", lat:47.9100, lon:18.9730, network:"KISVASUT", line:"Börzsöny"}
];

/* ================= DIST ================= */

function d(a,b){
 return map.distance(a,b);
}

/* ================= RENDER ================= */

function render(){

 if(!userLat) return;

 let net = document.getElementById("network").value;

 let arr = stops.map(s=>({
  ...s,
  dist: d([userLat,userLon],[s.lat,s.lon])
 }));

 if(net !== "ALL"){
  arr = arr.filter(s=>s.network === net);
 }

 arr = arr.filter(s=>s.dist < 25000);

 arr.sort((a,b)=>a.dist-b.dist);

 document.getElementById("zone").innerHTML =
 `🧭 aktív: ${net}`;

 let html = "";

 arr.slice(0,10).forEach(s=>{
  html += `
  <div class="card">
   🚏 <b>${s.name}</b><br>
   🚆 ${s.network} | ${s.line}<br>
   📏 ${(s.dist/1000).toFixed(2)} km
  </div>`;
 });

 document.getElementById("stops").innerHTML = html;
}

/* ================= SEARCH ================= */

function filter(){

 let q = document.getElementById("search").value.toLowerCase();

 let f = stops.filter(s=>
  s.name.toLowerCase().includes(q) ||
  (s.line||"").toLowerCase().includes(q)
 );

 document.getElementById("stops").innerHTML =
 f.slice(0,15).map(s=>`
  <div class="card">
   🚏 ${s.name}<br>
   ${s.network} | ${s.line}
  </div>
 `).join("");
}

/* ================= GPS ================= */

async function update(pos){

 userLat = pos.coords.latitude;
 userLon = pos.coords.longitude;

 let acc = pos.coords.accuracy;

 document.getElementById("gps").innerHTML =
 `📍 ${userLat.toFixed(5)}, ${userLon.toFixed(5)} | ±${Math.round(acc)} m`;

 L.marker([userLat,userLon]).addTo(map);
 map.setView([userLat,userLon],13);

 try{
  let r = await fetch(
   `https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`
  );

  let d = await r.json();
  let a = d.address || {};

  document.getElementById("gps").innerHTML +=
  `<br>🌍 ${a.city || a.town || a.village || "-"} | ${a.road || ""}`;

 }catch(e){}

 render();
}

/* ================= NET ================= */

function net(){
 let c = navigator.connection;
 if(!c) return "📶 N/A";
 return `📶 ${c.effectiveType} | ⚡ ${c.downlink}`;
}

setInterval(()=>{
 document.getElementById("net").innerHTML = net();
},2000);

/* ================= NETWORK SET ================= */

function setNetwork(){
 render();
}

/* ================= LOAD GTFS ================= */

async function loadGTFS(){

 // 🔥 IDE jönnek majd:
 // BKK GTFS
 // MÁV GTFS
 // Zala GTFS

 let res = await fetch("stops.json");
 let data = await res.json();

 stops = data.concat(kisvasut);

}

/* ================= INIT ================= */

navigator.geolocation.watchPosition(update);

loadGTFS();

</script>

</body>
</html>
