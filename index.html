<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Attila Közlekedés – Diszpécser térkép</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

.title{
position:absolute;
top:10px;
left:60px;
background:white;
padding:8px 14px;
font-size:22px;
font-weight:bold;
z-index:1000;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
border-radius:6px;
}
</style>
</head>

<body>

<div class="title">
Attila Közlekedés – Diszpécser térkép
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.55,19.05],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'OpenStreetMap'
}).addTo(map);


var busStops = [

{lat:47.5917, lon:19.0472, name:"Békásmegyer"},
{lat:47.5747, lon:19.0495, name:"Csillaghegy"},
{lat:47.5604, lon:19.0470, name:"Rómaifürdő"},
{lat:47.5482, lon:19.0472, name:"Aquincum"},
{lat:47.5332, lon:19.0455, name:"Kaszásdűlő"}

];


busStops.forEach(function(stop){

L.circleMarker([stop.lat,stop.lon],{
radius:6,
color:"blue"
})
.addTo(map)
.bindPopup(stop.name);

});


var busLine = [

[47.5917,19.0472],
[47.5747,19.0495],
[47.5604,19.0470],
[47.5482,19.0472],
[47.5332,19.0455]

];

L.polyline(busLine,{
color:"red",
weight:4
}).addTo(map);

</script>

</body>
</html>
