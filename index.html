```html id="profull01"
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚍 Attila PRO MAX ULTIMATE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#000;color:#FFD700;font-family:Arial;}
#map{height:50vh;}
.panel{padding:10px;}
.card{background:#111;padding:10px;margin-top:10px;border-radius:10px;}
button{padding:10px;margin:5px;border-radius:10px;}
#chart{height:200px;}
iframe{width:100%;height:400px;border:0;margin-top:10px;}
</style>
</head>

<body>

<h2 style="text-align:center;">🚍 PRO MAX ULTIMATE</h2>

<div id="map"></div>

<div class="panel">

<button onclick="getLocation()">📍 GPS</button>
<button onclick="exportPDF()">📄 PDF</button>

<br>

<!-- külső rendszerek -->
<button onclick="openMap('bkk')">🚍 BKK FUTÁR</button>
<button onclick="openMap('mav')">🚆 Vonattérkép</button>
<button onclick="openMap('rt')">🌍 RealTime</button>
<button onclick="openMap('volan')">🚌 Utas.hu</button>

<div id="info" class="card"></div>

<canvas id="chart"></canvas>

<iframe id="extMap"></iframe>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

// ===== MAP
var map = L.map('map').setView([47.4979,19.0402],13);

var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
var topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');

var rail = L.tileLayer('https://{s}.tiles.openrailwaymap.org/{z}/{x}/{y}.png');
var tourist = L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png');
var road = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');

osm.addTo(map);

L.control.layers(
 {"OSM":osm,"Topo":topo},
 {"Vasút":rail,"Turista":tourist,"Közút":road}
).addTo(map);

// ===== GPS
let marker,path=[];
let minAcc=9999,maxAcc=0;

function getLocation(){
 navigator.geolocation.watchPosition(async pos=>{
  let lat=pos.coords.latitude;
  let lon=pos.coords.longitude;
  let acc=pos.coords.accuracy;
  let speed=(pos.coords.speed||0)*3.6;
  let alt=pos.coords.altitude || 0;

  minAcc=Math.min(minAcc,acc);
  maxAcc=Math.max(maxAcc,acc);

  if(marker) map.removeLayer(marker);
  marker=L.circleMarker([lat,lon],{radius:8,color:'red'}).addTo(map);

  map.setView([lat,lon],15);

  path.push([lat,lon]);
  if(path.length>1){
   L.polyline(path,{color:'yellow'}).addTo(map);
  }

  let addr = await getAddress(lat,lon);

  document.getElementById("info").innerHTML=`
  📍 ${lat.toFixed(5)}, ${lon.toFixed(5)}<br>
  🏠 ${addr}<br>
  ⛰️ Magasság: ${alt.toFixed(1)} m<br>
  🎯 Pontosság: ±${Math.round(acc)} m<br>
  📉 Min: ${Math.round(minAcc)} m | 📈 Max: ${Math.round(maxAcc)} m<br>
  🚶 ${speed.toFixed(1)} km/h (${(speed/3.6).toFixed(2)} m/s)
  `;

  drawProfile();

 });
}

// ===== cím
async function getAddress(lat,lon){
 try{
  let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
  let d=await res.json();
  let a=d.address||{};
  return `${a.country||""} → ${a.city||a.town||""} → ${a.road||""} ${a.house_number||""}`;
 }catch{return "Cím hiba";}
}

// ===== profil (demo)
function drawProfile(){
 let data=[],labels=[],dist=0;

 for(let i=1;i<path.length;i++){
  let d=map.distance(path[i-1],path[i]);
  dist+=d;
  let elev=100+Math.sin(i/3)*50;
  data.push(elev);
  labels.push((dist/1000).toFixed(2)+" km");
 }

 if(data.length<2)return;

 new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:labels,datasets:[{label:"Szint (m)",data:data}]}
 });
}

// ===== külső térképek
function openMap(type){

 if(type==="bkk"){
  extMap.src="https://futar.bkk.hu/";
 }

 if(type==="mav"){
  extMap.src="https://vonatterkep.info/";
 }

 if(type==="rt"){
  extMap.src="https://map.realtimenext.hu/";
 }

 if(type==="volan"){
  extMap.src="https://utas.hu/";
 }

}

// ===== PDF
function exportPDF(){
 html2pdf().from(document.body).save("pro_terkep.pdf");
}

</script>

</body>
</html>
```
