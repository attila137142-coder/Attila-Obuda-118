<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila GPS PRO FIX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; background:#111; color:#fff; }
#map { height: 60vh; }
.panel { padding:10px; }
button { margin:3px; padding:8px; border-radius:6px; border:0; }
.box { background:#1e1e1e; padding:10px; border-radius:8px; font-size:13px; }
</style>
</head>

<body>

<div class="panel">
<button onclick="toggleElevation()">⛰️ Magasság</button>
<button onclick="resetTrack()">🔄 Reset</button>
<div id="info" class="box">Indítás...</div>
</div>

<div id="map"></div>

<script>

// MAP
let map = L.map('map').setView([47.4979,19.0402],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// STATE
let track=[];
let marker, polyline;
let elevationMode="gps";

// ---------- DIST
function dist(a,b,c,d){
  let R=6371e3;
  let φ1=a*Math.PI/180;
  let φ2=c*Math.PI/180;
  let Δφ=(c-a)*Math.PI/180;
  let Δλ=(d-b)*Math.PI/180;

  let x=Math.sin(Δφ/2)**2+
    Math.cos(φ1)*Math.cos(φ2)*
    Math.sin(Δλ/2)**2;

  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ---------- SEGMENT
function calcSeg(a,b){
  let d=dist(a.lat,a.lng,b.lat,b.lng);
  let h=(b.ele||0)-(a.ele||0);
  let s=d>0?(h/d)*100:0;

  return {d:Math.round(d),h:Math.round(h),s:s.toFixed(1)};
}

// ---------- API HEIGHT (BACKGROUND)
async function getElevation(lat,lng){
  try{
    let r=await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
    let d=await r.json();
    return d.results[0].elevation;
  }catch(e){return 0;}
}

// ---------- UPDATE POS (FAST)
function updatePosition(lat,lng,ele){

  track.push({lat,lng,ele});
  if(track.length>100) track.shift();

  if(!marker){
    marker = L.marker([lat,lng]).addTo(map);
    map.setView([lat,lng],15);
  }else{
    marker.setLatLng([lat,lng]);
    map.panTo([lat,lng]);
  }

  let latlngs = track.map(p=>[p.lat,p.lng]);

  if(polyline){
    polyline.setLatLngs(latlngs);
  }else{
    polyline = L.polyline(latlngs,{color:'red'}).addTo(map);
  }

  renderUI(lat,lng);
}

// ---------- UPDATE HEIGHT (ASYNC)
function updateElevation(ele){
  if(track.length){
    track[track.length-1].ele = ele;
  }
}

// ---------- GPS (NON BLOCKING)
function startGPS(){
  navigator.geolocation.watchPosition(pos=>{

    let lat=pos.coords.latitude;
    let lng=pos.coords.longitude;
    let ele=pos.coords.altitude||0;

    updatePosition(lat,lng,ele);

    if(elevationMode==="api"){
      getElevation(lat,lng).then(e=>{
        updateElevation(e);
      });
    }

  },err=>console.log(err),{enableHighAccuracy:true});
}

// ---------- UI
function renderUI(lat,lng){

  let seg="";

  if(track.length>1){
    let s=calcSeg(track[track.length-2],track[track.length-1]);

    seg = `
    📏 ${s.d} m<br>
    ⛰️ ${s.h} m<br>
    📈 ${s.s} %
    `;
  }

  document.getElementById("info").innerHTML=`
  📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}<br><br>
  ${seg}<br>
  🔄 mód: ${elevationMode.toUpperCase()}
  `;
}

// ---------- BUTTONS
function toggleElevation(){
  elevationMode = elevationMode==="gps"?"api":"gps";
}

function resetTrack(){
  track=[];
  if(polyline) map.removeLayer(polyline);
  polyline=null;
}

// START
startGPS();

</script>

</body>
</html>
