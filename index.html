<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY Menetrend</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000c;
 color:#0f0;
 padding:10px;
 width:300px;
 border:1px solid #0f0;
}

</style>
</head>

<body>

<div id="panel">
<h3>🚆 ROXY MENETREND</h3>
<div id="info">Kattints egy megállóra</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.5,19.04],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// ================= ADAT =================
let stopsData = [];
let stopTimes = [];

// ================= STOPS =================
async function loadStops(){

 let res = await fetch("stops.txt");
 let text = await res.text();

 let lines = text.split("\n");

 for(let i=1;i<lines.length;i++){

  let cols = lines[i].split(",");

  let id = cols[0];
  let name = cols[2];
  let lat = parseFloat(cols[4]);
  let lon = parseFloat(cols[5]);

  if(!lat || !lon) continue;

  stopsData.push({id,name,lat,lon});

  let m = L.circleMarker([lat,lon],{
    radius:4,color:"yellow"
  }).addTo(map);

  m.on("click",()=>{
    showTimes(id,name);
  });
 }

 console.log("stops OK");
}

// ================= STOP TIMES =================
async function loadTimes(){

 let res = await fetch("stop_times.txt");
 let text = await res.text();

 let lines = text.split("\n");

 for(let i=1;i<lines.length;i++){

  let c = lines[i].split(",");

  stopTimes.push({
    stop:c[3],
    dep:c[2]
  });
 }

 console.log("times OK");
}

// ================= SHOW =================
function showTimes(stopId,name){

 let list = stopTimes.filter(s=>s.stop===stopId);

 let html = "<b>"+name+"</b><br>";

 list.slice(0,15).forEach(s=>{
  html += "🕒 "+s.dep+"<br>";
 });

 document.getElementById("info").innerHTML = html;
}

// ================= START =================
window.onload = () => {
 loadStops();
 loadTimes();
};

</script>

</body>
</html>
