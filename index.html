<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>MULTI GTFS PRO RENDSZER (AUTO SAVE)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    body { margin:0; font-family: Arial; display:flex; height:100vh; }
    #sidebar { width:380px; padding:10px; border-right:1px solid #ddd; overflow:auto; background:#fafafa; }
    #map { flex:1; }

    #dropzone {
      border:2px dashed #888;
      padding:10px;
      text-align:center;
      margin-bottom:10px;
      background:white;
      cursor:pointer;
    }

    input { width:100%; padding:8px; margin-bottom:10px; }

    .stop { padding:6px; border-bottom:1px solid #eee; cursor:pointer; background:white; }
    .stop:hover { background:#f0f0f0; }

    .small { font-size:12px; color:#555; }

    #status { font-size:12px; padding:6px; background:#e7f3ff; border:1px solid #b3d7ff; margin-bottom:10px; }

    #info { font-size:12px; padding:6px; background:#fff3cd; border:1px solid #ffeeba; margin-bottom:10px; }
  </style>
</head>
<body>

<div id="sidebar">

  <h3>🌍 MULTI GTFS PRO (AUTO SAVE)</h3>

  <div id="status">📦 ZIP betöltés vagy visszatöltés...</div>
  <div id="info">BKK + Volán + MÁV + mentés</div>

  <div id="dropzone">📁 Húzz ide GTFS ZIP-et</div>
  <input type="file" id="fileInput" multiple accept=".zip" />

  <input id="search" placeholder="Keresés..." />

  <div id="list"></div>
</div>

<div id="map"></div>

<script>

const STORAGE_KEY = "gtfs_zip_storage_v1";

const map = L.map('map').setView([47.4979,19.0402],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(map);

let stops=[];
let markers=[];
let stopTimesIndex={};

const status=document.getElementById('status');

// ---------------- STORAGE ----------------
function saveZip(name, arrayBuffer){
  const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  const base64 = arrayBufferToBase64(arrayBuffer);

  stored.push({name, data:base64});

  localStorage.setItem(STORAGE_KEY, JSON.stringify(stored));
}

function loadSavedZips(){
  const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  return stored;
}

function arrayBufferToBase64(buffer){
  let binary='';
  const bytes=new Uint8Array(buffer);
  bytes.forEach(b=>binary+=String.fromCharCode(b));
  return btoa(binary);
}

function base64ToBlob(base64){
  const binary=atob(base64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return new Blob([bytes]);
}

// ---------------- CSV ----------------
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(Boolean);
  const header=lines[0].split(',');
  return {lines,header};
}

// ---------------- LOAD ZIP ----------------
async function loadZip(file){
  const zip=await JSZip.loadAsync(file);

  const stopsFile=zip.file("stops.txt");
  const stopTimesFile=zip.file("stop_times.txt");

  if(stopsFile){
    const text=await stopsFile.async("string");
    const {lines,header}=parseCSV(text);

    const idIndex=header.indexOf('stop_id');
    const nameIndex=header.indexOf('stop_name');
    const latIndex=header.indexOf('stop_lat');
    const lonIndex=header.indexOf('stop_lon');

    const newStops=lines.slice(1).map(l=>{
      const c=l.split(',');
      return {
        id:c[idIndex],
        name:c[nameIndex],
        lat:parseFloat(c[latIndex]),
        lon:parseFloat(c[lonIndex])
      };
    }).filter(s=>s.id && s.name && !isNaN(s.lat));

    stops=stops.concat(newStops);
  }

  if(stopTimesFile){
    const text=await stopTimesFile.async("string");
    const lines=text.split(/\r?\n/).filter(Boolean);
    const header=lines[0].split(',');

    const sid=header.indexOf('stop_id');
    const time=header.indexOf('departure_time');
    const trip=header.indexOf('trip_id');

    for(let i=1;i<lines.length;i++){
      const c=lines[i].split(',');
      const id=c[sid];
      if(!id) continue;

      if(!stopTimesIndex[id]) stopTimesIndex[id]=[];
      stopTimesIndex[id].push({time:c[time],trip:c[trip]});
    }
  }

  status.innerText=`✔ Betöltve: ${stops.length} megálló`;

  render();
}

// ---------------- INIT LOAD FROM STORAGE ----------------
async function loadFromStorage(){
  const stored = loadSavedZips();

  if(stored.length === 0){
    status.innerText = "📦 Nincs mentett GTFS";
    return;
  }

  status.innerText = "♻ Betöltés mentett ZIP-ekből...";

  for(const z of stored){
    const blob = base64ToBlob(z.data);
    const file = new File([blob], z.name);
    await loadZip(file);
  }
}

// ---------------- RENDER ----------------
function render(){
  renderList(stops);
  renderMarkers(stops);
}

function renderList(data){
  const list=document.getElementById('list');
  list.innerHTML='';

  data.slice(0,200).forEach(s=>{
    const div=document.createElement('div');
    div.className='stop';
    div.innerHTML=`<b>${s.name}</b><div class='small'>${s.id}</div>`;
    div.onclick=()=>openStop(s);
    list.appendChild(div);
  });
}

function renderMarkers(data){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  data.forEach(s=>{
    if(!s.lat||!s.lon) return;
    const m=L.marker([s.lat,s.lon]).addTo(map).on('click',()=>openStop(s));
    markers.push(m);
  });
}

// ---------------- STOP ----------------
function openStop(stop){
  const times=stopTimesIndex[stop.id]||[];

  let html=`<b>${stop.name}</b><br><br>`;

  if(!times.length) html+="<i>Nincs menetrend</i>";
  else html+=times.slice(0,10).map(t=>"🚌 "+t.time).join("<br>");

  L.popup().setLatLng([stop.lat,stop.lon]).setContent(html).openOn(map);
}

// ---------------- SEARCH ----------------
const search=document.getElementById('search');
search.addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  const f=stops.filter(s=>s.name&&s.name.toLowerCase().includes(q));
  renderList(f);
  renderMarkers(f);
});

// ---------------- FILE INPUT ----------------
const fileInput=document.getElementById('fileInput');
const drop=document.getElementById('dropzone');

function handleFiles(files){
  for(const f of files){
    const reader = new FileReader();

    reader.onload = async (e)=>{
      const buffer = e.target.result;

      // SAVE
      saveZip(f.name, buffer);

      // LOAD
      const blob = new Blob([buffer]);
      const file = new File([blob], f.name);
      await loadZip(file);
    };

    reader.readAsArrayBuffer(f);
  }
}

drop.addEventListener('dragover',e=>{e.preventDefault();drop.style.background="#ddd"});
drop.addEventListener('dragleave',()=>drop.style.background="white");
drop.addEventListener('drop',e=>{
  e.preventDefault();drop.style.background="white";
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change',e=>handleFiles(e.target.files));

// ---------------- START ----------------
loadFromStorage();

</script>

</body>
</html>
