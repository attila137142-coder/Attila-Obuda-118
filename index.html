<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BKK + MÁV + VOLÁN UNIFIED DISPATCH SYSTEM</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body{margin:0;font-family:Arial;background:#0f172a;color:#e2e8f0}
    header{padding:12px;background:#111827;display:flex;justify-content:space-between;align-items:center}
    h1{font-size:14px;margin:0}
    .btn{background:#2563eb;border:none;padding:8px 10px;color:#fff;border-radius:8px;cursor:pointer}
    .grid{display:grid;gap:10px;padding:10px}
    .card{background:#1f2937;padding:10px;border-radius:12px}
    input{width:100%;padding:10px;border-radius:8px;border:none;margin-top:5px}
    #map{height:320px;border-radius:12px}
    .resultBox{margin-top:8px;padding:8px;background:#111827;border-radius:8px;cursor:pointer}
    .tag{font-size:11px;padding:2px 6px;border-radius:6px;background:#374151;margin-left:5px}

    #menu{position:fixed;inset:0;background:#0b1220;display:none;padding:20px;z-index:999;overflow:auto}

    .bkk{color:#60a5fa}
    .mav{color:#fbbf24}
    .volan{color:#34d399}
  </style>
</head>
<body>

<header>
  <h1>🚆 BKK + MÁV + VOLÁN DISPATCH</h1>
  <button class="btn" onclick="toggleMenu()">Menü</button>
</header>

<div id="menu">
  <h2>🚦 UNIFIED ENGINE</h2>
  <p>BKK / MÁV / VOLÁN integrált rendszer</p>
  <button class="btn" onclick="toggleMenu()">Bezár</button>
</div>

<div class="grid">

  <div class="card">
    <h3>🔍 Kereső (összes hálózat)</h3>
    <input id="search" placeholder="megálló / GTFS / vasútállomás" oninput="searchStops()" />
    <div id="results"></div>
  </div>

  <div class="card">
    <h3>🗺️ Térkép</h3>
    <div id="map"></div>
  </div>

  <div class="card">
    <h3>📊 Diszpécser panel</h3>
    <div id="panel">Válassz megállót...</div>
  </div>

</div>

<script>

let map;
let userLat=null,userLon=null;

// ---------------- UNIFIED GTFS ----------------
const stops=[
  // BKK
  {name:"Deák Ferenc tér",gtfs:"BKK_001",lat:47.4975,lon:19.0550,net:"bkk"},
  {name:"Örs vezér tere",gtfs:"BKK_002",lat:47.5017,lon:19.1356,net:"bkk"},

  // MÁV / HÉV
  {name:"Kelenföld vasútállomás",gtfs:"MAV_001",lat:47.4649,lon:19.0227,net:"mav"},
  {name:"Szob vasútállomás",gtfs:"MAV_002",lat:47.8213,lon:18.8626,net:"mav"},

  // VOLÁN
  {name:"Vác autóbusz-állomás",gtfs:"VOLAN_001",lat:47.7819,lon:19.1296,net:"volan"},
  {name:"Szentendre autóbusz-állomás",gtfs:"VOLAN_002",lat:47.6604,lon:19.0754,net:"volan"}
];

// ---------------- GPS ----------------
function startGPS(){
  navigator.geolocation.watchPosition(p=>{
    userLat=p.coords.latitude;
    userLon=p.coords.longitude;
  });
}

// ---------------- DIST ----------------
function dist(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ---------------- SEARCH ----------------
function searchStops(){
  const q=document.getElementById('search').value.toLowerCase();
  const res=document.getElementById('results');
  res.innerHTML="";

  stops.filter(s=>s.name.toLowerCase().includes(q)||s.gtfs.toLowerCase().includes(q))
  .forEach(s=>{

    let d="";
    if(userLat)d=`📏 ${dist(userLat,userLon,s.lat,s.lon).toFixed(2)} km`;

    const div=document.createElement("div");
    div.className="resultBox";
    div.innerHTML=`
      <span class="${s.net}">🚏 ${s.name}</span><br>
      🆔 ${s.gtfs}<br>
      ${d}
    `;

    div.onclick=()=>renderPanel(s);
    res.appendChild(div);
  });
}

// ---------------- PANEL ----------------
function renderPanel(s){
  const el=document.getElementById('panel');

  const times=[-3,0,4,12];

  el.innerHTML=`<b>${s.name}</b><br><br>`;

  times.forEach(t=>{
    let st="IDŐBEN",cls="";

    if(t<0){st=`KÉSIK ${Math.abs(t)}p`;cls="mav"}
    if(t>5){st=`SIET ${t}p`;cls="volan"}
    if(t>=0&&t<=5){st="IDŐBEN";cls="bkk"}

    el.innerHTML+=`<div class="${cls}">🕒 indulás +${t}p <span class="tag">${st}</span></div>`;
  });
}

// ---------------- MAP ----------------
window.onload=()=>{
  map=L.map('map').setView([47.5,19.05],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  stops.forEach(s=>{
    L.marker([s.lat,s.lon]).addTo(map)
    .bindPopup(`<b>${s.name}</b><br>${s.net.toUpperCase()}`)
    .on('click',()=>renderPanel(s));
  });

  startGPS();
};

// ---------------- MENU ----------------
function toggleMenu(){
  const m=document.getElementById('menu');
  m.style.display=m.style.display==='block'?'none':'block';
}

</script>

</body>
</html>
