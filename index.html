<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<title>GTFS PRO ONLINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body { margin:0; font-family: Arial; display:flex; height:100vh; }
#sidebar { width:380px; padding:10px; border-right:1px solid #ddd; overflow:auto; }
#map { flex:1; }
#dropzone { border:2px dashed #888; padding:10px; text-align:center; margin-bottom:10px; }
.stop { padding:6px; border-bottom:1px solid #eee; cursor:pointer; }
.stop:hover { background:#f0f0f0; }
input,button { width:100%; padding:8px; margin-bottom:8px; }
#status { font-size:12px; margin-bottom:10px; }
</style>
</head>
<body>

<div id="sidebar">
<h3>🚌 GTFS PRO ONLINE</h3>
<div id="status">Indítás...</div>

<div id="dropzone">📁 Húzd ide ZIP</div>
<input type="file" id="fileInput" multiple accept=".zip" />
<button onclick="clearDB()">🗑 CLEAR</button>

<input id="search" placeholder="Keresés..." />
<div id="list"></div>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([47.4979,19.0402],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stops=[], stopTimes=[], tripsMap={}, routesMap={};
let markers=[], vehicles=[], vehicleMarkers=[];
const status=document.getElementById('status');

// DB
let db;
const DB_NAME="GTFS_DB";

function initDB(){
  return new Promise(res=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=e=>{
      db=e.target.result;
      db.createObjectStore("zips",{keyPath:"name"});
    };
    req.onsuccess=e=>{db=e.target.result; res();};
  });
}

function saveZip(name,data){
  return new Promise(res=>{
    const tx=db.transaction("zips","readwrite");
    tx.objectStore("zips").put({name,data});
    tx.oncomplete=()=>res();
  });
}

function getZips(){
  return new Promise(r=>{
    const tx=db.transaction("zips","readonly");
    const req=tx.objectStore("zips").getAll();
    req.onsuccess=()=>r(req.result);
  });
}

function clearDB(){
  const tx=db.transaction("zips","readwrite");
  tx.objectStore("zips").clear();
  location.reload();
}

function parseCSV(t){
  const lines=t.split(/\r?\n/).filter(Boolean);
  const h=lines[0].split(',');
  return {lines,h};
}

async function loadZip(file){
  const zip=await JSZip.loadAsync(file);

  if(zip.file("stops.txt")){
    const text=await zip.file("stops.txt").async("string");
    const {lines,h}=parseCSV(text);

    const idI=h.indexOf('stop_id');
    const nI=h.indexOf('stop_name');
    const laI=h.indexOf('stop_lat');
    const loI=h.indexOf('stop_lon');

    const newStops=lines.slice(1).map(l=>{
      const c=l.split(',');
      return {id:c[idI],name:c[nI],lat:+c[laI],lon:+c[loI]};
    });

    newStops.forEach(s=>{
      if(!stops.find(x=>x.id===s.id)) stops.push(s);
    });
  }

  if(zip.file("routes.txt")){
    const text=await zip.file("routes.txt").async("string");
    const {lines,h}=parseCSV(text);
    const rid=h.indexOf('route_id');
    const short=h.indexOf('route_short_name');
    lines.slice(1).forEach(l=>{
      const c=l.split(',');
      routesMap[c[rid]]=c[short];
    });
  }

  if(zip.file("trips.txt")){
    const text=await zip.file("trips.txt").async("string");
    const {lines,h}=parseCSV(text);
    const tid=h.indexOf('trip_id');
    const rid=h.indexOf('route_id');
    const head=h.indexOf('trip_headsign');

    lines.slice(1).forEach(l=>{
      const c=l.split(',');
      tripsMap[c[tid]]={route:routesMap[c[rid]], headsign:c[head]};
    });
  }

  if(zip.file("stop_times.txt")){
    const text=await zip.file("stop_times.txt").async("string");
    const {lines,h}=parseCSV(text);
    const sI=h.indexOf('stop_id');
    const tI=h.indexOf('departure_time');
    const trI=h.indexOf('trip_id');

    stopTimes=stopTimes.concat(lines.slice(1).map(l=>{
      const c=l.split(',');
      return {stop:c[sI],time:c[tI],trip:c[trI]};
    }));
  }

  status.innerText=`✔ ${stops.length} megálló`;
  buildVehicles();
  updateVehicles();
  render();
}

async function loadFromDB(){
  stops=[]; stopTimes=[]; tripsMap={}; routesMap={};
  const files=await getZips();
  if(!files.length){status.innerText="Nincs mentett adat";return;}

  status.innerText="♻ Betöltés...";

  for(const f of files){
    const file=new File([f.data],f.name);
    await loadZip(file);
  }

  status.innerText="♻ Kész (adatbázisból)";
}

function buildVehicles(){
  vehicles=[];
  const grouped={};

  stopTimes.forEach(t=>{
    if(!grouped[t.trip]) grouped[t.trip]=[];
    const p=t.time.split(':');
    const sec=+p[0]*3600 + +p[1]*60;
    grouped[t.trip].push({...t,sec});
  });

  for(const id in grouped){
    const seq=grouped[id].sort((a,b)=>a.sec-b.sec);
    if(seq.length>1) vehicles.push({id,seq});
  }
}

function updateVehicles(){
  const now=new Date();
  const cur=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

  vehicleMarkers.forEach(m=>map.removeLayer(m));
  vehicleMarkers=[];

  vehicles.forEach(v=>{
    for(let i=0;i<v.seq.length-1;i++){
      const a=v.seq[i],b=v.seq[i+1];
      if(cur>=a.sec && cur<=b.sec){
        const sa=stops.find(s=>s.id===a.stop);
        const sb=stops.find(s=>s.id===b.stop);
        if(!sa||!sb) return;

        const r=(cur-a.sec)/(b.sec-a.sec);
        const lat=sa.lat+(sb.lat-sa.lat)*r;
        const lon=sa.lon+(sb.lon-sa.lon)*r;

        const trip=tripsMap[v.id];
        const label=trip?trip.route:"?";

        const m=L.circleMarker([lat,lon],{radius:6})
          .addTo(map)
          .bindPopup(`🚌 ${label}`);

        vehicleMarkers.push(m);
        break;
      }
    }
  });
}

setInterval(updateVehicles,5000);

function render(){
  const list=document.getElementById('list');
  list.innerHTML='';

  stops.slice(0,200).forEach(s=>{
    const d=document.createElement('div');
    d.className='stop';
    d.innerText=s.name;
    d.onclick=()=>openStop(s);
    list.appendChild(d);
  });

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  stops.forEach(s=>{
    const m=L.marker([s.lat,s.lon]).addTo(map);
    markers.push(m);
  });
}

function openStop(stop){
  const now=new Date();
  const cur=now.getHours()*3600+now.getMinutes()*60;

  const times=stopTimes
    .filter(t=>t.stop===stop.id)
    .map(t=>{
      const p=t.time.split(':');
      const sec=+p[0]*3600+ +p[1]*60;
      return {...t,sec};
    })
    .filter(t=>t.sec>=cur)
    .sort((a,b)=>a.sec-b.sec)
    .slice(0,10);

  let html=`<b>${stop.name}</b><br><br>`;

  times.forEach(t=>{
    const trip=tripsMap[t.trip];
    if(!trip) return;
    html+=`🚌 <b>${trip.route}</b> → ${trip.headsign}<br>${t.time}<br><br>`;
  });

  L.popup().setLatLng([stop.lat,stop.lon]).setContent(html).openOn(map);
}

search.oninput=e=>{
  const q=e.target.value.toLowerCase();
  const f=stops.filter(s=>s.name.toLowerCase().includes(q));
  const list=document.getElementById('list');
  list.innerHTML='';
  f.forEach(s=>{
    const d=document.createElement('div');
    d.className='stop';
    d.innerText=s.name;
    list.appendChild(d);
  });
};

const fileInput=document.getElementById('fileInput');
const drop=document.getElementById('dropzone');

function handle(files){
  for(const f of files){
    const r=new FileReader();
    r.onload=async e=>{
      await saveZip(f.name,e.target.result);
      const file=new File([e.target.result],f.name);
      await loadZip(file);
    };
    r.readAsArrayBuffer(f);
  }
}

drop.ondragover=e=>e.preventDefault();
drop.ondrop=e=>{e.preventDefault();handle(e.dataTransfer.files);};
fileInput.onchange=e=>handle(e.target.files);

(async()=>{
  await initDB();
  await loadFromDB();
})();

</script>

</body>
</html>
