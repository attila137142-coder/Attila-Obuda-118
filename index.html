<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iránytű Navi PRO</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family: Arial; background:#0f172a; color:#e2e8f0; }
    header { padding:12px; background:#111827; display:flex; justify-content:space-between; align-items:center; }
    h1 { font-size:16px; margin:0; }
    .btn { background:#2563eb; border:none; padding:8px 10px; color:#fff; border-radius:8px; cursor:pointer; }
    .grid { display:grid; gap:10px; padding:10px; }
    .card { background:#1f2937; padding:10px; border-radius:12px; }
    input { width:100%; padding:10px; border-radius:8px; border:none; margin-top:5px; }
    #map { height:320px; border-radius:12px; }
    .small { font-size:12px; opacity:0.8; white-space:pre-line; }
    .row { display:flex; gap:10px; }
    .row > div { flex:1; }
    .compass { font-size:28px; text-align:center; padding:10px; }
  </style>
</head>
<body>

<header>
  <h1>🧭 Iránytű Navi PRO</h1>
  <button class="btn" onclick="toggleMenu()">Menü</button>
</header>

<div class="grid">

  <div class="card">
    <h3>🔍 Kereső</h3>
    <input id="search" placeholder="Megálló keresés..." oninput="searchStops()" />
    <div id="results" class="small"></div>
  </div>

  <div class="card">
    <h3>🗺️ Térkép</h3>
    <div id="map"></div>
    <div class="small" id="mapStatus">Térkép inicializálás...</div>
  </div>

  <div class="card">
    <h3>🧭 Iránytű</h3>
    <div class="compass" id="compass">Várakozás...</div>
    <button class="btn" onclick="startCompass()">Iránytű indítása</button>
    <div class="small">Ha nem működik: HTTPS vagy engedély kell</div>
  </div>

</div>

<script>

let map;

window.onload = () => {
  try {
    map = L.map('map').setView([47.4979, 19.0402], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    L.marker([47.4979, 19.0402]).addTo(map).bindPopup('Budapest').openPopup();

    setTimeout(() => map.invalidateSize(), 300);

    document.getElementById('mapStatus').innerText = "Térkép OK ✔";
  } catch(e){
    document.getElementById('mapStatus').innerText = "Térkép hiba: " + e.message;
  }
};

const stops = ["Attila út","Deák tér","Kelenföld","Örs vezér tere","Batthyány tér"];

function searchStops(){
  const q = document.getElementById('search').value.toLowerCase();
  const res = stops.filter(s => s.toLowerCase().includes(q));
  document.getElementById('results').innerText = res.length ? res.join('\n') : "Nincs találat";
}

function toggleMenu(){
  console.log("GTFS MENU OPEN");
  alert("Menü: GTFS / járatok / útvonaltervező (placeholder)");
}

function startCompass(){
  if(!window.DeviceOrientationEvent){
    document.getElementById('compass').innerText = "Nincs szenzor";
    return;
  }

  if(typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission()
      .then(p => { if(p==='granted') initCompass(); })
      .catch(()=>fallbackCompass());
  } else {
    initCompass();
    fallbackCompass();
  }
}

function initCompass(){
  window.addEventListener("deviceorientation", e => {
    if(e.alpha==null){ fallbackCompass(); return; }

    let d = e.alpha;
    let t = "⬆️ ÉSZAK";

    if(d>45&&d<135) t="➡️ KELET";
    else if(d>135&&d<225) t="⬇️ DÉL";
    else if(d>225&&d<315) t="⬅️ NYUGAT";

    document.getElementById('compass').innerText = t;
  });
}

// fallback (desktop teszt)
function fallbackCompass(){
  window.addEventListener('mousemove', e => {
    const x = e.clientX/window.innerWidth;
    let t = "⬆️ ÉSZAK";
    if(x<0.25) t="⬅️ NYUGAT";
    else if(x<0.5) t="⬇️ DÉL";
    else if(x<0.75) t="➡️ KELET";
    document.getElementById('compass').innerText = t;
  });
}

</script>

</body>
</html>
