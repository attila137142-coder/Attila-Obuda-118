<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map{height:100vh;}
</style>
</head>

<body>

<div id="map"></div>

<script>

// térkép
let map = L.map('map').setView([47.5,19.04],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19
}).addTo(map);

// jármű layer
let vehiclesLayer = L.layerGroup().addTo(map);

// ikon
let icon = L.icon({
 iconUrl:"https://cdn-icons-png.flaticon.com/512/61/61231.png",
 iconSize:[30,30]
});

// BETÖLTÉS
async function load(){

 // IDE jön majd a VALÓDI proxy URL!
 let res = await fetch("vehicles.json");
 let data = await res.json();

 vehiclesLayer.clearLayers();

 data.forEach(v=>{

  let color = v.delay > 60 ? "red" : "green";

  let m = L.marker([v.lat,v.lon],{icon:icon})
   .bindPopup(`
    🚍 ${v.line}<br>
    ⏱ ${v.delay} sec
   `);

  m.addTo(vehiclesLayer);
 });

}

// frissítés
setInterval(load,5000);
load();

</script>

</body>
</html>
