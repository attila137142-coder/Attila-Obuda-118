<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚌 DISZPÉCSER PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{background:black;color:#FFD700;font-family:Arial;text-align:center;}
#map{height:50vh;}
#list{max-width:900px;margin:auto;}
.row{border-bottom:1px solid #333;padding:6px;}
.red{color:red;}
.blue{color:#00aaff;}
.white{color:white;}
</style>
</head>

<body>

<h2>🚌 DISZPÉCSER NÉZET</h2>

<button onclick="getLocation()">📍 Saját hely</button>

<div id="map"></div>
<div id="list"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAP
let map=L.map('map').setView([47.55,19.05],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== MEGÁLLÓK (rövidítve)
const stops=[
 {name:"Békásmegyer",lat:47.598,lon:19.054},
 {name:"Flórián tér",lat:47.542,lon:19.042},
 {name:"Batthyány tér",lat:47.506,lon:19.039},
 {name:"Szentendre",lat:47.661,lon:19.075}
];

// ===== JÁRMŰVEK
let vehicles=[];

// ===== HELYZET
let userLat=null,userLon=null;

function getLocation(){
 navigator.geolocation.getCurrentPosition(pos=>{
  userLat=pos.coords.latitude;
  userLon=pos.coords.longitude;
 });
}

// ===== GENERÁLÁS
function generate(){

 vehicles=[];

 let now=new Date();
 let base=now.getMinutes()*60+now.getSeconds();

 for(let i=0;i<12;i++){

  let stop=stops[Math.floor(Math.random()*stops.length)];

  let baseTime=(i+1)*180;
  let delay=Math.floor(Math.random()*120-60);

  let real=baseTime-(base%180)+delay;

  vehicles.push({
    line: [34,134,243,"H5"][i%4],
    dest: ["Szentendre","Vác","Békás","Batthyány"][i%4],
    time: real,
    delay: delay,
    forda:"F"+(10+i),
    id:"BUS-"+(100+i),
    lat: stop.lat + (Math.random()-0.5)*0.01,
    lon: stop.lon + (Math.random()-0.5)*0.01
  });
 }

 // rendezés idő szerint
 vehicles.sort((a,b)=>a.time-b.time);
}

// ===== TÉRKÉP
let markers=[];

function drawMap(){

 markers.forEach(m=>map.removeLayer(m));
 markers=[];

 vehicles.forEach(v=>{

  let m=L.marker([v.lat,v.lon]).addTo(map)
    .bindPopup(`🚌 ${v.line} → ${v.dest}`);

  markers.push(m);
 });
}

// ===== LISTA
function render(){

 let html="";

 vehicles.forEach(v=>{

  let m=Math.floor(v.time/60);
  let s=v.time%60;

  let cls="white";
  if(v.delay<0) cls="red";
  if(v.delay>0) cls="blue";

  html+=`<div class="row ${cls}">
  <b>${v.line}</b> |
  ${m}:${String(s).padStart(2,"0")} |
  (${v.delay}s) |
  ${v.dest} |
  ${v.forda} |
  ${v.id}
  </div>`;
 });

 list.innerHTML=html;
}

// ===== FRISSÍTÉS
function update(){

 generate();

 vehicles.forEach(v=>{
  v.time-=1;
  v.lat+= (Math.random()-0.5)*0.0005;
  v.lon+= (Math.random()-0.5)*0.0005;
 });

 drawMap();
 render();
}

setInterval(update,1000);

generate();
update();

</script>

</body>
</html>
