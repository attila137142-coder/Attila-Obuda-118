<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<title>GTFS PRO ULTRA + VONALAK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body { margin:0; font-family: Arial; display:flex; height:100vh; }
#sidebar { width:380px; padding:10px; border-right:1px solid #ddd; overflow:auto; }
#map { flex:1; }
.stop { padding:6px; border-bottom:1px solid #eee; cursor:pointer; }
.stop:hover { background:#f0f0f0; }
input,button { width:100%; padding:8px; margin-bottom:8px; }
</style>
</head>
<body>

<div id="sidebar">
<h3>🚌 GTFS ULTRA + VONALAK</h3>
<button onclick="clearDB()">🗑 CLEAR</button>
<input id="search" placeholder="Keresés..." />
<div id="list"></div>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([47.4979,19.0402],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let cluster = L.markerClusterGroup();
map.addLayer(cluster);

let stopsMap = new Map();
let stops=[];
let shapesMap = {};
let shapeLines = [];

// DB
let db;
const DB_NAME="GTFS_DB";

function initDB(){
  return new Promise(res=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=e=>{
      db=e.target.result;
      db.createObjectStore("zips",{keyPath:"name"});
    };
    req.onsuccess=e=>{db=e.target.result; res();};
  });
}

function saveZip(name,data){
  return new Promise(res=>{
    const tx=db.transaction("zips","readwrite");
    tx.objectStore("zips").put({name,data});
    tx.oncomplete=()=>res();
  });
}

function getZips(){
  return new Promise(r=>{
    const tx=db.transaction("zips","readonly");
    const req=tx.objectStore("zips").getAll();
    req.onsuccess=()=>r(req.result);
  });
}

function clearDB(){
  const tx=db.transaction("zips","readwrite");
  tx.objectStore("zips").clear();
  location.reload();
}

function parseCSV(text){
  const lines=text.split(/\r?\n/);
  const header=lines[0].split(',');
  const data=[];

  for(let i=1;i<lines.length;i++){
    let row=[],cur='',q=false;
    for(let c of lines[i]){
      if(c==='"') q=!q;
      else if(c===','&&!q){row.push(cur);cur='';}
      else cur+=c;
    }
    row.push(cur);
    if(row.length===header.length) data.push(row);
  }
  return {header,data};
}

async function loadZip(file){
  const zip=await JSZip.loadAsync(file);

  if(zip.file("stops.txt")){
    const t=await zip.file("stops.txt").async("string");
    const {header,data}=parseCSV(t);

    const idI=header.indexOf('stop_id');
    const nI=header.indexOf('stop_name');
    const laI=header.indexOf('stop_lat');
    const loI=header.indexOf('stop_lon');

    data.forEach(r=>{
      const s={id:r[idI],name:r[nI],lat:+r[laI],lon:+r[loI]};
      if(!stopsMap.has(s.id)) stopsMap.set(s.id,s);
    });
  }

  if(zip.file("shapes.txt")){
    const t=await zip.file("shapes.txt").async("string");
    const {header,data}=parseCSV(t);

    const idI=header.indexOf('shape_id');
    const laI=header.indexOf('shape_pt_lat');
    const loI=header.indexOf('shape_pt_lon');
    const seqI=header.indexOf('shape_pt_sequence');

    data.forEach(r=>{
      const id=r[idI];
      if(!shapesMap[id]) shapesMap[id]=[];
      shapesMap[id].push({lat:+r[laI],lon:+r[loI],seq:+r[seqI]});
    });
  }

  render();
  drawShapes();
}

async function loadFromDB(){
  stopsMap=new Map();
  shapesMap={};

  const files=await getZips();
  for(const f of files){
    const file=new File([f.data],f.name);
    await loadZip(file);
  }
}

function render(){
  stops=Array.from(stopsMap.values());

  cluster.clearLayers();

  stops.forEach(s=>{
    if(!isNaN(s.lat)&&!isNaN(s.lon)){
      const m=L.marker([s.lat,s.lon]);
      cluster.addLayer(m);
    }
  });

  const list=document.getElementById('list');
  list.innerHTML='';

  stops.slice(0,200).forEach(s=>{
    const d=document.createElement('div');
    d.className='stop';
    d.innerText=s.name;
    list.appendChild(d);
  });
}

function drawShapes(){
  shapeLines.forEach(l=>map.removeLayer(l));
  shapeLines=[];

  for(const id in shapesMap){
    const pts=shapesMap[id]
      .sort((a,b)=>a.seq-b.seq)
      .map(p=>[p.lat,p.lon]);

    if(pts.length>1){
      const line=L.polyline(pts,{color:'blue'}).addTo(map);
      shapeLines.push(line);
    }
  }
}

search.oninput=e=>{
  const q=e.target.value.toLowerCase();
  const f=stops.filter(s=>s.name.toLowerCase().includes(q));

  cluster.clearLayers();

  f.forEach(s=>{
    if(!isNaN(s.lat)&&!isNaN(s.lon)){
      cluster.addLayer(L.marker([s.lat,s.lon]));
    }
  });
};

const fileInput=document.createElement('input');
fileInput.type='file';
fileInput.multiple=true;
fileInput.accept='.zip';
document.body.appendChild(fileInput);

fileInput.onchange=e=>{
  const files=e.target.files;
  for(const f of files){
    const r=new FileReader();
    r.onload=async ev=>{
      await saveZip(f.name,ev.target.result);
      await loadZip(new File([ev.target.result],f.name));
    };
    r.readAsArrayBuffer(f);
  }
};

(async()=>{
  await initDB();
  await loadFromDB();
})();

</script>

</body>
</html>
