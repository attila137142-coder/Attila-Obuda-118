<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Attila Közlekedés – Diszpécser térkép</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {margin:0;font-family:Arial;}
#map {height:100vh;}

.title{
position:absolute;
left:50px;
top:10px;
background:white;
padding:10px;
font-weight:bold;
font-size:20px;
z-index:1000;
box-shadow:0 0 5px rgba(0,0,0,0.3);
}

.busIcon{
background:#1976d2;
color:white;
padding:3px 6px;
border-radius:4px;
font-weight:bold;
}

.legend{
position:absolute;
right:20px;
bottom:20px;
background:white;
padding:10px;
z-index:1000;
font-size:12px;
}
</style>

</head>

<body>

<div class="title">
Attila Közlekedés – Diszpécser térkép
</div>

<div id="map"></div>

<div class="legend">
<b>Késés jelölés</b><br>
🟢 0-4 perc<br>
🟡 5-14 perc<br>
🟠 15-20 perc<br>
🔴 20+ perc
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.56,19.05],12);

var normal = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{attribution:'OpenStreetMap'}
).addTo(map);

var topo = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'
);

var baseMaps={
"Normál térkép":normal,
"Turista térkép":topo
};

L.control.layers(baseMaps).addTo(map);

function delayColor(delay){
if(delay<5) return "green";
if(delay<15) return "yellow";
if(delay<20) return "orange";
return "red";
}

var vehicles=[
{
line:"160",
id:"104",
plate:"BKK-104",
delay:2,
speed:38,
lat:47.598,
lon:19.055
},
{
line:"34",
id:"212",
plate:"BKK-212",
delay:12,
speed:30,
lat:47.58,
lon:19.05
},
{
line:"106",
id:"315",
plate:"BKK-315",
delay:1,
speed:45,
lat:47.56,
lon:19.045
}
];

vehicles.forEach(v=>{

var icon=L.divIcon({
className:"busIcon",
html:v.line
});

var marker=L.marker([v.lat,v.lon],{icon:icon}).addTo(map);

marker.bindPopup(
"<b>Járat:</b> "+v.line+
"<br><b>Jármű ID:</b> "+v.id+
"<br><b>Rendszám:</b> "+v.plate+
"<br><b>Sebesség:</b> "+v.speed+" km/h"+
"<br><b>Késés:</b> "+v.delay+" perc"
);

});

var route=[
[47.60,19.055],
[47.59,19.053],
[47.58,19.051],
[47.57,19.048],
[47.56,19.045]
];

L.polyline(route,{color:"red",weight:5}).addTo(map);

var stops=[
["Békásmegyer",47.598,19.055],
["Csillaghegy",47.579,19.048],
["Rómaifürdő",47.575,19.045],
["Aquincum",47.567,19.045],
["Óbuda",47.558,19.043]
];

stops.forEach(s=>{
L.circleMarker([s[1],s[2]],{
radius:5,
color:"red"
}).addTo(map).bindPopup(s[0]);
});

</script>

</body>
</html>
