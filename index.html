<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚍 PRO MAX FIX</title>

<style>
body{background:#000;color:#FFD700;font-family:Arial;padding:10px;}
button{padding:10px;margin:5px;border-radius:10px;}
.card{background:#111;padding:10px;margin-top:10px;border-radius:10px;}
.red{color:#ff4d4d;} .blue{color:#4db8ff;}
#mapFrame{width:100%;height:350px;border:0;margin-top:10px;}
</style>
</head>

<body>

<h2>🚍 PRO rendszer (FIX)</h2>

<button onclick="start()">▶ Indítás</button>

<button onclick="loadMap('osm')">🗺️ OSM</button>
<button onclick="loadMap('topo')">⛰️ Topo</button>
<button onclick="loadMap('rail')">🚆 Vasút</button>
<button onclick="loadMap('brouter')">🧭 Útvonal</button>

<input id="search" placeholder="Megálló keresés..." oninput="render()">

<div id="status"></div>
<div id="location" class="card"></div>

<iframe id="mapFrame"></iframe>

<div id="list"></div>

<script>

let userLat,userLon,userAcc;
let stops=[];

// ===== GPS
function getLocation(){
 return new Promise((res,rej)=>{
  navigator.geolocation.getCurrentPosition(p=>{
   userLat=p.coords.latitude;
   userLon=p.coords.longitude;
   userAcc=p.coords.accuracy;
   res();
  },rej);
 });
}

// ===== CÍM
async function getAddress(lat,lon){
 try{
  const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
  const d = await res.json();
  const a = d.address||{};
  return `${a.country||""} → ${a.city||a.town||""} → ${a.road||""} ${a.house_number||""}`;
 }catch{return "Cím nem elérhető";}
}

// ===== DIST
function dist(a,b,c,d){
 const R=6371e3;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
 Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== OSM
async function loadStops(){
 const query = `
 [out:json];
 node(around:2000,${userLat},${userLon})["highway"="bus_stop"];
 node(around:2000,${userLat},${userLon})["railway"="tram_stop"];
 node(around:2000,${userLat},${userLon})["railway"="station"];
 out;
 `;
 const res = await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:query});
 const data = await res.json();

 return data.elements.map(e=>({
  name:e.tags.name || "Megálló",
  lat:e.lat,
  lon:e.lon
 }));
}

// ===== MAP JAVÍTVA
function loadMap(type){

 if(type==="osm"){
  mapFrame.src=`https://www.openstreetmap.org/export/embed.html?bbox=${userLon-0.01},${userLat-0.01},${userLon+0.01},${userLat+0.01}`;
 }

 if(type==="topo"){
  mapFrame.src=`https://opentopomap.org/#map=14/${userLat}/${userLon}`;
 }

 if(type==="rail"){
  mapFrame.src=`https://www.openrailwaymap.org/?map=14/${userLat}/${userLon}`;
 }

 if(type==="brouter"){
  mapFrame.src=`https://brouter.de/brouter-web/#map=14/${userLat}/${userLon}/standard`;
 }
}

// ===== RENDER
async function render(){

 const q = document.getElementById("search").value.toLowerCase();

 const addr = await getAddress(userLat,userLon);

 document.getElementById("location").innerHTML=`
 📍 ${userLat.toFixed(6)}, ${userLon.toFixed(6)}<br>
 🎯 ±${Math.round(userAcc)} m<br>
 🏠 ${addr}
 `;

 let list = stops.map(s=>({...s,d:dist(userLat,userLon,s.lat,s.lon)}));

 if(q){
  list = list.filter(s=>s.name.toLowerCase().includes(q));
 }

 list.sort((a,b)=>a.d-b.d);

 let near = list.slice(0,10);

 let html="";

 if(near.length===0){
  html="<div class='card red'>Nincs találat</div>";
 }

 near.forEach(s=>{
  html+=`<div class="card">
  🚏 <b>${s.name}</b><br>
  📏 ${Math.round(s.d)} m
  </div>`;
 });

 document.getElementById("list").innerHTML=html;
}

// ===== START
async function start(){
 await getLocation();
 document.getElementById("status").innerText="Betöltés...";
 stops = await loadStops();
 loadMap("osm");
 document.getElementById("status").innerText="✔ Kész";
 render();
}

</script>

</body>
</html>
