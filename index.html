<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mini Navigáció</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 500px; }
</style>
</head>

<body>

<h2>📍 Mini Navigáció</h2>
<button onclick="calc()">Távolság számítás</button>

<div id="map"></div>
<p id="result">Eredmény: </p>

<script>

let map = L.map('map').setView([47.55, 19.045], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let start = null;
let end = null;

map.on('click', function(e) {

if (!start) {
start = e.latlng;
L.marker(start).addTo(map).bindPopup("Start").openPopup();
} else {
end = e.latlng;
L.marker(end).addTo(map).bindPopup("Cél").openPopup();
}

});

function calc() {

if (!start || !end) {
alert("Kattints 2 pontot!");
return;
}

let dx = start.lat - end.lat;
let dy = start.lng - end.lng;

let dist = Math.sqrt(dx*dx + dy*dy) * 111;

document.getElementById("result").innerHTML =
"Távolság: " + dist.toFixed(2) + " km";

}

</script>

</body>
</html>
