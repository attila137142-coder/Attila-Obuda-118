<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés V2.1 - VOLÁN + BKK + MÁV</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:#fff; }

#topbar{
 display:flex;
 justify-content:space-between;
 padding:10px;
 background:#111827;
 font-size:13px;
}

#container{
 display:grid;
 grid-template-columns: 2fr 1fr;
 height: calc(100vh - 40px);
}

#map{ height:100%; }

.panel{
 background:#1f2937;
 padding:10px;
 overflow:auto;
}

.card{
 background:#111827;
 padding:8px;
 margin-bottom:8px;
 border-radius:8px;
 font-size:13px;
}

input{
 width:100%;
 padding:8px;
 margin-bottom:10px;
 border-radius:6px;
 border:none;
}
</style>
</head>

<body>

<div id="topbar">
 <div id="gps">📍 GPS...</div>
 <div id="net">📶 ...</div>
 <div id="status">🟢 READY</div>
</div>

<div id="container">

 <div id="map"></div>

 <div class="panel">

  <input id="search" placeholder="🔎 megálló / település" oninput="searchStops()">

  <h3>🚏 Legközelebbi</h3>
  <div id="stops">--</div>

 </div>

</div>

<script>

/* ================= MAP ================= */

let map = L.map('map').setView([47.4979,19.0402], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'OSM'
}).addTo(map);

/* ================= USER ================= */

let userLat, userLon;

/* ================= FULL DATABASE ================= */

let stops = [

/* ================= BKK ================= */
{type:"BKK", line:"M3", name:"Deák Ferenc tér", lat:47.4979, lon:19.0540},
{type:"BKK", line:"M4", name:"Kálvin tér", lat:47.4899, lon:19.0615},

/* ================= MÁV ================= */
{type:"MÁV", line:"100a", name:"Kelenföld vasútállomás", lat:47.4649, lon:19.0193},
{type:"MÁV", line:"1", name:"Déli pályaudvar", lat:47.4990, lon:19.0250},

/* ================= VOLÁN - BUDAPEST / PEST ================= */
{type:"VOLÁN", line:"Volán 260", name:"Budapest, Népliget autóbusz-pályaudvar", lat:47.4760, lon:19.0990},
{type:"VOLÁN", line:"Volán 260", name:"Vecsés, Market Center", lat:47.4030, lon:19.2580},
{type:"VOLÁN", line:"Volán 312", name:"Dunakeszi, Fő út", lat:47.6360, lon:19.1380},
{type:"VOLÁN", line:"Volán 312", name:"Göd, vasútállomás", lat:47.6910, lon:19.1390},

/* ================= VOLÁN - ZALA MEGYE ================= */
{type:"VOLÁN", line:"Volán 8", name:"Zalaegerszeg, autóbusz-állomás", lat:46.8440, lon:16.8460},
{type:"VOLÁN", line:"Volán 8", name:"Keszthely, autóbusz-állomás", lat:46.7680, lon:17.2430},
{type:"VOLÁN", line:"Volán 9", name:"Lenti, autóbusz-állomás", lat:46.6240, lon:16.5360},

/* ================= KISVASÚT ================= */
{type:"KISVASUT", line:"Gyermekvasút", name:"Hűvösvölgy", lat:47.5412, lon:18.9640},
{type:"KISVASUT", line:"Királyrét", name:"Kismaros", lat:47.8270, lon:19.0150},

];

/* ================= FORMAT ================= */

function formatDistance(m){
 return m < 1000 ? Math.round(m)+" m" : (m/1000).toFixed(2)+" km";
}

/* ================= DIST ================= */

function dist(a,b){
 return map.distance(a,b);
}

/* ================= NEAREST ================= */

function getNearest(){

 return stops.map(s=>{
  return {
   ...s,
   d: dist([userLat,userLon],[s.lat,s.lon])
  };
 }).sort((a,b)=>a.d-b.d).slice(0,10);

}

/* ================= RENDER ================= */

function renderStops(list){

 let data = list || getNearest();

 document.getElementById("stops").innerHTML =
 data.map(s=>`
  <div class="card">
   🚏 <b>${s.name}</b><br>
   🏷 ${s.type} | ${s.line}<br>
   📏 ${formatDistance(s.d)}
  </div>
 `).join("");

}

/* ================= SEARCH ================= */

function searchStops(){

 let q = document.getElementById("search").value.toLowerCase();

 if(q === ""){
  renderStops();
  return;
 }

 let filtered = stops.filter(s =>
  s.name.toLowerCase().includes(q) ||
  s.type.toLowerCase().includes(q) ||
  s.line.toLowerCase().includes(q)
 );

 renderStops(filtered);
}

/* ================= NETWORK ================= */

function net(){
 let c = navigator.connection;
 if(!c) return "📶 nincs adat";
 return `📶 ${c.effectiveType} | ⚡ ${c.downlink} Mbps`;
}

setInterval(()=>{
 document.getElementById("net").innerHTML = net();
},2000);

/* ================= GPS ================= */

async function update(pos){

 userLat = pos.coords.latitude;
 userLon = pos.coords.longitude;

 let acc = pos.coords.accuracy;

 document.getElementById("gps").innerHTML = `
 📍 ${userLat.toFixed(5)}, ${userLon.toFixed(5)}<br>
 🎯 ±${Math.round(acc)} m
 `;

 let res = await fetch(
  `https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`
 );

 let d = await res.json();
 let a = d.address || {};

 document.getElementById("status").innerHTML =
 `🌍 ${a.city || a.town || a.village || "-"} | READY`;

 L.marker([userLat,userLon]).addTo(map);
 map.setView([userLat,userLon],13);

 renderStops();
}

/* ================= START ================= */

navigator.geolocation.watchPosition(update);

</script>

</body>
</html>
