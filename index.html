<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚀 Attila Közlekedés PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  background:#000;
  color:#FFD700;
  font-family:Arial;
  margin:0;
  padding:10px;
}

h1{text-align:center;}

#map{height:40vh;margin-bottom:10px;}

button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.stop{
  margin-top:15px;
  padding:10px;
  background:#111;
  border-radius:10px;
}

.row{
  padding:5px;
  border-bottom:1px solid #333;
}

.red{color:red;}
.blue{color:#00aaff;}
.white{color:white;}

</style>
</head>

<body>

<h1>🚀 Attila Közlekedés PRO</h1>

<div style="text-align:center;">
<button onclick="getLocation()">📍 Saját hely</button>
<button onclick="mode='near';render()">Közeli</button>
<button onclick="mode='all';render()">Összes</button>
</div>

<div id="map"></div>
<div id="list"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAP
let map=L.map('map').setView([47.55,19.05],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== ADATOK (részlet, ide rakd be a 45-öt)
const stops=[
 {name:"Békásmegyer",lat:47.598,lon:19.054},
 {name:"Flórián tér",lat:47.542,lon:19.042},
 {name:"Batthyány tér",lat:47.506,lon:19.039},
 {name:"Szentendre",lat:47.661,lon:19.075},
 {name:"Keszthely",lat:46.768,lon:17.245},
 {name:"Hévíz",lat:46.790,lon:17.185}
];

// ===== KISVASÚT
const gyStops=[
 {name:"Hűvösvölgy"},
 {name:"Hárs-hegy"},
 {name:"Szépjuhászné"},
 {name:"Jánoshegy"},
 {name:"Virágvölgy"},
 {name:"Csillebérc"}
];

// ===== HELYZET
let userLat=null,userLon=null;
let mode="near";

function getLocation(){
 navigator.geolocation.getCurrentPosition(pos=>{
  userLat=pos.coords.latitude;
  userLon=pos.coords.longitude;
  render();
 });
}

// ===== TÁVOLSÁG
function dist(a,b,c,d){
 const R=6371e3;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
 Math.sin(dLon/2)**2;
 return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// ===== ADAT GENERÁLÁS
let departures=[];

function genData(){

 departures=[];

 stops.forEach(s=>{
  for(let i=0;i<2;i++){
    departures.push({
      stop:s.name,
      line:[134,243,"H5","S72"][i%4],
      dest:["Szentendre","Vác","Békás"][i%3],
      time:Math.floor(Math.random()*600+60),
      delay:Math.floor(Math.random()*60-30),
      lat:s.lat,
      lon:s.lon,
      type:["BKK","Volán","MÁV"][i%3]
    });
  }
 });

 gyStops.forEach(s=>{
  departures.push({
    stop:s.name,
    line:"GV",
    dest:"Széchenyi-hegy",
    time:Math.floor(Math.random()*600+120),
    delay:0,
    type:"Kisvasút"
  });
 });
}

// ===== MP CSÖKKENTÉS
function tick(){
 departures.forEach(d=>{
  d.time--;
 });
}

// ===== MARKER
let markers=[];

function drawMap(data){

 markers.forEach(m=>map.removeLayer(m));
 markers=[];

 data.forEach(d=>{
  if(d.lat){
    let m=L.circleMarker([d.lat,d.lon],{radius:5,color:"yellow"}).addTo(map);
    markers.push(m);
  }
 });
}

// ===== RENDER
function render(){

 let data=departures.filter(d=>d.time>0);

 if(mode==="near" && userLat){
  data=data.filter(d=>d.lat && dist(userLat,userLon,d.lat,d.lon)<2000);
 }

 let grouped={};

 data.forEach(d=>{
  if(!grouped[d.stop]) grouped[d.stop]=[];
  grouped[d.stop].push(d);
 });

 let html="";

 Object.keys(grouped).forEach(stop=>{

  html+=`<div class="stop"><b>📍 ${stop}</b>`;

  grouped[stop]
   .sort((a,b)=>a.time-b.time)
   .forEach(v=>{

    let m=Math.floor(v.time/60);
    let s=v.time%60;

    let cls="white";
    if(v.delay<0) cls="red";
    if(v.delay>0) cls="blue";

    html+=`
    <div class="row ${cls}">
    ${v.line} | ${m}:${String(s).padStart(2,"0")} |
    (${v.delay}s) | ${v.dest} | ${v.type}
    </div>`;
   });

  html+="</div>";
 });

 document.getElementById("list").innerHTML=html;

 drawMap(data);
}

// ===== LOOP
genData();

setInterval(()=>{
 tick();
 render();
},1000);

render();

</script>

</body>
</html>
