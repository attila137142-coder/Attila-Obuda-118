<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<title>GTFS MENETREND PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body { margin:0; font-family: Arial; display:flex; height:100vh; }
#sidebar { width:380px; padding:10px; border-right:1px solid #ddd; overflow:auto; }
#map { flex:1; }
.stop { padding:6px; border-bottom:1px solid #eee; cursor:pointer; }
.stop:hover { background:#f0f0f0; }
#dropzone { border:2px dashed #888; padding:10px; text-align:center; margin-bottom:10px; }
input { width:100%; padding:8px; margin-bottom:10px; }
</style>
</head>
<body>

<div id="sidebar">
<h3>🚌 MENETREND PRO</h3>
<div id="dropzone">📁 Húzd ide a GTFS ZIP-et</div>
<input type="file" id="fileInput" accept=".zip" />
<input id="search" placeholder="Keresés..." />
<div id="list"></div>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([47.4979,19.0402],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stops=[];
let markers=[];
let stopTimes=[];
let tripsMap={};
let routesMap={};

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(Boolean);
  const header=lines[0].split(',');
  return {lines,header};
}

async function loadZip(file){
  const zip=await JSZip.loadAsync(file);

  // STOPS
  const stopsText=await zip.file("stops.txt").async("string");
  let {lines,header}=parseCSV(stopsText);
  const idIndex=header.indexOf('stop_id');
  const nameIndex=header.indexOf('stop_name');
  const latIndex=header.indexOf('stop_lat');
  const lonIndex=header.indexOf('stop_lon');

  stops=lines.slice(1).map(l=>{
    const c=l.split(',');
    return {id:c[idIndex],name:c[nameIndex],lat:+c[latIndex],lon:+c[lonIndex]};
  });

  // ROUTES
  const routesText=await zip.file("routes.txt").async("string");
  ({lines,header}=parseCSV(routesText));
  const rid=header.indexOf('route_id');
  const short=header.indexOf('route_short_name');

  lines.slice(1).forEach(l=>{
    const c=l.split(',');
    routesMap[c[rid]]=c[short];
  });

  // TRIPS
  const tripsText=await zip.file("trips.txt").async("string");
  ({lines,header}=parseCSV(tripsText));
  const tid=header.indexOf('trip_id');
  const trid=header.indexOf('route_id');
  const headsign=header.indexOf('trip_headsign');

  lines.slice(1).forEach(l=>{
    const c=l.split(',');
    tripsMap[c[tid]]={route:routesMap[c[trid]], headsign:c[headsign]};
  });

  // STOP TIMES
  const stText=await zip.file("stop_times.txt").async("string");
  ({lines,header}=parseCSV(stText));
  const sid=header.indexOf('stop_id');
  const time=header.indexOf('departure_time');
  const trip=header.indexOf('trip_id');

  stopTimes=lines.slice(1).map(l=>{
    const c=l.split(',');
    return {stop:c[sid], time:c[time], trip:c[trip]};
  });

  render();
}

function render(){
  renderList(stops);
  renderMarkers(stops);
}

function renderList(data){
  const list=document.getElementById('list');
  list.innerHTML='';
  data.slice(0,200).forEach(s=>{
    const div=document.createElement('div');
    div.className='stop';
    div.innerHTML=s.name;
    div.onclick=()=>openStop(s);
    list.appendChild(div);
  });
}

function renderMarkers(data){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  data.forEach(s=>{
    const m=L.marker([s.lat,s.lon]).addTo(map).on('click',()=>openStop(s));
    markers.push(m);
  });
}

function openStop(stop){
  const now=new Date();
  const current=now.getHours()*3600+now.getMinutes()*60;

  const times=stopTimes
    .filter(t=>t.stop===stop.id)
    .map(t=>{
      const parts=t.time.split(':');
      const sec=+parts[0]*3600+ +parts[1]*60;
      return {...t,sec};
    })
    .filter(t=>t.sec>=current)
    .sort((a,b)=>a.sec-b.sec)
    .slice(0,10);

  let html=`<b>${stop.name}</b><br><br>`;

  times.forEach(t=>{
    const trip=tripsMap[t.trip];
    if(!trip) return;
    html+=`🚌 <b>${trip.route}</b> → ${trip.headsign} <br>${t.time}<br><br>`;
  });

  L.popup().setLatLng([stop.lat,stop.lon]).setContent(html).openOn(map);
}

// SEARCH
const search=document.getElementById('search');
search.addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  const f=stops.filter(s=>s.name.toLowerCase().includes(q));
  renderList(f);
  renderMarkers(f);
});

// FILE
const fileInput=document.getElementById('fileInput');
const drop=document.getElementById('dropzone');

drop.addEventListener('dragover',e=>e.preventDefault());
drop.addEventListener('drop',e=>{
  e.preventDefault();
  loadZip(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change',e=>loadZip(e.target.files[0]));
</script>

</body>
</html>
