<!DOCTYPE html>
<html>
<head>
  <title>Szabó Attila</title>
  <style>
    body {
      background-color: #f4f6f9;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: auto;
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background-color: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .button:hover {
      background-color: #45a049;
      transform: scale(1.05);
    }

    .section {
      margin-top: 40px;
      text-align: left;
    }

    .section h2 {
      color: #2c3e50;
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Szabó Attila 👋</h1>
    <p>Tanuló webfejlesztő vagyok.</p>
    <p>Ez az első élő weboldalam a Vercelen 🚀</p>

    <a href="mailto:attila137142@gmail.com" class="button">Kapcsolat</a>

    <div class="section">
      <h2>Rólam</h2>
      <p>Érdekel a webfejlesztés és folyamatosan tanulok HTML, CSS és JavaScript témában.</p>
    </div>

    <div class="section">
      <h2>Készségek</h2>
      <p>HTML ✔</p>
      <p>CSS ✔</p>
      <p>GitHub ✔</p>
      <p>Vercel ✔</p>
    </div>

  </div>

</body>
</html>
