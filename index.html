<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>📱 Attila Mobil Navigáció PRO v2</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#000;
 color:#FFD700;
 padding:10px;
}

h1{font-size:18px;text-align:center;}

button{
 width:100%;
 padding:10px;
 margin:5px 0;
 border-radius:10px;
 border:0;
 background:#222;
 color:#FFD700;
}

.card{
 background:#111;
 padding:10px;
 margin-top:10px;
 border-radius:10px;
}

.small{font-size:12px;opacity:0.7;}
.red{color:#ff4d4d;}
.blue{color:#4db8ff;}
.green{color:#4dff88;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>

<h1>📱 Attila Mobil Navigáció PRO v2</h1>

<button onclick="getLocation()">📍 GPS frissítés</button>
<button onclick="loadGTFS()">📦 GTFS betöltés</button>

<div id="status" class="card">⚠️ Indítás...</div>
<div id="debug" class="card small"></div>

<div id="results"></div>

<script>

// ======================
// GLOBAL
// ======================
let stops = [];
let stopTimes = [];
let trips = [];

let tripsMap = {};
let stopTimesMap = {};

let userLat = null;
let userLon = null;

// ======================
// DEBUG LOG
// ======================
function log(msg){
 document.getElementById("debug").innerHTML += msg + "<br>";
 console.log(msg);
}

// ======================
// GPS
// ======================
function getLocation(){

 if(!navigator.geolocation){
  document.getElementById("status").innerText =
   "❌ GPS nem elérhető";
  return;
 }

 navigator.geolocation.getCurrentPosition(pos=>{
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;

  document.getElementById("status").innerText =
   "✔ GPS OK";

  setTimeout(render, 300);

 },err=>{
  document.getElementById("status").innerText =
   "❌ GPS hiba: " + err.message;
 });
}

// ======================
// GTFS BETÖLTÉS
// ======================
async function loadGTFS(){

 try{

  document.getElementById("status").innerText =
   "📦 GTFS betöltés...";

  const res = await fetch("IDE_A_VERCEL_PROXY_URL");

  if(!res.ok){
   throw new Error("HTTP hiba: " + res.status);
  }

  const blob = await res.blob();

  const zip = await JSZip.loadAsync(blob);

  const stopsTxt = await zip.file("stops.txt").async("string");
  const stopTimesTxt = await zip.file("stop_times.txt").async("string");
  const tripsTxt = await zip.file("trips.txt").async("string");

  stops = parseCSV(stopsTxt);
  stopTimes = parseCSV(stopTimesTxt);
  trips = parseCSV(tripsTxt);

  log("Stops: " + stops.length);
  log("StopTimes: " + stopTimes.length);
  log("Trips: " + trips.length);

  // INDEX
  tripsMap = {};
  stopTimesMap = {};

  trips.forEach(t=>{
   tripsMap[t.trip_id] = t;
  });

  stopTimes.forEach(st=>{
   if(!stopTimesMap[st.stop_id]){
    stopTimesMap[st.stop_id] = [];
   }
   stopTimesMap[st.stop_id].push(st);
  });

  document.getElementById("status").innerText =
   "✔ GTFS betöltve: " + stops.length + " megálló";

  render();

 }catch(e){

  document.getElementById("status").innerText =
   "❌ GTFS HIBA: " + e.message;

  log("ERROR: " + e.message);
 }
}

// ======================
// CSV (egyszerű parser)
// ======================
function parseCSV(txt){

 if(!txt){
  log("❌ Üres CSV");
  return [];
 }

 const rows = txt.split("\n").filter(r=>r.trim()!=="");

 const headers = rows[0].split(",");

 return rows.slice(1).map(r=>{
  const cols = r.split(",");
  let obj = {};
  headers.forEach((h,i)=>obj[h]=cols[i]);
  return obj;
 });
}

// ======================
// DISTANCE
// ======================
function haversine(lat1, lon1, lat2, lon2){

 const R = 6371000;
 const dLat = (lat2-lat1)*Math.PI/180;
 const dLon = (lon2-lon1)*Math.PI/180;

 const a =
  Math.sin(dLat/2)**2 +
  Math.cos(lat1*Math.PI/180) *
  Math.cos(lat2*Math.PI/180) *
  Math.sin(dLon/2)**2;

 return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ======================
// RENDER
// ======================
function render(){

 if(!stops.length){
  document.getElementById("results").innerHTML =
   "<div class='card red'>❌ Nincs GTFS adat betöltve</div>";
  return;
 }

 if(!userLat){
  document.getElementById("results").innerHTML =
   "<div class='card blue'>📍 Várakozás GPS-re...</div>";
  return;
 }

 let nearby = stops.map(s=>{

  const lat = parseFloat(s.stop_lat || 0);
  const lon = parseFloat(s.stop_lon || 0);

  return {
   ...s,
   dist: haversine(userLat,userLon,lat,lon)
  };

 }).sort((a,b)=>a.dist-b.dist).slice(0,10);

 let html = "";

 nearby.forEach(s=>{

  let times = stopTimesMap[s.stop_id] || [];

  let next = [];

  for(let t of times.slice(0,25)){

   const trip = tripsMap[t.trip_id];
   if(!trip) continue;

   let [h,m] = (t.arrival_time||"0:0").split(":").map(Number);
   h = h % 24;

   const now = new Date();
   const min =
    (h*60+m) - (now.getHours()*60 + now.getMinutes());

   if(min < 0 || min > 180) continue;

   next.push({
    line: trip.route_id,
    time: min
   });
  }

  next.sort((a,b)=>a.time-b.time);

  html += `
  <div class="card">
   🚏 <b>${s.stop_name}</b><br>
   📏 ${(s.dist/1000).toFixed(2)} km | ${Math.round(s.dist)} m<br>
  `;

  next.slice(0,5).forEach(n=>{
   let c = "";
   if(n.time < 2) c="red";
   else if(n.time > 10) c="blue";

   html += `<div class="${c}">
    🚍 ${n.line} | ${n.time} perc
   </div>`;
  });

  html += "</div>";
 });

 document.getElementById("results").innerHTML = html;
}

// auto refresh
setInterval(render, 30000);

</script>

</body>
</html>
