<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ROXY TEST</title>
</head>

<body>
  <h1>ROXY TRANSIT CORE</h1>

  <button onclick="runApp()">GTFS indítás</button>

  <pre id="out"></pre>

  <script type="module">
    import JSZip from "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js";

    class RoxyGTFSLoader {
      async load() {
        const res = await fetch("https://bkk.hu/gtfs/budapest_gtfs.zip");
        const buf = await res.arrayBuffer();
        return await JSZip.loadAsync(buf);
      }
    }

    window.runApp = async function () {
      const out = document.getElementById("out");
      out.textContent = "Loading...";

      const loader = new RoxyGTFSLoader();
      const zip = await loader.load();

      out.textContent = "ZIP OK\nFiles: " + Object.keys(zip.files).length;
    }
  </script>
</body>
</html>
