<script>

let mode = "normal";

const STOPS = [
{name:"Békásmegyer HÉV", dist:300},
{name:"Pünkösdfürdő", dist:800},
{name:"Csillaghegy", dist:1200},
{name:"Rómaifürdő", dist:1800},
{name:"Aquincum", dist:2200}
];

// 👉 MENETREND (minta)
const TIMES = {
"Békásmegyer HÉV": ["12:05","12:20","12:35"],
"Pünkösdfürdő": ["12:10","12:25","12:40"],
"Csillaghegy": ["12:15","12:30","12:45"],
"Rómaifürdő": ["12:18","12:33","12:48"],
"Aquincum": ["12:22","12:37","12:52"]
};

function setMode(m){
mode = m;
render();
}

function render(){
const list = document.getElementById("list");
list.innerHTML = "";

STOPS.forEach(s => {
let div = document.createElement("div");
div.className = "stop";

if(mode=="green") div.style.background="lightgreen";
if(mode=="red") div.style.background="salmon";

div.innerHTML = `
<b>${s.name}</b><br>
Távolság: ${s.dist} m
`;

div.onclick = () => showTimes(s.name);

list.appendChild(div);
});
}

// 👉 EZ AZ ÚJ RÉSZ
function showTimes(stopName){
const list = document.getElementById("list");
list.innerHTML = "";

let title = document.createElement("h3");
title.innerText = stopName;
list.appendChild(title);

TIMES[stopName].forEach(t => {
let d = document.createElement("div");
d.className = "stop";
d.innerText = "Indul: " + t;
list.appendChild(d);
});

let back = document.createElement("button");
back.innerText = "⬅️ Vissza";
back.onclick = render;
list.appendChild(back);
}

render();

</script>
