<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila PRO NAV v1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;background:#000;color:#0f0;font-family:Arial}
#map{height:60vh;}
#panel{padding:10px}
button{padding:10px;margin:5px;background:#111;color:#0f0;border:1px solid #0f0}
input{padding:10px;width:70%}
.card{background:#111;margin-top:10px;padding:10px;border-radius:10px}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
<button onclick="getLocation()">📍 Helyzet</button>
<input id="search" placeholder="Keresés...">
<button onclick="search()">🔎</button>

<div id="info"></div>
<div id="stops"></div>
</div>

<script>

let map = L.map('map').setView([47.5,19.0],13);

let osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
let topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
let rail = L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png',{opacity:1});

osm.addTo(map);

L.control.layers({
 "Alap": osm,
 "Topo": topo
},{
 "Vasút": rail
}).addTo(map);

let marker;
let userLat, userLon;

let stopLayer = L.layerGroup().addTo(map);
let routeLayer = L.layerGroup().addTo(map);

// ==== MEGÁLLÓK (rövid lista – bővíthető)
let stops = [
{name:"Békásmegyer HÉV",lat:47.598091,lon:19.054599},
{name:"Nád utca",lat:47.594072,lon:19.048469},
{name:"Flórián tér",lat:47.542896,lon:19.042252},
{name:"Batthyány tér",lat:47.506002,lon:19.039456},
{name:"Pomáz HÉV",lat:47.642749,lon:19.032657},
{name:"Szentendre",lat:47.661038,lon:19.075607}
];

// ===== GPS
async function getLocation(){

 navigator.geolocation.getCurrentPosition(async pos=>{

  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;

  if(marker) map.removeLayer(marker);

  marker = L.circleMarker([userLat,userLon],{
   radius:8,color:'red'
  }).addTo(map);

  map.setView([userLat,userLon],15);

  let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`);
  let d = await res.json();
  let a = d.address || {};

  document.getElementById("info").innerHTML=`
  🌍 ${a.country||""}<br>
  🏙️ ${a.city||a.town||""}<br>
  🛣️ ${a.road||""} ${a.house_number||""}<br>
  🎯 ±${Math.round(pos.coords.accuracy)} m
  `;

  showStops();
 });
}

// ===== KÖZÚTI ÚTVONAL (VALÓDI)
async function routeTo(lat,lon){

 routeLayer.clearLayers();

 let url = `https://router.project-osrm.org/route/v1/driving/${userLon},${userLat};${lon},${lat}?overview=full&geometries=geojson`;

 let res = await fetch(url);
 let data = await res.json();

 let route = data.routes[0];

 let coords = route.geometry.coordinates.map(c=>[c[1],c[0]]);

 L.polyline(coords,{color:'lime'}).addTo(routeLayer);

 let dist = (route.distance/1000).toFixed(2);
 let time = Math.round(route.duration/60);

 alert(`🚗 ${dist} km | ⏱ ${time} perc`);
}

// ===== MEGÁLLÓK
function showStops(){
function showDepartures(stopName){

 let stop = GTFS.stops.find(s=>s.stop_name === stopName);

 if(!stop){
  alert("Nincs GTFS megálló");
  return;
 }

 let now = new Date();
 let nowSec = now.getHours()*3600 + now.getMinutes()*60;

 let times = GTFS.stopTimes
  .filter(t=>t.stop_id === stop.stop_id)
  .map(t=>{
    let parts = t.departure_time.split(":");
    let sec = parts[0]*3600 + parts[1]*60;
    return {...t,sec};
  })
  .filter(t=>t.sec > nowSec)
  .sort((a,b)=>a.sec-b.sec)
  .slice(0,5);

 let html = `<h3>🕒 ${stopName}</h3>`;

 times.forEach(t=>{

  let min = Math.round((t.sec - nowSec)/60);

  let trip = GTFS.trips.find(tr=>tr.trip_id === t.trip_id);

  html+=`
  <div>
   🚍 ${trip.route_id || "?"}
   → ${trip.trip_headsign || ""}
   | ${min} perc
  </div>
  `;
 });

 document.getElementById("stops").innerHTML = html;
}
 
 stopLayer.clearLayers();

 let arr = stops.map(s=>{
  let d = map.distance([userLat,userLon],[s.lat,s.lon]);
  return {...s,dist:d};
 });

 arr.sort((a,b)=>a.dist-b.dist);

 let html="<h3>🚏 Megállók</h3>";

 arr.slice(0,10).forEach(s=>{

  let air = s.dist<1000 ? Math.round(s.dist)+" m" : (s.dist/1000).toFixed(2)+" km";

  html+=`
  <div class="card">
   <b>${s.name}</b><br>
   📏 ${air}<br>
   <button onclick="routeTo(${s.lat},${s.lon})">Útvonal</button>
  </div>
  `;

  L.marker([s.lat,s.lon]).addTo(stopLayer)
   .bindPopup(`<b>${s.name}</b><br><button onclick="routeTo(${s.lat},${s.lon})">Menj ide</button>`);
 });

 document.getElementById("stops").innerHTML = html;
}

// ===== OKOS KERESŐ
async function search(){

 let q = document.getElementById("search").value;

 let found = stops.find(s=>s.name.toLowerCase().includes(q.toLowerCase()));

 if(found){
  map.setView([found.lat,found.lon],16);
  L.marker([found.lat,found.lon]).addTo(stopLayer)
   .bindPopup(found.name).openPopup();
  return;
 }

 let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
 let data = await res.json();

 if(data.length>0){

  let p = data[0];

  map.setView([p.lat,p.lon],16);

  L.marker([p.lat,p.lon]).addTo(stopLayer)
   .bindPopup(p.display_name).openPopup();

 }else{
  alert("Nincs találat");
 }
}

</script>

</body>
</html>
