<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Budapest Transit Brain V2 LIVE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

#wrap{
display:grid;
grid-template-columns:2fr 1fr;
height:100vh;
}

#map{height:100%;}

.panel{
background:#111827;
padding:10px;
overflow:auto;
}

.card{
background:#0f172a;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #243244;
font-size:13px;
}

input{
width:100%;
padding:8px;
margin-bottom:8px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

h3{color:#38bdf8;}
</style>
</head>

<body>

<div id="wrap">

<div id="map"></div>

<div class="panel">

<h3>🚏 A → B útvonal</h3>

<input id="from" placeholder="Honnan? pl. Deák tér">
<input id="to" placeholder="Hova? pl. Kelenföld">

<button onclick="route()">🚆 Útvonal számítás</button>

<h3>🚌 Élő járművek</h3>
<div id="vehicles"></div>

<h3>📍 Eredmény</h3>
<div id="result">Várakozás...</div>

</div>

</div>

<script>

/* ================= MAP ================= */

let map = L.map('map').setView([47.4979,19.0402], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:"OSM"
}).addTo(map);

/* ================= STOPS ================= */

let stops = [
{name:"Deák tér", lat:47.4979, lon:19.0540},
{name:"Blaha", lat:47.4963, lon:19.0700},
{name:"Kelenföld", lat:47.4649, lon:19.0193},
{name:"Nyugati", lat:47.5101, lon:19.0560},
{name:"Népliget", lat:47.4760, lon:19.0990}
];

/* ================= VEHICLES (LIVE SIM CORE) ================= */

let vehicles = [
{route:"M2", lat:47.4979, lon:19.04, dir:0.0003},
{route:"4-6", lat:47.4950, lon:19.06, dir:-0.0002},
{route:"M4", lat:47.4650, lon:19.02, dir:0.00025}
];

let markers = [];

/* ================= DRAW STOPS ================= */

stops.forEach(s=>{
 L.circleMarker([s.lat,s.lon],{
  radius:5,
  color:"#22c55e"
 }).addTo(map).bindPopup(s.name);
});

/* ================= LIVE VEHICLE ENGINE ================= */

function drawVehicles(){

 markers.forEach(m=>map.removeLayer(m));
 markers = [];

 vehicles.forEach(v=>{

  v.lat += v.dir;

  let marker = L.circleMarker([v.lat,v.lon],{
   radius:6,
   color:"red"
  }).addTo(map).bindPopup("🚌 "+v.route);

  markers.push(marker);

 });

 document.getElementById("vehicles").innerHTML =
 vehicles.map(v=>`
  <div class="card">
   🚌 ${v.route}<br>
   📍 ${v.lat.toFixed(4)}, ${v.lon.toFixed(4)}
  </div>
 `).join("");

}

/* ================= ROUTE ENGINE ================= */

function findStop(name){
 return stops.find(s=>s.name.toLowerCase()===name.toLowerCase());
}

function route(){

 let from = findStop(document.getElementById("from").value);
 let to = findStop(document.getElementById("to").value);

 if(!from || !to){
  document.getElementById("result").innerHTML="❌ nincs ilyen megálló";
  return;
 }

 let dist = Math.hypot(
  from.lat-to.lat,
  from.lon-to.lon
 ) * 111;

 document.getElementById("result").innerHTML = `
 <div class="card">
  🚏 Indulás: ${from.name}<br>
  🚏 Érkezés: ${to.name}
 </div>

 <div class="card">
  📏 Távolság: ${dist.toFixed(2)} km
 </div>

 <div class="card">
  🧠 Ajánlás: ${dist < 3 ? "gyaloglás" : "tömegközlekedés"}
 </div>
 `;
}

/* ================= LIVE LOOP ================= */

setInterval(()=>{
 drawVehicles();
},1500);

drawVehicles();

</script>

</body>
</html>
