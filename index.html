<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY V12.1 ZERO ERROR BUILD</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000c;
 color:#0f0;
 padding:10px;
 width:380px;
 border:1px solid #0f0;
 max-height:90vh;
 overflow:auto;
}

.stop{
 cursor:pointer;
 padding:6px;
 margin-bottom:5px;
 border-bottom:1px solid #0f0;
}
.stop:hover{background:#0f0;color:#000}

.small{font-size:12px;opacity:0.8}
</style>
</head>

<body>

<div id="panel">
<h3>🚆 ROXY V12.1 ZERO ERROR</h3>
<div id="info">📍 indulás...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map=L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stopLayer=L.layerGroup().addTo(map);

// ================= USER =================
let userLat=null,userLon=null;
let userAddress="";

// ================= DIST =================
function getDistance(lat1,lon1,lat2,lon2){
 let R=6371000;
 let dLat=(lat2-lat1)*Math.PI/180;
 let dLon=(lon2-lon1)*Math.PI/180;

 let a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

 return Math.round(2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// ================= ADDRESS =================
async function getAddress(lat,lon){
 try{
  let res=await fetch(
   `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
  );
  let d=await res.json();
  let a=d.address;
  return `${a.city||a.town||a.village||""} ${a.road||""} ${a.house_number||""}`;
 }catch(e){
  return "nincs cím";
 }
}

// ================= GPS =================
navigator.geolocation.getCurrentPosition(async pos=>{
 userLat=pos.coords.latitude;
 userLon=pos.coords.longitude;
 userAddress=await getAddress(userLat,userLon);

 document.getElementById("info").innerHTML=`
 <b>📍 Saját hely</b><br>${userAddress}<br><br>Térképre kattints 🚏
 `;
});

// ================= OVERPASS FIX =================
async function fetchOverpass(query){
 let urls=[
  "https://overpass-api.de/api/interpreter",
  "https://lz4.overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter"
 ];

 for(let url of urls){
  try{
   let res=await fetch(url,{method:"POST",body:query});
   if(res.ok) return await res.json();
  }catch(e){}
 }

 throw "Overpass error";
}

// ================= GTFS SAFE =================
let GTFSStops={};
let GTFSTimes=[];

function parseCSV(line){
 let r=[],c="",q=false;
 for(let ch of line){
  if(ch=='"') q=!q;
  else if(ch==','&&!q){r.push(c);c=""}
  else c+=ch;
 }
 r.push(c);
 return r;
}

async function loadStops(){
 try{
  let res=await fetch("./stops.txt");
  let text=await res.text();
  let lines=text.split("\n");

  for(let i=1;i<lines.length;i++){
   let c=parseCSV(lines[i]);
   if(c.length<5) continue;

   GTFSStops[c[0]]={
    name:c[2],
    lat:parseFloat(c[3]),
    lon:parseFloat(c[4])
   };
  }
 }catch(e){
  console.log("GTFS stops hiányzik (404)");
 }
}

async function loadTimes(){
 try{
  let res=await fetch("./stop_times.txt");
  let text=await res.text();
  let lines=text.split("\n");

  for(let i=1;i<lines.length;i++){
   let c=parseCSV(lines[i]);
   if(c.length<4) continue;

   GTFSTimes.push({
    dep:c[2],
    stop_id:c[3]
   });
  }
 }catch(e){
  console.log("GTFS times hiányzik (404)");
 }
}

// ================= MASTER =================
const MASTER_STOPS=[
 {name:"Békásmegyer H",lat:47.5951,lon:19.0452,gtfs:"BKK_1001"},
 {name:"Nád utca",lat:47.5002,lon:19.0301,gtfs:"BKK_2002"}
];

// ================= MASTER MATCH =================
function findMaster(lat,lon){
 let best=null,bestDist=999999;

 for(let s of MASTER_STOPS){
  let d=getDistance(lat,lon,s.lat,s.lon);
  if(d<bestDist){bestDist=d;best=s;}
 }

 return {stop:best,dist:bestDist};
}

// ================= DECISION =================
function choose(osm,master){
 if(master.stop && master.dist<150){
  return {type:"MASTER",data:master.stop};
 }
 return {type:"OSM",data:osm};
}

// ================= CLICK DEBUG =================
map.on("click",async e=>{

 console.log("CLICK OK",e.latlng);

 let lat=e.latlng.lat;
 let lon=e.latlng.lng;

 let master=findMaster(lat,lon);

 let query=`
 [out:json];
 (
  node(around:600,${lat},${lon})["highway"="bus_stop"];
  node(around:600,${lat},${lon})["railway"];
 );
 out;
 `;

 let osm=await fetchOverpass(query);

 stopLayer.clearLayers();

 let html="<b>🚏 DISPATCH</b><br><br>";

 osm.elements.forEach(s=>{

  let name=s.tags?.name;
  if(!name) return;

  let chosen=choose(s,master);
  let dist=getDistance(lat,lon,s.lat,s.lon);

  html+=`
  <div class="stop"
  onclick="selectStop('${name}',${s.lat},${s.lon},
  '${chosen.type==="MASTER"?chosen.data.gtfs:""}')">

  🚏 ${name}<br>
  📏 ${dist} m<br>
  🧠 ${chosen.type}

  </div>`;
 });

 document.getElementById("info").innerHTML=html;
});

// ================= SELECT =================
function selectStop(name,lat,lon,gtfs){

 map.setView([lat,lon],16);

 let times=[];

 if(gtfs){
  let now=new Date();
  let cur=now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');

  times=GTFSTimes
  .filter(t=>t.stop_id===gtfs && t.dep>=cur)
  .map(t=>t.dep)
  .slice(0,10);
 }

 let html=`<b>🚏 ${name}</b><br><br>`;
 html+=`📍 ${userAddress}<br><br>`;
 html+=`🆔 ${gtfs||"OSM"}<br><br>`;

 html+="<b>🕒 indulások:</b><br>";

 if(!gtfs){
  html+="⚠️ OSM-only";
 }
 else if(times.length===0){
  html+="❌ nincs adat";
 }
 else{
  times.forEach(t=>html+=`🕒 ${t}<br>`);
 }

 document.getElementById("info").innerHTML=html;
});

// ================= INIT =================
window.onload=async()=>{
 await loadStops();
 await loadTimes();
};

</script>

</body>
</html>
