<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>GTFS Megálló menetrend</title>
<style>
body { font-family: Arial; padding: 10px; }
button { padding: 6px 10px; margin: 5px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px;}
td, th { border: 1px solid #000; padding: 4px; text-align: center;}
th { background: #ddd; }
</style>
</head>
<body>

<h2>Megálló menetrend (egyszerű)</h2>

<input type="file" id="zipFile">
<br>
<input type="text" id="stopName" placeholder="Megálló neve (pl. Hűvösvölgy)">
<button onclick="loadGTFS()">Betöltés</button>

<table id="table">
<tr><th>Idő</th><th>Trip</th><th>Típus</th></tr>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script>
let stopTimes = [], stops = [];

async function loadGTFS() {
  const file = document.getElementById('zipFile').files[0];
  const zip = await JSZip.loadAsync(file);

  stops = await parseCSV(await zip.file("stops.txt").async("string"));
  stopTimes = await parseCSV(await zip.file("stop_times.txt").async("string"));

  render();
}

function parseCSV(text) {
  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows[0];
  return rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h,i)=>obj[h]=r[i]);
    return obj;
  });
}

function render() {
  const name = document.getElementById('stopName').value.toLowerCase();
  const stop = stops.find(s => s.stop_name.toLowerCase().includes(name));

  if (!stop) {
    alert("Nincs ilyen megálló!");
    return;
  }

  let list = stopTimes
    .filter(st => st.stop_id === stop.stop_id)
    .map(st => ({
      time: st.departure_time,
      trip: st.trip_id,
      type: "INDUL"
    }));

  list.sort((a,b)=> a.time.localeCompare(b.time));

  const table = document.getElementById("table");
  table.innerHTML = "<tr><th>Idő</th><th>Trip</th><th>Típus</th></tr>";

  list.forEach(r=>{
    table.innerHTML += `<tr>
      <td>${r.time}</td>
      <td>${r.trip}</td>
      <td>${r.type}</td>
    </tr>`;
  });
}
</script>

</body>
</html>
