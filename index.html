<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NAVIGATION ENGINE v8</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; background:#0f0f0f; color:#fff; }
#map { height: 55vh; }

.container { display:flex; }
.left { width:40%; padding:10px; }
.right { width:60%; padding:10px; background:#151515; }

.box { background:#1e1e1e; padding:10px; border-radius:8px; }
.item { padding:6px; border-bottom:1px solid #333; cursor:pointer; }
.item:hover { background:#222; }

button { margin:3px; padding:8px; border:0; border-radius:6px; cursor:pointer; }
</style>
</head>

<body>

<div id="map"></div>

<div class="container">

<div class="left">

<button onclick="loadEngine()">📦 LOAD v8 CORE</button>
<button onclick="analyzeRoute()">🧠 ROUTE ANALYZER</button>

<div id="list" class="box"></div>

</div>

<div class="right box" id="detail">
📍 válassz pontot
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([47.3,19.3],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let nodes = [];
let selected = null;

// ---------------- CORE LOAD ----------------
function loadEngine(){

nodes = [

/* ===== BKK + HÉV ===== */
{id:"NAD", name:"Nád utca", type:"bkk", lat:47.594072, lng:19.048469},
{id:"FLORIAN", name:"Flórián tér", type:"bkk", lat:47.542896, lng:19.042252},
{id:"BME", name:"Békásmegyer HÉV", type:"hev", lat:47.598091, lng:19.054599},
{id:"SZENT", name:"Szentendre", type:"hev", lat:47.661038, lng:19.075607},

/* ===== TÚRA HÁLÓ (PILIS / BÖRZSÖNY) ===== */
{id:"DOBOKO", name:"Dobogókő", type:"tura", lat:47.719118, lng:18.897577, elev:699},
{id:"CSOB", name:"Csobánka", type:"tura", lat:47.6500, lng:18.9600, elev:300},
{id:"CSOVANYOS", name:"Csóványos", type:"tura", lat:47.94908, lng:18.9483, elev:938},

/* ===== ERDEI VASUT ===== */
{id:"KIRALYRET", name:"Királyrét", type:"forest", lat:47.9100, lng:18.9730, elev:350}

];

render();
}

// ---------------- RENDER ----------------
function render(){

document.getElementById("list").innerHTML =
nodes.map(n=>`
  <div class="item" onclick="selectNode('${n.id}')">
    🚏 ${n.name} <br>
    <small>${n.type}</small>
  </div>
`).join("");

}

// ---------------- SELECT NODE ----------------
function selectNode(id){

selected = nodes.find(n=>n.id===id);

let neighbors = getNeighbors(selected);

document.getElementById("detail").innerHTML = `
<h3>${selected.name}</h3>

📍 ${selected.lat}, ${selected.lng}<br><br>

⛰ Eleváció: ${selected.elev || "n/a"} m<br><br>

🧭 Szomszédok:<br>
${neighbors.map(n=>`
  ➜ ${n.name}<br>
  📏 ${Math.round(n.dist)} m<br>
  ⛰ lejtés: ${n.slope}%<br><br>
`).join("")}
`;

}

// ---------------- ROUTE ANALYZER ----------------
function analyzeRoute(){

if(!selected){
  alert("válassz pontot");
  return;
}

let res = nodes.map(n=>{
  let d = hav(selected.lat,selected.lng,n.lat,n.lng);
  let slope = calcSlope(selected,n,d);

  return {
    name:n.name,
    dist:d,
    slope:slope
  };
}).sort((a,b)=>a.dist-b.dist);

document.getElementById("detail").innerHTML = `
<h3>🧠 ROUTE ANALYSIS</h3>

${res.slice(0,8).map(r=>`
  ➜ ${r.name}<br>
  📏 ${Math.round(r.dist)} m<br>
  ⛰ lejtés: ${r.slope}%<br><br>
`).join("")}
`;

}

// ---------------- NEIGHBORS ----------------
function getNeighbors(a){

return nodes
.filter(n=>n.id!==a.id)
.map(n=>{

let d = hav(a.lat,a.lng,n.lat,n.lng);
let slope = calcSlope(a,n,d);

return {name:n.name,dist:d,slope};
})
.sort((a,b)=>a.dist-b.dist)
.slice(0,3);

}

// ---------------- SLOPE ----------------
function calcSlope(a,b,dist){

if(!a.elev || !b.elev) return 0;

return ((b.elev - a.elev) / dist) * 10000; // skálázott %

}

// ---------------- DISTANCE ----------------
function hav(lat1,lon1,lat2,lon2){

const R=6371000;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// INIT
loadEngine();

</script>

</body>
</html>
