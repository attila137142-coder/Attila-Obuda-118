<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Transit Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; display:flex; }
#map { height:100vh; width:75%; }
#sidebar {
  width:25%;
  height:100vh;
  overflow:auto;
  background:#f4f4f4;
  padding:10px;
}
.stop {
  padding:5px;
  cursor:pointer;
  border-bottom:1px solid #ccc;
}
.stop:hover { background:#ddd; }

.controls {
  position:absolute;
  top:10px;
  left:10px;
  z-index:1000;
  background:white;
  padding:10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
<h3>🚏 Megállók</h3>
<div id="stopList"></div>
</div>

<div class="controls">
<button onclick="setLayer('osm')">Normál</button>
<button onclick="setLayer('sat')">Műhold</button>
<button onclick="locateMe()">📍 Hol vagyok</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MAP
var map = L.map('map').setView([47.4979, 19.0402], 13);

// LAYERS
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
var sat = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');

osm.addTo(map);

function setLayer(type){
  map.eachLayer(layer => map.removeLayer(layer));
  if(type === "osm") osm.addTo(map);
  if(type === "sat") sat.addTo(map);
}

// LAYERS GROUP
var stopLayer = L.layerGroup().addTo(map);
var vehicleLayer = L.layerGroup().addTo(map);

var stopList = document.getElementById("stopList");

// 📍 HOL VAGYOK
function locateMe(){
  map.locate({setView:true, maxZoom:16});

  map.on('locationfound', function(e){
    L.marker(e.latlng)
      .addTo(map)
      .bindPopup("Itt vagy")
      .openPopup();
  });
}
