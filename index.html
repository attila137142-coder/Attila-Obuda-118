
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚏 Attila Közlekedés PRO</title>

<style>
body{background:#000;color:#FFD700;font-family:Arial;padding:10px;}
h2{text-align:center;}
button{padding:10px;margin:5px;border-radius:10px;}
.card{background:#111;padding:10px;margin-top:10px;border-radius:10px;}
.small{font-size:12px;opacity:0.7;}
.red{color:#ff4d4d;}
.blue{color:#4db8ff;}
</style>
</head>

<body>

<h2>🚏 2 km megállók</h2>

<button onclick="start()">▶ Indítás</button>

<div id="status">Várakozás...</div>
<div id="list"></div>

<script>

// ===== TELJES MEGÁLLÓ LISTA (rövidítve példa – IDE MÁSOLD BE A 45-ÖT!)
const STOPS = [
{name:"Békásmegyer HÉV-állomás",lat:47.598091,lon:19.054599},
{name:"Nád utca",lat:47.594072,lon:19.048469},
{name:"Gulácsy Lajos utca",lat:47.602562,lon:19.048229},
{name:"Flórián tér",lat:47.542896,lon:19.042252},
{name:"Lakás",lat:47.594304,lon:19.048770}
];

// ===== DEMO MENETREND (később cseréljük valósra)
const TIMES = ["05:10","05:20","05:30","05:40","05:50","06:00","06:10","06:20","06:30","06:40"];

let userLat,userLon,userAcc;

// ===== GPS
function getLocation(){
 return new Promise((res,rej)=>{
  navigator.geolocation.getCurrentPosition(p=>{
   userLat=p.coords.latitude;
   userLon=p.coords.longitude;
   userAcc=p.coords.accuracy;
   res();
  },rej);
 });
}

// ===== TÁVOLSÁG
function dist(a,b,c,d){
 const R=6371e3;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
 Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== IDŐ
function getMin(t){
 const now=new Date();
 const [h,m]=t.split(":").map(Number);
 return (h*60+m)-(now.getHours()*60+now.getMinutes());
}

// ===== CÍM (SZÉTBONTVA!)
async function getAddress(lat,lon){
 try{
  const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
  const data = await res.json();
  const a = data.address || {};

  return {
   country: a.country || "",
   city: a.city || a.town || a.village || "",
   road: a.road || "",
   house: a.house_number || ""
  };

 }catch{
  return {country:"",city:"",road:"",house:""};
 }
}

// ===== RENDER
async function render(){

 let near = STOPS.map(s=>{
  return {...s,d:dist(userLat,userLon,s.lat,s.lon)};
 })
 .filter(s=>s.d<=2000)
 .sort((a,b)=>a.d-b.d);

 let addr = await getAddress(userLat,userLon);

 let html = `
 <div class="card">
 📍 Saját hely<br>
 🌐 ${userLat.toFixed(6)}, ${userLon.toFixed(6)}<br>
 🎯 Pontosság: ±${Math.round(userAcc)} m<br>
 🏠 ${addr.country} → ${addr.city} → ${addr.road} ${addr.house}
 </div>
 `;

 near.forEach(s=>{

  html+=`<div class="card">
  🚏 ${s.name}<br>
  📏 ${Math.round(s.d)} m (${(s.d/1000).toFixed(2)} km)<br>`;

  TIMES.forEach(t=>{
   let min=getMin(t);
   if(min<0||min>60) return;

   let c="";
   if(min<2)c="red";
   else if(min>10)c="blue";

   html+=`<div class="${c}">
   🚍 ${t} (${min} perc)
   </div>`;
  });

  html+="</div>";
 });

 document.getElementById("list").innerHTML=html;
}

// ===== START
async function start(){
 try{
  await getLocation();
  document.getElementById("status").innerText="✔ GPS OK";
  render();
 }catch(e){
  document.getElementById("status").innerText="Hiba: "+e.message;
 }
}

</script>

</body>
</html>
