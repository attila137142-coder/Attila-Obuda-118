<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>PRO NAV + SRTM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#panel {
 position:absolute;
 top:10px;
 left:10px;
 background:white;
 padding:10px;
 width:360px;
 z-index:1000;
 max-height:90vh;
 overflow:auto;
}

canvas { width:100%; height:120px; }
button { width:100%; margin-top:5px; }
</style>
</head>

<body>

<div id="panel">

<h3>📍 Hely</h3>
<div id="loc"></div>

<h3>🗺️ Térképek</h3>
<button onclick="setOSM()">Alap</button>
<button onclick="setTopo()">Turista (Topo)</button>
<button onclick="setRail()">Vasút</button>

<h3>🔎 Keresés</h3>
<input id="search">
<button onclick="search()">Keres</button>
<button onclick="route()">🚗 Útvonal + szint</button>

<h3>📊 Szintprofil</h3>
<canvas id="chart"></canvas>

<h3>📍 POI</h3>
<div id="poi"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
let map = L.map('map').setView([47.5,19.04],13);

let osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
let topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
let rail = L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png');

osm.addTo(map);

function setOSM(){ map.eachLayer(l=>map.removeLayer(l)); osm.addTo(map); }
function setTopo(){ map.eachLayer(l=>map.removeLayer(l)); topo.addTo(map); }
function setRail(){ map.eachLayer(l=>map.removeLayer(l)); rail.addTo(map); }

let user, target;
let routeLayer = L.layerGroup().addTo(map);

// HELY
navigator.geolocation.getCurrentPosition(pos=>{

 user = [pos.coords.latitude,pos.coords.longitude];

 map.setView(user,14);
 L.marker(user).addTo(map);

});

// KERESÉS
async function search(){

 let q = document.getElementById("search").value;

 let r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
 let d = await r.json();

 target = [parseFloat(d[0].lat),parseFloat(d[0].lon)];

 map.setView(target,15);
 L.marker(target).addTo(map);

}

// 🚗 ÚTVONAL + SRTM
async function route(){

 if(!target) return;

 let url = `https://router.project-osrm.org/route/v1/driving/${user[1]},${user[0]};${target[1]},${target[0]}?overview=full&geometries=geojson`;

 let r = await fetch(url);
 let data = await r.json();

 let coords = data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);

 routeLayer.clearLayers();
 L.polyline(coords,{color:"blue"}).addTo(routeLayer);

 let elevations = [];

 // 🌄 SRTM API (Open Elevation)
 for(let c of coords.slice(0,30)){ // limit API miatt

  let e = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${c[0]},${c[1]}`);
  let d = await e.json();

  elevations.push(d.results[0].elevation);

 }

 drawChart(elevations);

}

// 📊 GRAFIKON
function drawChart(data){

 let canvas = document.getElementById("chart");
 let ctx = canvas.getContext("2d");

 ctx.clearRect(0,0,400,200);

 let max = Math.max(...data);
 let min = Math.min(...data);

 ctx.beginPath();

 data.forEach((v,i)=>{

  let x = i*10;
  let y = 100 - ((v-min)/(max-min))*100;

  ctx.lineTo(x,y+100);

 });

 ctx.strokeStyle="green";
 ctx.stroke();

}

</script>

</body>
</html>
