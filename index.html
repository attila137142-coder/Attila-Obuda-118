<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila GPS PRO NAVI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; background:#111; color:#fff; }
#map { height: 60vh; }
.panel { padding:10px; }
button { margin:3px; padding:8px; border:0; border-radius:6px; cursor:pointer; }
.box { background:#1e1e1e; padding:10px; border-radius:8px; font-size:13px; }
</style>
</head>

<body>

<div class="panel">

<button onclick="setMode('gps')">🧭 GPS</button>
<button onclick="setMode('tura')">🥾 Túra</button>
<button onclick="toggleElevation()">⛰️ Magasság váltás</button>
<button onclick="loadPOI()">📌 POI</button>
<button onclick="loadRail()">🚆 Vasút</button>
<button onclick="resetTrack()">🔄 Reset</button>

<div id="info" class="box">Indítás...</div>

</div>

<div id="map"></div>

<script>

let map = L.map('map').setView([47.4979,19.0402],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let mode="gps";
let track=[];
let marker, polyline;

let elevationMode = "gps"; // gps / api

let poiLayer = L.layerGroup().addTo(map);

let heading = 0;
window.addEventListener("deviceorientation", e=>{
  if(e.alpha) heading = Math.round(e.alpha);
});

// -------- MODE
function setMode(m){
  mode=m;
}

// -------- ELEV SWITCH
function toggleElevation(){
  elevationMode = elevationMode==="gps" ? "api" : "gps";
}

// -------- DIST
function dist(a,b,c,d){
  let R=6371e3;
  let φ1=a*Math.PI/180;
  let φ2=c*Math.PI/180;
  let Δφ=(c-a)*Math.PI/180;
  let Δλ=(d-b)*Math.PI/180;

  let x=Math.sin(Δφ/2)**2+
    Math.cos(φ1)*Math.cos(φ2)*
    Math.sin(Δλ/2)**2;

  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// -------- SEGMENT
function calcSeg(a,b){
  let d = dist(a.lat,a.lng,b.lat,b.lng);
  let h = (b.ele||0)-(a.ele||0);
  let slope = d>0 ? (h/d)*100 : 0;

  return {
    d: Math.round(d),
    h: Math.round(h),
    s: slope.toFixed(1)
  };
}

// -------- API HEIGHT
async function getElevation(lat,lng){
  try{
    let r = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
    let d = await r.json();
    return d.results[0].elevation;
  }catch(e){
    return 0;
  }
}

// -------- GPS
function startGPS(){
  navigator.geolocation.watchPosition(async pos=>{

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    let ele = pos.coords.altitude || 0;

    // API felülírás
    if(elevationMode==="api"){
      ele = await getElevation(lat,lng);
    }

    track.push({lat,lng,ele});
    if(track.length>100) track.shift();

    if(!marker){
      marker = L.marker([lat,lng]).addTo(map);
      map.setView([lat,lng],15);
    } else {
      marker.setLatLng([lat,lng]);
      map.panTo([lat,lng]);
    }

    if(polyline) polyline.setLatLngs(track.map(p=>[p.lat,p.lng]));
    else polyline = L.polyline(track.map(p=>[p.lat,p.lng]),{color:'red'}).addTo(map);

    renderUI(lat,lng);

  },err=>console.log(err),{enableHighAccuracy:true});
}

// -------- UI
function renderUI(lat,lng){

  let seg = "";

  if(track.length>1){
    let a = track[track.length-2];
    let b = track[track.length-1];
    let s = calcSeg(a,b);

    seg = `
    📏 ${s.d} m<br>
    ⛰️ ${s.h} m<br>
    📈 ${s.s} %
    `;
  }

  document.getElementById("info").innerHTML = `
  🧭 ${mode}<br>
  🧭 irány: ${heading}°<br>
  📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}<br><br>

  ${seg}<br>

  🔄 magasság: ${elevationMode.toUpperCase()}
  `;
}

// -------- POI
async function loadPOI(){
  poiLayer.clearLayers();

  let c = map.getCenter();

  let q = `
  [out:json];
  node(around:1200,${c.lat},${c.lng})[amenity];
  out;
  `;

  let r = await fetch("https://overpass-api.de/api/interpreter?data="+encodeURIComponent(q));
  let d = await r.json();

  d.elements.slice(0,20).forEach(p=>{
    let m = L.marker([p.lat,p.lon]).addTo(poiLayer);
    m.bindPopup(p.tags.name || "POI");
  });
}

// -------- RAIL
async function loadRail(){
  poiLayer.clearLayers();

  let c = map.getCenter();

  let q = `
  [out:json];
  node(around:4000,${c.lat},${c.lng})[railway=station];
  out;
  `;

  let r = await fetch("https://overpass-api.de/api/interpreter?data="+encodeURIComponent(q));
  let d = await r.json();

  d.elements.forEach(p=>{
    let m = L.marker([p.lat,p.lon]).addTo(poiLayer);
    m.bindPopup("🚆 "+(p.tags.name||"Állomás"));
  });
}

// -------- RESET
function resetTrack(){
  track=[];
  if(polyline) map.removeLayer(polyline);
  polyline=null;
}

// START
startGPS();

</script>

</body>
</html>
