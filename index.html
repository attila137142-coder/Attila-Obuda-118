// ===== GPS
async function getLocation(){

 navigator.geolocation.getCurrentPosition(async pos=>{

  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;

  if(marker) map.removeLayer(marker);

  marker = L.circleMarker([userLat,userLon],{
   radius:8,color:'red'
  }).addTo(map);

  map.setView([userLat,userLon],15);

  let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`);
  let d = await res.json();
  let a = d.address || {};

  document.getElementById("info").innerHTML=`
  🌍 ${a.country||""}<br>
  🏙️ ${a.city||a.town||""}<br>
  🛣️ ${a.road||""} ${a.house_number||""}<br>
  🎯 ±${Math.round(pos.coords.accuracy)} m
  `;

  showStops();
 });
}

// ===== KÖZÚTI ÚTVONAL (VALÓDI)
async function routeTo(lat,lon){

 routeLayer.clearLayers();

 let url = `https://router.project-osrm.org/route/v1/driving/${userLon},${userLat};${lon},${lat}?overview=full&geometries=geojson`;

 let res = await fetch(url);
 let data = await res.json();

 let route = data.routes[0];

 let coords = route.geometry.coordinates.map(c=>[c[1],c[0]]);

 L.polyline(coords,{color:'lime'}).addTo(routeLayer);

 let dist = (route.distance/1000).toFixed(2);
 let time = Math.round(route.duration/60);

 alert(`🚗 ${dist} km | ⏱ ${time} perc`);
}

// ===== MEGÁLLÓK
function showStops(){
function showDepartures(stopName){
 function parseCSV(text){

 let lines = text.split("\n");
 let headers = lines[0].split(",");

 return lines.slice(1).map(line=>{
  let obj = {};
  let cols = line.split(",");
  headers.forEach((h,i)=>{
   obj[h] = cols[i];
  });
  return obj;
 });
}

 let stop = GTFS.stops.find(s=>s.stop_name === stopName);

 if(!stop){
  alert("Nincs GTFS megálló");
  return;
 }

 let now = new Date();
 let nowSec = now.getHours()*3600 + now.getMinutes()*60;

 let times = GTFS.stopTimes
  .filter(t=>t.stop_id === stop.stop_id)
  .map(t=>{
    let parts = t.departure_time.split(":");
    let sec = parts[0]*3600 + parts[1]*60;
    return {...t,sec};
  })
  .filter(t=>t.sec > nowSec)
  .sort((a,b)=>a.sec-b.sec)
  .slice(0,5);

 let html = `<h3>🕒 ${stopName}</h3>`;

 times.forEach(t=>{

  let min = Math.round((t.sec - nowSec)/60);

  let trip = GTFS.trips.find(tr=>tr.trip_id === t.trip_id);

  html+=`
  <div>
   🚍 ${trip.route_id || "?"}
   → ${trip.trip_headsign || ""}
   | ${min} perc
  </div>
  `;
 });

 document.getElementById("stops").innerHTML = html;
}
 
 stopLayer.clearLayers();

 let arr = stops.map(s=>{
  let d = map.distance([userLat,userLon],[s.lat,s.lon]);
  return {...s,dist:d};
 });

 arr.sort((a,b)=>a.dist-b.dist);

 let html="<h3>🚏 Megállók</h3>";
let GTFS = {
 stops: [],
 stopTimes: [],
 trips: []
};

async function loadGTFS(){

 let url = "IDE_RAKD_A_LINKET.zip";

 let res = await fetch(url);
 let buffer = await res.arrayBuffer();

 let zip = await JSZip.loadAsync(buffer);

 // stops
 let stopsText = await zip.file("stops.txt").async("string");
 GTFS.stops = parseCSV(stopsText);

 // stop_times
 let stText = await zip.file("stop_times.txt").async("string");
 GTFS.stopTimes = parseCSV(stText);

 // trips
 let trText = await zip.file("trips.txt").async("string");
 GTFS.trips = parseCSV(trText);

 console.log("GTFS betöltve");
}
 arr.slice(0,10).forEach(s=>{

  let air = s.dist<1000 ? Math.round(s.dist)+" m" : (s.dist/1000).toFixed(2)+" km";

  html+=`
  <div class="card">
   <b>${s.name}</b><br>
   📏 ${air}<br>
   <button onclick="routeTo(${s.lat},${s.lon})">Útvonal</button>
  </div>
  `;

  L.marker([s.lat,s.lon]).addTo(stopLayer)
   .bindPopup(`<b>${s.name}</b><br><button onclick="routeTo(${s.lat},${s.lon})">Menj ide</button>`);
 });

 document.getElementById("stops").innerHTML = html;
}

// ===== OKOS KERESŐ
async function search(){

 let q = document.getElementById("search").value;

 let found = stops.find(s=>s.name.toLowerCase().includes(q.toLowerCase()));

 if(found){
  map.setView([found.lat,found.lon],16);
  L.marker([found.lat,found.lon]).addTo(stopLayer)
   .bindPopup(found.name).openPopup();
  return;
 }

 let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
 let data = await res.json();

 if(data.length>0){

  let p = data[0];

  map.setView([p.lat,p.lon],16);

  L.marker([p.lat,p.lon]).addTo(stopLayer)
   .bindPopup(p.display_name).openPopup();

 }else{
  alert("Nincs találat");
 }
}
