<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXY CORE MASTER FULL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; width:100vw; }

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:rgba(0,0,0,0.85);
 color:#0f0;
 padding:10px;
 width:340px;
 border:1px solid #0f0;
}

button{
 width:100%;
 margin:3px 0;
 padding:6px;
 background:black;
 color:#0f0;
 border:1px solid #0f0;
 cursor:pointer;
}

.status{
 font-size:12px;
 margin:5px 0;
 border:1px solid #0f0;
 padding:5px;
}
</style>
</head>

<body>

<div id="panel">
<h3>🧭 ROXY CORE MASTER</h3>

<div id="status" class="status">READY</div>

<button onclick="startGPS()">📍 GPS</button>
<button onclick="startTrack()">📡 TRACK</button>
<button onclick="stopTrack()">⛔ STOP</button>

<hr style="border:1px solid #0f0;">

<button onclick="toggleModule('gtfs')">🚉 GTFS</button>
<button onclick="toggleModule('forest')">🌲 ERDŐ NAV</button>
<button onclick="toggleModule('road')">🛣️ ROAD NAV</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

//
// ================= MAP CORE =================
//
let map = L.map('map').setView([47.5,19.04],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution:'ROXY CORE'
}).addTo(map);

let watchID = null;
let trail = [];
let line = null;

//
// ================= MODULE SYSTEM =================
//
const modules = {
 gtfs: false,
 forest: false,
 road: false
};

function toggleModule(name){
 modules[name] = !modules[name];
 document.getElementById("status").innerText =
  name.toUpperCase() + " = " + modules[name];
}

//
// ================= GPS =================
//
function startGPS(){
 navigator.geolocation.getCurrentPosition(p=>{
  map.setView([p.coords.latitude,p.coords.longitude],15);
  L.marker([p.coords.latitude,p.coords.longitude]).addTo(map);
 });
}

//
// ================= TRACK =================
//
function startTrack(){

 if(watchID) return;

 watchID = navigator.geolocation.watchPosition(p=>{

  let pt = [p.coords.latitude, p.coords.longitude];
  trail.push(pt);

  L.circleMarker(pt,{radius:4,color:"lime"}).addTo(map);

  if(line) map.removeLayer(line);
  line = L.polyline(trail,{color:"lime"}).addTo(map);

  // MODULE HOOK
  runModules(pt);

 });
}

function stopTrack(){
 if(watchID){
  navigator.geolocation.clearWatch(watchID);
  watchID = null;
 }
}

//
// ================= MODULE ENGINE =================
//
function runModules(point){

 if(modules.gtfs){
  console.log("GTFS active:", point);
 }

 if(modules.forest){
  console.log("FOREST NAV active:", point);
 }

 if(modules.road){
  console.log("ROAD NAV active:", point);
 }

}

</script>

</body>
</html>
