<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🌲 Erdei meredekség mérő</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  background:black;
  color:#0f0;
  font-family:Arial;
}

#map {
  height:90vh;
}

#panel {
  padding:10px;
  background:#111;
}

button {
  padding:10px;
  margin:5px;
  background:black;
  color:#0f0;
  border:2px solid #0f0;
  border-radius:10px;
}

.info {
  font-size:14px;
  margin-top:5px;
}
</style>
</head>

<body>

<div id="panel">
  <button onclick="reset()">🧹 Törlés</button>
  <div id="info">Kattints a térképre útvonalhoz</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
let map = L.map('map').setView([47.6,19.0],13);

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);
L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png').addTo(map);

// ADATOK
let points = [];
let line = L.polyline([],{color:'lime'}).addTo(map);

// KATTINTÁS
map.on('click', async function(e){

  points.push(e.latlng);
  line.addLatLng(e.latlng);

  if(points.length > 1){
    await calculate();
  }

});

// SZÁMOLÁS
async function calculate(){

  let totalDist = 0;
  let totalUp = 0;
  let totalDown = 0;

  for(let i=1;i<points.length;i++){

    let p1 = points[i-1];
    let p2 = points[i];

    let dist = map.distance(p1,p2);
    totalDist += dist;

    // MAGASSÁG API
    let h1 = await getHeight(p1);
    let h2 = await getHeight(p2);

    let diff = h2 - h1;

    if(diff > 0) totalUp += diff;
    else totalDown += Math.abs(diff);

  }

  let slope = (totalUp / totalDist) * 100;

  document.getElementById("info").innerHTML = `
    📏 Hossz: ${(totalDist/1000).toFixed(2)} km<br>
    ⛰️ Emelkedés: ${totalUp.toFixed(0)} m<br>
    ⛰️ Lejtés: ${totalDown.toFixed(0)} m<br>
    📊 Átlag meredekség: ${slope.toFixed(1)} %
  `;
}

// MAGASSÁG LEKÉRÉS
async function getHeight(p){

  try{
    let res = await fetch(
      `https://api.open-elevation.com/api/v1/lookup?locations=${p.lat},${p.lng}`
    );

    let data = await res.json();
    return data.results[0].elevation;

  }catch{
    return 0;
  }

}

// TÖRLÉS
function reset(){
  points = [];
  line.setLatLngs([]);
  document.getElementById("info").innerText = "Törölve!";
}

</script>

</body>
</html>
