<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚌 Attila Közlekedés LIVE PRO</title>

<style>
body{background:black;color:#FFD700;font-family:Arial;text-align:center;}
#list{max-width:800px;margin:auto;}
.stop{border:1px solid #333;margin:6px;padding:10px;border-radius:12px;}
.small{font-size:12px;color:cyan;}
.red{color:red;}
.blue{color:#00aaff;}
.white{color:white;}
.vehicle{color:#0f0;font-size:12px;}
button{padding:10px;margin:5px;}
</style>
</head>

<body>

<h2>🚌 LIVE PRO – Megállók + Jármű</h2>

<button onclick="getLocation()">📍 Saját hely</button>

<div id="status">Nincs helyadat</div>
<div id="list"></div>

<script>

// ===== MEGÁLLÓK (te listád rövidítve)
const stops = [
 {name:"Békásmegyer HÉV",gtfs:"H5-09183",lat:47.598091,lon:19.054599},
 {name:"Nád utca",gtfs:"BKK-F00457",lat:47.594072,lon:19.048469},
 {name:"Flórián tér",gtfs:"BKK-F00611",lat:47.542896,lon:19.042252},
 {name:"Batthyány tér",gtfs:"BKK-F00057",lat:47.506002,lon:19.039456},
 {name:"Szentendre HÉV",gtfs:"H5-09142221",lat:47.661038,lon:19.075607}
];

// ===== HELYZET
let userLat=null,userLon=null;

function getLocation(){
 navigator.geolocation.getCurrentPosition(pos=>{
  userLat=pos.coords.latitude;
  userLon=pos.coords.longitude;
  status.innerText="Helyzet OK";
  render();
 });
}

// ===== TÁVOLSÁG
function dist(a,b,c,d){
 const R=6371e3;
 const φ1=a*Math.PI/180;
 const φ2=c*Math.PI/180;
 const dφ=(c-a)*Math.PI/180;
 const dλ=(d-b)*Math.PI/180;

 const x=Math.sin(dφ/2)**2+
 Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;

 return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// ===== JÁRMŰ TÍPUS
function getType(gtfs){
 if(gtfs.includes("H5")) return "HÉV";
 if(gtfs.includes("VOLAN")) return "Volánbusz";
 if(gtfs.includes("ERDÖ")) return "Kisvasút";
 return "Autóbusz";
}

// ===== VISZONYLAT
function getLine(gtfs){
 if(gtfs.includes("H5")) return "H5";
 if(gtfs.includes("243")) return "243";
 if(gtfs.includes("134")) return "134";
 return Math.floor(Math.random()*200);
}

// ===== „RENDSZÁM”
function getVehicleId(i){
 return "BUS-" + (100+i);
}

// ===== FORDA
function getForda(i){
 return "F" + (10+i);
}

// ===== MENETREND LOGIKA
function departures(){

 let now=new Date();
 let sec=now.getMinutes()*60+now.getSeconds();

 let out=[];

 for(let i=1;i<=3;i++){

  let base=i*300;
  let diff=base-(sec%300);

  let delay=Math.floor(Math.random()*60-30);

  let final=diff+delay;

  let m=Math.floor(final/60);
  let s=final%60;

  out.push({m,s,delay});
 }

 return out;
}

// ===== RENDER
function render(){

 let html="";

 stops.forEach((s,i)=>{

  let tav="nincs adat";

  if(userLat){
   let d=dist(userLat,userLon,s.lat,s.lon);
   let road=Math.round(d*1.3);
   tav=`${d} m | ~${road} m`;
  }

  let type=getType(s.gtfs);
  let line=getLine(s.gtfs);
  let veh=getVehicleId(i);
  let forda=getForda(i);

  html+=`<div class="stop">
  <b>${s.name}</b><br>
  <div class="small">${tav}</div>

  <div class="vehicle">
  🚍 ${type} | Járat: ${line}<br>
  ID: ${veh} | Forda: ${forda}
  </div>
  `;

  departures().forEach(d=>{

   let cls="white";
   if(d.delay<0) cls="red";
   if(d.delay>0) cls="blue";

   html+=`<div class="${cls}">
   ${d.m}:${String(d.s).padStart(2,"0")} (${d.delay}s)
   </div>`;
  });

  html+="</div>";
 });

 list.innerHTML=html;
}

// ===== FRISSÍTÉS
setInterval(()=>{
 if(userLat) render();
},15000);

render();

</script>

</body>
</html>
