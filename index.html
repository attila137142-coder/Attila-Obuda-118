<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>🌲 Turista PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  background:black;
  color:#0f0;
  font-family:Arial;
}

#map{height:85vh;}

#panel{
  padding:10px;
  font-size:18px;
}

button{
  padding:10px;
  margin:5px;
  background:black;
  color:#0f0;
  border:2px solid #0f0;
  cursor:pointer;
}

.box{
  background:black;
  color:yellow;
  border:1px solid yellow;
  padding:3px;
  font-size:11px;
}
</style>
</head>

<body>

<div id="panel">
<button onclick="reset()">🧹 Törlés</button><br>

📏 Hossz: <span id="dist">-</span><br>
⬆️ Emelkedés: <span id="up">-</span><br>
⬇️ Lejtés: <span id="down">-</span><br>
📊 Átlag: <span id="avg">-</span><br>
⚠️ MAX: <span id="max">-</span><br>
⚠️ MIN: <span id="min">-</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([47.55,19.03],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let points=[];
let line;
let markers=[];

map.on("click", async e=>{
  points.push([e.latlng.lng,e.latlng.lat]);

  if(points.length===2){
    calcRoute();
  }
});

// ===== ROUTE =====
async function calcRoute(){

  let url = `https://router.project-osrm.org/route/v1/foot/${points[0][0]},${points[0][1]};${points[1][0]},${points[1][1]}?overview=full&geometries=geojson`;

  let res = await fetch(url);
  let data = await res.json();

  let coords = data.routes[0].geometry.coordinates;

  if(line) map.removeLayer(line);
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  line = L.polyline(coords.map(c=>[c[1],c[0]]),{color:'lime'}).addTo(map);

  // ===== ELEVATION =====
  let elevRes = await fetch("https://api.opentopodata.org/v1/test-dataset?locations="+
    coords.map(c=>c[1]+","+c[0]).join("|"));

  let elevData = await elevRes.json();

  let elev = elevData.results.map(r=>r.elevation);

  calcSlope(coords,elev);
}

// ===== SLOPE =====
function calcSlope(coords,elev){

  let total=0, up=0, down=0;
  let max=-999, min=999;

  for(let i=0;i<coords.length-1;i++){

    let a = coords[i];
    let b = coords[i+1];

    let d = map.distance([a[1],a[0]],[b[1],b[0]]);
    let h = elev[i+1]-elev[i];

    if(d<2) continue;

    let slope = (h/d)*100;

    total+=d;

    if(h>0) up+=h;
    else down+=Math.abs(h);

    if(slope>max) max=slope;
    if(slope<min) min=slope;

    // ===== TÉRKÉP DOBOZ =====
    let mid = [
      (a[1]+b[1])/2,
      (a[0]+b[0])/2
    ];

    let m = L.marker(mid,{
      icon:L.divIcon({
        className:"",
        html:`<div class="box">
        ${slope.toFixed(1)}%<br>${Math.round(d)}m
        </div>`
      })
    }).addTo(map);

    markers.push(m);
  }

  document.getElementById("dist").innerText=(total/1000).toFixed(2)+" km";
  document.getElementById("up").innerText=Math.round(up)+" m";
  document.getElementById("down").innerText=Math.round(down)+" m";
  document.getElementById("avg").innerText=((up-down)/total*100).toFixed(1)+" %";
  document.getElementById("max").innerText=max.toFixed(1)+" %";
  document.getElementById("min").innerText=min.toFixed(1)+" %";
}

// ===== RESET =====
function reset(){
  points=[];
  if(line) map.removeLayer(line);
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
}

</script>

</body>
</html>
