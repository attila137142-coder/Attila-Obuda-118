<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚂 Vasút LIVE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{background:black;color:yellow;text-align:center;font-family:Arial;}
#map{height:600px;}
#info{color:cyan;font-size:18px;}

.piros{color:red;}
.kek{color:cyan;}
.normal{color:white;}
</style>
</head>

<body>

<h1>🚂 Vasút LIVE</h1>

<button onclick="vonatok()">🚆 Vonatok keresése</button>

<div id="map"></div>
<div id="info">Adatok...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map=L.map('map').setView([47.5,19.04],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let sajatPoz=null;

navigator.geolocation.watchPosition(p=>{
 sajatPoz=[p.coords.latitude,p.coords.longitude];
 map.setView(sajatPoz,12);
});

// „vasút” keresés
function vonatok(){

 fetch(`https://overpass-api.de/api/interpreter?data=
 [out:json];
 node(around:5000,${sajatPoz[0]},${sajatPoz[1]})
 ["railway"="station"];
 out;`)

 .then(r=>r.json())
 .then(d=>{

   let html="";

   d.elements.slice(0,5).forEach(e=>{

     let kes=Math.floor(Math.random()*300)-150;

     let szin="normal";
     if(kes>60) szin="kek";
     if(kes<-60) szin="piros";

     html+=`
     <div class="${szin}">
     🚉 ${e.tags.name||"Állomás"}
     (${kes} mp)
     </div>`;

     L.marker([e.lat,e.lon]).addTo(map)
       .bindPopup(e.tags.name||"Állomás");
   });

   document.getElementById("info").innerHTML=html;
 });
}

// frissítés
setInterval(()=>{
 if(sajatPoz) vonatok();
},20000);

</script>

</body>
</html>
