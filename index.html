<script>

// ===== 45 MEGÁLLÓ

// ===== DEMO „VALÓDI” MENETREND
function fakeDepartures(stop){
 return [
  {line:"134",dest:"Nyugati pályaudvar",time:"06:12",trip:"T1"},
  {line:"34",dest:"Békásmegyer",time:"06:15",trip:"T2"},
  {line:"160",dest:"Óbuda",time:"06:18",trip:"T3"}
 ];
}

// ===== GPS
let userLat,userLon,userAcc;

function getLocation(){
 return new Promise((res,rej)=>{
  navigator.geolocation.getCurrentPosition(p=>{
   userLat=p.coords.latitude;
   userLon=p.coords.longitude;
   userAcc=p.coords.accuracy;
   res();
  },rej);
 });
}

// ===== CÍM
async function getAddress(lat,lon){
 try{
  const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
  const d = await res.json();
  const a = d.address||{};
  return `${a.country||""} → ${a.city||a.town||""} → ${a.road||""} ${a.house_number||""}`;
 }catch{return "Cím nem elérhető";}
}

// ===== TÁVOLSÁG
function dist(a,b,c,d){
 const R=6371e3;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
 Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== IDŐ
function getMin(t){
 const now=new Date();
 const [h,m]=t.split(":").map(Number);
 return (h*60+m)-(now.getHours()*60+now.getMinutes());
}

// ===== RENDER
async function render(){

 const addr = await getAddress(userLat,userLon);

 document.getElementById("location").innerHTML = `
 📍 Saját hely<br>
 🌐 ${userLat.toFixed(6)}, ${userLon.toFixed(6)}<br>
 🎯 Pontosság: ±${Math.round(userAcc)} m<br>
 🏠 ${addr}
 `;

 let near = STOPS.map(s=>({...s,d:dist(userLat,userLon,s.lat,s.lon)}))
 .filter(s=>s.d<=2000)
 .sort((a,b)=>a.d-b.d);

 let html="";

 near.forEach(s=>{

  html+=`<div class="card">
  🚏 <b>${s.name}</b><br>
  📏 ${Math.round(s.d)} m<br>`;

  fakeDepartures(s).forEach(d=>{
   let min=getMin(d.time);
   if(min<0||min>60) return;

   let c="";
   if(min<2)c="red";
   else if(min>10)c="blue";

   html+=`<div class="${c}">
   🚍 <b>${d.line}</b> → ${d.dest}<br>
   ⏰ ${d.time} (${min} perc)<br>
   <span class="small">Trip: ${d.trip}</span>
   </div>`;
  });

  html+="</div>";
 });

 document.getElementById("list").innerHTML=html;
}

// ===== START
async function start(){
 await getLocation();
 document.getElementById("status").innerText="✔ Fut";
 render();
}

</script>
