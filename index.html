<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
}

#map{
width:70%;
height:100vh;
}

#panel{
width:30%;
background:#f4f4f4;
padding:10px;
overflow:auto;
}

button{
width:100%;
padding:10px;
margin-top:5px;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td{
border:1px solid #ccc;
padding:5px;
}

.bigNumber{
font-size:20px;
font-weight:bold;
color:#c00;
}

#map5000{
height:250px;
margin-top:10px;
}
</style>

</head>

<body>

<div id="map"></div>

<div id="panel">

<h2>Attila Közlekedés</h2>

<button onclick="startNav()">Navigáció indítása</button>

<button onclick="showStops()">Megállók 1 km-en belül</button>

<button onclick="showVehicles()">Járművek</button>

<h3>Távolság adatok</h3>

<table>

<tr>
<td>Összes távolság</td>
<td id="total">0 km</td>
</tr>

<tr>
<td>Következő pont</td>
<td id="next">0 km</td>
</tr>

<tr>
<td>Megtett</td>
<td id="done">0 km</td>
</tr>

<tr>
<td>Megtett %</td>
<td id="donep">0%</td>
</tr>

<tr>
<td>Hátralévő</td>
<td id="left">0 km</td>
</tr>

<tr>
<td>Hátralévő %</td>
<td id="leftp">0%</td>
</tr>

</table>

<h3>Sebesség</h3>

<div class="bigNumber" id="speed">0 km/h</div>
<div id="speedms">0 m/s</div>

<h3>5000 léptékű térkép</h3>

<div id="map5000"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.5,19.05],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var mapSmall = L.map('map5000').setView([47.5,19.05],16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(mapSmall);

var userMarker;

function startNav(){

navigator.geolocation.watchPosition(function(pos){

var lat = pos.coords.latitude;
var lon = pos.coords.longitude;

var speed = pos.coords.speed || 0;

var kmh = speed * 3.6;
var ms = speed;

document.getElementById("speed").innerHTML = kmh.toFixed(1)+" km/h";
document.getElementById("speedms").innerHTML = ms.toFixed(1)+" m/s";

if(!userMarker){

userMarker = L.marker([lat,lon]).addTo(map);

}else{

userMarker.setLatLng([lat,lon]);

}

map.setView([lat,lon],15);

mapSmall.setView([lat,lon],16);

});

}

function showStops(){

alert("Megállók keresése 1 km-en belül – ide jön majd a GTFS adat.");

}

function showVehicles(){

alert("BKV / MÁV / Volán járműkövetés – ide jön majd a GTFS realtime.");

}

</script>

</body>
</html>
