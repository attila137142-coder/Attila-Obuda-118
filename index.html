<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<title>Attila Közlekedés PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
margin: 0;
height: 100%;
font-family: Arial;
}

/* SIDEBAR */
#sidebar {
position: absolute;
left: 0;
top: 0;
bottom: 0;
width: 300px;
background: #1e1e1e;
color: white;
overflow-y: auto;
padding: 10px;
z-index: 1000;
}

/* MAP */
#map {
position: absolute;
left: 300px;
top: 0;
right: 0;
bottom: 0;
}

/* UI */
button {
width: 100%;
padding: 10px;
margin-bottom: 5px;
background: #333;
color: white;
border: none;
cursor: pointer;
}

button:hover {
background: #555;
}

.stop {
padding: 5px;
border-bottom: 1px solid #444;
cursor: pointer;
}

.stop:hover {
background: #444;
}
</style>
</head>

<body>

<div id="sidebar">
<h3>🚆 Attila Közlekedés</h3>

<button onclick="locateMe()">📍 Hol vagyok</button>
<button onclick="toggleRail()">🚆 Vasút</button>

<h4>Megállók</h4>
<div id="stopList"></div>
</div>

<div id="map"></div>
