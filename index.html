<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attila Közlekedés – FULL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#111; color:#0f0; }

#map { height:100vh; }

#panel {
 position:absolute;
 top:10px;
 left:10px;
 background:rgba(0,0,0,0.85);
 padding:10px;
 border:1px solid lime;
 z-index:1000;
 width:260px;
}

#panel input {
 width:100%;
 margin-bottom:5px;
}

.btn {
 background:#000;
 color:#0f0;
 border:1px solid #0f0;
 padding:5px;
 margin:2px 0;
 cursor:pointer;
 width:100%;
}
</style>
</head>

<body>

<div id="panel">
<h3>📍 Helyadatok</h3>
<div id="location">betöltés...</div>

<h3>📡 GSM</h3>
<div id="gsm">--</div>

<h3>🔎 Kereső</h3>
<input id="search" placeholder="cím vagy hely">
<button class="btn" onclick="searchPlace()">Keresés</button>

<h3>🚏 Legközelebbi megállók</h3>
<div id="stops"></div>

<button class="btn" onclick="loadVehicles()">🚍 Járművek frissítése</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🌍 TÉRKÉP
let map = L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19
}).addTo(map);

let userMarker;
let vehicleLayer = L.layerGroup().addTo(map);

// 🚍 IKON
let busIcon = L.icon({
 iconUrl:"https://cdn-icons-png.flaticon.com/512/61/61231.png",
 iconSize:[30,30]
});

// 📍 HELYMEGHATÁROZÁS + CÍM
navigator.geolocation.getCurrentPosition(async pos=>{

 let lat = pos.coords.latitude;
 let lon = pos.coords.longitude;

 userMarker = L.marker([lat,lon]).addTo(map)
  .bindPopup("Te itt vagy").openPopup();

 map.setView([lat,lon],15);

 // cím
 let res = await fetch(
  `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
 );
 let d = await res.json();
 let a = d.address;

 document.getElementById("location").innerHTML =
  `${a.country}<br>${a.city || a.town}<br>${a.road || ""} ${a.house_number || ""}`;

 loadStops(lat,lon);

});

// 📡 GSM (becsült)
function getSignal(){
 let c = navigator.connection;
 if(!c) return "nincs adat";
 let percent = Math.min(100, c.downlink * 20);
 return Math.round(percent);
}

setInterval(()=>{
 document.getElementById("gsm").innerHTML =
  "📶 "+getSignal()+"%";
},2000);

// 🔎 KERESÉS
async function searchPlace(){

 let q = document.getElementById("search").value;

 let res = await fetch(
  `https://nominatim.openstreetmap.org/search?format=json&q=${q}`
 );

 let data = await res.json();

 if(data.length == 0){
  alert("NINCS TALÁLAT");
  return;
 }

 let p = data[0];

 map.setView([p.lat,p.lon],15);
 L.marker([p.lat,p.lon]).addTo(map);

}

// 🚏 DEMO MEGÁLLÓK
let demoStops = [
 {name:"Megálló 1",lat:47.498,lon:19.04},
 {name:"Megálló 2",lat:47.499,lon:19.041},
 {name:"Megálló 3",lat:47.497,lon:19.042}
];

// 📏 TÁVOLSÁG
function dist(a,b){
 return map.distance(a,b);
}

// 🚏 KÖZELI MEGÁLLÓK
function loadStops(lat,lon){

 let arr = demoStops.map(s=>{
  let d = dist([lat,lon],[s.lat,s.lon]);
  return {...s,dist:d};
 });

 arr.sort((a,b)=>a.dist-b.dist);

 let html = "";

 arr.slice(0,5).forEach(s=>{
  html += `${s.name} – ${Math.round(s.dist)} m<br>`;
 });

 document.getElementById("stops").innerHTML = html;
}

// 🚍 JÁRMŰVEK (DEMO → proxy helyett)
async function loadVehicles(){

 let data = [
  {lat:47.50,lon:19.04,line:"H5",delay:0},
  {lat:47.51,lon:19.05,line:"34",delay:120}
 ];

 vehicleLayer.clearLayers();

 data.forEach(v=>{

  let color = v.delay > 60 ? "red" : "green";

  let m = L.marker([v.lat,v.lon],{icon:busIcon})
   .bindPopup(`🚍 ${v.line}<br>⏱ ${v.delay} sec`);

  m.addTo(vehicleLayer);

 });

}

// 🔄 AUTO FRISSÍTÉS
setInterval(loadVehicles,5000);
loadVehicles();

</script>

</body>
</html>
