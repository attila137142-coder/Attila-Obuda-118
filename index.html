<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iránytű Navi PRO - GTFS ENGINE</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family: Arial; background:#0f172a; color:#e2e8f0; }
    header { padding:12px; background:#111827; display:flex; justify-content:space-between; align-items:center; }
    h1 { font-size:16px; margin:0; }
    .btn { background:#2563eb; border:none; padding:8px 10px; color:#fff; border-radius:8px; cursor:pointer; }
    .grid { display:grid; gap:10px; padding:10px; }
    .card { background:#1f2937; padding:10px; border-radius:12px; }
    input { width:100%; padding:10px; border-radius:8px; border:none; margin-top:5px; }
    #map { height:320px; border-radius:12px; }
    .small { font-size:12px; opacity:0.85; white-space:pre-line; }
    .resultBox { margin-top:8px; padding:8px; background:#111827; border-radius:8px; }

    #menu {
      position:fixed;
      inset:0;
      background:#0b1220;
      display:none;
      padding:20px;
      z-index:999;
      overflow:auto;
    }

    /* COMPASS BIG UPGRADE */
    .compass {
      font-size:42px;
      text-align:center;
      padding:12px;
      font-weight:bold;
    }

    .compassTable {
      margin-top:10px;
      background:#111827;
      padding:10px;
      border-radius:10px;
      font-size:12px;
    }

    .compassTable div {
      margin:4px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>🧭 Iránytű Navi PRO - GTFS ENGINE</h1>
  <button class="btn" onclick="toggleMenu()">Menü</button>
</header>

<div id="menu">
  <h2>🚆 GTFS ENGINE</h2>
  <p>Járatok / útvonaltervező / import</p>

  <button class="btn" onclick="alert('GTFS IMPORT PLACEHOLDER')">📦 GTFS Import</button>
  <button class="btn" onclick="alert('JÁRAT LISTA PLACEHOLDER')">🚍 Járatok</button>
  <button class="btn" onclick="alert('ÚTVONALTERVEZŐ PLACEHOLDER')">🧭 Útvonaltervező</button>

  <br/><br/>
  <button class="btn" onclick="toggleMenu()">Bezár</button>
</div>

<div class="grid">

  <div class="card">
    <h3>🔍 GTFS Megálló kereső</h3>
    <input id="search" placeholder="Név vagy GTFS kód" oninput="searchStops()" />
    <div id="results" class="small"></div>
  </div>

  <div class="card">
    <h3>🗺️ Térkép</h3>
    <div id="map"></div>
    <div class="small" id="mapStatus">Térkép betöltés...</div>
  </div>

  <div class="card">
    <h3>🧭 Iránytű NAVI</h3>
    <div class="compass" id="compass">⏳ VÁRAKOZÁS: szenzor</div>

    <!-- TABLE VIEW -->
    <div class="compassTable" id="compassData">
      <div>📍 Alpha: -</div>
      <div>🧭 Irány: -</div>
      <div>📡 Status: várakozás</div>
    </div>

    <button class="btn" onclick="startCompass()">Iránytű indítása</button>
  </div>

</div>

<script>

let map;
let userLat = null;
let userLon = null;

const stops = [
  { gtfs:"HU-BKK-1001", name:"Deák Ferenc tér", lat:47.4979, lon:19.0550 },
  { gtfs:"HU-BKK-1002", name:"Kelenföld", lat:47.4649, lon:19.0227 },
  { gtfs:"HU-BKK-1003", name:"Örs vezér tere", lat:47.5006, lon:19.1372 },
  { gtfs:"HU-BKK-1004", name:"Batthyány tér", lat:47.5063, lon:19.0399 }
];

// GEO
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(p=>{
    userLat=p.coords.latitude;
    userLon=p.coords.longitude;
  });
}

function getDistance(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// SEARCH
function searchStops(){
  const q=document.getElementById('search').value.toLowerCase();
  const res=document.getElementById('results');
  res.innerHTML="";

  const found=stops.filter(s=>s.name.toLowerCase().includes(q)||s.gtfs.toLowerCase().includes(q));

  found.forEach(s=>{
    let dist="";
    if(userLat!=null) dist=` | 📏 ${getDistance(userLat,userLon,s.lat,s.lon).toFixed(2)} km`;

    const div=document.createElement("div");
    div.className="resultBox";
    div.innerText=`🚏 ${s.name}\n🆔 ${s.gtfs}\n📍 ${s.lat},${s.lon}${dist}`;
    res.appendChild(div);
  });
}

// MAP
window.onload=()=>{
  map=L.map('map').setView([47.4979,19.04],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  stops.forEach(s=>{
    L.marker([s.lat,s.lon]).addTo(map).bindPopup(`${s.name}<br>${s.gtfs}`);
  });

  setTimeout(()=>map.invalidateSize(),300);
  document.getElementById('mapStatus').innerText="✔ READY";
};

// MENU
function toggleMenu(){
  const m=document.getElementById('menu');
  m.style.display=m.style.display==='block'?'none':'block';
}

// COMPASS + TABLE
function startCompass(){
  const el=document.getElementById('compass');
  const table=document.getElementById('compassData');

  if(!window.DeviceOrientationEvent){
    el.innerText="❌ nincs szenzor";
    return;
  }

  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(p=>{
      if(p!=='granted'){el.innerText="❌ nincs engedély";return;}
      initCompass();
    });
  }else initCompass();

  function initCompass(){
    table.innerHTML="<div>📡 Status: aktív</div>";

    window.addEventListener("deviceorientation",e=>{
      let a=e.alpha||0;
      let dir="ÉSZAK";

      if(a>45&&a<135)dir="KELET";
      else if(a>135&&a<225)dir="DÉL";
      else if(a>225&&a<315)dir="NYUGAT";

      el.innerText="🧭 "+dir;

      table.innerHTML=`
        <div>📍 Alpha: ${a.toFixed(1)}</div>
        <div>🧭 Irány: ${dir}</div>
        <div>📡 Status: aktív</div>
      `;
    });
  }
}

</script>

</body>
</html>
