<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Egyszerű Közlekedés</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000c;
 color:#0f0;
 padding:10px;
 width:300px;
 border:1px solid #0f0;
}
</style>
</head>

<body>

<div id="panel">
<h3>🚆 Egyszerű menetrend</h3>
<div id="info">Térképre kattints</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// 📍 kattintás = koordináta
map.on("click", async e => {

 let lat = e.latlng.lat;
 let lon = e.latlng.lng;

 document.getElementById("info").innerHTML =
 "🔍 keresés...";

 // 👉 Overpass – megállók lekérése
 let query = `
 [out:json];
 node(around:200,${lat},${lon})["highway"="bus_stop"];
 out;
 `;

 let res = await fetch("https://overpass-api.de/api/interpreter", {
  method:"POST",
  body:query
 });

 let data = await res.json();

 if(!data.elements.length){
  document.getElementById("info").innerHTML =
   "❌ nincs megálló a közelben";
  return;
 }

 let stop = data.elements[0];

 document.getElementById("info").innerHTML =
 `🚏 Megálló:<br>${stop.tags.name || "névtelen"}`;

});

</script>

</body>
</html>
