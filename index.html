.dark .info {
    background: #1e1e1e;
}

.toggle {
    position: absolute;
    top: 15px;
    right: 15px;
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleDark()">🌙</button>

<h1>🚌 Attila Közlekedés 2.3</h1>

<input type="text" id="kereso" placeholder="Pl. 890 vagy 890/12 vagy 1203">

<button onclick="keres()">Keresés</button>
<button onclick="mentes()">⭐ Kedvencekhez</button>

<div id="eredmeny" class="info" style="display:none;"></div>

<script>
const jaratok = {
  "890": {
    nev: "Szentendre – Budapest",
    tipus: "Helyközi autóbusz",
    uzemelteto: "Volánbusz",
    belso: "V890"
  },
  "1203": {
    nev: "Dunakanyar regionális járat",
    tipus: "Regionális autóbusz",
    uzemelteto: "Volánbusz",
    belso: "D1203"
  }
};

function keres() {
    let input = document.getElementById("kereso").value.trim();
    let alap = input.split("/")[0];

    if(jaratok[alap]) {
        let adat = jaratok[alap];

        document.getElementById("eredmeny").style.display = "block";
        document.getElementById("eredmeny").innerHTML =
            "<b>Vonal:</b> " + input + "<br>" +
            "<b>Megnevezés:</b> " + adat.nev + "<br>" +
            "<b>Típus:</b> " + adat.tipus + "<br>" +
            "<b>Üzemeltető:</b> " + adat.uzemelteto + "<br>" +
            "<b>Belső azonosító:</b> " + adat.belso + "<br><br>" +
            "<button onclick=\"window.open('https://www.google.com/maps/search/" + input + "+busz')\">🗺 Élő térkép</button>";
    } else {
        document.getElementById("eredmeny").style.display = "block";
        document.getElementById("eredmeny").innerHTML =
            "Nincs adat, de megnyithatod Google-ben.<br><br>" +
            "<button onclick=\"window.open('https://www.google.com/maps/search/" + input + "+busz')\">Keresés Google-ben</button>";
    }
}

function mentes() {
    let input = document.getElementById("kereso").value;
    localStorage.setItem("kedvenc", input);
    alert("Mentve kedvencekhez!");
}

function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("darkmode", document.body.classList.contains("dark"));
}

window.onload = function() {
    if(localStorage.getItem("darkmode") === "true") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
