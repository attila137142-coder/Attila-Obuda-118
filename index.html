<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Mini Google Transit + BKK Vezérlőterem V1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

#wrap{
display:grid;
grid-template-columns:2fr 1fr;
height:100vh;
}

#map{height:100%;}

.panel{
background:#111827;
padding:10px;
overflow:auto;
}

.card{
background:#0f172a;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #243244;
font-size:13px;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:6px;
margin-top:5px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* 🎨 SZÍNEK */
.bkk{ background:#2563eb; }
.mav{ background:#16a34a; }
.volan{ background:#f59e0b; }
.regio{ background:#a855f7; }

button:hover{opacity:0.85;}

h3{color:#38bdf8;}
</style>
</head>

<body>

<div id="wrap">

<!-- ================= MAP ================= -->
<div id="map"></div>

<!-- ================= PANEL ================= -->
<div class="panel">

<input id="search" placeholder="🔎 megálló keresés..." oninput="renderStops()">

<h3>🚏 Megállók</h3>
<div id="stops"></div>

<h3>🕒 Indulások</h3>
<div id="departures">Válassz megállót</div>

<h3>🌐 Menetrend linkek</h3>
<div id="links"></div>

</div>

</div>

<script>

try{

/* ================= MAP ================= */

let map = L.map('map').setView([47.4979,19.0402], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:"OSM"
}).addTo(map);

/* ================= STOPS ================= */

let stops = [

/* BKK */
{name:"Deák tér", type:"BKK", lat:47.4979, lon:19.0540, url:"https://futar.bkk.hu"},
{name:"Blaha Lujza tér", type:"BKK", lat:47.4963, lon:19.0700, url:"https://futar.bkk.hu"},

/* MÁV */
{name:"Kelenföld", type:"MÁV", lat:47.4649, lon:19.0193, url:"https://jegy.mav.hu"},
{name:"Nyugati", type:"MÁV", lat:47.5101, lon:19.0560, url:"https://jegy.mav.hu"},

/* VOLÁN */
{name:"Népliget", type:"VOLÁN", lat:47.4760, lon:19.0990, url:"https://menetrendek.hu"},

/* REGION */
{name:"Zalaegerszeg", type:"REGIO", lat:46.8440, lon:16.8460, url:"https://menetrendek.hu"},

/* EXTRA (45-ig bővített stabil lista) */
...Array.from({length:35}).map((_,i)=>({
 name:"Megálló "+(i+1),
 type:"REGIO",
 lat:47.4+Math.random()*0.2,
 lon:19.0+Math.random()*0.2,
 url:"https://menetrendek.hu"
}))

];

/* ================= GTFS STOP_TIMES ================= */

let stopTimes = [
{stop:"Deák tér", route:"M2", time:"12:10"},
{stop:"Deák tér", route:"M2", time:"12:25"},
{stop:"Blaha Lujza tér", route:"4-6", time:"12:12"},
{stop:"Kelenföld", route:"M4", time:"12:18"},
{stop:"Népliget", route:"VOLÁN 260", time:"12:30"}
];

/* ================= MAP ================= */

stops.forEach(s=>{

 let color =
  s.type==="BKK" ? "#2563eb" :
  s.type==="MÁV" ? "#16a34a" :
  s.type==="VOLÁN" ? "#f59e0b" :
  "#a855f7";

 L.circleMarker([s.lat,s.lon],{
  radius:5,
  color:color
 }).addTo(map).bindPopup(`🚏 ${s.name}<br>${s.type}`);

});

/* ================= RENDER STOPS ================= */

function renderStops(){

 let q = document.getElementById("search").value.toLowerCase();

 let list = stops.filter(s=>
  s.name.toLowerCase().includes(q) ||
  s.type.toLowerCase().includes(q)
 );

 document.getElementById("stops").innerHTML =
 list.map(s=>{

 let cls =
  s.type==="BKK" ? "bkk" :
  s.type==="MÁV" ? "mav" :
  s.type==="VOLÁN" ? "volan" :
  "regio";

 return `
  <div class="card">
   🚏 <b>${s.name}</b><br>
   🏷 ${s.type}

   <button class="${cls}"
    onclick="showDepartures('${s.name}')">
    🕒 Indulások
   </button>

   <button class="${cls}"
    onclick="openUrl('${s.url}')">
    🌐 Menetrend
   </button>

  </div>
 `;

 }).join("");

 renderLinks();

}

/* ================= GTFS ================= */

function showDepartures(stopName){

 let now = new Date();
 let current = now.getHours()*60 + now.getMinutes();

 let deps = stopTimes
 .filter(t=>t.stop===stopName)
 .map(t=>{

  let [h,m]=t.time.split(":").map(Number);
  let mins=h*60+m;

  return {...t,diff:mins-current};

 })
 .filter(t=>t.diff>=0)
 .sort((a,b)=>a.diff-b.diff);

 document.getElementById("departures").innerHTML =
 deps.length ? deps.map(d=>`
  <div class="card">
   🚌 ${d.route}<br>
   🕒 ${d.time}<br>
   ⏱ ${d.diff} perc
  </div>
 `).join("") : "❌ nincs indulás";
}

/* ================= LINKS PANEL ================= */

function renderLinks(){

 document.getElementById("links").innerHTML =
 stops.slice(0,10).map(s=>`
  <div class="card">
   🌐 ${s.name}
   <button onclick="openUrl('${s.url}')">Megnyitás</button>
  </div>
 `).join("");

}

/* ================= URL ================= */

function openUrl(url){
 window.open(url,"_blank");
}

/* ================= INIT ================= */

renderStops();
renderLinks();

console.log("V1 CONTROL CENTER READY");

}catch(e){
 console.error("FATAL:",e);
}

</script>

</body>
</html>
