<script>

// ===== MAP
let map=L.map('map').setView([47.49,19.04],15);

let osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
let topo=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
let rail=L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png',{opacity:0.9});
let turista=L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png');

osm.addTo(map);

function setLayer(type){
 map.eachLayer(l=>map.removeLayer(l));
 osm.addTo(map);
 if(type==="topo") topo.addTo(map);
 if(type==="rail") rail.addTo(map);
 if(type==="turista") turista.addTo(map);
}

// ===== GPS
let userPos=null;

navigator.geolocation.watchPosition(p=>{
 userPos=[p.coords.latitude,p.coords.longitude];
 loadStops();
});

// ===== RESET
let line=null,start=null,segmentsLayer=[];

function resetRoute(){
 if(line) map.removeLayer(line);
 segmentsLayer.forEach(l=>map.removeLayer(l));
 segmentsLayer=[];
 start=null;
 document.getElementById("info").innerText="Törölve";
}

// ===== MODE
let mode="road";

// ===== CLICK
map.on("click", async e=>{

 if(!userPos) return;

 if(!start){
   start=userPos;
   alert("Start OK → kattints célra");
   return;
 }

 let end=[e.latlng.lat,e.latlng.lng];

 let url;

 // ===== ROUTER
 if(mode==="road"){
   url=`https://router.project-osrm.org/route/v1/foot/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;
 }else{
   url=`https://api.openrouteservice.org/v2/directions/foot-hiking?api_key=YOUR_API_KEY&start=${start[1]},${start[0]}&end=${end[1]},${end[0]}`;
 }

 let res=await fetch(url);
 let data=await res.json();

 let route;

 if(mode==="road"){
   route=data.routes[0];
 }else{
   route={
     distance:data.features[0].properties.summary.distance,
     geometry:data.features[0].geometry
   };
 }

 let dist=(route.distance/1000).toFixed(2);

 if(line) map.removeLayer(line);
 line=L.geoJSON(route.geometry).addTo(map);

 // ===== SZINT
 let coords=route.geometry.coordinates.map(c=>c[1]+","+c[0]).join("|");

 let elevRes=await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${coords}`);
 let elevData=await elevRes.json();

 let gain=0, loss=0;

 // ===== SZAKASZOK + SZÍNEZÉS
 for(let i=1;i<elevData.results.length;i++){

   let h1=elevData.results[i-1].elevation;
   let h2=elevData.results[i].elevation;

   let diff=h2-h1;

   let p1=[
     route.geometry.coordinates[i-1][1],
     route.geometry.coordinates[i-1][0]
   ];

   let p2=[
     route.geometry.coordinates[i][1],
     route.geometry.coordinates[i][0]
   ];

   let d=map.distance(p1,p2);
   if(d<5) continue;

   let percent=(diff/d)*100;

   if(diff>0) gain+=diff;
   else loss+=Math.abs(diff);

   // ===== SZÍN
   let color="green";
   if(Math.abs(percent)>8) color="red";
   else if(Math.abs(percent)>4) color="orange";

   let seg=L.polyline([p1,p2],{
     color:color,
     weight:5
   }).addTo(map);

   segmentsLayer.push(seg);

   // ===== FELIRAT
   let mid=[
     (p1[0]+p2[0])/2,
     (p1[1]+p2[1])/2
   ];

   let txt=L.marker(mid,{
     icon:L.divIcon({
       html:`<div style="color:${color};font-size:12px">${percent.toFixed(1)}%</div>`
     })
   }).addTo(map);

   segmentsLayer.push(txt);
 }

 document.getElementById("info").innerHTML=
 `
 📏 Út: ${dist} km<br>
 ⛰ Emelkedés: ${gain.toFixed(0)} m<br>
 ⛰ Lejtés: ${loss.toFixed(0)} m
 `;

 start=null;

});

// ===== MEGÁLLÓK VALÓDI ÚT
async function loadStops(){

 if(!userPos) return;

 let res=await fetch(`https://overpass-api.de/api/interpreter?data=
 [out:json];
 node(around:1000,${userPos[0]},${userPos[1]})["highway"="bus_stop"];
 out;`);

 let data=await res.json();

 let html="";

 for(let s of data.elements.slice(0,5)){

   let dx=map.distance(userPos,[s.lat,s.lon]);

   // ===== VALÓDI ÚT
   let url=`https://router.project-osrm.org/route/v1/foot/${userPos[1]},${userPos[0]};${s.lon},${s.lat}?overview=false`;

   let r=await fetch(url);
   let d=await r.json();

   let road=(d.routes && d.routes[0]) ? Math.round(d.routes[0].distance) : "?";

   html+=`
   <div class="stop">
   <b>${s.tags.name||"Megálló"}</b><br>
   📏 ${dx.toFixed(0)} m | 🛣 ${road} m
   </div>`;
 }

 document.getElementById("stops").innerHTML=html;
}

</script>
