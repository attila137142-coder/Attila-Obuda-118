let userLat = null;
let userLon = null;

// ===== HELY =====
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    document.getElementById("status").innerText = "Hely OK";
    render();
  });
}

// ===== TÁVOLSÁG =====
function distance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1)*Math.PI/180;
  const Δλ = (lon2-lon1)*Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
    Math.cos(φ1)*Math.cos(φ2) *
    Math.sin(Δλ/2)**2;

  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ===== MÓD =====
function setMode(m) {
  if (m === "green") {
    document.body.style.color = "#00FF00";
    document.body.className = "";
  }
  else if (m === "red") {
    document.body.style.color = "#FF4444";
    document.body.className = "";
  }
  else if (m === "matrix") {
    document.body.style.color = "#00FF00";
    document.body.className = "matrix";
  }
  else {
    document.body.style.color = "#FFD700";
    document.body.className = "";
  }
}

// ===== RENDER SAJÁT LISTA =====
function render() {

  const search = document.getElementById("search").value.toLowerCase();
  const div = document.getElementById("content");

  div.innerHTML = "";

  stops
    .filter(s => s.name.toLowerCase().includes(search))
    .forEach(s => {

      let dist = "nincs adat";
      if (userLat) {
        dist = distance(userLat, userLon, s.lat, s.lon) + " m";
      }

      div.innerHTML += `
        <div class="stop">
          <b>${s.name}</b><br>
          Távolság: ${dist}
        </div>
      `;
    });
}

// ===== KÉSÉS =====
function generateDelay() {
  return Math.floor(Math.random() * 180 - 90);
}
function formatDelay(sec) {
  const sign = sec >= 0 ? "+" : "-";
  sec = Math.abs(sec);
  return sign + Math.floor(sec/60) + ":" + String(sec%60).padStart(2,"0");
}
function getDelayClass(sec) {
  if (sec < -10) return "delay-fast";
  if (sec > 10) return "delay-late";
  return "delay-on";
}

// ===== CSV =====
function parseCSV(line) {
  const result = [];
  let current = "";
  let insideQuotes = false;

  for (let c of line) {
    if (c === '"') insideQuotes = !insideQuotes;
    else if (c === ',' && !insideQuotes) {
      result.push(current);
      current = "";
    } else current += c;
  }

  result.push(current);
  return result;
}

// ===== BKK =====
async function loadBKK() {

  document.getElementById("content").innerHTML = "BETÖLTÉS...";

  try {
    const url = "https://go.bkk.hu/api/static/v1/public-gtfs/budapest_gtfs.zip";

    const res = await fetch(url);
    const blob = await res.blob();
    const zip = await JSZip.loadAsync(blob);

    const stopsTxt = await zip.file("stops.txt").async("string");
    const stopTimesTxt = await zip.file("stop_times.txt").async("string");

    const stopsRows = stopsTxt.split("\n");
    const stopTimesRows = stopTimesTxt.split("\n");

    let html = "";

    for (let i = 1; i < 15; i++) {

      const cols = parseCSV(stopsRows[i]);
      const stopId = cols[0];
      const stopName = cols[2];

      html += `<div class="stop"><b>${stopName}</b><br>`;

      let count = 0;

      for (let j = 1; j < 5000; j++) {

        const st = parseCSV(stopTimesRows[j]);

        if (st[3] === stopId) {

          const delay = generateDelay();
          const delayClass = getDelayClass(delay);

          html += `
⏱ ${st[1]}
<span class="${delayClass}">(${formatDelay(delay)})</span><br>
<div class="vehicle">Busz | BKK-${Math.floor(Math.random()*1000)}</div>
`;

          count++;
        }

        if (count >= 3) break;
      }

      html += `</div>`;
    }

    document.getElementById("content").innerHTML = html;

  } catch (err) {
    document.getElementById("content").innerHTML = "HIBA: " + err;
  }
}
