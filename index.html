<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXY SAFETY CORE FIX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; width:100vw; }

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:rgba(0,0,0,0.85);
 color:#0f0;
 padding:10px;
 width:320px;
 border:1px solid #0f0;
}

button{
 width:100%;
 margin:3px 0;
 padding:6px;
 background:black;
 color:#0f0;
 border:1px solid #0f0;
 cursor:pointer;
}

.status{
 font-size:12px;
 margin:5px 0;
 border:1px solid #0f0;
 padding:5px;
}
</style>
</head>

<body>

<div id="panel">
<h3>🔐 ROXY SAFETY CORE FIX</h3>

<div id="status" class="status">READY</div>
<div id="loc" class="status">--</div>

<button onclick="startGPS()">📍 GPS + CÍM</button>
<button onclick="startTrack()">📡 TRACK</button>
<button onclick="stopTrack()">⛔ STOP</button>
<button onclick="goBack()">🔁 VISSZAÚT</button>
<button onclick="resetAll()">🧹 RESET</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.5,19.04],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution:'OSM'
}).addTo(map);

let trail = [];
let watchID = null;
let line;
let lastMarker = null;

// ================= GPS + ADDRESS =================
async function startGPS(){

 navigator.geolocation.getCurrentPosition(async p=>{

  let lat = p.coords.latitude;
  let lon = p.coords.longitude;
  let acc = p.coords.accuracy;

  map.setView([lat,lon],16);

  if(lastMarker) map.removeLayer(lastMarker);

  lastMarker = L.marker([lat,lon]).addTo(map);

  document.getElementById("status").innerText =
   "GPS OK | pontosság: "+Math.round(acc)+" m";

  // 📍 REVERSE GEOCODING
  try{
   let r = await fetch(
    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
   );
   let d = await r.json();

   let a = d.address;

   document.getElementById("loc").innerHTML =
    (a.city || a.town || a.village || "") + "<br>" +
    (a.road || "") + " " + (a.house_number || "");

  }catch{
   document.getElementById("loc").innerText = lat+","+lon;
  }

 });

}

// ================= TRACK =================
function startTrack(){

 if(watchID) return;

 watchID = navigator.geolocation.watchPosition(p=>{

  let pt = [p.coords.latitude, p.coords.longitude];

  trail.push(pt);

  L.circleMarker(pt,{radius:4,color:"lime"}).addTo(map);

  if(line) map.removeLayer(line);
  line = L.polyline(trail,{color:"lime"}).addTo(map);

  document.getElementById("status").innerText =
   "TRACK: "+trail.length;

 });

}

// ================= STOP =================
function stopTrack(){
 if(watchID){
  navigator.geolocation.clearWatch(watchID);
  watchID = null;
 }
}

// ================= VISSZAÚT =================
function goBack(){

 if(trail.length < 2) return;

 let back = [...trail].reverse();

 if(line) map.removeLayer(line);

 line = L.polyline(back,{color:"red"}).addTo(map);

 document.getElementById("status").innerText =
  "VISSZAÚT AKTÍV";
}

// ================= RESET =================
function resetAll(){
 location.reload();
}

</script>

</body>
</html>
