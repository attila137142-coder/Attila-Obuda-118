<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY V16.5 MULTI-GTFS FULL MERGE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000d;
 color:#0f0;
 padding:10px;
 width:520px;
 max-height:90vh;
 overflow:auto;
 border:1px solid #0f0;
}

.tag{padding:2px 6px;margin:2px;display:inline-block;font-size:12px}
.bkk{background:#1e90ff;color:#fff}
.volan{background:#f4c542;color:#000}
.mav{background:#ccc;color:#000}
.fallback{background:#444;color:#fff}
</style>
</head>

<body>

<div id="panel">
<h3>🚆 ROXY V16.5 – MULTI-GTFS MERGE</h3>
<div id="info">📡 inicializálás...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map=L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stopLayer=L.layerGroup().addTo(map);

// ================= MASTER STOPS =================
let MASTER_STOPS=[
 {name:"Békásmegyer",gtfs:"H5",lat:47.598091,lon:19.054599},
 {name:"Flórián tér",gtfs:"BKK",lat:47.542896,lon:19.042252},
 {name:"Örs vezér tér",gtfs:"BKK",lat:47.501742,lon:19.135604},
 {name:"Vác",gtfs:"VOLAN",lat:47.781930,lon:19.129643},
 {name:"Királyrét",gtfs:"VOLAN",lat:47.895040,lon:18.977687}
];

// ================= FEEDS =================
let FEEDS={
 bkk:null,
 volan:null,
 mav:null
};

// ================= SAFE LOAD =================
async function loadGTFS(name,file){

 try{

  let r=await fetch(file);
  if(!r.ok) throw "no file";

  let text=await r.text();

  let lines=text.split("\n");

  let data={stopTimes:[]};

  for(let i=1;i<lines.length;i++){

   let c=lines[i].split(",");
   if(c.length<4) continue;

   data.stopTimes.push({
    trip:c[0],
    time:c[2],
    stop:c[3],
    feed:name
   });

  }

  return data;

 }catch(e){
  return null;
 }

}

// ================= INIT FEEDS =================
async function initFeeds(){

 FEEDS.bkk=await loadGTFS("bkk","bkk_stop_times.txt");
 FEEDS.volan=await loadGTFS("volan","volan_stop_times.txt");
 FEEDS.mav=await loadGTFS("mav","mav_stop_times.txt");

}

// ================= DIST =================
function dist(a,b,c,d){

 let R=6371000;
 let dLat=(c-a)*Math.PI/180;
 let dLon=(d-b)*Math.PI/180;

 let x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*
 Math.cos(c*Math.PI/180)*
 Math.sin(dLon/2)**2;

 return Math.round(2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// ================= FIND STOP =================
function nearest(lat,lon){

 let best=null,min=999999;

 MASTER_STOPS.forEach(s=>{

  let d=dist(lat,lon,s.lat,s.lon);

  if(d<min){
   min=d;
   best=s;
  }

 });

 return {best,min};

}

// ================= MERGED DEPARTURES =================
function getDepartures(stopId){

 let out=[];

 for(let f in FEEDS){

  let feed=FEEDS[f];

  if(!feed) continue;

  feed.stopTimes.forEach(t=>{

   if(t.stop==stopId){
    out.push({...t,feed:f});
   }

  });

 }

 if(out.length==0){

  for(let i=0;i<5;i++){

   out.push({
    time:new Date(Date.now()+i*60000).toLocaleTimeString(),
    trip:"FALLBACK",
    feed:"fallback"
   });

  }

 }

 return out.sort((a,b)=>a.time.localeCompare(b.time));

}

// ================= CLICK =================
map.on("click",e=>{

 let lat=e.latlng.lat;
 let lon=e.latlng.lon;

 let n=nearest(lat,lon);

 let deps=getDepartures(n.best.gtfs);

 let html=`<b>🚏 ${n.best.name}</b><br>
 📏 ${n.min} m<br>
 🆔 ${n.best.gtfs}<br><br>

 <b>🕒 Indulások (MULTI FEED)</b><br>`;

 deps.forEach(d=>{

  let cls="fallback";

  if(d.feed=="bkk") cls="bkk";
  if(d.feed=="volan") cls="volan";
  if(d.feed=="mav") cls="mav";

  html+=`
  <span class="tag ${cls}">${d.feed}</span>
  🕒 ${d.time}<br>
  🚍 ${d.trip}<br><br>`;

 });

 document.getElementById("info").innerHTML=html;

});

// ================= INIT =================
window.onload=async()=>{

 await initFeeds();

 MASTER_STOPS.forEach(s=>{

  L.circleMarker([s.lat,s.lon],{
   radius:5,
   color:"#0f0",
   fillColor:"#0f0",
   fillOpacity:1
  }).addTo(stopLayer);

 });

 document.getElementById("info").innerHTML="✅ MULTI-GTFS READY";

};

</script>

</body>
</html>
