<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY V4.1 STABLE FIX</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}
#panel{
position:absolute;top:10px;left:10px;z-index:9999;
background:#000c;color:#0f0;padding:10px;width:340px;
border:1px solid #0f0;
}
button{width:100%;margin:3px 0}
</style>
</head>

<body>

<div id="panel">
<h3>🧭 ROXY V4.1 FIX</h3>
<div id="log">READY</div>

<button onclick="loadDemo()">📦 LOAD DEMO GRAPH</button>
<button onclick="runRoute('A','E')">🧠 ROUTE A → E</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.5,19.04],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// ================= GRAPH =================
let nodes = {};
let edges = {};

// ================= LOG =================
function log(t){
 document.getElementById("log").innerText = t;
 console.log(t);
}

// ================= SAFE DEMO GRAPH =================
function loadDemo(){

 nodes = {
  A:{lat:47.50,lon:19.00},
  B:{lat:47.505,lon:19.01},
  C:{lat:47.51,lon:19.02},
  D:{lat:47.52,lon:19.03},
  E:{lat:47.53,lon:19.04}
 };

 edges = {
  A:["B"],
  B:["C"],
  C:["D"],
  D:["E"]
 };

 log("🟢 DEMO GRAPH LOADED");
}

// ================= DIST =================
function dist(a,b){
 let A=nodes[a],B=nodes[b];
 let dx=(A.lat-B.lat)*111000;
 let dy=(A.lon-B.lon)*111000;
 return Math.sqrt(dx*dx+dy*dy);
}

// ================= DIJKSTRA =================
function runRoute(start,end){

 if(!nodes[start]||!nodes[end]){
  log("❌ INVALID START/END");
  return;
 }

 let Q=Object.keys(nodes);
 let d={},prev={};

 Q.forEach(n=>d[n]=Infinity);
 d[start]=0;

 while(Q.length){

  Q.sort((a,b)=>d[a]-d[b]);
  let u=Q.shift();

  if(u===end) break;

  for(let v of (edges[u]||[])){

   let alt=d[u]+dist(u,v);

   if(alt<d[v]){
    d[v]=alt;
    prev[v]=u;
   }
  }
 }

 let path=[];
 let cur=end;

 while(cur){
  path.unshift(cur);
  cur=prev[cur];
 }

 draw(path);
 log("🧠 ROUTE: "+path.join(" → "));
}

// ================= DRAW =================
function draw(path){

 let c=path.map(p=>[nodes[p].lat,nodes[p].lon]);

 L.polyline(c,{color:"lime"}).addTo(map);

 map.fitBounds(L.polyline(c).getBounds());
}

</script>

</body>
</html>
