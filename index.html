<body>

<h2 style="text-align:center;">🚍 PRO Navigáció</h2>

<div id="map"></div>

<div class="panel">
<button onclick="getLocation()">📍 GPS</button>
<button onclick="exportPDF()">📄 PDF mentés</button>
<button onclick="keres()">📄 cim keresö</button>
 
<div id="info" class="card"></div>
<canvas id="chart"></canvas>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

// ===== MAP
var map = L.map('map').setView([47.4979,19.0402],13);

// BASE
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
var topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');

// OVERLAYS
var rail = L.tileLayer('https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png');
var tourist = L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png');
var road = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');

osm.addTo(map);

L.control.layers(
 {"OSM":osm,"Topo":topo},
 {"Vasút":rail,"Turista":tourist,"Közút":road}
).addTo(map);

// ===== GPS
let marker, path=[];
function getLocation(){
 navigator.geolocation.watchPosition(pos=>{
  let lat=pos.coords.latitude;
  let lon=pos.coords.longitude;
  let acc=pos.coords.accuracy;
  let speed=(pos.coords.speed||0)*3.6;

  if(marker) map.removeLayer(marker);
  marker = L.circleMarker([lat,lon],{radius:8,color:'red'}).addTo(map);

  map.setView([lat,lon],15);

  path.push([lat,lon]);

  if(path.length>1){
   L.polyline(path,{color:'yellow'}).addTo(map);
  }

  updateInfo(lat,lon,acc,speed);
  drawProfile();

 });
}

// ===== INFO
function updateInfo(lat,lon,acc,speed){
 let ms = speed/3.6;
 document.getElementById("info").innerHTML=`
 📍 ${lat.toFixed(5)}, ${lon.toFixed(5)}<br>
 🎯 Pontosság: ±${Math.round(acc)} m<br>
 🚶 Sebesség: ${speed.toFixed(1)} km/h (${ms.toFixed(2)} m/s)
 `;
}
 
function cimKeres(lat, lon) {
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("cim").innerText = data.display_name;
    });
}

// ===== SZINT PROFIL (fake DEMO, később cserélhető valósra)
function drawProfile(){

 let dist=0;
 let data=[];
 let labels=[];

 for(let i=1;i<path.length;i++){
  let d = map.distance(path[i-1],path[i]);
  dist+=d;

  let elev = 100 + Math.sin(i/3)*50; // DEMO magasság
  data.push(elev);
  labels.push((dist/1000).toFixed(2)+" km");
 }

 if(data.length<2) return;

 new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
   labels:labels,
   datasets:[{
    label:"Szintprofil (m)",
    data:data
   }]
  }
 });
}

// ===== PDF
 function exportPDF(){
 html2pdf().from(document.body).save("terkep.pdf");
}

});

    let p1 = pontok[0];

    let tav = map.distance(p1, p2);

    alert("Távolság: " + tav.toFixed(0) + " méter");

    pontok = []; // reset
     }
});



</script>

</body>
</html>
