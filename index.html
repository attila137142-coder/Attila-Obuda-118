<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXY V7 SAFETY CORE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#0b0b0b; color:#0f0; }
#map { height:100vh; }

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:1000;
 background:rgba(0,0,0,0.92);
 border:1px solid #0f0;
 padding:10px;
 width:340px;
 max-height:92vh;
 overflow:auto;
}

button{
 width:100%;
 margin:3px 0;
 padding:6px;
 background:black;
 color:#0f0;
 border:1px solid #0f0;
 cursor:pointer;
}

.status{
 border:1px solid #0f0;
 padding:6px;
 margin:5px 0;
 font-size:12px;
}

.small{font-size:11px;opacity:0.8;}
</style>
</head>

<body>

<div id="panel">
<h3>🔐 ROXY SAFETY CORE</h3>

<div id="status" class="status">READY</div>
<div id="loc" class="status">--</div>

<button onclick="startGPS()">📍 GPS START</button>
<button onclick="startTrack()">📡 TRACK ON</button>
<button onclick="stopTrack()">⛔ STOP</button>
<button onclick="goBack()">🔁 VISSZAÚT</button>
<button onclick="resetAll()">🧹 RESET</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.5,19.04],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= DATA =================
let trail = [];
let line;
let watchID = null;
let lastPos = null;
let accMin = 9999;

// ================= GPS =================
function startGPS(){

 navigator.geolocation.getCurrentPosition(p=>{

  let lat = p.coords.latitude;
  let lon = p.coords.longitude;
  let acc = p.coords.accuracy;

  lastPos = [lat,lon];
  accMin = Math.min(accMin, acc);

  map.setView([lat,lon],15);

  L.marker([lat,lon]).addTo(map);

  document.getElementById("status").innerText =
   "GPS OK | pontosság: "+Math.round(acc)+" m";

  document.getElementById("loc").innerText =
   lat.toFixed(5)+", "+lon.toFixed(5);

 });

}

// ================= TRACK =================
function startTrack(){

 if(watchID) return;

 watchID = navigator.geolocation.watchPosition(p=>{

  let pt = [p.coords.latitude, p.coords.longitude];

  trail.push(pt);
  lastPos = pt;

  L.circleMarker(pt,{radius:4,color:"lime"}).addTo(map);

  if(line) map.removeLayer(line);
  line = L.polyline(trail,{color:"lime"}).addTo(map);

  document.getElementById("status").innerText =
   "TRACK: "+trail.length+" pont";

 });

}

// ================= STOP =================
function stopTrack(){
 if(watchID){
  navigator.geolocation.clearWatch(watchID);
  watchID = null;
  document.getElementById("status").innerText = "TRACK OFF";
 }
}

// ================= VISSZAÚT =================
function goBack(){

 if(trail.length < 2){
  alert("Nincs elég adat");
  return;
 }

 let back = [...trail].reverse();

 if(line) map.removeLayer(line);

 line = L.polyline(back,{color:"red"}).addTo(map);

 document.getElementById("status").innerText =
  "VISSZAÚT AKTÍV 🔁";

}

// ================= RESET =================
function resetAll(){
 location.reload();
}

</script>

</body>
</html>
