<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Egyszerű Közlekedés</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000c;
 color:#0f0;
 padding:10px;
 width:300px;
 border:1px solid #0f0;
}
</style>
</head>

<body>

<div id="panel">
<h3>🚆 Egyszerű menetrend</h3>
<div id="info">Térképre kattints</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// 📍 kattintás = koordináta
map.on("click", async e => {
map.on("click", async e => {

 let lat = e.latlng.lat;
 let lon = e.latlng.lng;

 document.getElementById("info").innerHTML = "🔍 keresés...";

 // nagyobb kör + több típus
 let query = `
 [out:json];
 (
  node(around:500,${lat},${lon})["highway"="bus_stop"];
  node(around:500,${lat},${lon})["public_transport"="platform"];
  node(around:500,${lat},${lon})["railway"="tram_stop"];
  node(around:500,${lat},${lon})["railway"="station"];
 );
 out;
 `;

 try{

  let res = await fetch("https://overpass-api.de/api/interpreter", {
    method:"POST",
    body:query
  });

  let data = await res.json();

  if(!data.elements.length){
    document.getElementById("info").innerHTML =
    "❌ nincs megálló a közelben";
    return;
  }

  // töröljük a régi marker-eket
  if(window.stopLayer){
    map.removeLayer(window.stopLayer);
  }

  window.stopLayer = L.layerGroup().addTo(map);

  let html = "<b>Közeli megállók:</b><br>";

  data.elements.slice(0,10).forEach(s=>{

    let name = s.tags.name || "névtelen megálló";

    // MARKER!
    L.circleMarker([s.lat,s.lon],{
      radius:8,
      color:"yellow",
      fillColor:"yellow",
      fillOpacity:1
    }).addTo(window.stopLayer);

    html += "🚏 " + name + "<br>";
  });

  document.getElementById("info").innerHTML = html;

 }catch(err){
  document.getElementById("info").innerHTML =
  "❌ hálózati hiba";
 }

});
 let lat = e.latlng.lat;
 let lon = e.latlng.lng;

 document.getElementById("info").innerHTML =
 "🔍 keresés...";

 // 👉 Overpass – megállók lekérése
 let query = `
 [out:json];
 node(around:200,${lat},${lon})["highway"="bus_stop"];
 out;
 `;

 let res = await fetch("https://overpass-api.de/api/interpreter", {
  method:"POST",
  body:query
 });

 let data = await res.json();

 if(!data.elements.length){
  document.getElementById("info").innerHTML =
   "❌ nincs megálló a közelben";
  return;
 }

 let stop = data.elements[0];

 document.getElementById("info").innerHTML =
 `🚏 Megálló:<br>${stop.tags.name || "névtelen"}`;

});

</script>

</body>
</html>
