<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés V2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

#topbar {
 display:flex;
 justify-content:space-between;
 padding:10px;
 background:#111827;
 font-size:14px;
}

#container {
 display:grid;
 grid-template-columns: 2fr 1fr;
 height: calc(100vh - 40px);
}

#map { height:100%; }

.panel {
 background:#1f2937;
 padding:10px;
 overflow:auto;
}

.card {
 background:#111827;
 padding:8px;
 margin-bottom:8px;
 border-radius:8px;
}

input {
 width:100%;
 padding:6px;
 margin-bottom:10px;
}
</style>
</head>

<body>

<div id="topbar">
 <div id="gps">📍 GPS...</div>
 <div id="net">📶 ...</div>
 <div id="status">🟢 READY</div>
</div>

<div id="container">

 <div id="map"></div>

 <div class="panel">

  <input id="search" placeholder="🔎 Megálló keresés..." oninput="searchStops()">

  <h3>🚏 Legközelebbi</h3>
  <div id="stops"></div>

 </div>

</div>

<script>

/* ================= MAP ================= */

let map = L.map('map').setView([47.4979,19.0402], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'OSM'
}).addTo(map);

let userLat, userLon;

/* ================= ADATBÁZIS ================= */

let stops = [

{line:"Gyermekvasút", name:"Hűvösvölgy", lat:47.5412, lon:18.9640},
{line:"Gyermekvasút", name:"Normafa", lat:47.5070, lon:18.9630},

{line:"MÁV", name:"Kelenföld", lat:47.4649, lon:19.0193},
{line:"MÁV", name:"Déli pályaudvar", lat:47.4990, lon:19.0250},

{line:"BKK", name:"Deák Ferenc tér", lat:47.4979, lon:19.0540},

{line:"Kisvasút", name:"Királyrét", lat:47.9100, lon:18.9730}

];

/* ================= GPS ================= */

function update(pos){

 userLat = pos.coords.latitude;
 userLon = pos.coords.longitude;

 document.getElementById("gps").innerHTML =
 `📍 ${userLat.toFixed(4)}, ${userLon.toFixed(4)}`;

 L.marker([userLat,userLon]).addTo(map);
 map.setView([userLat,userLon],14);

 renderStops();
}

/* ================= NETWORK ================= */

function net(){

 let c = navigator.connection;
 if(!c) return "📶 N/A";

 return `📶 ${c.effectiveType} | ⚡ ${c.downlink} Mbps`;
}

setInterval(()=>{
 document.getElementById("net").innerHTML = net();
},2000);

/* ================= NEAREST ================= */

function dist(a,b){
 return map.distance(a,b);
}

function renderStops(){

 let arr = stops.map(s=>{
  return {
   ...s,
   d: dist([userLat,userLon],[s.lat,s.lon])
  };
 });

 arr.sort((a,b)=>a.d-b.d);

 let html = "";

 arr.slice(0,8).forEach(s=>{
  html += `
  <div class="card">
   🚏 <b>${s.name}</b><br>
   🚆 ${s.line}<br>
   📏 ${(s.d/1000).toFixed(2)} km
  </div>`;
 });

 document.getElementById("stops").innerHTML = html;
}

/* ================= SEARCH ================= */

function searchStops(){

 let q = document.getElementById("search").value.toLowerCase();

 let filtered = stops.filter(s =>
  s.name.toLowerCase().includes(q)
 );

 document.getElementById("stops").innerHTML =
 filtered.map(s=>`
  <div class="card">
   🚏 ${s.name}<br>
   🚆 ${s.line}
  </div>
 `).join("");
}

/* ================= INIT ================= */

navigator.geolocation.watchPosition(update);

</script>

</body>
</html>
