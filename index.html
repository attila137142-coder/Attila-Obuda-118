<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXY V4 REAL ROUTE GRAPH</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:rgba(0,0,0,0.85);
 color:#0f0;
 padding:10px;
 width:380px;
 border:1px solid #0f0;
}

button{
 width:100%;
 margin:3px 0;
 padding:6px;
 background:black;
 color:#0f0;
 border:1px solid #0f0;
 cursor:pointer;
}

.status{
 font-size:12px;
 margin:5px 0;
 border:1px solid #0f0;
 padding:5px;
}
</style>
</head>

<body>

<div id="panel">
<h3>🌍 ROXY V4 REAL GRAPH</h3>

<div id="status" class="status">READY</div>

<button onclick="loadGraph()">📦 LOAD OSM GRAPH</button>
<button onclick="runRoute()">🧠 ROUTE (Dijkstra)</button>
<button onclick="touristMode()">🌲 TOURIST MODE</button>
<button onclick="resetAll()">🧹 RESET</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.5,19.04],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= GRAPH =================
let nodes = {};
let edges = {};

// ================= LOAD OSM DATA =================
// Overpass API (Budapest környék példa)

async function loadGraph(){

 document.getElementById("status").innerText =
 "📦 LOADING OSM GRAPH...";

 let query = `
 [out:json];
 (
  way["highway"](47.45,18.95,47.6,19.2);
 );
 (._;>;);
 out body;
 `;

 let res = await fetch("https://overpass-api.de/api/interpreter", {
  method:"POST",
  body: query
 });

 let data = await res.json();

 nodes = {};
 edges = {};

 // nodes build
 data.elements.forEach(el=>{
  if(el.type==="node"){
   nodes[el.id]={
    lat:el.lat,
    lon:el.lon
   };
  }
 });

 // edges build (ways)
 data.elements.forEach(el=>{
  if(el.type==="way"){
   let n = el.nodes;

   for(let i=0;i<n.length-1;i++){

    let a = n[i];
    let b = n[i+1];

    if(!edges[a]) edges[a]=[];
    if(!edges[b]) edges[b]=[];

    edges[a].push(b);
    edges[b].push(a);
   }
  }
 });

 document.getElementById("status").innerText =
 "🟢 OSM GRAPH READY";
}

// ================= DISTANCE =================
function dist(a,b){

 let A = nodes[a];
 let B = nodes[b];

 if(!A || !B) return 999999;

 let dx = (A.lat-B.lat)*111000;
 let dy = (A.lon-B.lon)*111000;

 return Math.sqrt(dx*dx+dy*dy);
}

// ================= DIJKSTRA =================
function runRoute(startId,endId){

 let distMap = {};
 let prev = {};
 let Q = Object.keys(nodes);

 Q.forEach(n=>distMap[n]=Infinity);
 distMap[startId]=0;

 while(Q.length){

  Q.sort((a,b)=>distMap[a]-distMap[b]);
  let u = Q.shift();

  if(u===endId) break;

  let neighbors = edges[u] || [];

  for(let v of neighbors){

   let cost = dist(u,v);

   let alt = distMap[u] + cost;

   if(alt < distMap[v]){
    distMap[v]=alt;
    prev[v]=u;
   }
  }
 }

 let path=[];
 let cur=endId;

 while(cur){
  path.unshift(cur);
  cur=prev[cur];
 }

 draw(path);

 document.getElementById("status").innerText =
 "🧠 ROUTE READY";
}

// ================= DRAW =================
function draw(path){

 let coords = path.map(id=>[
  nodes[id].lat,
  nodes[id].lon
 ]);

 L.polyline(coords,{color:"lime"}).addTo(map);

 map.fitBounds(L.polyline(coords).getBounds());
}

// ================= TOURIST =================
function touristMode(){

 document.getElementById("status").innerText =
 "🌲 TOURIST MODE";

 navigator.geolocation.getCurrentPosition(p=>{

  let from=[p.coords.latitude,p.coords.longitude];
  let to=[47.55,19.1];

  L.polyline([from,to],{color:"orange"}).addTo(map);
 });
}

// ================= RESET =================
function resetAll(){
 location.reload();
}

</script>

</body>
</html>
