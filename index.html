<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GTFS Cockpit v5.1 FIX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; background:#111; color:#fff; }
#map { height: 60vh; }
.panel { padding:10px; }
button { margin:3px; padding:8px; border:0; border-radius:6px; }
.box { background:#1e1e1e; padding:10px; border-radius:8px; font-size:13px; }
.list { max-height:25vh; overflow:auto; margin-top:8px; }
.item { padding:4px 0; border-bottom:1px solid #333; }
</style>
</head>

<body>

<div class="panel">

<button onclick="loadGTFS()">📦 GTFS LOAD</button>
<button onclick="setFilter('all')">🌍 ALL</button>
<button onclick="setFilter('bkk')">🚍 BKK</button>
<button onclick="setFilter('volan')">🚌 VOLÁN</button>
<button onclick="setFilter('mav')">🚆 MÁV</button>
<button onclick="setFilter('forest')">🌲 KISVASÚT</button>

<div id="info" class="box">Ready</div>

<div id="list" class="box list"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([47.2,19.5],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = L.layerGroup().addTo(map);

let state = {
  stops: [],
  filter: "all"
};

// ---------------- GTFS LOAD ----------------
function loadGTFS(){

  state.stops = [
    {id:"BKK_001",name:"Deák Ferenc tér",lat:47.4979,lng:19.0550,type:"bkk"},
    {id:"BKK_002",name:"Astoria",lat:47.4959,lng:19.0615,type:"bkk"},
    {id:"MAV_001",name:"Keleti pályaudvar",lat:47.5009,lng:19.0836,type:"mav"},
    {id:"VOL_001",name:"Székesfehérvár busz",lat:47.1860,lng:18.4221,type:"volan"},
    {id:"KIS_001",name:"Szob kisvasút",lat:47.8190,lng:18.8670,type:"forest"},
    {id:"NAD_UTCA_FIX","name":"Nád utca FIX pont",lat:47.52,lng:19.08,type:"bkk"}
  ];

  render();
  renderInfo("GTFS betöltve ✔");
}

// ---------------- FILTER ----------------
function setFilter(f){
  state.filter = f;
  render();
}

// ---------------- RENDER ----------------
function render(){

  markers.clearLayers();

  let list = state.stops;

  if(state.filter !== "all"){
    list = list.filter(s => s.type === state.filter);
  }

  // MAP
  list.forEach(s=>{
    L.marker([s.lat,s.lng])
      .addTo(markers)
      .bindPopup(`${s.name}<br>${s.id}`);
  });

  // LISTA
  document.getElementById("list").innerHTML =
    list.map(s =>
      `<div class="item">
        🚏 ${s.name}<br>
        🆔 ${s.id}<br>
        📊 ${s.type}
      </div>`
    ).join("");

  renderInfo(`${list.length} elem`);
}

// ---------------- INFO ----------------
function renderInfo(t){
  document.getElementById("info").innerHTML = t;
}

</script>

</body>
</html>
