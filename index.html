<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila PRO – Szint + Vasút</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  background:black;
  color:yellow;
  font-family:Arial;
  text-align:center;
}

#map{
  height:700px;
}

button{
  padding:10px;
  margin:5px;
  font-size:16px;
}

#info{
  color:cyan;
  margin-top:10px;
  font-size:16px;
}

/* Térkép feliratok nagyítása */
.leaflet-container{
  font-size:18px;
}
</style>
</head>

<body>

<h1>🚂 Attila Közlekedés – PRO</h1>

<div>
<button onclick="setLayer('osm')">Alap</button>
<button onclick="setLayer('topo')">Topo</button>
<button onclick="setLayer('rail')">Vasút</button>
<button onclick="setLayer('turista')">Turista</button>
</div>

<div id="map"></div>

<div id="info">Kattints: start → cél</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== TÉRKÉP
let map = L.map('map').setView([47.4979, 19.0402], 15);

let osm = L.tileLayer(
 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
 {maxZoom:20}
);

let topo = L.tileLayer(
 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'
);

let rail = L.tileLayer(
 'https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png',
 {opacity:0.9}
);

let turista = L.tileLayer(
 'https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png'
);

osm.addTo(map);

// ===== RÉTEG VÁLTÁS
function setLayer(type){

 map.eachLayer(l=>map.removeLayer(l));

 osm.addTo(map);

 if(type==="topo") topo.addTo(map);
 if(type==="rail") rail.addTo(map);
 if(type==="turista") turista.addTo(map);
}

// ===== GPS
let userPos = null;

navigator.geolocation.watchPosition(p=>{
 userPos = [p.coords.latitude, p.coords.longitude];
});

// ===== ÚTVONAL
let start=null;
let line=null;

map.on("click", async e=>{

 if(!userPos){
   alert("Nincs GPS!");
   return;
 }

 if(!start){
   start=userPos;
   alert("Start rögzítve → kattints célra");
   return;
 }

 let end=[e.latlng.lat, e.latlng.lng];

 // útvonal
 let url=`https://router.project-osrm.org/route/v1/foot/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;

 let res=await fetch(url);
 let data=await res.json();

 let route=data.routes[0];

 let dist=(route.distance/1000).toFixed(2);

 if(line) map.removeLayer(line);
 line=L.geoJSON(route.geometry).addTo(map);

 // ===== SZINT LEKÉRÉS
 let coords=route.geometry.coordinates
  .map(c=>c[1]+","+c[0])
  .join("|");

 let elevRes=await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${coords}`);
 let elevData=await elevRes.json();

 let gain=0, loss=0;
 let segments=[];

 for(let i=1;i<elevData.results.length;i++){

   let h1=elevData.results[i-1].elevation;
   let h2=elevData.results[i].elevation;

   let diff=h2-h1;

   let d=map.distance(
     [route.geometry.coordinates[i-1][1], route.geometry.coordinates[i-1][0]],
     [route.geometry.coordinates[i][1], route.geometry.coordinates[i][0]]
   );

   if(d < 5) continue; // zaj kiszűrés

   let percent=(diff/d)*100;

   if(diff>0){
     gain+=diff;
     segments.push(`⬆️ ${d.toFixed(0)} m | ${percent.toFixed(1)}%`);
   }else{
     loss+=Math.abs(diff);
     segments.push(`⬇️ ${d.toFixed(0)} m | ${percent.toFixed(1)}%`);
   }
 }

 // ===== KIÍRÁS
 document.getElementById("info").innerHTML=
 `
 📏 Út: ${dist} km<br>
 ⛰ Emelkedés: ${gain.toFixed(0)} m<br>
 ⛰ Lejtés: ${loss.toFixed(0)} m<br><br>

 <b>📊 Szakaszok:</b><br>
 ${segments.slice(0,12).join("<br>")}
 `;

 start=null;

});

</script>

</body>
</html>
