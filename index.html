<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hungary Transit + Forest Rail Cockpit PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; background:#111; color:#fff; }
#map { height: 60vh; }
.panel { padding:10px; }
button { margin:3px; padding:8px; border:0; border-radius:6px; }
.box { background:#1e1e1e; padding:10px; border-radius:8px; font-size:13px; }
</style>
</head>

<body>

<div class="panel">

<button onclick="setMode('gps')">🧭 GPS</button>
<button onclick="toggleStops()">🚏 Megállók</button>
<button onclick="filter('bkk')">🚍 BKK</button>
<button onclick="filter('volan')">🚌 VOLÁN</button>
<button onclick="filter('mav')">🚆 MÁV</button>
<button onclick="filter('forest')">🌲 Kisvasút</button>

<div id="info" class="box">Indítás...</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([47.4979,19.0402],8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let mode = "gps";
let showStops = false;
let userPos = null;
let markers = L.layerGroup().addTo(map);

// ---------------- DEMO GTFS LITE ADAT ----------------
// (EZT később a te GTFS exportjaid töltik fel automatikusan)
let stops = [
  {id:"BKK_001", name:"Deák Ferenc tér", lat:47.4975, lng:19.0550, type:"bkk"},
  {id:"BKK_002", name:"Blaha Lujza tér", lat:47.4970, lng:19.0700, type:"bkk"},
  {id:"MAV_010", name:"Keleti pályaudvar", lat:47.5009, lng:19.0836, type:"mav"},
  {id:"VOL_120", name:"Érd autóbusz-állomás", lat:47.3840, lng:18.9300, type:"volan"},
  {id:"KIS_001", name:"Szob kisvasút", lat:47.8190, lng:18.8670, type:"forest"},
  /* ================= GYERMEKVASÚT ================= */
{line:"Gyermekvasút", name:"Széchenyi-hegy", lat:47.5007, lon:18.9653, mav_id:"005546912"},
{line:"Gyermekvasút", name:"Normafa", lat:47.5070, lon:18.9630, mav_id:"005546904"},
{line:"Gyermekvasút", name:"Csillebérc", lat:47.5109, lon:18.9659, mav_id:"005546896"},
{line:"Gyermekvasút", name:"Virágvölgy", lat:47.5185, lon:18.9672, mav_id:"005546888"},
{line:"Gyermekvasút", name:"Jánoshegy", lat:47.5207, lon:18.9646, mav_id:"005546870"},
{line:"Gyermekvasút", name:"Vadaspark mh.", lat:47.5365, lon:18.9695, mav_id:null},
{line:"Gyermekvasút", name:"Szépjuhászné", lat:47.5287, lon:18.9683, mav_id:"005546862"},
{line:"Gyermekvasút", name:"Hárs-hegy", lat:47.5315, lon:18.9712, mav_id:"005546854"},
{line:"Gyermekvasút", name:"Hűvösvölgy", lat:47.5412, lon:18.9640, mav_id:"005546847"},

/* ================= KIRÁLYRÉT ================= */
{line:"Királyréti Erdei Vasút", name:"Kismaros", lat:47.8270, lon:19.0150, mav_id:null},
{line:"Királyréti Erdei Vasút", name:"Morgó", lat:47.8440, lon:19.0020, mav_id:null},
{line:"Királyréti Erdei Vasút", name:"Börzsönyliget", lat:47.8605, lon:18.9940, mav_id:null},
{line:"Királyréti Erdei Vasút", name:"Pap-hegy", lat:47.8830, lon:18.9840, mav_id:null},
{line:"Királyréti Erdei Vasút", name:"Királyrét", lat:47.9100, lon:18.9730, mav_id:null},

/* ================= KEMENCE ================= */
{line:"Kemencei Erdei Múzeumvasút", name:"Kemence", lat:47.9980, lon:18.8910, mav_id:null},
{line:"Kemencei Erdei Múzeumvasút", name:"Godóvár", lat:47.9905, lon:18.8875, mav_id:null},
{line:"Kemencei Erdei Múzeumvasút", name:"Feketevölgy", lat:47.9830, lon:18.8830, mav_id:null},
{line:"Kemencei Erdei Múzeumvasút", name:"Hajagos", lat:47.9750, lon:18.8790, mav_id:null},
{line:"Kemencei Erdei Múzeumvasút", name:"Rózsa-forrás", lat:47.9670, lon:18.8750, mav_id:null},

/* ================= NAGYBÖRZSÖNY ================= */
{line:"Nagybörzsönyi Erdei Vasút", name:"Nagybörzsöny", lat:47.9360, lon:18.8320, mav_id:null},
{line:"Nagybörzsönyi Erdei Vasút", name:"Nagybörzsöny-Észak", lat:47.9430, lon:18.8280, mav_id:null},
{line:"Nagybörzsönyi Erdei Vasút", name:"Kisirtáspuszta", lat:47.9500, lon:18.8220, mav_id:null},
{line:"Nagybörzsönyi Erdei Vasút", name:"Nagyirtáspuszta", lat:47.9555, lon:18.8185, mav_id:null},

/* ================= SZOBI KISVASÚT (KIEGÉSZÍTVE!) ================= */
{line:"Szobi Kisvasút", name:"Szob", lat:47.8190, lon:18.8680, mav_id:null},
{line:"Szobi Kisvasút", name:"Márianosztra", lat:47.8730, lon:18.8700, mav_id:null},
{line:"Szobi Kisvasút", name:"Máriakút", lat:47.8850, lon:18.8720, mav_id:null},
{line:"Szobi Kisvasút", name:"Füstös-forrás", lat:47.8950, lon:18.8750, mav_id:null},
{line:"Szobi Kisvasút", name:"Vetett-fű", lat:47.9050, lon:18.8780, mav_id:n
];

// ---------------- GPS ----------------
navigator.geolocation.watchPosition(pos=>{
  userPos = {lat:pos.coords.latitude,lng:pos.coords.longitude};

  render();
});

// ---------------- MODE ----------------
function setMode(m){
  mode = m;
  render();
}

// ---------------- TOGGLE ----------------
function toggleStops(){
  showStops = !showStops;
  render();
}

// ---------------- FILTER ----------------
function filter(type){
  markers.clearLayers();

  stops.filter(s=>s.type===type).forEach(s=>{
    addStop(s);
  });

  render();
}

// ---------------- STOP RENDER ----------------
function addStop(s){
  let m = L.marker([s.lat,s.lng]).addTo(markers);

  let dist = userPos ? haversine(userPos.lat,userPos.lng,s.lat,s.lng) : 0;

  m.bindPopup(`
    🚏 ${s.name}<br>
    🆔 ${s.id}<br>
    📏 ${dist.toFixed(0)} m
  `);
}

// ---------------- DISTANCE ----------------
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ---------------- MAIN RENDER ----------------
function render(){

  if(showStops){
    markers.clearLayers();
    stops.forEach(s=>addStop(s));
  }

  let text = `
    🧭 MODE: ${mode}<br>
    📍 User: ${userPos ? userPos.lat.toFixed(5)+", "+userPos.lng.toFixed(5) : "no GPS"}<br>
    🚏 Stops loaded: ${stops.length}<br>
  `;

  document.getElementById("info").innerHTML = text;
}

</script>

</body>
</html>
