<script>

// VALÓDI MENETREND (Menetrend API - proxy)
async function loadTimes(stopName){

 const el=document.getElementById("times-"+stopName);

 try{

   const url=`https://transport.opendata.ch/v1/stationboard?station=${encodeURIComponent(stopName)}&limit=5`;

   const res=await fetch(url);
   const data=await res.json();

   let html="";

   data.stationboard.forEach(j=>{

     const dep=new Date(j.stop.departure);
     const now=new Date();

     let diff=Math.floor((dep-now)/1000);

     let color="white";
     if(diff<0) color="red";
     if(diff>300) color="blue";

     let m=Math.floor(Math.abs(diff)/60);
     let s=Math.abs(diff)%60;

     html+=`
     <div class="${color}">
       ${j.number} → ${j.to}<br>
       ⏱ ${diff>=0?"+":"-"}${m}:${String(s).padStart(2,"0")}
     </div>`;
   });

   el.innerHTML=html;

 }catch(e){
   el.innerHTML="Hiba menetrendnél";
 }

}

</script>
