<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>📱 Attila Mobil Navigáció PRO v1</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#000;
 color:#FFD700;
 padding:10px;
}

h1{text-align:center;font-size:20px;}

button{
 padding:10px;
 margin:5px 0;
 width:100%;
 border-radius:10px;
 border:0;
 background:#222;
 color:#FFD700;
}

.card{
 background:#111;
 padding:10px;
 margin-top:10px;
 border-radius:10px;
}

.small{font-size:12px;opacity:0.7;}
.red{color:red;}
.blue{color:#00aaff;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>

<h1>📱 Attila Mobil Navigáció PRO v1</h1>

<button onclick="getLocation()">📍 Hely frissítés</button>
<button onclick="loadGTFS()">📥 GTFS betöltés</button>
<button onclick="toggleSurvival()">🌲 Börzsöny mód</button>

<div id="status" class="card">⚠️ Nincs adat</div>

<div id="network" class="card">📡 Hálózat: -</div>

<div id="results"></div>

<script>

// =====================
// ADATOK
// =====================
let stops = [];
let stopTimes = [];
let trips = [];

let tripsMap = {};
let stopTimesMap = {};

let userLat = null;
let userLon = null;

let survivalMode = false;

// =====================
// GPS
// =====================
function getLocation(){
 navigator.geolocation.getCurrentPosition(pos=>{
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;

  document.getElementById("status").innerText =
   "✔ GPS frissítve";

  render();
 });
}

// =====================
// GTFS BETÖLTÉS
// =====================
async function loadGTFS(){

 document.getElementById("status").innerText =
 "📦 GTFS betöltés...";

 const res = await fetch("IDE_A_VERCEL_PROXY_URL");
 const blob = await res.blob();

 const zip = await JSZip.loadAsync(blob);

 stops = parseCSV(await zip.file("stops.txt").async("string"));
 stopTimes = parseCSV(await zip.file("stop_times.txt").async("string"));
 trips = parseCSV(await zip.file("trips.txt").async("string"));

 // index
 tripsMap = {};
 stopTimesMap = {};

 trips.forEach(t=>{
  tripsMap[t.trip_id] = t;
 });

 stopTimes.forEach(st=>{
  if(!stopTimesMap[st.stop_id]) stopTimesMap[st.stop_id]=[];
  stopTimesMap[st.stop_id].push(st);
 });

 document.getElementById("status").innerText =
 "✔ GTFS kész";

 render();
}

// =====================
// CSV
// =====================
function parseCSV(txt){
 const rows = txt.trim().split("\n");
 const headers = rows[0].split(",");

 return rows.slice(1).map(r=>{
  const cols = r.split(",");
  let obj={};
  headers.forEach((h,i)=>obj[h]=cols[i]);
  return obj;
 });
}

// =====================
// TÁVOLSÁG
// =====================
function haversine(lat1, lon1, lat2, lon2){
 const R = 6371000;
 const dLat = (lat2-lat1)*Math.PI/180;
 const dLon = (lon2-lon1)*Math.PI/180;

 const a =
  Math.sin(dLat/2)**2 +
  Math.cos(lat1*Math.PI/180) *
  Math.cos(lat2*Math.PI/180) *
  Math.sin(dLon/2)**2;

 return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// =====================
// NETWORK (becsült)
// =====================
function networkInfo(){
 const c = navigator.connection;

 if(!c) return "ismeretlen";

 return `${c.effectiveType || "?"} | RTT ${c.rtt || "?"}ms`;
}

// =====================
// SURVIVAL MODE
// =====================
function toggleSurvival(){
 survivalMode = !survivalMode;

 if(survivalMode){
  document.body.style.background = "#001100";
  document.getElementById("status").innerText =
   "🌲 Börzsöny mód AKTÍV";
 } else {
  document.body.style.background = "#000";
  document.getElementById("status").innerText =
   "Normál mód";
 }

 render();
}

// =====================
// RENDER
// =====================
function render(){

 document.getElementById("network").innerText =
 "📡 Hálózat: " + networkInfo();

 if(!userLat || stops.length === 0) return;

 let nearby = stops.map(s=>{
  const d = haversine(
   userLat,userLon,
   +s.stop_lat,+s.stop_lon
  );

  return {...s,dist:d};
 })
 .sort((a,b)=>a.dist-b.dist)
 .slice(0,12);

 let html = "";

 nearby.forEach(s=>{

  let times = stopTimesMap[s.stop_id] || [];

  let next = [];

  for(let t of times.slice(0,20)){
   const trip = tripsMap[t.trip_id];
   if(!trip) continue;

   let [h,m] = (t.arrival_time||"0:0").split(":").map(Number);
   h = h % 24;

   const now = new Date();
   const min =
    (h*60+m) - (now.getHours()*60 + now.getMinutes());

   if(min < 0 || min > 180) continue;

   next.push({
    line: trip.route_id,
    time: min
   });
  }

  next.sort((a,b)=>a.time-b.time);

  html += `
  <div class="card">
   🚏 <b>${s.stop_name}</b><br>
   📏 ${(s.dist/1000).toFixed(2)} km (${Math.round(s.dist)} m)<br>
  `;

  next.slice(0,5).forEach(n=>{
   let c = "";
   if(n.time < 2) c="red";
   else if(n.time > 10) c="blue";

   html += `<div class="${c}">
    🚍 ${n.line} | ${n.time} perc
   </div>`;
  });

  html += "</div>";
 });

 document.getElementById("results").innerHTML = html;
}

// auto frissítés
setInterval(render, 30000);

</script>

</body>
</html>
