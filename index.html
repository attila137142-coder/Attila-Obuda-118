<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés V2 - Dispatcher</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:#fff; }

#topbar{
 display:flex;
 justify-content:space-between;
 padding:10px;
 background:#111827;
 font-size:14px;
}

#container{
 display:grid;
 grid-template-columns: 2fr 1fr;
 height: calc(100vh - 40px);
}

#map{ height:100%; }

.panel{
 background:#1f2937;
 padding:10px;
 overflow:auto;
}

.card{
 background:#111827;
 padding:8px;
 margin-bottom:8px;
 border-radius:8px;
}

input{
 width:100%;
 padding:8px;
 margin-bottom:10px;
 border-radius:6px;
 border:none;
}
</style>
</head>

<body>

<div id="topbar">
 <div id="gps">📍 GPS...</div>
 <div id="net">📶 ...</div>
 <div id="status">🟢 READY</div>
</div>

<div id="container">

 <div id="map"></div>

 <div class="panel">

  <input id="search" placeholder="🔎 Megálló keresés..." oninput="searchStops()">

  <h3>🚏 Legközelebbi megállók</h3>
  <div id="stops">--</div>

 </div>

</div>

<script>

/* ================= MAP ================= */

let map = L.map('map').setView([47.4979,19.0402], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'OSM'
}).addTo(map);

/* ================= USER ================= */

let userLat, userLon;

/* ================= STOP DATABASE ================= */

let stops = [

/* --- BKK / MÁV --- */
{line:"BKK", name:"Deák Ferenc tér", lat:47.4979, lon:19.0540},
{line:"MÁV", name:"Kelenföld", lat:47.4649, lon:19.0193},
{line:"MÁV", name:"Déli pályaudvar", lat:47.4990, lon:19.0250},

/* --- GYERMEKVASÚT --- */
{line:"Gyermekvasút", name:"Hűvösvölgy", lat:47.5412, lon:18.9640},
{line:"Gyermekvasút", name:"Normafa", lat:47.5070, lon:18.9630},

/* --- KISVASUTAK --- */
{line:"Királyrét", name:"Kismaros", lat:47.8270, lon:19.0150},
{line:"Királyrét", name:"Királyrét", lat:47.9100, lon:18.9730},

{line:"Kemence", name:"Kemence", lat:47.9980, lon:18.8910},

{line:"Szobi Kisvasút", name:"Szob", lat:47.8190, lon:18.8680}

];

/* ================= FORMAT ================= */

function formatDistance(m){
 return m < 1000 ? Math.round(m)+" m" : (m/1000).toFixed(2)+" km";
}

/* ================= DIST ================= */

function dist(a,b){
 return map.distance(a,b);
}

/* ================= NEAREST ================= */

function getNearest(){

 return stops.map(s=>{
  return {
   ...s,
   d: dist([userLat,userLon],[s.lat,s.lon])
  };
 }).sort((a,b)=>a.d-b.d).slice(0,10);

}

/* ================= RENDER ================= */

function renderStops(){

 let list = getNearest();

 document.getElementById("stops").innerHTML =
 list.map(s=>`
  <div class="card">
   🚏 <b>${s.name}</b><br>
   🚆 ${s.line}<br>
   📏 ${formatDistance(s.d)}
  </div>
 `).join("");

}

/* ================= SEARCH ================= */

function searchStops(){

 let q = document.getElementById("search").value.toLowerCase();

 let filtered = stops.filter(s =>
  s.name.toLowerCase().includes(q)
 );

 document.getElementById("stops").innerHTML =
 filtered.map(s=>`
  <div class="card">
   🚏 ${s.name}<br>
   🚆 ${s.line}
  </div>
 `).join("");

}

/* ================= NETWORK ================= */

function net(){

 let c = navigator.connection;
 if(!c) return "📶 nincs adat";

 return `📶 ${c.effectiveType} | ⚡ ${c.downlink} Mbps`;
}

setInterval(()=>{
 document.getElementById("net").innerHTML = net();
},2000);

/* ================= GPS ================= */

async function update(pos){

 userLat = pos.coords.latitude;
 userLon = pos.coords.longitude;

 let acc = pos.coords.accuracy;

 document.getElementById("gps").innerHTML =
 `📍 ${userLat.toFixed(4)}, ${userLon.toFixed(4)} | ±${Math.round(acc)}m`;

 let res = await fetch(
  `https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`
 );

 let d = await res.json();
 let a = d.address || {};

 document.getElementById("status").innerHTML =
 `🌍 ${a.city || a.town || a.village || "-"} | READY`;

 L.marker([userLat,userLon]).addTo(map);
 map.setView([userLat,userLon],14);

 renderStops();
}

/* ================= START ================= */

navigator.geolocation.watchPosition(update);

</script>

</body>
</html>
