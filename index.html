<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attila Közlekedés – Diszpécser térkép</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.title{
position:absolute;
top:15px;
left:70px;
z-index:1000;
background:white;
padding:10px 16px;
border-radius:8px;
font-size:22px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

.layerbox{
position:absolute;
top:80px;
left:15px;
z-index:1000;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
font-size:16px;
}

.leaflet-control-zoom a{
width:50px;
height:50px;
line-height:50px;
font-size:26px;
}

</style>

</head>

<body>

<div class="title">
Attila Közlekedés – Diszpécser térkép
</div>

<div class="layerbox">

<label>
<input type="radio" name="layer" checked onclick="streetLayer.addTo(map); topoLayer.remove();">
Utcatérkép
</label>

<br><br>

<label>
<input type="radio" name="layer" onclick="topoLayer.addTo(map); streetLayer.remove();">
Topográfiai térkép
</label>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.55,19.03],13);

var streetLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

var topoLayer = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
{
maxZoom:17,
attribution:'© OpenTopoMap'
}
);

L.marker([47.55,19.03])
.addTo(map)
.bindPopup("Békásmegyer központ");

</script>

</body>
</html>
