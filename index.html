<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<title>MULTI GTFS PRO (IndexedDB)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body { margin:0; font-family: Arial; display:flex; height:100vh; }
#sidebar { width:380px; padding:10px; border-right:1px solid #ddd; overflow:auto; }
#map { flex:1; }
#dropzone { border:2px dashed #888; padding:10px; text-align:center; margin-bottom:10px; }
.stop { padding:6px; border-bottom:1px solid #eee; cursor:pointer; }
.stop:hover { background:#f0f0f0; }
input { width:100%; padding:8px; margin-bottom:10px; }
#status { font-size:12px; margin-bottom:10px; }
</style>
</head>
<body>

<div id="sidebar">
<h3>💾 MULTI GTFS PRO (IndexedDB)</h3>
<div id="status">Indítás...</div>
<div id="dropzone">📁 Húzz ide GTFS ZIP-et</div>
<input type="file" id="fileInput" multiple accept=".zip" />
<input id="search" placeholder="Keresés..." />
<div id="list"></div>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([47.4979,19.0402],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stops=[], markers=[], stopTimes=[];
let tripsMap={}, routesMap={};
const status=document.getElementById('status');

// ---------------- IndexedDB ----------------
let db;
const DB_NAME="GTFS_DB";

function initDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=e=>{
      db=e.target.result;
      db.createObjectStore("zips",{keyPath:"name"});
    };
    req.onsuccess=e=>{db=e.target.result; resolve();};
    req.onerror=e=>reject();
  });
}

function saveZip(name,buffer){
  const tx=db.transaction("zips","readwrite");
  tx.objectStore("zips").put({name,data:buffer});
}

function getAllZips(){
  return new Promise(res=>{
    const tx=db.transaction("zips","readonly");
    const req=tx.objectStore("zips").getAll();
    req.onsuccess=()=>res(req.result);
  });
}

// ---------------- CSV ----------------
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(Boolean);
  const header=lines[0].split(',');
  return {lines,header};
}

// ---------------- LOAD ZIP ----------------
async function loadZip(file){
  const zip=await JSZip.loadAsync(file);

  const stopsText=await zip.file("stops.txt").async("string");
  let {lines,header}=parseCSV(stopsText);

  const idIndex=header.indexOf('stop_id');
  const nameIndex=header.indexOf('stop_name');
  const latIndex=header.indexOf('stop_lat');
  const lonIndex=header.indexOf('stop_lon');

  const newStops=lines.slice(1).map(l=>{
    const c=l.split(',');
    return {id:c[idIndex],name:c[nameIndex],lat:+c[latIndex],lon:+c[lonIndex]};
  });

  stops=stops.concat(newStops);

  // ROUTES
  const routesText=await zip.file("routes.txt").async("string");
  ({lines,header}=parseCSV(routesText));
  const rid=header.indexOf('route_id');
  const short=header.indexOf('route_short_name');
  lines.slice(1).forEach(l=>{
    const c=l.split(',');
    routesMap[c[rid]]=c[short];
  });

  // TRIPS
  const tripsText=await zip.file("trips.txt").async("string");
  ({lines,header}=parseCSV(tripsText));
  const tid=header.indexOf('trip_id');
  const trid=header.indexOf('route_id');
  const headsign=header.indexOf('trip_headsign');
  lines.slice(1).forEach(l=>{
    const c=l.split(',');
    tripsMap[c[tid]]={route:routesMap[c[trid]], headsign:c[headsign]};
  });

  // STOP TIMES
  const stText=await zip.file("stop_times.txt").async("string");
  ({lines,header}=parseCSV(stText));
  const sid=header.indexOf('stop_id');
  const time=header.indexOf('departure_time');
  const trip=header.indexOf('trip_id');

  stopTimes=stopTimes.concat(lines.slice(1).map(l=>{
    const c=l.split(',');
    return {stop:c[sid],time:c[time],trip:c[trip]};
  }));

  status.innerText=`✔ Betöltve: ${stops.length} megálló`;
  render();
}

// ---------------- LOAD FROM DB ----------------
async function loadFromDB(){
  const files=await getAllZips();
  if(!files.length){status.innerText="Nincs mentett adat";return;}

  status.innerText="♻ Betöltés adatbázisból...";

  for(const f of files){
    const file=new File([f.data],f.name);
    await loadZip(file);
  }
}

// ---------------- RENDER ----------------
function render(){
  renderList(stops);
  renderMarkers(stops);
}

function renderList(data){
  const list=document.getElementById('list');
  list.innerHTML='';
  data.slice(0,200).forEach(s=>{
    const div=document.createElement('div');
    div.className='stop';
    div.innerText=s.name;
    div.onclick=()=>openStop(s);
    list.appendChild(div);
  });
}

function renderMarkers(data){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  data.forEach(s=>{
    const m=L.marker([s.lat,s.lon]).addTo(map).on('click',()=>openStop(s));
    markers.push(m);
  });
}

function openStop(stop){
  const now=new Date();
  const current=now.getHours()*3600+now.getMinutes()*60;

  const times=stopTimes
    .filter(t=>t.stop===stop.id)
    .map(t=>{
      const p=t.time.split(':');
      const sec=+p[0]*3600+ +p[1]*60;
      return {...t,sec};
    })
    .filter(t=>t.sec>=current)
    .sort((a,b)=>a.sec-b.sec)
    .slice(0,10);

  let html=`<b>${stop.name}</b><br><br>`;

  times.forEach(t=>{
    const trip=tripsMap[t.trip];
    if(!trip) return;
    html+=`🚌 <b>${trip.route}</b> → ${trip.headsign}<br>${t.time}<br><br>`;
  });

  L.popup().setLatLng([stop.lat,stop.lon]).setContent(html).openOn(map);
}

// SEARCH
const search=document.getElementById('search');
search.addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  const f=stops.filter(s=>s.name.toLowerCase().includes(q));
  renderList(f);
  renderMarkers(f);
});

// FILE INPUT
const fileInput=document.getElementById('fileInput');
const drop=document.getElementById('dropzone');

function handleFiles(files){
  for(const f of files){
    const reader=new FileReader();
    reader.onload=async e=>{
      const buffer=e.target.result;
      saveZip(f.name,buffer);
      const file=new File([buffer],f.name);
      await loadZip(file);
    };
    reader.readAsArrayBuffer(f);
  }
}

drop.addEventListener('dragover',e=>e.preventDefault());
drop.addEventListener('drop',e=>{
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change',e=>handleFiles(e.target.files));

// ---------------- VEHICLE SIMULATION ----------------
let vehicles = [];
let vehicleMarkers = [];

function buildVehicles(){
  vehicles = [];

  const grouped = {};

  stopTimes.forEach(st=>{
    if(!grouped[st.trip]) grouped[st.trip]=[];
    const parts = st.time.split(':');
    const sec = +parts[0]*3600 + +parts[1]*60;
    grouped[st.trip].push({...st, sec});
  });

  for(const tripId in grouped){
    const seq = grouped[tripId].sort((a,b)=>a.sec-b.sec);
    if(seq.length < 2) continue;

    vehicles.push({ tripId, seq });
  }
}

function updateVehicles(){
  const now = new Date();
  const current = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();

  // clear old
  vehicleMarkers.forEach(m=>map.removeLayer(m));
  vehicleMarkers = [];

  vehicles.forEach(v=>{
    for(let i=0;i<v.seq.length-1;i++){
      const a = v.seq[i];
      const b = v.seq[i+1];

      if(current >= a.sec && current <= b.sec){

        const stopA = stops.find(s=>s.id===a.stop);
        const stopB = stops.find(s=>s.id===b.stop);
        if(!stopA || !stopB) return;

        const ratio = (current - a.sec) / (b.sec - a.sec);

        const lat = stopA.lat + (stopB.lat - stopA.lat)*ratio;
        const lon = stopA.lon + (stopB.lon - stopA.lon)*ratio;

        const trip = tripsMap[v.tripId];
        const label = trip ? trip.route : "?";

        const marker = L.circleMarker([lat,lon],{
          radius:6
        }).addTo(map).bindPopup(`🚌 ${label}`);

        vehicleMarkers.push(marker);
        break;
      }
    }
  });
}

setInterval(updateVehicles, 5000);

// START
(async()=>{
  await initDB();
  await loadFromDB();

  // wait a bit then build vehicles
  setTimeout(()=>{
    buildVehicles();
    updateVehicles();
  },2000);
})();
