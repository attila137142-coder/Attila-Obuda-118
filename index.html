<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>ROXY V3</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:#000c;
 color:#0f0;
 padding:10px;
 width:320px;
 border:1px solid #0f0;
 max-height:90vh;
 overflow:auto;
}

.stop{
 cursor:pointer;
 padding:3px;
}
.stop:hover{
 background:#0f0;
 color:#000;
}
</style>
</head>

<body>

<div id="panel">
<h3>🚆 ROXY V3</h3>
<div id="info">Térképre kattints</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.4979,19.0402],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let stopLayer = L.layerGroup().addTo(map);

// ================= OVERPASS =================
async function fetchOverpass(query){

 let urls = [
  "https://overpass-api.de/api/interpreter",
  "https://lz4.overpass-api.de/api/interpreter",
  "https://overpass.kumi.systems/api/interpreter"
 ];

 for(let url of urls){
  try{
    let res = await fetch(url,{
      method:"POST",
      body:query
    });

    if(res.ok){
      return await res.json();
    }
  }catch(e){}
 }

 throw "nincs szerver";
}

// ================= CLICK =================
map.on("click", async e => {

 let lat = e.latlng.lat;
 let lon = e.latlng.lng;

 document.getElementById("info").innerHTML = "🔍 keresés...";

 let query = `
 [out:json];
 (
  node(around:600,${lat},${lon})["highway"="bus_stop"];
  node(around:600,${lat},${lon})["public_transport"="platform"];
  node(around:600,${lat},${lon})["railway"="tram_stop"];
  node(around:600,${lat},${lon})["railway"="station"];
 );
 out;
 `;

 try{

  let data = await fetchOverpass(query);

  if(!data.elements.length){
    document.getElementById("info").innerHTML = "❌ nincs megálló";
    return;
  }

  stopLayer.clearLayers();

  let used = {};
  let html = "<b>Közeli megállók:</b><br>";

  data.elements.forEach(s=>{

    let name = s.tags?.name;
    if(!name) return;

    if(used[name]) return;
    used[name] = true;

    L.circleMarker([s.lat,s.lon],{
      radius:9,
      color:"yellow",
      fillColor:"yellow",
      fillOpacity:1
    }).addTo(stopLayer);

    html += `<div class="stop"
      onclick="selectStop('${name}',${s.lat},${s.lon})">
      🚏 ${name}
    </div>`;
  });

  document.getElementById("info").innerHTML = html;

 }catch(err){
  document.getElementById("info").innerHTML =
  "⚠️ hálózati hiba";
 }

});

// ================= MENETREND (DEMO) =================
function getFakeDepartures(){

 let now = new Date();
 let list = [];

 for(let i=1;i<=5;i++){
  let d = new Date(now.getTime() + i*600000);
  list.push(d.toTimeString().slice(0,5));
 }

 return list;
}

// ================= SELECT STOP =================
function selectStop(name,lat,lon){

 map.setView([lat,lon],16);

 let times = getFakeDepartures();

 let html = `<b>🚏 ${name}</b><br><br>`;

 html += "<b>Következő indulások:</b><br>";

 times.forEach(t=>{
  html += `🕒 ${t}<br>`;
 });

 document.getElementById("info").innerHTML = html;
}

</script>

</body>
</html>
