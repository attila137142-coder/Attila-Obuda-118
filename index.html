let userLat = null;
let userLon = null;
let mode = "normal";

// ===== HELYZET
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    document.getElementById("status").innerText = "Helyzet OK";
    render();
  });
}

// ===== TÁVOLSÁG
function distance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1)*Math.PI/180;
  const Δλ = (lon2-lon1)*Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
    Math.cos(φ1)*Math.cos(φ2) *
    Math.sin(Δλ/2)**2;

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(R * c);
}

// ===== KÉSÉS FORMÁTUM
function formatDelay(sec) {
  const sign = sec >= 0 ? "+" : "-";
  sec = Math.abs(sec);
  const m = Math.floor(sec/60);
  const s = sec % 60;
  return sign + m + ":" + String(s).padStart(2,"0");
}

// ===== MÓD
function setMode(m) {
  mode = m;
  document.getElementById("app").className = "container " + m;
}

// ===== RENDER
function render() {
  const list = document.getElementById("list");
  const search = document.getElementById("search").value.toLowerCase();

  list.innerHTML = "";

  stops
    .filter(s =>
      s.name.toLowerCase().includes(search) ||
      s.gtfs.toLowerCase().includes(search)
    )
    .forEach(s => {

      let distText = "Nincs helyadat";
      if(userLat){
        const d = distance(userLat, userLon, s.lat, s.lon);
        const road = Math.round(d * 1.3);
        distText = `Légvonal: ${d} m | Út: ~${road} m`;
      }

      const delay = formatDelay(Math.floor(Math.random()*300 - 150));

      const div = document.createElement("div");
      div.className = "stop";

      div.innerHTML = `
        <b>${s.name}</b><br>
        <span class="small">GTFS: ${s.gtfs}</span><br>
        <span class="small">${distText}</span><br>
        <span class="small">Késés: ${delay}</span>
      `;

      list.appendChild(div);
    });
}

// ===== INDÍTÁS
