<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🗺 Attila Térkép PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#000;color:#FFD700;font-family:Arial;}
#map{height:90vh;}
#panel{
  height:10vh;
  padding:8px;
  background:#111;
  font-size:14px;
}

/* 🔥 FELIRAT ERŐSÍTÉS */
.leaflet-tile{
  filter: contrast(1.3) brightness(1.1) saturate(1.1);
}

/* 🔥 KONTRÚR HATÁS */
.leaflet-container{
  text-shadow:0 0 2px #000,0 0 4px #000;
}
</style>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<div id="map"></div>
<div id="panel">GPS indul...</div>

<script>

let map = L.map('map').setView([47.5,19.05], 13);

// 🌍 TOPO (részletes, erdőhöz jó)
let topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{
 maxZoom:17
}).addTo(map);

// 🚆 VASÚT (kiemelve)
let rail = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 opacity:0.4
}).addTo(map);

// duplázás = erősebb vasút
rail.addTo(map);

// 📍 marker + kör
let marker=null;
let circle=null;

let lastPos=null;

// 🔧 SIMÍTÁS (erdőben hasznos)
function smooth(lat,lon){
 if(!lastPos){
  lastPos=[lat,lon];
  return lastPos;
 }
 lastPos=[
  lastPos[0]*0.7+lat*0.3,
  lastPos[1]*0.7+lon*0.3
 ];
 return lastPos;
}

// 🧭 GPS
function updateGPS(){

 navigator.geolocation.getCurrentPosition(pos=>{

  let lat=pos.coords.latitude;
  let lon=pos.coords.longitude;
  let acc=pos.coords.accuracy;
  let speed=pos.coords.speed || 0;
  let heading=pos.coords.heading || 0;

  // simítás
  [lat,lon]=smooth(lat,lon);

  if(!marker){
   marker=L.marker([lat,lon]).addTo(map);
  }else{
   marker.setLatLng([lat,lon]);
  }

  if(circle) map.removeLayer(circle);

  circle=L.circle([lat,lon],{
   radius:acc,
   color:'yellow',
   fillOpacity:0.15
  }).addTo(map);

  map.setView([lat,lon],15);

  document.getElementById("panel").innerHTML=`
  📍 ${lat.toFixed(5)}, ${lon.toFixed(5)}<br>
  🎯 Pontosság: ±${Math.round(acc)} m<br>
  🚶 Sebesség: ${(speed*3.6).toFixed(1)} km/h<br>
  🧭 Irány: ${Math.round(heading)}°
  `;

 },err=>{
  document.getElementById("panel").innerText="GPS hiba: "+err.message;
 });

}

// 🔄 frissítés
setInterval(updateGPS,3000);

updateGPS();

</script>

</body>
</html>
