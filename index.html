<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  background: black;
  color: #FFD700;
  font-family: Arial;
  padding: 10px;
}

h1 {
  font-size: 28px;
}

button {
  background: black;
  color: #FFD700;
  border: 2px solid #FFD700;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

.stop {
  background: #222;
  padding: 12px;
  margin: 6px 0;
  border-radius: 12px;
}

.small {
  font-size: 13px;
  opacity: 0.8;
}

.red { color: red; }
.blue { color: cyan; }
</style>

</head>

<body>

<h1>🚌 Attila Közlekedés PRO</h1>

<button onclick="loadBKK()">📦 BKK betöltés</button>
<button onclick="getLocation()">📍 Saját hely</button>

<input id="search" placeholder="Megálló / GTFS keresés..." oninput="render()">

<div id="status">Nincs helyadat</div>
<div id="list"></div>

<script>

let stops = [];
let userLat = null;
let userLon = null;

// ===== HELYZET
function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    document.getElementById("status").innerText = "Helyzet OK";
    render();
  }, err => {
    document.getElementById("status").innerText = "HIBA: helyadat tiltva!";
  });
}

// ===== TÁVOLSÁG
function distance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1)*Math.PI/180;
  const Δλ = (lon2-lon1)*Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
    Math.cos(φ1)*Math.cos(φ2) *
    Math.sin(Δλ/2)**2;

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(R * c);
}

// ===== BKK BETÖLTÉS
async function loadBKK() {

  document.getElementById("status").innerText = "Betöltés...";

  try {
    const url = "https://go.bkk.hu/api/static/v1/public-gtfs/budapest_gtfs.zip";
    const res = await fetch(url);
    const blob = await res.blob();

    const zip = await JSZip.loadAsync(blob);
    const stopsFile = await zip.file("stops.txt").async("string");

    const rows = stopsFile.split("\n");

    stops = [];

    for (let i = 1; i < 200; i++) {
      let cols = rows[i].split(",");

      stops.push({
        name: cols[2],
        lat: parseFloat(cols[4]),
        lon: parseFloat(cols[5]),
        gtfs: cols[0]
      });
    }

    document.getElementById("status").innerText = "BKK betöltve!";
    render();

  } catch (err) {
    document.getElementById("status").innerText = "HIBA: Nem sikerült lekérni!";
  }
}

// ===== RENDER
function render() {

  const list = document.getElementById("list");
  const search = document.getElementById("search").value.toLowerCase();

  list.innerHTML = "";

  stops
    .filter(s =>
      s.name && (
        s.name.toLowerCase().includes(search) ||
        s.gtfs.toLowerCase().includes(search)
      )
    )
    .slice(0,50)
    .forEach(s => {

      let distText = "Nincs helyadat";

      if(userLat){
        const d = distance(userLat, userLon, s.lat, s.lon);
        const road = Math.round(d * 1.3);

        distText = `Légvonal: ${d} m | Út: ~${road} m`;
      }

      const delay = Math.floor(Math.random()*300 - 150);

      let delayText = `<span>${delay} sec</span>`;
      if(delay < 0) delayText = `<span class="red">${delay} sec</span>`;
      if(delay > 0) delayText = `<span class="blue">+${delay} sec</span>`;

      const div = document.createElement("div");
      div.className = "stop";

      div.innerHTML = `
        <b>${s.name}</b><br>
        <span class="small">GTFS: ${s.gtfs}</span><br>
        <span class="small">${distText}</span><br>
        <span class="small">Késés: ${delayText}</span>
      `;

      list.appendChild(div);
    });
}

</script>

</body>
</html>
