<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Attila közlekedés</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; }
#map { height:100vh; }
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.598,19.055],13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var marker = L.marker([47.598,19.055]).addTo(map);

marker.bindPopup("Békásmegyer teszt pont)
