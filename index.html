<script>

// ===== IDŐ FRISSÍTÉS (VALÓDI)
let departures = [];

function genData(){
  departures = [];

  stops.forEach(s=>{
    for(let i=0;i<2;i++){
      departures.push({
        stop:s.name,
        line:[134,243,"H5","S72"][i%4],
        dest:["Szentendre","Vác","Békás"][i%3],
        time:Math.floor(Math.random()*600+60),
        delay:Math.floor(Math.random()*60-30),
        type:["BKK","Volán","MÁV"][i%3]
      });
    }
  });

  // kisvasút külön
  gyStops.forEach(s=>{
    departures.push({
      stop:s.name,
      line:"GV",
      dest:"Széchenyi-hegy",
      time:Math.floor(Math.random()*600+120),
      delay:0,
      type:"Kisvasút"
    });
  });
}

// ===== CSÖKKENTÉS
function tick(){
  departures.forEach(d=>{
    d.time--;
  });
}

// ===== RENDER
function render(){

 let grouped={};

 departures.forEach(d=>{
  if(d.time<0) return;

  if(!grouped[d.stop]) grouped[d.stop]=[];
  grouped[d.stop].push(d);
 });

 let html="";

 Object.keys(grouped).forEach(stop=>{

  html+=`<h3>📍 ${stop}</h3>`;

  grouped[stop]
   .sort((a,b)=>a.time-b.time)
   .forEach(v=>{

    let m=Math.floor(v.time/60);
    let s=v.time%60;

    let cls="white";
    if(v.delay<0) cls="red";
    if(v.delay>0) cls="blue";

    html+=`
    <div class="${cls}">
    ${v.line} → ${m}:${String(s).padStart(2,"0")} →
    ${v.dest} (${v.type})
    </div>`;
   });

 });

 document.getElementById("list").innerHTML=html;
}

// ===== LOOP
genData();

setInterval(()=>{
 tick();
 render();
},1000);

render();

</script>
