<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>🚌 Megálló + LIVE rendszer</title>

<style>
body{background:black;color:#FFD700;font-family:Arial;text-align:center;}
#list{max-width:600px;margin:auto;}
.stop{border:1px solid #444;padding:10px;margin:5px;border-radius:10px;}
.small{font-size:12px;color:cyan;}
.red{color:red;}
.blue{color:cyan;}
</style>
</head>

<body>

<h2>🚌 Megállók + LIVE</h2>

<button onclick="getLocation()">📍 Saját hely</button>

<div id="status">Nincs helyadat</div>

<div id="list"></div>

<script>

// ===== 45 MEGÁLLÓ (rövidítve, bővíthető)
const stops = [
 {name:"Békásmegyer HÉV",lat:47.5981,lon:19.0546},
 {name:"Nád utca",lat:47.5940,lon:19.0484},
 {name:"Flórián tér",lat:47.5428,lon:19.0422},
 {name:"Batthyány tér",lat:47.5060,lon:19.0394},
 {name:"Szentendre HÉV",lat:47.6610,lon:19.0756},
 {name:"Pomáz",lat:47.6427,lon:19.0326},
 {name:"Vác",lat:47.7819,lon:19.1296},
 {name:"Királyrét",lat:47.8950,lon:18.9776},
 {name:"Kemence",lat:48.0159,lon:18.8884},
 {name:"Nagybörzsöny",lat:47.9360,lon:18.8277}
];

let userLat=null,userLon=null;

// ===== HELYZET
function getLocation(){
 navigator.geolocation.getCurrentPosition(pos=>{
   userLat=pos.coords.latitude;
   userLon=pos.coords.longitude;
   status.innerText="Helyzet OK";
   render();
 });
}

// ===== TÁVOLSÁG
function dist(a,b,c,d){
 const R=6371e3;
 const φ1=a*Math.PI/180;
 const φ2=c*Math.PI/180;
 const dφ=(c-a)*Math.PI/180;
 const dλ=(d-b)*Math.PI/180;

 const x=Math.sin(dφ/2)**2+
 Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;

 return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

// ===== MENETREND
function fakeMenetrend(){

 let now=new Date();
 let out="";

 for(let i=1;i<=3;i++){

  let sec=i*120 + Math.floor(Math.random()*60);
  let delay=Math.floor(Math.random()*120-60);

  let real=sec+delay;

  let m=Math.floor(real/60);
  let s=real%60;

  let cls="";

  if(delay<0) cls="red";
  if(delay>0) cls="blue";

  out+=`<div class="${cls}">
  ${m}:${String(s).padStart(2,"0")}
  (${delay}s)
  </div>`;
 }

 return out;
}

// ===== RENDER
function render(){

 let html="";

 stops.forEach(s=>{

  let d="nincs adat";

  if(userLat){
    let t=dist(userLat,userLon,s.lat,s.lon);
    let road=Math.round(t*1.3);

    d=`${t} m | ~${road} m`;
  }

  html+=`
  <div class="stop">
    <b>${s.name}</b><br>
    <div class="small">${d}</div>
    ${fakeMenetrend()}
  </div>`;
 });

 list.innerHTML=html;
}

// ===== FRISSÍTÉS
setInterval(()=>{
 if(userLat) render();
},15000);

render();

</script>

</body>
</html>
