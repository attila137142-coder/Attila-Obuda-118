<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BKK STABIL</title>

<style>
body{background:black;color:#FFD700;font-family:Arial;text-align:center;}
.stop{border:1px solid #444;margin:5px;padding:10px;}
.line{color:cyan;}
</style>
</head>

<body>

<h2>🚌 BKK MENETREND (STABIL)</h2>

<div id="out"></div>

<script>

// ===== MINTA GTFS ADAT (VALÓS LOGIKA)
const stops = [
 {id:"F00457",name:"Nád utca"},
 {id:"F00611",name:"Flórián tér"},
 {id:"F00057",name:"Batthyány tér"},
 {id:"09183",name:"Békásmegyer HÉV"},
];

const departures = [
 {stop:"F00457",line:"34",time:"12:05"},
 {stop:"F00457",line:"134",time:"12:12"},
 {stop:"F00611",line:"1",time:"12:08"},
 {stop:"F00611",line:"9",time:"12:15"},
 {stop:"F00057",line:"19",time:"12:06"},
 {stop:"09183",line:"H5",time:"12:10"},
];

// ===== KÉSÉS SZÁMOLÁS
function delay(){
 return Math.floor(Math.random()*120-60);
}

// ===== MEGJELENÍTÉS
function render(){

 let html="";

 stops.forEach(s=>{

  html+=`<div class="stop"><b>${s.name}</b><br>`;

  departures
    .filter(d=>d.stop===s.id)
    .forEach(d=>{

      let del=delay();

      let cls="";
      if(del<0) cls="red";
      if(del>0) cls="blue";

      html+=`<div class="line ${cls}">
      ${d.line} → ${d.time} (${del}s)
      </div>`;
    });

  html+="</div>";
 });

 out.innerHTML=html;
}

setInterval(render,5000);
render();

</script>

</body>
</html>
