<!DOCTYPE html> <html lang="hu"> <head> <meta charset="UTF-8"> <title>🚍 Attila Közlekedés PRO – GTFS</title> <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script> <style> body{ background:#000; color:#FFD700; font-family:Arial; padding:10px; } h1{text-align:center;} input{ width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:none; } button{ padding:10px; margin:5px; border-radius:10px; border:none; cursor:pointer; } .stop{ margin-top:15px; padding:10px; background:#111; border-radius:10px; } .row{ padding:5px; border-bottom:1px solid #333; } .small{font-size:12px;opacity:0.7;} </style> </head> <body> <h1>🚍 Attila Közlekedés PRO</h1> <input id="search" placeholder="Megálló / járat / GTFS..." oninput="render()"> <button onclick="loadGTFS()">📥 GTFS betöltés</button> <button onclick="getLocation()">📍 Saját hely</button> <div id="status">Nincs adat</div> <div id="list"></div> <script> // ===== SAJÁT 45 MEGÁLLÓ (RÖVIDÍTVE PÉLDA) const myStops = [ "H5-09183","BKK-F00457","BKK-00438","BKK-F00611","BKK-F00613" ]; // ===== ADATOK let stopsData = []; let stopTimes = []; let trips = []; let userLat=null,userLon=null; // ===== HELY function getLocation(){ navigator.geolocation.getCurrentPosition(pos=>{ userLat=pos.coords.latitude; userLon=pos.coords.longitude; render(); }); } // ===== GTFS BETÖLTÉS async function loadGTFS(){ document.getElementById("status").innerText="Betöltés..."; try{ const res = await fetch("https://go.bkk.hu/api/static/v1/public-gtfs/budapest_gtfs.zip"); const blob = await res.blob(); const zip = await JSZip.loadAsync(blob); const stopsTxt = await zip.file("stops.txt").async("string"); const stopTimesTxt = await zip.file("stop_times.txt").async("string"); const tripsTxt = await zip.file("trips.txt").async("string"); stopsData = parseCSV(stopsTxt); stopTimes = parseCSV(stopTimesTxt); trips = parseCSV(tripsTxt); document.getElementById("status").innerText="Kész ✔"; render(); }catch(e){ document.getElementById("status").innerText="HIBA: "+e; } } // ===== CSV PARSE function parseCSV(txt){ const rows = txt.split("\n"); const headers = rows[0].split(","); return rows.slice(1).map(r=>{ const cols = r.split(","); let obj={}; headers.forEach((h,i)=>obj[h]=cols[i]); return obj; }); } // ===== RENDER function render(){ const search = document.getElementById("search").value.toLowerCase(); let html=""; stopsData .filter(s => myStops.includes(s.stop_id)) .forEach(s=>{ const name = s.stop_name.toLowerCase(); if(search && !name.includes(search) && !s.stop_id.toLowerCase().includes(search) ) return; html += `<div class="stop"><b>${s.stop_name}</b> <div class="small">${s.stop_id}</div>`; const relatedTimes = stopTimes .filter(st => st.stop_id === s.stop_id) .slice(0,5); relatedTimes.forEach(st=>{ const trip = trips.find(t=>t.trip_id === st.trip_id); html += ` <div class="row"> ${trip ? trip.route_id : "?"} | ${st.arrival_time} </div>`; }); html += "</div>"; }); document.getElementById("list").innerHTML = html; } </script> </body> </html>
