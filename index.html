<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<title>GTFS Map PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
margin: 0;
height: 100%;
}

#map {
position: absolute;
top: 0;
left: 300px;
right: 0;
bottom: 0;
}

#sidebar {
position: absolute;
width: 300px;
top: 0;
bottom: 0;
left: 0;
background: #222;
color: white;
overflow-y: auto;
padding: 10px;
}

button {
width: 100%;
margin-bottom: 5px;
padding: 10px;
background: #444;
color: white;
border: none;
cursor: pointer;
}

button:hover {
background: #666;
}

.stop-item {
padding: 5px;
border-bottom: 1px solid #444;
cursor: pointer;
}

.stop-item:hover {
background: #555;
}
</style>
</head>

<body>

<div id="sidebar">
<h3>Közeli megállók</h3>

<button onclick="setLayer('osm')">Térkép</button>
<button onclick="setLayer('sat')">Műhold</button>

<div id="stopsList"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// TÉRKÉP
var map = L.map('map').setView([47.4979, 19.0402], 13);

// LAYEREK
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var sat = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');

function setLayer(type) {
map.removeLayer(osm);
map.removeLayer(sat);

if (type === 'osm') map.addLayer(osm);
if (type === 'sat') map.addLayer(sat);
}

// MARKER GROUP
var markers = L.layerGroup().addTo(map);

// GTFS BETÖLTÉS
fetch('stops.txt')
.then(res => res.text())
.then(data => {
let lines = data.split('\n');

let stopsList = document.getElementById("stopsList");

for (let i = 1; i < lines.length; i++) {
let cols = lines[i].split(',');

if (cols.length < 5) continue;

let name = cols[2];
let lat = parseFloat(cols[3]);
let lon = parseFloat(cols[4]);

if (!lat || !lon) continue;

// MARKER
let marker = L.marker([lat, lon])
.addTo(markers)
.bindPopup(name);

// LISTA
let div = document.createElement("div");
div.className = "stop-item";
div.innerText = name;

div.onclick = () => {
map.setView([lat, lon], 16);
marker.openPopup();
};

stopsList.appendChild(div);
}
})
.catch(err => {
alert("Nem sikerült betölteni a stops.txt fájlt!");
console.error(err);
});
</script>

</body>
