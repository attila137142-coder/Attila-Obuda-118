<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>REAL NATIONAL TRANSIT OS</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body{margin:0;font-family:Arial;background:#0f172a;color:#e2e8f0}
    header{padding:12px;background:#111827;display:flex;justify-content:space-between;align-items:center}
    h1{font-size:14px;margin:0}
    .btn{background:#2563eb;border:none;padding:8px 10px;color:#fff;border-radius:8px;cursor:pointer}
    .grid{display:grid;gap:10px;padding:10px}
    .card{background:#1f2937;padding:10px;border-radius:12px}
    input{width:100%;padding:10px;border-radius:8px;border:none;margin-top:5px}
    #map{height:320px;border-radius:12px}
    .resultBox{margin-top:8px;padding:8px;background:#111827;border-radius:8px;cursor:pointer}
    .tag{font-size:11px;padding:2px 6px;border-radius:6px;background:#374151;margin-left:5px}

    .late{color:#3b82f6}   /* KÉK - késik */
    .early{color:#ef4444}  /* PIROS - siet */
    .onTime{color:#e2e8f0}

    .vehicleRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:6px;
      font-size:12px;
      opacity:0.9;
    }

    .vehicle{
      background:#0b1220;
      padding:4px 8px;
      border-radius:6px;
      border:1px solid #374151;
    }

    #menu{position:fixed;inset:0;background:#0b1220;display:none;padding:20px;z-index:999;overflow:auto}
  </style>
</head>
<body>

<header>
  <h1>🚆 REAL NATIONAL TRANSIT OS</h1>
  <button class="btn" onclick="toggleMenu()">Menü</button>
</header>

<div id="menu">
  <h2>🧭 DISPATCH ENGINE</h2>
  <p>BKK + MÁV + VOLÁN + FLEET DATA</p>
  <button class="btn" onclick="toggleMenu()">Bezár</button>
</div>

<div class="grid">

  <div class="card">
    <h3>🔍 Kereső (GTFS + idegen adatok)</h3>
    <input id="search" placeholder="megálló / jármű / járat" oninput="searchAll()" />
    <div id="results"></div>
  </div>

  <div class="card">
    <h3>🗺️ Térkép</h3>
    <div id="map"></div>
  </div>

  <div class="card">
    <h3>📊 Indulási panel</h3>
    <div id="panel">Válassz elemet...</div>
  </div>

</div>

<script>

let map;
let userLat=null,userLon=null;

// ---------------- STOPS ----------------
const stops=[
  {name:"Deák Ferenc tér",gtfs:"BKK_001",lat:47.4975,lon:19.0550,route:"R1"},
  {name:"Örs vezér tere",gtfs:"BKK_002",lat:47.5017,lon:19.1356,route:"R1"},
  {name:"Szob",gtfs:"MAV_002",lat:47.8213,lon:18.8626,route:"R2"}
];

// ---------------- IDEGEN / FLEET ADATOK ----------------
const vehicles=[
  {route:"R1",type:"Volvo 2220",line:"300/95",shift:"2430/3",plate:"DKG-258"},
  {route:"R2",type:"MÁV FLIRT",line:"120A",shift:"1102/1",plate:"H-TRAIN"}
];

// ---------------- GPS ----------------
function startGPS(){
  navigator.geolocation.watchPosition(p=>{
    userLat=p.coords.latitude;
    userLon=p.coords.longitude;
  });
}

// ---------------- DIST ----------------
function dist(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ---------------- SEARCH (ALL DATA) ----------------
function searchAll(){
  const q=document.getElementById('search').value.toLowerCase();
  const res=document.getElementById('results');
  res.innerHTML="";

  const all=[
    ...stops.map(s=>({...s,type:"stop"})),
    ...vehicles.map(v=>({...v,type:"vehicle"}))
  ];

  all.filter(x=>(x.name||x.type||x.plate||"").toLowerCase().includes(q)|| (x.gtfs||"").toLowerCase().includes(q))
  .forEach(x=>{

    const div=document.createElement("div");
    div.className="resultBox";

    if(x.type=="stop"){
      div.innerHTML=`🚏 ${x.name}<br>🆔 ${x.gtfs}`;
      div.onclick=()=>renderStop(x);
    }

    if(x.type=="vehicle"){
      div.innerHTML=`🚍 ${x.type}<br>📟 ${x.line} | ${x.shift}<br>🚗 ${x.plate}`;
      div.onclick=()=>renderVehicle(x);
    }

    res.appendChild(div);
  });
}

// ---------------- STOP PANEL ----------------
function renderStop(s){
  const el=document.getElementById('panel');
  const v=vehicles.filter(v=>v.route===s.route);

  const times=[-3,0,4,10];

  el.innerHTML=`<b>${s.name}</b><br>🧭 Route: ${s.route}<br><br>`;

  v.forEach(vv=>{
    el.innerHTML+=`
      <div class="vehicleRow">
        <div class="vehicle">${vv.type}</div>
        <div class="vehicle">${vv.line}</div>
        <div class="vehicle">${vv.shift}</div>
        <div class="vehicle">${vv.plate}</div>
      </div>
    `;
  });

  times.forEach(t=>{
    let cls="onTime",txt="IDŐBEN";

    if(t<0){cls="late";txt=`KÉSIK ${Math.abs(t)}p`}
    if(t>5){cls="early";txt=`SIET ${t}p`}

    el.innerHTML+=`<div class="${cls}">🕒 +${t}p <span class="tag">${txt}</span></div>`;
  });
}

// ---------------- VEHICLE PANEL ----------------
function renderVehicle(v){
  const el=document.getElementById('panel');
  el.innerHTML=`
    <b>🚍 ${v.type}</b><br>
    📟 ${v.line}<br>
    ⏱ ${v.shift}<br>
    🚗 ${v.plate}<br>
    🧭 Route: ${v.route}
  `;
}

// ---------------- MAP ----------------
window.onload=()=>{
  map=L.map('map').setView([47.5,19.05],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  stops.forEach(s=>{
    L.marker([s.lat,s.lon]).addTo(map)
    .bindPopup(`${s.name}<br>${s.gtfs}`)
    .on('click',()=>renderStop(s));
  });

  startGPS();
};

// ---------------- MENU ----------------
function toggleMenu(){
  const m=document.getElementById('menu');
  m.style.display=m.style.display==='block'?'none':'block';
}

</script>

</body>
</html>
