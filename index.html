<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Attila Közlekedés térkép</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.4979, 19.0402], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
}).addTo(map);


L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap'
}).addTo(map);
L.marker([47.539,19.046]).addTo(map)
.bindPopup("Óbuda megálló");

L.marker([47.520,19.056]).addTo(map)
.bindPopup("Margit híd");

L.marker([47.4979,19.0402]).addTo(map)
.bindPopup("Belváros");
</script>

</body>
</html>
