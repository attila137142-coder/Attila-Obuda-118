<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXY CORE + GTFS + ROUTE AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:rgba(0,0,0,0.85);
 color:#0f0;
 padding:10px;
 width:360px;
 border:1px solid #0f0;
}

button{
 width:100%;
 margin:3px 0;
 padding:6px;
 background:black;
 color:#0f0;
 border:1px solid #0f0;
 cursor:pointer;
}

.status{
 font-size:12px;
 margin:5px 0;
 border:1px solid #0f0;
 padding:5px;
}
</style>
</head>

<body>

<div id="panel">
<h3>🧭 ROXY ROUTE AI CORE</h3>

<div id="status" class="status">READY</div>

<button onclick="startGPS()">📍 GPS</button>
<button onclick="loadGTFS()">🚉 GTFS LOAD</button>
<button onclick="runDijkstra()">🧠 ROUTE AI</button>
<button onclick="touristMode()">🌲 TOURIST MODE</button>
<button onclick="resetAll()">🧹 RESET</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.5,19.04],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= DATA =================
let stops = [];     // GTFS megállók
let graph = {};     // útgráf
let markers = [];

// ================= GPS =================
function startGPS(){
 navigator.geolocation.getCurrentPosition(p=>{
  map.setView([p.coords.latitude,p.coords.longitude],15);
  L.marker([p.coords.latitude,p.coords.longitude]).addTo(map);
 });
}

// ================= GTFS ENGINE (DEMO) =================
// (valós rendszerben CSV / JSON GTFS jön ide)

function loadGTFS(){

 // DEMO 45 megálló helyett 5 pont
 stops = [
  {id:"A",lat:47.5,lon:19.0},
  {id:"B",lat:47.51,lon:19.01},
  {id:"C",lat:47.52,lon:19.03},
  {id:"D",lat:47.53,lon:19.05},
  {id:"E",lat:47.54,lon:19.06}
 ];

 // graph build
 graph = {
  A:["B"],
  B:["A","C"],
  C:["B","D"],
  D:["C","E"],
  E:["D"]
 };

 // kirajzolás
 stops.forEach(s=>{
  let m = L.marker([s.lat,s.lon]).addTo(map);
  markers.push(m);
 });

 document.getElementById("status").innerText =
 "🚉 GTFS LOADED";
}

// ================= DIJKSTRA AI =================
function runDijkstra(){

 let start = "A";
 let goal = "E";

 let dist = {};
 let prev = {};
 let Q = Object.keys(graph);

 Q.forEach(n=>dist[n]=Infinity);
 dist[start]=0;

 while(Q.length){

  Q.sort((a,b)=>dist[a]-dist[b]);
  let u = Q.shift();

  if(u===goal) break;

  for(let v of (graph[u]||[])){
   let alt = dist[u] + 1;
   if(alt < dist[v]){
    dist[v]=alt;
    prev[v]=u;
   }
  }
 }

 let path = [];
 let cur = goal;

 while(cur){
  path.unshift(cur);
  cur = prev[cur];
 }

 document.getElementById("status").innerText =
 "🧠 ROUTE: " + path.join(" → ");

 // draw route
 let coords = path.map(id=>{
  let s = stops.find(x=>x.id===id);
  return [s.lat,s.lon];
 });

 L.polyline(coords,{color:"lime"}).addTo(map);
}

// ================= TOURIST MODE =================
function touristMode(){

 document.getElementById("status").innerText =
 "🌲 TOURIST MODE (légvonal)";

 navigator.geolocation.getCurrentPosition(p=>{
  let from = [p.coords.latitude,p.coords.longitude];
  let to = [47.54,19.06];

  L.polyline([from,to],{color:"orange"}).addTo(map);
 });

}

// ================= RESET =================
function resetAll(){
 location.reload();
}

</script>

</body>
</html>
