<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>🌲 Turista PRO FIX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:black;color:#0f0;font-family:Arial;}
#map{height:75vh;}
#panel{padding:10px;}
button{padding:8px;margin:5px;background:black;color:#0f0;border:2px solid #0f0;}
.box{background:black;color:yellow;border:1px solid yellow;padding:3px;font-size:11px;}
</style>
</head>

<body>

<div id="panel">
<button onclick="reset()">🧹 Törlés</button><br>

📏 Hossz: <span id="dist">-</span><br>
⬆️ Emelkedés: <span id="up">-</span><br>
⬇️ Lejtés: <span id="down">-</span><br>
📊 Átlag: <span id="avg">-</span><br>
⚠️ MAX: <span id="max">-</span><br>
⚠️ MIN: <span id="min">-</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([47.55,19.03],13);

// ✅ VALÓDI TURISTA TÉRKÉP
let base = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
let hiking = L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png');

base.addTo(map);
hiking.addTo(map);

let pts=[];
let line;
let markers=[];

map.on("click", e=>{
  pts.push([e.latlng.lng,e.latlng.lat]);
  if(pts.length===2) route();
});

// ===== ROUTE
async function route(){

  let url=`https://router.project-osrm.org/route/v1/foot/${pts[0][0]},${pts[0][1]};${pts[1][0]},${pts[1][1]}?overview=full&geometries=geojson`;

  let r=await fetch(url);
  let d=await r.json();

  let coords=d.routes[0].geometry.coordinates;

  // 🔧 LIMITÁLÁS (EZ A KULCS!)
  coords = coords.filter((c,i)=> i%5===0);

  if(line) map.removeLayer(line);
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  line=L.polyline(coords.map(c=>[c[1],c[0]]),{color:'lime'}).addTo(map);

  // ===== ELEVATION
  let elev=[];

  try{
    let urlElev="https://api.opentopodata.org/v1/test-dataset?locations="+
      coords.map(c=>c[1]+","+c[0]).join("|");

    let res=await fetch(urlElev);
    let data=await res.json();

    elev=data.results.map(r=>r.elevation);

  }catch(e){
    console.log("Elevation hiba");
    elev = coords.map(()=>0);
  }

  calc(coords,elev);
}

// ===== CALC
function calc(coords,elev){

  let total=0,up=0,down=0,max=-999,min=999;

  for(let i=0;i<coords.length-1;i++){

    let a=coords[i],b=coords[i+1];

    let d=map.distance([a[1],a[0]],[b[1],b[0]]);
    let h=elev[i+1]-elev[i];

    if(d<2) continue;

    let slope = d>0 ? (h/d)*100 : 0;

    total+=d;

    if(h>0) up+=h;
    else down+=Math.abs(h);

    if(slope>max) max=slope;
    if(slope<min) min=slope;

    let mid=[(a[1]+b[1])/2,(a[0]+b[0])/2];

    let m=L.marker(mid,{
      icon:L.divIcon({
        html:`<div class="box">${slope.toFixed(1)}%<br>${Math.round(d)}m</div>`
      })
    }).addTo(map);

    markers.push(m);
  }

  document.getElementById("dist").innerText=(total/1000).toFixed(2)+" km";
  document.getElementById("up").innerText=Math.round(up)+" m";
  document.getElementById("down").innerText=Math.round(down)+" m";
  document.getElementById("avg").innerText=(total>0?((up-down)/total*100).toFixed(1):0)+" %";
  document.getElementById("max").innerText=max.toFixed(1)+" %";
  document.getElementById("min").innerText=min.toFixed(1)+" %";
}

// ===== RESET
function reset(){
  pts=[];
  if(line) map.removeLayer(line);
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
}

</script>

</body>
</html>
