<!DOCTYPE html>
<html>
<head>
  <title>Szabó Attila</title>
  <style>
    body {
      background-color: #f4f6f9;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: auto;
    }
    h1 {
      color: #2c3e50;
    }
    p {
      color: #555;
      font-size: 18px;
    }
    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background-color: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
    .button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Szabó Attila 👋</h1>
    <p>Tanuló webfejlesztő vagyok.</p>
    <p>Ez az első élő weboldalam a Vercelen 🚀</p>
    <a href="#" class="button">Kapcsolat</a>
  </div>

</body>
</html>
