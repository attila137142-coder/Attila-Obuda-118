<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attila Közlekedés</title>

<style>
body { font-family: -apple-system; margin:0; padding:15px; background:#f2f2f7; }
h1 { text-align:center; }
input { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc; }
.card {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
button {
  background:#007aff;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  float:right;
}
.small { font-size:14px; color:#555; }
</style>
</head>
<body>

<h1>🚆 Attila Közlekedés</h1>

<input type="text" id="search" placeholder="Állomás keresése...">

<div id="menetrend"></div>

<script>
const jaratok = [
  {jarat:"Kisvasút 1", indul:"06:00", erkezik:"07:10", allomas:"Szob"},
  {jarat:"Kisvasút 2", indul:"08:00", erkezik:"09:10", allomas:"Nagybörzsöny"},
  {jarat:"Kisvasút 3", indul:"10:00", erkezik:"11:10", allomas:"Márianosztra"},
  {jarat:"Kisvasút 4", indul:"12:00", erkezik:"13:10", allomas:"Szob"}
];

function render(filter="") {
  const lista = document.getElementById("menetrend");
  lista.innerHTML="";
  jaratok
    .filter(j=>j.allomas.toLowerCase().includes(filter.toLowerCase()))
    .forEach(j=>{
      const fav = localStorage.getItem(j.jarat)==="1";
      lista.innerHTML += `
        <div class="card">
          <strong>${j.jarat}</strong>
          <div class="small">Állomás: ${j.allomas}</div>
          <div>Indul: ${j.indul}</div>
          <div>Érkezik: ${j.erkezik}</div>
          <button onclick="toggleFav('${j.jarat}')">
            ${fav ? "★ Kedvenc" : "☆ Kedvenc"}
          </button>
        </div>`;
    });
}

function toggleFav(jarat){
  if(localStorage.getItem(jarat)==="1"){
    localStorage.removeItem(jarat);
  } else {
    localStorage.setItem(jarat,"1");
  }
  render(document.getElementById("search").value);
}

document.getElementById("search").addEventListener("input",e=>{
  render(e.target.value);
});

render();
</script>

</body>
</html>
