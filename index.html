<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXY V7-B UPGRADE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; width:100vw; }

#panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:9999;
 background:rgba(0,0,0,0.85);
 color:#0f0;
 padding:10px;
 width:340px;
 border:1px solid #0f0;
}

button{
 width:100%;
 margin:3px 0;
 padding:6px;
 background:black;
 color:#0f0;
 border:1px solid #0f0;
 cursor:pointer;
}

.status{
 font-size:12px;
 margin:5px 0;
 border:1px solid #0f0;
 padding:5px;
}
</style>
</head>

<body>

<div id="panel">
<h3>🌲 ROXY V7-B UPGRADE</h3>

<div id="status" class="status">READY</div>
<div id="info" class="status">--</div>

<button onclick="startGPS()">📍 GPS</button>
<button onclick="startTrack()">📡 TRACK</button>
<button onclick="calcStats()">📊 ANALYZE</button>
<button onclick="resetAll()">🧹 RESET</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
let map = L.map('map').setView([47.5,19.04],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= DATA =================
let trail = [];
let watchID = null;
let line;

// ================= GPS =================
function startGPS(){
 navigator.geolocation.getCurrentPosition(p=>{
  map.setView([p.coords.latitude,p.coords.longitude],15);
 });
}

// ================= TRACK =================
function startTrack(){

 if(watchID) return;

 watchID = navigator.geolocation.watchPosition(p=>{

  let pt = {
   lat: p.coords.latitude,
   lon: p.coords.longitude,
   acc: p.coords.accuracy,
   alt: p.coords.altitude || 0
  };

  trail.push(pt);

  L.circleMarker([pt.lat,pt.lon],{radius:4,color:"lime"}).addTo(map);

  if(line) map.removeLayer(line);

  line = L.polyline(trail.map(t=>[t.lat,t.lon]),{color:"lime"}).addTo(map);

 });

}

// ================= ANALYZE =================
function calcStats(){

 if(trail.length < 2){
  alert("Nincs elég adat");
  return;
 }

 let total = 0;
 let maxSlope = 0;

 for(let i=1;i<trail.length;i++){

  let a = trail[i-1];
  let b = trail[i];

  let dx = (b.lon - a.lon)*111000;
  let dy = (b.lat - a.lat)*111000;

  let dist = Math.sqrt(dx*dx + dy*dy);

  let dz = (b.alt - a.alt);

  let slope = dist ? (dz/dist)*100 : 0;

  total += dist;
  maxSlope = Math.max(maxSlope, slope);
 }

 document.getElementById("info").innerHTML =
  "📏 Táv: "+Math.round(total)+" m<br>"+
  "⛰️ Max meredekség: "+maxSlope.toFixed(1)+"%";

 document.getElementById("status").innerText =
  "ANALYZED";
}

// ================= RESET =================
function resetAll(){
 location.reload();
}

</script>

</body>
</html>
