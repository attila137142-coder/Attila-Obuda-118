<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Közlekedés PRO</title>

<style>
body { font-family: Arial; margin: 0; }

nav {
  background: #222;
  padding: 10px;
}

nav button {
  margin: 5px;
  padding: 10px;
  cursor: pointer;
  color: white;
  background: #444;
  border: 0;
  border-radius: 6px;
}

.section {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}
</style>
</head>

<body>

<nav>
  <button onclick="show('tavolsag')">📏 Távolság</button>
  <button onclick="show('menetrend')">🚍 Menetrend</button>
  <button onclick="show('terkep')">🗺️ Térkép</button>
  <button onclick="show('egyeb')">⚙️ Egyéb</button>
</nav>

<!-- SZEKCIÓK -->

<div id="tavolsag" class="section active">
  <h2>Távolság adatok</h2>
  <p>Itt lesznek a számítások, lejtések, stb.</p>
</div>

<div id="menetrend" class="section">
  <h2>Közlekedési menetrendek</h2>
  <p>Itt lesz BKK / MÁV / Volán logika.</p>
</div>

<div id="terkep" class="section">
  <h2>Térképek</h2>
  <p>Itt jönnek a térképes modulok.</p>
</div>

<div id="egyeb" class="section">
  <h2>Egyéb modulok</h2>
  <p>Extra funkciók.</p>
</div>

<script>
function show(id) {
  let sections = document.querySelectorAll(".section");
  sections.forEach(s => s.classList.remove("active"));

  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
