<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Attila Transit V9 - A→B Route Engine</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

#wrap{
display:grid;
grid-template-columns:2fr 1fr;
height:100vh;
}

#map{height:100%;}

.panel{
background:#111827;
padding:10px;
overflow:auto;
}

input{
width:100%;
padding:8px;
margin-bottom:8px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

.card{
background:#0f172a;
padding:8px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #243244;
font-size:13px;
}

h3{color:#38bdf8;}
</style>
</head>

<body>

<div id="wrap">

<div id="map"></div>

<div class="panel">

<h3>🚏 A → B útvonaltervező</h3>

<input id="from" placeholder="📍 Honnan? pl. Deák tér">
<input id="to" placeholder="📍 Hova? pl. Kelenföld">

<button onclick="planRoute()">🚆 Útvonal keresés</button>

<h3>📌 Eredmény</h3>
<div id="result">Írj be két pontot</div>

</div>

</div>

<script>

let map = L.map('map').setView([47.4979,19.0402], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:"OSM"
}).addTo(map);

/* ================= STOP ADATBÁZIS ================= */

let stops = [
{name:"Deák tér", lat:47.4979, lon:19.0540},
{name:"Blaha Lujza tér", lat:47.4963, lon:19.0700},
{name:"Kelenföld", lat:47.4649, lon:19.0193},
{name:"Nyugati", lat:47.5101, lon:19.0560},
{name:"Népliget", lat:47.4760, lon:19.0990},
{name:"Kőbánya-Kispest", lat:47.4636, lon:19.1467}
];

/* ================= SEGÉD ================= */

function dist(a,b){
 return Math.sqrt(
  Math.pow(a.lat-b.lat,2)+
  Math.pow(a.lon-b.lon,2)
 );
}

function findStop(name){
 return stops.find(s=>s.name.toLowerCase()===name.toLowerCase());
}

function nearest(lat,lon){
 return stops.reduce((a,b)=>{

  let da = Math.hypot(lat-a.lat,lon-a.lon);
  let db = Math.hypot(lat-b.lat,lon-b.lon);

  return db<da ? b : a;

 });
}

/* ================= ROUTE ENGINE ================= */

function planRoute(){

 let fromName = document.getElementById("from").value;
 let toName = document.getElementById("to").value;

 let from = findStop(fromName);
 let to = findStop(toName);

 if(!from || !to){
  document.getElementById("result").innerHTML =
  "❌ nem található megálló";
  return;
 }

 /* ===== LEGS ===== */

 let walk1 = nearest(from.lat,from.lon);
 let walk2 = nearest(to.lat,to.lon);

 let d1 = Math.hypot(from.lat-walk1.lat,from.lon-walk1.lon)*111000;
 let d2 = Math.hypot(to.lat-walk2.lat,to.lon-walk2.lon)*111000;

 let total = d1 + d2;

 /* ===== MAP DRAW ===== */

 map.eachLayer(l=>{
 if(l._path) map.removeLayer(l);
 });

 L.polyline([
 [from.lat,from.lon],
 [walk1.lat,walk1.lon],
 [walk2.lat,walk2.lon],
 [to.lat,to.lon]
 ],{
 color:"cyan"
 }).addTo(map);

 map.fitBounds([
 [from.lat,from.lon],
 [to.lat,to.lon]
 ]);

 /* ===== OUTPUT ===== */

 document.getElementById("result").innerHTML = `
 <div class="card">
  🚶 Kiindulás: ${from.name}<br>
  🚏 Gyaloglás: ${Math.round(d1)} m
 </div>

 <div class="card">
  🚆 Átszállási zóna<br>
  📍 ${walk1.name} → ${walk2.name}
 </div>

 <div class="card">
  🚶 Érkezés: ${to.name}<br>
  🚏 Gyaloglás: ${Math.round(d2)} m
 </div>

 <div class="card">
  📏 Teljes távolság: ${(total/1000).toFixed(2)} km
 </div>
 `;
}

</script>

</body>
</html>
